function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

/* ============================================================
   QUIZ
   ============================================================ */
function mountQuiz(quiz, typeA, typeB, container) {
  let current = 0;
  const answers = new Array(quiz.questions.length).fill(null);

  function renderQuestion() {
    const total = quiz.questions.length;
    const pct   = Math.round((current / total) * 100);
    const q     = quiz.questions[current];
    const isLast = current === total - 1;

    container.innerHTML = `
      <p class="vs-quiz-intro">5 questions specific to this pairing. Select the option that fits you better.</p>
      <div class="vs-quiz-prog-bar"><div class="vs-quiz-prog-fill" style="width:${pct}%"></div></div>
      <div class="vs-quiz-q-num">Question ${current + 1} of ${total}</div>
      <div class="vs-quiz-q-text">${q.q}</div>
      <div class="vs-quiz-options">
        <button class="vs-quiz-option" data-score="${q.a.score}">${q.a.text}</button>
        <button class="vs-quiz-option" data-score="${q.b.score}">${q.b.text}</button>
      </div>
      <div class="vs-quiz-footer">
        <span class="vs-quiz-prog-text">${current + 1} / ${total}</span>
        <button class="vs-quiz-btn" id="quiz-next" disabled>${isLast ? 'See result' : 'Next'}</button>
      </div>
    `;

    container.querySelectorAll('.vs-quiz-option').forEach(btn => {
      btn.addEventListener('click', function () {
        container.querySelectorAll('.vs-quiz-option').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        answers[current] = this.dataset.score;
        container.querySelector('#quiz-next').disabled = false;
      });
    });

    container.querySelector('#quiz-next').addEventListener('click', () => {
      if (answers[current] === null) return;
      current++;
      if (current >= total) renderResult();
      else renderQuestion();
    });
  }

  function renderResult() {
    const aCount = answers.filter(v => v === 'A').length;
    const bCount = answers.filter(v => v === 'B').length;
    let result;
    if (aCount > bCount)      result = quiz.resultA;
    else if (bCount > aCount) result = quiz.resultB;
    else                      result = quiz.resultTie;

    const typeSlug  = result.type !== '?' ? result.type.toLowerCase() : null;
    const typeLink  = typeSlug ? `/types/${typeSlug}` : '/';
    const linkLabel = typeSlug ? `Read about ${result.type}` : 'Take the full test';

    container.innerHTML = `
      <div class="vs-quiz-result">
        <div class="vs-quiz-result-type">${result.type}</div>
        <div class="vs-quiz-result-label">${result.label}</div>
        <div class="vs-quiz-result-desc">${result.desc}</div>
        <div class="vs-quiz-result-links">
          <a class="vs-quiz-result-link" href="${typeLink}">${linkLabel}</a>
          <a class="vs-quiz-result-link" href="/">Take the full test</a>
        </div>
        <button class="vs-quiz-reset">Retake quiz</button>
      </div>
    `;

    container.querySelector('.vs-quiz-reset').addEventListener('click', () => {
      current = 0;
      answers.fill(null);
      renderQuestion();
    });
  }

  renderQuestion();
}

      if (!d) return '';
      return `<a class="vs-pair-card" href="/vs/${slug}">
        <div class="vs-pair-card-types">${d.typeA} vs ${d.typeB}</div>
        <div class="vs-pair-card-tag">${d.roleA} vs ${d.roleB}</div>
      </a>`;
    }).join('');
    return `
      <div class="vs-hub-section">
        <div class="vs-hub-section-title">${g.label}</div>
        <div class="vs-hub-grid">${cards}</div>
      </div>`;
  }).join('');

  root.innerHTML = `
    <div class="vs-hub">
      <div class="vs-hub-header">
        <h1 class="vs-hub-title">Type <em>vs</em> Type</h1>
        <p class="vs-hub-desc">Deep comparisons of every major MBTI pairing — cognitive functions, five ways to tell them apart, and a short quiz to help you find which one you actually are.</p>
      </div>
      ${sectionsHTML}
      <div class="vs-cta" style="margin-top:8px;">
        <p class="vs-cta-copy">Not sure which type you are to begin with?</p>
        <a class="vs-cta-btn" href="/">Take the 77 Scenarios test</a>
      </div>
    </div>
  `;
}

/* ============================================================
   INIT
   ============================================================ */
(function init() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  const slug = parts[1] || '';
  const data = vsData[slug];
  const root = document.getElementById('vs-root');

  if (!slug) {
    renderIndex();
    return;
  }

  if (!data) {
    document.getElementById('page-title').textContent = 'Pairing Not Found | 77 Scenarios';
    root.innerHTML = `
      <div class="vs-not-found">
        <h1>${slug.toUpperCase().replace(/-/g, ' vs ').replace(/\bvs\b/, 'vs')}</h1>
        <p>This pairing isn't available yet. Browse all comparisons or take the full test to find your type.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="/vs" class="vs-cta-btn">All comparisons</a>
          <a href="/" class="vs-cta-btn" style="background:none;border:1px solid var(--gold);color:var(--gold);">Take the test</a>
        </div>
      </div>
    `;
    return;
  }

  renderPage(data);
})();
</script>
<script src="/nav.js"></script>
</body>
</html>
