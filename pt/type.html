<script>
const types = {
  ISTJ:{
    name:"O Inspetor",tagline:"Dever, precisão, integridade",
    p1:"Todo mundo diz que se importa em fazer as coisas do jeito certo. A maioria não quer dizer isso da forma que você quer. Você mantém um padrão silenciosamente, sem anúncios, e percebe a distância entre o que as pessoas se comprometem a fazer e o que realmente entregam. Essa diferença te incomoda de uma forma que os outros acham difícil de entender. Você não é severo por isso, só lembra.",
    p2:"Sua confiabilidade é rara o suficiente para que a maioria das pessoas só consiga apreciá-la quando desaparece. Você não trabalha por elogio. Trabalha porque o trabalho merece ser feito corretamente. As pessoas que te conhecem bem sabem que podem te entregar algo e ir embora, com a certeza de que será resolvido.",
    desire:"Ser completamente confiável e nunca ser a causa de uma falha",
    fear:"Ser pego despreparado, ou ser responsável por algo que foi feito errado",
    strengths:["Compromissos são cumpridos sem exceção — as pessoas aprendem rápido que podem depender de você","Memória para detalhes factuais, decisões passadas e nuances procedimentais é incomumente afiada","Permanece metódico quando a pressão aumenta, enquanto outros ficam reativos","Aplica o mesmo padrão a si mesmo que aplica aos outros, o que é raro"],
    blindspots:["Quando as circunstâncias realmente mudam, adaptar-se pode parecer uma concessão, mesmo quando não é","O calor está lá, mas tende a ficar interno — as pessoas às vezes se sentem invisíveis para você","Preocupações emocionais muitas vezes são filtradas antes de serem totalmente compreendidas"],
    traits:["Confiável","Meticuloso","Íntegro","Paciente","Reservado"],
    famous:[{name:"Hermione Granger",ctx:"Fictício"},{name:"Warren Buffett",ctx:"Investidor"},{name:"Rainha Elizabeth II",ctx:"Histórico"}],
    similar:["ESTJ","ISFJ","INTJ"]
  },
  ISFJ:{
    name:"O Protetor",tagline:"Cuidado silencioso, lealdade feroz",
    p1:"Você lembra o que as pessoas dizem porque estava realmente ouvindo. Não ouvindo e planejando sua resposta, nem ouvindo enquanto pensava em outra coisa. Ouvindo. Você guarda pequenos detalhes sobre as pessoas de quem cuida — o que gostam, o que as preocupa, o que mencionaram querer uma vez — e age sobre isso depois, silenciosamente, sem apontar.",
    p2:"O mundo depende de pessoas como você mais do que reconhece. Você aparece. Cumpre o que prometeu. Percebe quando algo está errado e faz algo a respeito sem precisar ser pedido. O risco é que esse hábito de dar silenciosamente pode continuar por muito tempo antes que alguém pense em perguntar o que você precisa.",
    desire:"Cuidar das pessoas ao seu redor e saber que não as decepcionou",
    fear:"Decepcionar alguém que estava contando com você sem ter dito",
    strengths:["Memória pessoal do que importa para os outros é quase perturbadora em sua precisão","Age a partir do cuidado através de ações específicas e oportunas, não de palavras","Cria segurança genuína — as pessoas se sentem acolhidas, não gerenciadas","Cumpre compromissos com as pessoas muito depois de quando seria aceitável parar"],
    blindspots:["Raramente pede ajuda, mesmo quando genuinamente sobrecarregado","Diz sim a obrigações muito além do ponto de ser justo consigo mesmo","Evita conflito mesmo quando o conflito protegeria o relacionamento"],
    traits:["Caloroso","Observador","Leal","Confiável","Altruísta"],
    famous:[{name:"Capitão América",ctx:"Fictício"},{name:"Kate Middleton",ctx:"Figura pública"},{name:"Dr. Watson",ctx:"Fictício"}],
    similar:["ISTJ","INFJ","ESFJ"]
  },
  INFJ:{
    name:"O Conselheiro",tagline:"Visão rara, determinação tranquila",
    p1:"Você carrega uma contradição. É profundamente privado e ainda assim compreende as pessoas melhor do que quase todos ao seu redor. Você consegue sentir para onde uma conversa está indo antes de chegar lá, perceber o que está incomodando alguém antes que tenham colocado em palavras, ver o arco mais longo de uma situação enquanto todos os outros reagem à superfície. Você guarda essa informação com cuidado. Não performa empatia.",
    p2:"O tipo mais raro por uma razão. A combinação de intuição e inteligência emocional que você tem não é um traço de personalidade — é uma forma de processar que a maioria das pessoas simplesmente não tem acesso. O custo disso é que você absorve mais do que os outros, e se recuperar dessa absorção exige tempo sozinho que os outros raramente entendem como a necessidade que é.",
    desire:"Viver em pleno alinhamento com seus valores e deixar algo que realmente importou",
    fear:"Comprometer sua integridade, ou perceber tarde demais que os ideais não sobrevivem ao contato com o mundo",
    strengths:["Vê padrões em pessoas e situações muito antes de se tornarem visíveis para os outros","Empatia que não perde clareza analítica — você sente e pensa simultaneamente","Convicção que se mantém sob pressão sustentada sem se tornar frágil","Alcança pessoas que estão fechadas para quase todos os outros"],
    blindspots:["Dá demais para poucos, e se recupera lentamente quando esses investimentos não funcionam","Perfeccionismo que pode paralisar a conclusão indefinidamente","Desaparece completamente quando sobrecarregado — os outros leem isso como rejeição"],
    traits:["Perspicaz","Idealista","Empático","Determinado","Enigmático"],
    famous:[{name:"Jesus Cristo",ctx:"Histórico"},{name:"Aragorn",ctx:"Fictício"},{name:"Nelson Mandela",ctx:"Histórico"}],
    similar:["INTJ","ENFJ","INFP"]
  },
  INTJ:{
    name:"O Arquiteto",tagline:"Mente estratégica, padrão implacável",
    p1:"Você já viu cinco passos à frente. A frustração não é que você é mais inteligente do que todos — é que a maioria das pessoas não está prestando atenção nas mesmas coisas que você, e explicar a diferença é genuinamente difícil. Você mantém sistemas complexos na cabeça simultaneamente, os avalia contra um padrão elevado, e fala quando ficam aquém. Não porque quer ser difícil. Porque deixar passar parece errado.",
    p2:"Independência não é uma preferência — é como você pensa. Ruído externo não melhora a qualidade do que você produz; degrada. Você construiu hábitos em torno da solidão não como isolamento, mas como a condição sob a qual seu melhor trabalho acontece. As pessoas que valem a pena ter em sua vida entenderão isso. As que não entendem vão achar difícil.",
    desire:"Entender como as coisas funcionam em um nível profundo e construir algo que reflita esse entendimento",
    fear:"Ser incompetente, ou dependente de alguém menos capaz do que você",
    strengths:["Pensamento estratégico de longo alcance genuinamente raro nesse nível","Trabalha sem precisar de validação externa — o trabalho atende ao seu padrão ou não atende","Mantém múltiplas camadas de complexidade em paralelo sem perder o fio","Altos padrões pessoais que produzem resultados pelos quais vale a pena se orgulhar"],
    blindspots:["A dimensão emocional das situações é sistematicamente subestimada","Pode parecer arrogante ou desdenhoso sem perceber","Quando os outros são irracionais, esconder o desprezo exige esforço visível"],
    traits:["Estratégico","Independente","Exigente","Decisivo","Visionário"],
    famous:[{name:"Gandalf",ctx:"Fictício"},{name:"Elon Musk",ctx:"Empreendedor"},{name:"Friedrich Nietzsche",ctx:"Filósofo"}],
    similar:["ENTJ","INTP","INFJ"]
  },
  ISTP:{
    name:"O Artesão",tagline:"Cabeça fria, mãos hábeis",
    p1:"Quando algo quebra ou dá errado, você é a pessoa mais calma na sala. Não porque não leva a sério, mas porque já começou a diagnosticar. Você pensa através dos problemas interagindo com eles — desmontando algo, testando uma teoria, ajustando com base no que encontra. Ler sobre isso raramente é tão útil quanto fazer.",
    p2:"Você respeita competência acima de quase tudo, e consegue perceber sua ausência rapidamente. Performance social — o tipo que substitui confiança por habilidade — registra como ruído. Você mantém sua própria competência em um padrão igualmente sem sentimentalismo. Quando você diz que algo funciona, funciona.",
    desire:"Entender como as coisas funcionam e ser genuinamente, praticamente útil quando importa",
    fear:"Ser preso, forçado a depender de outros, ou privado da autonomia de trabalhar do seu jeito",
    strengths:["Mais claro sob pressão — a crise aguça em vez de abalar","Diagnóstico e reparo por instinto, não por procedimento","Alta tolerância para ambiguidade genuína — incerteza é um problema a resolver, não razão para parar","Aprende novas habilidades rapidamente colocando a mão na massa, não observando de longe"],
    blindspots:["Disponibilidade emocional requer esforço deliberado — pessoas próximas podem sentir a distância","Se compromete com pessoas e planos lentamente — confiança leva tempo para construir e menos para perder","Pode se retirar sem aviso e sem explicação"],
    traits:["Calmo","Analítico","Prático","Adaptável","Habilidoso"],
    famous:[{name:"James Bond",ctx:"Fictício"},{name:"Clint Eastwood",ctx:"Ator / Diretor"},{name:"Arya Stark",ctx:"Fictício"}],
    similar:["ESTP","INTP","ISFP"]
  },
  ISFP:{
    name:"O Artista",tagline:"Presente, livre, profundamente sensível",
    p1:"As pessoas confundem você com alguém fácil. Você é em alguns aspectos, mas seus valores estão entre os mais firmemente mantidos de qualquer pessoa. Você simplesmente não os argumenta — os vive. Quando uma situação viola algo que acredita ser errado, você sai. Sem anúncio, sem debate. Você se remove. Pessoas que não entendem você às vezes vivenciam isso como passividade. Não é.",
    p2:"Há uma qualidade de atenção em você que a maioria das pessoas não consegue acessar. A música certa no momento certo genuinamente te move. Você percebe cor, textura, espaço, a sensação que um ambiente carrega. Você está sintonizado com a beleza de uma forma que vai além da preferência para algo mais parecido com percepção. Essa sintonia também se aplica às pessoas — você sente como alguém está antes que tenham dito uma palavra.",

function render(){
  const p=new URLSearchParams(window.location.search);
  const t=(p.get('t')||'INTJ').toUpperCase();
  const d=types[t];
  if(!d){document.getElementById('content').innerHTML='<p style="color:var(--muted)">Tipo não encontrado.</p>';return;}
  document.title=`${t} Tipo de Personalidade · ${d.name}, 77 Scenarios`;

  // Read optional score params (e.g. ei=72E, sn=65N, tf=81T, jp=60J)
  const scoreKeys = ['ei','sn','tf','jp'];
  const dimDefs = [
    {a:'E',b:'I',la:'Extrovertido',lb:'Introvertido'},
    {a:'S',b:'N',la:'Sensorial',lb:'Intuitivo'},
    {a:'T',b:'F',la:'Racional',lb:'Emocional'},
    {a:'J',b:'P',la:'Julgador',lb:'Perceptivo'}
  ];
  let spectrumHTML = '';
  const hasScores = scoreKeys.every(k => p.get(k));
  if (hasScores) {
    const bars = scoreKeys.map((k,i) => {
      const val = p.get(k);
      const pct = parseInt(val);
      const letter = val.slice(-1).toUpperCase();
      const dd = dimDefs[i];
      const label = letter === dd.a ? dd.la : dd.lb;
      return `<div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">${label}</span>
          <span style="font-size:12px;color:var(--gold);font-weight:500">${letter} · ${pct}%</span>
        </div>
        <div style="height:4px;background:var(--surface2);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:4px;transition:width 1s cubic-bezier(0.22,1,0.36,1) 0.2s"></div>
        </div>
      </div>`;
    }).join('');
    spectrumHTML = `<div class="section r" data-d="1b" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:36px">
      <div class="section-label" style="margin-bottom:20px">Seus escores</div>
      ${bars}
      <p style="font-size:12px;color:var(--muted);margin-top:16px;line-height:1.6">Compartilhado de um teste 77 Cenários completo. <a href="/pt/" style="color:var(--gold);text-decoration:none">Fazer o teste →</a></p>
    </div>`;
  }

  // Dynamic SEO
  const desc=`The ${t} personality type (${d.name}): ${d.tagline}. Full description, strengths, blind spots, and famous examples of the ${t} Myers-Briggs type.`;
  let dm=document.querySelector('meta[name="description"]');
  if(!dm){dm=document.createElement('meta');dm.name='description';document.head.appendChild(dm);}
  dm.content=desc;
  let km=document.querySelector('meta[name="keywords"]');
  if(!km){km=document.createElement('meta');km.name='keywords';document.head.appendChild(km);}
  km.content=`${t} personality, ${t} personality type, ${t} Myers-Briggs, ${d.name} personality, MBTI ${t}, ${t} strengths weaknesses, ${t} famous people`;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content',`${t} · ${d.name}, 77 Scenarios`)||
    (()=>{const m=document.createElement('meta');m.setAttribute('property','og:title');m.content=`${t} · ${d.name}, 77 Scenarios`;document.head.appendChild(m);})();
  document.getElementById('canonical-url')?.setAttribute('href',`https://77scenarios.com/type.html?t=${t}`);
  const h1el=document.getElementById('page-h1');if(h1el)h1el.textContent=`${t} Personality Type — ${d.name}`;
  document.querySelector('meta[property="og:description"]')?.setAttribute('content',desc)||
    (()=>{const m=document.createElement('meta');m.setAttribute('property','og:description');m.content=desc;document.head.appendChild(m);})();
  document.querySelector('meta[property="og:url"]')?.setAttribute('content',`https://77scenarios.com/type?t=${t}`)||
    (()=>{const m=document.createElement('meta');m.setAttribute('property','og:url');m.content=`https://77scenarios.com/type?t=${t}`;document.head.appendChild(m);})();
  document.getElementById('type-schema').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":`${t} Personality Type: ${d.name}`,"description":desc,"url":`https://77scenarios.com/type.html?t=${t}`,"publisher":{"@type":"Organization","name":"77 Scenarios","url":"https://77scenarios.com"}});

  const code=t.split('').map((l,i)=>(i%2===1)?`<span class="hi">${l}</span>`:l).join('');
  const pills=t.split('').map((l,i)=>{
    const dims=['Energia','Percepção','Julgamento','Estilo de Vida'];
    return `<a href="/letter?l=${l}" class="letter-pill">${l} · ${dims[i]}</a>`;
  }).join('');
  const simCards=d.similar.map(c=>`<a href="/type?t=${c}" class="similar-card"><span class="sim-code">${c}</span><span class="sim-name">${typeNames[c]||''}</span></a>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="r" data-d="1"><div class="type-code">${code}</div><div class="type-name">${d.name}</div><div class="type-tagline">${d.tagline}</div><div class="letter-pills">${pills}</div></div>
    ${spectrumHTML}
    <div class="section r" data-d="2"><div class="section-label">Visão geral</div><p class="body-text">${d.p1}</p><p class="body-text">${d.p2}</p></div>
    <div class="fd-row section r" data-d="3">
      <div class="fd-box"><div class="fd-label">Desejo central</div><div class="fd-text">${d.desire}</div></div>
      <div class="fd-box"><div class="fd-label">Medo central</div><div class="fd-text">${d.fear}</div></div>
    </div>
    <div class="section r" data-d="4"><div class="section-label">Traços</div><div class="traits-row">${d.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div></div>
    <div class="two-col section r" data-d="5">
      <div class="box"><div class="box-title">Pontos Fortes</div><ul>${d.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>
      <div class="box"><div class="box-title">Pontos Cegos</div><ul>${d.blindspots.map(s=>`<li>${s}</li>`).join('')}</ul></div>
    </div>
    <div class="section r" data-d="6"><div class="section-label">Exemplos notáveis</div><div class="famous-grid">${d.famous.map(f=>`<div class="famous-card"><div class="famous-name">${f.name}</div><div class="famous-ctx">${f.ctx}</div></div>`).join('')}</div></div>
    <div class="section r" data-d="7"><div class="section-label">Tipos similares</div><div class="similar-row">${simCards}</div></div>
    <div class="section r" data-d="7b" style="margin-top:0">
      <div class="section-label">Funções cognitivas</div>
      <p class="body-text" style="margin-bottom:24px;font-size:14px;">Todo tipo funciona com quatro funções mentais em uma ordem definida. A primeira é quase sem esforço. A quarta é seu ponto fraco.</p>
      <div style="display:flex;flex-direction:column;gap:12px;" id="fn-stack-inline"></div>
      <a href="/functions?t=${t}" style="display:inline-block;margin-top:20px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);text-decoration:none;">Ver a análise completa das suas funções &#8594;</a>
    </div>
    <div class="sep r" data-d="8"></div>
    <div class="cta-block r" data-d="9">
      <div class="cta-text">Não tem certeza se é <em>${t}</em>?<br>Deixe os cenários decidir.</div>
      <a href="/pt/" class="btn-gold">Fazer o teste →</a>
    </div>`;


  // Build inline function stack
  const stackEl = document.getElementById('fn-stack-inline');
  if(stackEl && typeStacks[t]){
    typeStacks[t].forEach((fn,i)=>{
      const m=fnMeta[fn];
      const isFirst=i===0;
      stackEl.innerHTML+=`<div style="display:flex;align-items:center;gap:16px;padding:16px 20px;background:${isFirst?'rgba(201,168,76,0.06)':'var(--surface)'};border:1px solid ${isFirst?'rgba(201,168,76,0.25)':'var(--border)'};border-radius:10px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:${isFirst?'var(--gold)':'var(--cream)'};min-width:32px;text-align:center;">${fn}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:${isFirst?'var(--gold)':'var(--muted)'};margin-bottom:3px;">${posLabels[i]}</div>
          <div style="font-size:14px;color:var(--cream);font-weight:400;">${m.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${m.tagline}</div>
        </div>
      </div>`;
    });
  }

  // Observe newly injected elements
  document.querySelectorAll('.r').forEach(el=>obs.observe(el));
}

// Transitions
const ov=document.getElementById('t-overlay');
function fadeIn(){ov.style.opacity='1';ov.animate([{opacity:1},{opacity:0}],{duration:550,delay:60,easing:'cubic-bezier(0.22,1,0.36,1)',fill:'forwards'});}
fadeIn();
window.addEventListener('pageshow',e=>{if(e.persisted)fadeIn();});
document.addEventListener('click',e=>{
  const a=e.target.closest('a[href]');
  if(!a)return;
  const h=a.getAttribute('href');
  if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('javascript')||h.startsWith('mailto'))return;
  e.preventDefault();
  ov.animate([{opacity:0},{opacity:1}],{duration:320,easing:'cubic-bezier(0.76,0,0.24,1)',fill:'forwards'}).finished.then(()=>{window.location.href=h;});
});

// Reveal observer — defined before render() so obs.observe() works inside render()
const obs=new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    if(!en.isIntersecting)return;
    const delay=parseFloat(en.target.dataset.d||0)*70;
    setTimeout(()=>en.target.classList.add('in'),delay);
    obs.unobserve(en.target);
  });
},{threshold:0.155});

render();
</script>
