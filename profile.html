<script>
const ov=document.getElementById('t-overlay');
function fadeIn(){ov.style.opacity='1';ov.animate([{opacity:1},{opacity:0}],{duration:550,delay:60,easing:'cubic-bezier(0.22,1,0.36,1)',fill:'forwards'});}
fadeIn();
window.addEventListener('pageshow',e=>{if(e.persisted)fadeIn();});
document.addEventListener('click',e=>{
  const a=e.target.closest('a[href]');
  if(!a)return;
  const h=a.getAttribute('href');
  if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('javascript')||h.startsWith('mailto'))return;
  e.preventDefault();
  ov.animate([{opacity:0},{opacity:1}],{duration:320,easing:'cubic-bezier(0.76,0,0.24,1)',fill:'forwards'}).finished.then(()=>{window.location.href=h;});
});
const obs=new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    if(!en.isIntersecting)return;
    setTimeout(()=>en.target.classList.add('in'),parseFloat(en.target.dataset.d||0)*80);
    obs.unobserve(en.target);
  });
},{threshold:0.155});
document.querySelectorAll('.r').forEach(el=>obs.observe(el));
</script>

function pct(a, b) {
  const total = (a||0) + (b||0);
  return total ? Math.round((a||0) / total * 100) : 50;
}

function fmt(date) {
  return new Date(date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

function renderCard(r) {
  const ep = pct(r.ei_e, r.ei_i);
  const sp = pct(r.sn_s, r.sn_n);
  const tp = pct(r.tf_t, r.tf_f);
  const jp = pct(r.jp_j, r.jp_p);
  const t = r.personality_type;
  return `
    <div class="result-card">
      <div>
        <div class="result-type">${t}</div>
        <div class="result-meta">${typeNames[t] || ''} &nbsp;·&nbsp; ${fmt(r.created_at)}</div>

  const links = document.querySelector('.nav-links');
  const drawerLinks = document.querySelector('.nav-drawer-links');
  const _navAvatar = (profile && profile.avatar_url) || 'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 80 80%27%3E%3Ccircle cx=%2740%27 cy=%2740%27 r=%2740%27 fill=%27%23252a30%27/%3E%3Ccircle cx=%2740%27 cy=%2732%27 r=%2714%27 fill=%27%238a6d2e%27/%3E%3Cellipse cx=%2740%27 cy=%2772%27 rx=%2724%27 ry=%2716%27 fill=%27%238a6d2e%27/%3E%3C/svg%3E';
  if (links) {
    const wrap = document.createElement('a');
    wrap.href = '/profile';
    wrap.style.cssText = 'display:flex;align-items:center;gap:8px;text-decoration:none;';
    const img = document.createElement('img');
    img.src = _navAvatar;
    img.style.cssText = 'width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid var(--border);flex-shrink:0;';
    img.onerror = () => { img.src = 'data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 80 80%27%3E%3Ccircle cx=%2740%27 cy=%2740%27 r=%2740%27 fill=%27%23252a30%27/%3E%3Ccircle cx=%2740%27 cy=%2732%27 r=%2714%27 fill=%27%238a6d2e%27/%3E%3Cellipse cx=%2740%27 cy=%2772%27 rx=%2724%27 ry=%2716%27 fill=%27%238a6d2e%27/%3E%3C/svg%3E'; };
    const label = document.createElement('span');
    label.textContent = 'Profile';
    label.style.cssText = 'background:var(--gold);color:#0c0e10;padding:7px 16px;border-radius:60px;font-weight:500;font-size:0.82rem;letter-spacing:0.04em;';
    wrap.appendChild(img);
    wrap.appendChild(label);
    links.appendChild(wrap);
  }
  if (drawerLinks) {
    const a = document.createElement('a');
    a.href = '/profile'; a.textContent = 'Profile';
    drawerLinks.appendChild(a);
  }
  const { data: results, error } = await sb
    .from('results')
    .select('*')
    .order('created_at', { ascending: false });
  const container = document.getElementById('results-container');
  if (error || !results || results.length === 0) {
    container.innerHTML = `<div class="results-empty">No results saved yet.<br><a href="/">Take the test →</a></div>`;
    return;
  }
  container.innerHTML = results.map(renderCard).join('');
}

async function handleSignOut() {
  await sb.auth.signOut();
  window.location.href = '/';
}

load();
</script>
</body>
