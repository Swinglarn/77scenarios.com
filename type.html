<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#0c0e10;--surface:#13161a;--surface2:#1a1e24;--gold:#c9a84c;--gold-dim:#8a6d2e;--cream:#ede8df;--muted:#6b6560;--border:#252a30;--radius:14px;}
  html,body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6;}
  #t-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;background:#0c0e10;opacity:1;}
  .glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
  .glow-1{width:600px;height:600px;top:-200px;left:-150px;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);}
  .glow-2{width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(120,180,160,0.05) 0%,transparent 70%);}
  nav{position:sticky;top:0;z-index:100;background:rgba(12,14,16,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:56px;}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--cream);text-decoration:none;}
  .nav-logo span{color:var(--gold);}
  .nav-links{display:flex;gap:36px;align-items:center;}
  .nav-links a{font-size:14px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
  .nav-links a:hover{color:var(--cream);}
  .nav-cta{background:var(--gold);color:#0c0e10 !important;padding:8px 18px;border-radius:30px;font-weight:500 !important;transition:background 0.2s !important;}
  .nav-cta:hover{background:var(--cream) !important;}
  @media(max-width:600px){.nav-links .hide-sm{display:none;}}
  main{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:64px 32px 96px;}

  /* REVEAL */
  .r{opacity:0;transform:translateY(24px);transition:opacity 0.65s cubic-bezier(0.22,1,0.36,1),transform 0.65s cubic-bezier(0.22,1,0.36,1);}
  .r.in{opacity:1;transform:none;}

  .back-link{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-bottom:48px;transition:color 0.2s;}
  .back-link:hover{color:var(--gold);}

  .type-code{font-family:'Cormorant Garamond',serif;font-size:clamp(80px,14vw,130px);font-weight:300;line-height:1;letter-spacing:-0.04em;color:var(--cream);margin-bottom:16px;}
  .type-code .hi{color:var(--gold);}
  .type-name{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vw,44px);font-weight:300;font-style:italic;color:var(--cream);margin-bottom:6px;}
  .type-tagline{font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;}
  .letter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:44px;}
  .letter-pill{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 14px;border-radius:20px;border:1px solid var(--border);color:var(--muted);background:var(--surface);text-decoration:none;transition:all 0.2s;}
  .letter-pill:hover{border-color:var(--gold-dim);color:var(--gold);}

  .section{margin-bottom:48px;}
  .section-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:'';display:block;flex:1;height:1px;background:var(--border);}
  .body-text{font-size:16px;line-height:1.9;color:#a09890;}
  .body-text+.body-text{margin-top:16px;}

  .traits-row{display:flex;flex-wrap:wrap;gap:10px;}
  .trait{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:8px 16px;border-radius:30px;border:1px solid var(--border);color:var(--muted);background:var(--surface);}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:580px){.two-col{grid-template-columns:1fr;}}
  .box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
  .box-title{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
  .box ul{list-style:none;}
  .box ul li{font-size:14px;color:#a09890;line-height:1.75;padding:9px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
  .box ul li:last-child{border-bottom:none;}
  .box ul li::before{content:'–';color:var(--gold-dim);flex-shrink:0;margin-top:2px;}

  .fd-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:580px){.fd-row{grid-template-columns:1fr;}}
  .fd-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;}
  .fd-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .fd-text{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;font-style:italic;color:var(--cream);line-height:1.45;}

  .famous-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  @media(max-width:580px){.famous-grid{grid-template-columns:1fr;}}
  .famous-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
  .famous-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--cream);margin-bottom:3px;}
  .famous-ctx{font-size:11px;color:var(--muted);letter-spacing:0.04em;}

  .similar-row{display:flex;gap:10px;flex-wrap:wrap;}
  .similar-card{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;text-decoration:none;transition:all 0.2s;}
  .similar-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);}
  .sim-code{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--cream);}
  .sim-name{font-size:11px;color:var(--muted);}

  .cta-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .cta-text{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--cream);line-height:1.4;}
  .cta-text em{font-style:italic;color:var(--gold);}
  .btn-gold{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:#0c0e10;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border:none;border-radius:60px;padding:14px 28px;cursor:pointer;text-decoration:none;transition:all 0.25s;}
  .btn-gold:hover{background:var(--cream);transform:translateY(-2px);}
  .sep{height:1px;background:var(--border);margin:48px 0;}
</style>

<script>
const types = {
  ISTJ:{
    name:"The Inspector",tagline:"Duty, precision, integrity",
    p1:"Everyone says they care about doing things right. Most don't mean it the way you do. You hold a standard quietly, without announcements, and you notice the distance between what people commit to and what they deliver. That gap bothers you in a way others find hard to understand. You're not harsh about it — you just remember.",
    p2:"Your reliability is rare enough that most people can't fully appreciate it until it's gone. You don't work for praise. You work because the work deserves to be done properly. The people who know you well understand they can hand you something and walk away, completely sure it will be handled.",
    desire:"To be trusted completely and to never be the source of failure",
    fear:"Being caught unprepared, or responsible for something that was done wrong",
    strengths:["Commitments are kept without exception — people learn fast they can depend on you","Memory for factual detail, past decisions, and procedural nuance is uncommonly sharp","Stays methodical when pressure builds, where others get reactive","Applies the same standard to yourself that you apply to others — which is rare"],
    blindspots:["When circumstances genuinely change, adapting can feel like compromise, even when it isn't","Warmth is there but tends to stay internal — people sometimes feel unseen by you","Emotional concerns often get filtered out before they've been fully understood"],
    traits:["Dependable","Meticulous","Principled","Patient","Private"],
    famous:[{name:"Hermione Granger",ctx:"Fictional"},{name:"Warren Buffett",ctx:"Investor"},{name:"Queen Elizabeth II",ctx:"Historical"}],
    similar:["ESTJ","ISFJ","INTJ"]
  },
  ISFJ:{
    name:"The Protector",tagline:"Quiet care, fierce loyalty",
    p1:"You remember what people say because you were actually listening. Not listening and planning your reply, or listening while thinking about something else. Listening. You store small details about the people you care about — what they like, what worries them, what they mentioned wanting once — and you act on it later, quietly, without pointing it out.",
    p2:"The world runs on people like you more than it acknowledges. You show up. You follow through. You notice when something is off and you do something about it without needing to be asked. The risk is that this habit of giving quietly can go on for a long time before anyone thinks to ask what you need.",
    desire:"To care for the people around you and to know that you haven't let them down",
    fear:"Failing someone who was counting on you without them saying so",
    strengths:["Personal memory for what matters to others is almost unsettling in its accuracy","Acts on care through specific, timely action rather than words","Creates genuine safety — people feel held, not managed","Follows through on commitments to people long after it would have been acceptable to stop"],
    blindspots:["Rarely asks for help, even when genuinely overwhelmed","Says yes to obligations long past the point of fairness to yourself","Avoids conflict even when the conflict would actually protect the relationship"],
    traits:["Warm","Observant","Loyal","Reliable","Selfless"],
    famous:[{name:"Captain America",ctx:"Fictional"},{name:"Kate Middleton",ctx:"Public figure"},{name:"Dr Watson",ctx:"Fictional"}],
    similar:["ISTJ","INFJ","ESFJ"]
  },
  INFJ:{
    name:"The Counselor",tagline:"Rare vision, quiet resolve",
    p1:"You carry a contradiction. You're deeply private and yet you understand people better than almost anyone around you. You can feel where a conversation is going before it gets there, sense what's bothering someone before they've put it into words, see the longer arc of a situation while everyone else is reacting to the surface. You hold this information carefully. You don't perform empathy.",
    p2:"The rarest type for a reason. The combination of intuition and emotional intelligence you have is not a personality trait — it's a way of processing that most people simply don't have access to. The cost of it is that you absorb more than others do, and recovering from that absorption requires time alone that others rarely understand as the necessity it is.",
    desire:"To live in full alignment with your values and leave something that actually mattered",
    fear:"Compromising your integrity, or realising too late that ideals can't survive contact with the world",
    strengths:["Sees patterns in people and situations significantly ahead of when they become visible to others","Empathy that doesn't lose analytical clarity — you feel and think simultaneously","Conviction that holds under sustained pressure without becoming brittle","Reaches people who are closed to almost everyone else"],
    blindspots:["Gives too much to too few, and recovers slowly when those investments don't work out","Perfectionism that can stall completion indefinitely","Disappears completely when overwhelmed — others read this as rejection"],
    traits:["Insightful","Idealistic","Empathetic","Determined","Enigmatic"],
    famous:[{name:"Jesus Christ",ctx:"Son of Man"},{name:"Aragorn",ctx:"Fictional"},{name:"Nelson Mandela",ctx:"Historical"}],
    similar:["INTJ","ENFJ","INFP"]
  },
  INTJ:{
    name:"The Architect",tagline:"Strategic mind, relentless standard",
    p1:"You've already seen five steps ahead. The frustration isn't that you're smarter than everyone — it's that most people aren't paying attention to the same things you are, and explaining the gap is genuinely difficult. You hold complex systems in your head simultaneously, evaluate them against a high standard, and say something when they fall short. Not because you want to be difficult. Because letting it stand feels wrong.",
    p2:"Independence isn't a preference — it's how you think. External noise doesn't improve the quality of what you produce; it degrades it. You've built habits around solitude not as isolation but as the condition under which your best work happens. The people worth having in your life will understand this. The ones who don't will find it difficult.",
    desire:"To understand how things work at a deep level and build something that reflects that understanding",
    fear:"Being incompetent, or dependent on someone less capable than you",
    strengths:["Long-range strategic thinking that is genuinely rare at this level","Works without needing external validation — the work either meets your standard or it doesn't","Holds multiple layers of complexity in parallel without losing the thread","High personal standards that produce output worth being proud of"],
    blindspots:["The emotional dimension of situations gets systematically underweighted","Can come across as arrogant or dismissive without being aware of it","When others are irrational, concealing the contempt requires visible effort"],
    traits:["Strategic","Independent","High-standards","Decisive","Visionary"],
    famous:[{name:"Gandalf",ctx:"Fictional"},{name:"Elon Musk",ctx:"Entrepreneur"},{name:"Friedrich Nietzsche",ctx:"Philosopher"}],
    similar:["ENTJ","INTP","INFJ"]
  },
  ISTP:{
    name:"The Craftsman",tagline:"Cool head, skilled hands",
    p1:"When something breaks or goes sideways, you're the calmest person in the room. Not because you don't take it seriously, but because you've already started diagnosing. You think through problems by interacting with them — pulling something apart, testing a theory, adjusting based on what you find. Reading about it is rarely as useful as doing it.",
    p2:"You respect competence above almost everything else, and you can spot its absence fast. Social performance — the kind that substitutes confidence for skill — registers as noise. You hold your own competence to a similarly unsentimental standard. When you say something works, it works.",
    desire:"To understand how things function and be genuinely, practically useful when it matters",
    fear:"Being tied down, forced to depend on others, or stripped of the autonomy to work your way",
    strengths:["Clearest under pressure — crisis sharpens rather than rattles you","Diagnosis and repair by instinct, not procedure","High tolerance for genuine ambiguity — uncertainty is a problem to solve, not a reason to stop","Learns new skills fast by getting hands on, not by observing from a distance"],
    blindspots:["Emotional availability requires deliberate effort — close people can feel the distance","Commits to people and plans slowly — trust takes time to build and less time to lose","Can withdraw without warning and without explanation"],
    traits:["Calm","Analytical","Practical","Adaptable","Skilled"],
    famous:[{name:"James Bond",ctx:"Fictional"},{name:"Clint Eastwood",ctx:"Actor / Director"},{name:"Arya Stark",ctx:"Fictional"}],
    similar:["ESTP","INTP","ISFP"]
  },
  ISFP:{
    name:"The Artist",tagline:"Present, free, deeply feeling",
    p1:"People mistake you for easygoing. You are in some ways, but your values are among the most firmly held of anyone. You just don't argue them — you live them. When a situation violates something you believe is wrong, you leave. No announcement, no debate. You remove yourself. People who don't understand you sometimes experience this as passivity. It isn't.",
    p2:"There's a quality of attention in you that most people can't access. The right piece of music in the right moment actually moves you. You notice colour, texture, space, the feeling a room carries. You're attuned to beauty in a way that goes past preference into something more like perception. That attunement also applies to people — you feel how someone is doing before they've said a word.",
    desire:"To live authentically, fully in your senses, according to what you actually believe",
    fear:"Being forced into a shape that isn't yours — told who to be or what to want",
    strengths:["Aesthetic and emotional attunement that most people simply don't have","Strong personal ethics that get lived rather than announced","Warmth through specific action — present, quiet, real","Fully in the moment in a way that's increasingly rare and genuinely noticeable"],
    blindspots:["Avoids conflict past the point where it would have helped","Can drift without external structure or a clear reason to commit","Sensitive to criticism in ways that aren't visible on the surface"],
    traits:["Gentle","Authentic","Spontaneous","Sensitive","Creative"],
    famous:[{name:"Lana Del Rey",ctx:"Musician"},{name:"Harry Potter",ctx:"Fictional"},{name:"Bob Dylan",ctx:"Musician"}],
    similar:["INFP","ISTP","ESFP"]
  },
  INFP:{
    name:"The Mediator",tagline:"Deep ideals, quiet fire",
    p1:"The gap between how things are and how they should be is something you feel acutely, most of the time, whether you want to or not. You notice it in big systems and in small exchanges. That tension is uncomfortable and it's also the engine of most of what you produce. The idealism is not naivety. It's conviction. Some people's best creative work comes from this same place.",
    p2:"Most people don't see the full interior life you're carrying. You show it selectively, to people who've earned it. This is not dishonesty — it's protection for something that matters. The few people who do get admitted into your inner world tend to stay there a long time, because you invest in them fully and you remember.",
    desire:"To live in alignment with deep values and for that life to carry genuine meaning",
    fear:"That the life you live will be hollow, or that you'll compromise the things that make it worthwhile",
    strengths:["Empathy that runs deep enough to feel what others feel, not just observe it","Creative inner life that produces work with unusual emotional resonance","Sees potential in people before they see it in themselves","Stands for values under pressure without needing the approval of the room"],
    blindspots:["Idealism can outpace execution — the vision is vivid, the follow-through is harder","Sensitive to criticism in a way that can slow things down when speed is needed","Idealises people and then has to deal with the distance between expectation and reality"],
    traits:["Idealistic","Empathetic","Creative","Thoughtful","Principled"],
    famous:[{name:"Johnny Depp",ctx:"Actor"},{name:"Keanu Reeves",ctx:"Actor"},{name:"Frodo Baggins",ctx:"Fictional"}],
    similar:["ISFP","ENFP","INFJ"]
  },
  INTP:{
    name:"The Thinker",tagline:"Curious, precise, quietly unconventional",
    p1:"Your curiosity isn't polite interest. It's compulsive. You find an inconsistency and you can't walk past it without understanding why it's there. You find an idea and you need to know what happens when you push on it. Hours disappear in this process, which you experience less as wasted time and more as the thing time is for.",
    p2:"You're selective about people, not antisocial. The right conversation with someone who thinks at a similar level is one of the best things available to you. You'll stay much longer than planned. You leave shallow conversations faster than most, because the cost-benefit ratio of performing interest you don't feel has never made sense to you.",
    desire:"To understand the thing you're currently inside, completely, before moving to the next one",
    fear:"Being wrong in a way you didn't catch, or intellectually mediocre without knowing it",
    strengths:["Rigorous analytical thinking that doesn't stop at the comfortable answer","Intellectual honesty — updates positions when the evidence requires it, without ego","Connects distant ideas in ways that produce genuinely original insights","Comfortable in complexity and ambiguity that makes other types anxious"],
    blindspots:["Can circle an analysis indefinitely without choosing a direction","Social warmth is there but requires deliberate, conscious routing","Good ideas living inside the head rather than out in the world is a consistent pattern"],
    traits:["Analytical","Curious","Precise","Independent","Unconventional"],
    famous:[{name:"Albert Einstein",ctx:"Physicist"},{name:"Sherlock Holmes",ctx:"Fictional"},{name:"René Descartes",ctx:"Philosopher"}],
    similar:["INTJ","ENTP","ISTP"]
  },
  ESTP:{
    name:"The Dynamo",tagline:"Bold, perceptive, always in motion",
    p1:"You read rooms without trying. The temperature, the tension, who's actually in charge versus who thinks they are, which direction things are heading — you take all of this in passively and use it without announcing it. It makes you remarkably effective in situations that require quick, accurate social navigation.",
    p2:"You function best in real time. Planning is fine until it hits the reality of what's actually happening, and then you improvise better than most people plan. The gap between your capabilities and other people's expectations is often widest in a crisis — which is exactly when you'd rather be called.",
    desire:"To be in the middle of things, solving what's actually in front of you, with real stakes",
    fear:"Boredom, irrelevance, and moving slowly while something more interesting is happening elsewhere",
    strengths:["Reads people and dynamics accurately and quickly, without effort","Acts under pressure without the freeze that others experience","Pragmatic and persuasive — gets people moving in the needed direction","Decision and execution in the same motion, with very little drag between them"],
    blindspots:["Long-term planning feels genuinely unnatural and often gets postponed indefinitely","Can move through other people's processes without noticing the friction this creates","Commitment — to plans, to people — is something to be negotiated, not assumed"],
    traits:["Perceptive","Bold","Energetic","Pragmatic","Charismatic"],
    famous:[{name:"Stifler",ctx:"Fictional"},{name:"Han Solo",ctx:"Fictional"},{name:"Bear Grylls",ctx:"Adventurer"}],
    similar:["ESTJ","ISTP","ENTP"]
  },
  ESFP:{
    name:"The Performer",tagline:"Alive, generous, contagiously present",
    p1:"Being around you feels different to most rooms. There's a quality of actual presence — you're genuinely interested in the person you're talking to, not waiting for your turn to speak. That interest is specific; you ask follow-up questions about things people mentioned weeks ago. People feel seen by you, often more than they're used to.",
    p2:"You experience the world through sensation and feeling in a way that's increasingly rare. Things are genuinely beautiful or funny or moving or dull to you, without the ironic distance many people maintain. Life doesn't need an explanation or a purpose beyond the fact that you're in it. That's not shallow — it's a complete answer that a lot of people spend years trying to arrive at.",
    desire:"To be fully present in a full life, and to bring other people along",
    fear:"Going unnoticed, or passing through without having made anyone feel better for it",
    strengths:["Genuine interest in people — not performed, and specific enough to surprise","Presence that makes others feel they have your full attention, because they do","Generosity without a ledger — gives freely and doesn't track what's owed","Can shift the energy of a room without announcing any intention to do so"],
    blindspots:["Future-oriented planning and follow-through is a consistent challenge","Discomfort and hard truths can get avoided rather than faced","Prolonged routine or isolation depletes fast"],
    traits:["Enthusiastic","Generous","Spontaneous","Social","Warm"],
    famous:[{name:"Hunter Biden",ctx:"Public figure"},{name:"Marilyn Monroe",ctx:"Actor"},{name:"Elton John",ctx:"Musician"}],
    similar:["ENFP","ISFP","ESTP"]
  },
  ENFP:{
    name:"The Champion",tagline:"Restless possibility, magnetic energy",
    p1:"You make people feel more interesting than they thought they were. Not because you're flattering them — because you're genuinely seeing something. You find the compelling detail in almost anyone, the idea that hasn't been said, the potential that's sitting just below the surface. This is an unusual gift and most people have no idea what to do when they encounter it.",
    p2:"The relationship with follow-through is real and worth naming. Not because you're uncommitted — you're deeply committed to the things that matter to you — but because the next interesting thing arrives fast, and the space between interest and completion is where a lot of good ideas go quiet. The discipline isn't forcing yourself to be someone you're not. It's protecting the thing long enough for it to exist.",
    desire:"To explore what everything could be — ideas, people, yourself",
    fear:"Being ordinary, or trapped in a life that no longer fits",
    strengths:["Sees potential before it's visible to anyone else","Makes people feel capable of things they hadn't considered","Generates ideas rapidly, connects them across domains unexpectedly","Reads people and emotional dynamics with genuine, unstudied accuracy"],
    blindspots:["Starts significantly more than gets finished","Sensitive to disapproval under a confident exterior","The current idea can crowd out the previous commitment before it's complete"],
    traits:["Creative","Enthusiastic","Empathetic","Curious","Inspiring"],
    famous:[{name:"Kanye West",ctx:"Musician"},{name:"Will Smith",ctx:"Actor"},{name:"Willy Wonka",ctx:"Fictional"}],
    similar:["ENTP","INFP","ESFP"]
  },
  ENTP:{
    name:"The Visionary",tagline:"Sharp, provocative, relentlessly curious",
    p1:"You'll argue the other side of a position just to see if it holds. Not because you disagree — sometimes you do, sometimes you don't — but because untested ideas are half-formed ideas, and half-formed ideas produce bad decisions. You do this with your own views as well, which is more unusual than it sounds.",
    p2:"Stagnation is the thing you actually fear most, though boredom is how it usually presents. You move fast between ideas because there are always more interesting ones ahead. The challenge isn't generating — it's choosing, and then staying chosen. The most significant things you'll build will require you to remain interested in them long after the initial spark has passed.",
    desire:"To find the better answer — the one underneath the one everyone else stopped at",
    fear:"Stagnation, intellectual sameness, and being comfortable when you should be questioning",
    strengths:["Rapid synthesis across very different domains","Debate as a genuine thinking tool — not a performance, a method","Creative in constrained situations because constraints are just interesting problems","Intellectually fearless — will question including the things most people leave unexamined"],

    famous:[{name:"Socrates",ctx:"Philosopher"},{name:"Tyrion Lannister",ctx:"Fictional"},{name:"Leonardo da Vinci",ctx:"Polymath"}],
    similar:["ENFP","INTP","ENTJ"]
  },
  ESTJ:{
    name:"The Director",tagline:"Order, results, accountability",
    p1:"While everyone else is still discussing it, you've already started. You have a clear picture of how things should work, and that clarity is a genuine advantage — it means you waste very little motion. You're organised not out of preference but out of a well-founded belief that structure is what allows everything else to function.",
    p2:"You hold people to their commitments. Including yourself. The standard you apply outward is the same one you apply inward — which is actually the most honest form of fairness, even when it's uncomfortable. Others sometimes read this as demanding. From the inside, it looks like simple consistency.",

    fear:"Chaos, incompetence, and people who will not be held to what they agreed",
    strengths:["Execution at scale — making plans real is your native language","Direct and clear communication that doesn't make people guess","Holds accountability consistently, without exceptions or favourites","Builds processes and structures that outlast the immediate problem"],
    blindspots:["Flexibility in genuinely novel situations can feel like compromise when it isn't","The process can become more important than the human experience inside it","Discomfort with situations that have no clear right answer"],
    traits:["Organised","Direct","Decisive","Reliable","Driven"],
    famous:[{name:"Margaret Thatcher",ctx:"Political leader"},{name:"Gordon Ramsay",ctx:"Chef / Television"},{name:"Charlie Kirk",ctx:"Political commentator"}],
    similar:["ISTJ","ENTJ","ESFJ"]
  },
  ESFJ:{
    name:"The Caregiver",tagline:"Community, warmth, unstoppable care",
    p1:"You are the connective tissue. The person who remembers the birthday, the person who notices when someone's quieter than usual, the person who makes sure no one is standing alone at the edge of a room. This is not performance. It's how you actually experience belonging — not as an abstract value but as a daily practice of specific, small acts.",
    p2:"Community is not background to your life; it's the content of it. The rituals, the check-ins, the making sure everyone feels included — these matter to you in a way that's hard to explain to people for whom they don't. The risk is that tending to everyone else can quietly become a way of not attending to yourself.",
    desire:"To be genuinely needed, and to be part of a group that feels like home",
    fear:"Conflict, rejection, and the possibility of having let someone down without knowing it",
    strengths:["Notices what others need before it's said and acts on it specifically","Builds warmth and belonging in groups without forcing it","Makes people feel included and valued in a way they carry home","Reliable on commitments to people, over the long run, without needing the credit"],
    blindspots:["Criticism, even gentle and accurate criticism, can land hard and linger","Others' comfort can be prioritised at the direct expense of what's true","Needs external approval in ways that can be managed but not wished away"],
    traits:["Caring","Social","Loyal","Organised","Generous"],
    famous:[{name:"Molly Weasley",ctx:"Fictional"},{name:"Monica Geller",ctx:"Fictional"},{name:"Taylor Swift",ctx:"Musician"}],

  ENFJ:{
    name:"The Teacher",tagline:"Charisma with purpose",
    p1:"You see who someone could become before they see it themselves. Not as a project — as a perception. There's something in the way you read people that picks up on what's dormant rather than just what's present, and you invest in that. The people you've known tend to be more capable when you leave them than when you arrived. That's a specific and rare kind of impact.",

    blindspots:["Takes responsibility for others' outcomes beyond what's fair or sustainable","Avoids necessary conflict, especially with people they care about","Empathy can be weaponised against you by people who figure this out"],

  ENTJ:{

    p1:"You see the destination before others have identified the problem. The confidence this produces isn't performance — it's the output of having already run the scenarios internally and knowing which one works. When things are being done badly, the discomfort of watching that outweighs any discomfort of stepping in and changing it.",

const typeNames={ISTJ:"Inspector",ISFJ:"Protector",INFJ:"Counselor",INTJ:"Architect",ISTP:"Craftsman",ISFP:"Artist",INFP:"Mediator",INTP:"Thinker",ESTP:"Dynamo",ESFP:"Performer",ENFP:"Champion",ENTP:"Visionary",ESTJ:"Director",ESFJ:"Caregiver",ENFJ:"Teacher",ENTJ:"Commander"};

function render(){
  const p=new URLSearchParams(window.location.search);
  const t=(p.get('t')||'INTJ').toUpperCase();
  const d=types[t];
  if(!d){document.getElementById('content').innerHTML='<p style="color:var(--muted)">Type not found.</p>';return;}
  document.title=`${t} Personality Type · ${d.name} — 77 Scenarios`;

  // Dynamic SEO
  const desc=`The ${t} personality type (${d.name}): ${d.tagline}. Full description, strengths, blind spots, and famous examples of the ${t} Myers-Briggs type.`;
  let dm=document.querySelector('meta[name="description"]');
  if(!dm){dm=document.createElement('meta');dm.name='description';document.head.appendChild(dm);}
  dm.content=desc;
  let km=document.querySelector('meta[name="keywords"]');
  if(!km){km=document.createElement('meta');km.name='keywords';document.head.appendChild(km);}
  km.content=`${t} personality, ${t} personality type, ${t} Myers-Briggs, ${d.name} personality, MBTI ${t}, ${t} strengths weaknesses, ${t} famous people`;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content',`${t} · ${d.name} — 77 Scenarios`)||
    (()=>{const m=document.createElement('meta');m.setAttribute('property','og:title');m.content=`${t} · ${d.name} — 77 Scenarios`;document.head.appendChild(m);})();
  document.getElementById('canonical-url')?.setAttribute('href',`https://77scenarios.com/type.html?t=${t}`);
  document.getElementById('type-schema').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":`${t} Personality Type: ${d.name}`,"description":desc,"url":`https://77scenarios.com/type.html?t=${t}`,"publisher":{"@type":"Organization","name":"77 Scenarios","url":"https://77scenarios.com"}});

  const code=t.split('').map((l,i)=>(i%2===1)?`<span class="hi">${l}</span>`:l).join('');
  const pills=t.split('').map((l,i)=>{
    const dims=['Energy','Perception','Judgement','Lifestyle'];
    return `<a href="/letter?l=${l}" class="letter-pill">${l} · ${dims[i]}</a>`;
  }).join('');
  const simCards=d.similar.map(c=>`<a href="/type?t=${c}" class="similar-card"><span class="sim-code">${c}</span><span class="sim-name">${typeNames[c]||''}</span></a>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="r" data-d="1"><div class="type-code">${code}</div><div class="type-name">${d.name}</div><div class="type-tagline">${d.tagline}</div><div class="letter-pills">${pills}</div></div>
    <div class="section r" data-d="2"><div class="section-label">Overview</div><p class="body-text">${d.p1}</p><p class="body-text">${d.p2}</p></div>
    <div class="fd-row section r" data-d="3">
      <div class="fd-box"><div class="fd-label">Core desire</div><div class="fd-text">${d.desire}</div></div>
      <div class="fd-box"><div class="fd-label">Core fear</div><div class="fd-text">${d.fear}</div></div>
    </div>
    <div class="section r" data-d="4"><div class="section-label">Traits</div><div class="traits-row">${d.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div></div>
    <div class="two-col section r" data-d="5">
      <div class="box"><div class="box-title">Strengths</div><ul>${d.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>
      <div class="box"><div class="box-title">Blind spots</div><ul>${d.blindspots.map(s=>`<li>${s}</li>`).join('')}</ul></div>
    </div>
    <div class="section r" data-d="6"><div class="section-label">Notable examples</div><div class="famous-grid">${d.famous.map(f=>`<div class="famous-card"><div class="famous-name">${f.name}</div><div class="famous-ctx">${f.ctx}</div></div>`).join('')}</div></div>
    <div class="section r" data-d="7"><div class="section-label">Similar types</div><div class="similar-row">${simCards}</div></div>
    <div class="sep r" data-d="8"></div>
    <div class="cta-block r" data-d="9">
      <div class="cta-text">Not sure if you're <em>${t}</em>?<br>Let the scenarios decide.</div>
      <a href="/" class="btn-gold">Take the test →</a>
    </div>`;

  // Observe newly injected elements
  document.querySelectorAll('.r').forEach(el=>obs.observe(el));
}

// Transitions
const ov=document.getElementById('t-overlay');
function fadeIn(){ov.style.opacity='1';ov.animate([{opacity:1},{opacity:0}],{duration:550,delay:60,easing:'cubic-bezier(0.22,1,0.36,1)',fill:'forwards'});}
fadeIn();
window.addEventListener('pageshow',e=>{if(e.persisted)fadeIn();});
document.addEventListener('click',e=>{
  const a=e.target.closest('a[href]');
  if(!a)return;
  const h=a.getAttribute('href');
  if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('javascript')||h.startsWith('mailto'))return;
  e.preventDefault();
  ov.animate([{opacity:0},{opacity:1}],{duration:320,easing:'cubic-bezier(0.76,0,0.24,1)',fill:'forwards'}).finished.then(()=>{window.location.href=h;});
});

// Reveal observer
const obs=new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    if(!en.isIntersecting)return;
    const delay=parseFloat(en.target.dataset.d||0)*70;
    setTimeout(()=>en.target.classList.add('in'),delay);
    obs.unobserve(en.target);
  });
},{threshold:0.08});
document.querySelectorAll('.r').forEach(el=>obs.observe(el));

render();
</script>
</body>
</html>
