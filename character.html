  /* ── PAGE LAYOUT ── */

  .fn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:8px;}

  .tag-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .tag{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted);background:var(--surface2);}

  .cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}

  /* ── ANIMATIONS ── */
  .r{opacity:0;transform:translateY(18px);transition:opacity 0.55s cubic-bezier(0.22,1,0.36,1),transform 0.55s cubic-bezier(0.22,1,0.36,1);}

  footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:32px;text-align:center;}
  footer p{font-size:12px;color:var(--muted);}
  footer a{color:var(--muted);transition:color 0.2s;}
  footer a:hover{color:var(--cream);}

{name:`Tony Stark / Iron Man`,ctx:`Marvel Cinematic Universe`,type:'ENTP',cat:'Fiction',
desc:`Tony Stark is ENTP. The proof is in the press conference after his first escape from captivity: given every reason to stay quiet, he announces to the world "I am Iron Man" — not from bravery but because the ENTP genuinely cannot maintain a performance that bores them. His genius is Ne-driven: he built the first suit from cave scraps not because he planned to but because the problem was interesting and he was already solving it before he'd decided to. The arc from arms dealer to Avengers founder is not a moral conversion — it's an ENTP who finally found a problem large enough to hold his attention indefinitely. His conflicts with Steve Rogers are the ENTP's classic friction: too much awareness of how things could go wrong, not enough respect for the values-based objection. His final act — snapping his fingers with all six Stones, knowing what it costs — is Ne-Ti calculating the only solution that works, with Fe finally overriding the self-preservation instinct entirely.`,
kw:['Tony Stark MBTI','Iron Man personality type','ENTP Marvel character','what personality type is Tony Stark']},

{name:`Batman / Bruce Wayne`,ctx:`DC Comics, film series`,type:'INTJ',

kw:['Batman MBTI','Bruce Wayne personality type','INTJ DC character','what type is Batman']},

,

{name:`The Joker`,ctx:`DC Comics, The Dark Knight (2008)`,type:'ENTP',
cat:'Fiction',
desc:`The Joker as written by Nolan is ENTP without the restraint. His "Why so serious?" is a genuine philosophical position: seriousness requires a framework, and his entire project is demonstrating that frameworks are fictions. His magic trick with the pencil — "And it's gone" — is Ne at full speed: the punchline to an argument about how fast certainty disappears. His ferries experiment is not sadism but a controlled test: remove the social contract and see what people actually do. When both ferries refuse to detonate the other, he is genuinely surprised — which reveals his Ti limit, the ENTP who built the model and got the data wrong. His famous monologue — "I'm like a dog chasing cars; I wouldn't know what to do with one if I caught it" — is the ENTP's most honest self-assessment: the argument is the point, not the outcome.`,
kw:['Joker MBTI','Joker personality type','what type is the Joker','ENTP villain']},

{name:`Walter White`,ctx:`Breaking Bad`,type:'INTJ',
cat:'Fiction',
desc:`Walter White is INTJ, and the series is the story of what happens when an INTJ's suppressed capability finally gets permission to operate without constraint. His first lesson opens with "Chemistry is the study of change" — not matter, change — which is exactly how an INTJ frames their own life: not as what they are but as what they are becoming. His Heisenberg persona is not a mask; it is the dominant function unmediated, the Ni-Te stack without the social conditioning that kept it manageable. The season-four chess match with Gus Fring is two INTJs dismantling each other's systems — and Walt wins by turning his inferior Se into a weapon, climbing through nursing home windows to rig a bell to a wheelchair. His most honest line comes in the finale: "I did it for me. I liked it. I was good at it. And I was really — I was alive." Every INTJ watching that scene recognised something.`,
kw:['Walter White MBTI','Walter White personality type','Breaking Bad MBTI','INTJ anti-hero']},

,

{name:`Daenerys Targaryen`,ctx:`Game of Thrones`,type:'ENFJ',cat:'Fiction',
desc:`Daenerys Targaryen is ENFJ. She does not conquer cities — she liberates them, and the distinction is everything. Her speech to the Unsullied in Astapor, delivered in Valyrian she has concealed until the exact right moment, is Fe-Ni operating at peak efficiency: read the emotional reality of every person in that square, build the speech that transforms it, then detonate. She earns loyalty not through fear but through the specific ENFJ gift of making people feel that following her is the fullest expression of who they already are. Missandei, Jorah, Barristan, Tyrion — each of them becomes more themselves in her service. The final season is what happens to an ENFJ who loses every person who grounded her Fe in human reality: Viserion, Jorah, Missandei. Left only with the Ni vision of the world she was promised, with no one left to be the vision for, she burns King's Landing. It is not a betrayal of character. It is the character at its most exposed.`,
kw:['Daenerys personality type','Daenerys MBTI','ENFJ Game of Thrones character']},

{name:`Jon Snow`,ctx:`Game of Thrones`,type:'ISFP',cat:'Fiction',wiki:'Jon_Snow_(character)',
desc:`Jon Snow is ISFP. He acts entirely from personal values rooted in the present moment - he cannot let Wildlings die at Hardhome, cannot bend the knee when he doesn't mean it, cannot pretend loyalty he doesn't feel. His moral code is immediate and embodied: he does what feels right, right now, regardless of political consequence. He fights from instinct, grieves in silence, and leads only because he cannot walk away when something is wrong. The Night's Watch, the Wildlings, the threat beyond the Wall - each demands a physical, present-tense response, and Jon gives everything he has in the moment.`,
kw:['Jon Snow MBTI','Jon Snow personality type','ISFP Game of Thrones character']},

{name:`Cersei Lannister`,ctx:`Game of Thrones`,type:'ENTJ',
cat:'Fiction',
desc:`Cersei Lannister is ENTJ. Her defining line — "When you play the game of thrones, you win or you die" — is not a threat but a Te axiom: the world as she has modelled it, stated plainly for someone too naive to have seen it yet. She does not hate her enemies; she simply recognises that sentiment is an operational liability and acts accordingly. Her children are the one exception, the one variable her Te cannot reduce to a resource, and it is precisely this exception that Tyrion, Ned Stark, and eventually Cersei herself understand is both her weakness and the last legible human thing about her. The wildfire under the Sept of Baelor is her most complete act: a Te solution — total elimination of the problem set — at the cost of the last thing her Ni long-range vision had left to protect. She wins, and she loses everything.`,
kw:['Cersei Lannister MBTI','ENTJ villain character','Game of Thrones MBTI']},

{name:`Arya Stark`,ctx:`Game of Thrones`,type:'ISTP',
cat:'Fiction',
desc:`Arya Stark is ISTP. She asks Syrio Forel to teach her to fight because she has already decided - not because she has considered the options. She learns by doing: needle work, water dancing, the blind girl's market routes, the faces in the Hall. The Faceless Men appeal to her not because she wants to be no one, but because the training is real and the skills are permanent. Her list is not ideology - it is a Ti-Se tool: a precise inventory of debts she has witnessed and intends to settle in person. When she kills the Night King, she does it alone, with a dagger-switch her opponent never modelled, improvised in the exact moment the inferior Ni opened a window. She never gives a speech. She never explains herself. She just does the thing, and moves on.`,
kw:['Arya Stark MBTI','Arya personality type','ISTP female character']},

{name:`Michael Scott`,ctx:`The Office (US)`,type:'ENFP',
cat:'Fiction',
desc:`Michael Scott is ENFP whose Fe-inferior has never been properly calibrated. His need for connection is not performed — it is total, raw, and completely unfiltered by the self-awareness that would make it bearable for others. He declares himself the best boss, throws his employees a Dundies ceremony they mock, and then cries when they do not appreciate the effort. The tragedy of Michael Scott is that he is right about one thing: he does love these people. He loves them more than any of them love him. His goodbye in season seven — his mic pack removed before he can finish, the wordless hug with Pam on the jet bridge — works because the ENFP's warmth, finally stripped of its need to perform, is genuinely overwhelming. The movie references, the self-aggrandisement, the inappropriate declarations: all of them are the ENFP's authentic enthusiasm with no mechanism to modulate it.`,
kw:['Michael Scott MBTI','The Office personality type','ENFP fictional character']},

{name:`Dwight Schrute`,ctx:`The Office (US)`,type:'ESTJ',
cat:'Fiction',
desc:`Dwight Schrute is ESTJ. He is a volunteer sheriff's deputy, a beet farmer, a Lackawanna County volunteer fire department member, and the assistant to the regional manager — and he takes each of these roles with identical, unswerving seriousness. The humour of Dwight is the humour of Te-Si operating in a context that does not deserve it: his protocols, his loyalty to hierarchy, his emergency preparedness binder, his Survival Rule 1 — "Don't be a hero... wait, reverse that" — are all the ESTJ applying genuine competence to an environment of cheerful incompetence. His rivalry with Jim is ESTJ vs ENTP: the person who follows the rules furious at the person who treats every rule as a suggestion. His deepest loyalty is to Michael, which is the ESTJ's core vulnerability: the authority figure who he has decided deserves his obedience, right or wrong.`,
kw:['Dwight Schrute MBTI','Dwight personality type','ESTJ fictional character']},

{name:`Jim Halpert`,ctx:`The Office (US)`,type:'ENTP',
cat:'Fiction',
desc:`Jim is a grounded ENTP. He reads situations faster than anyone in the room and uses it for comedy rather than advantage - most of the time. His underachievement is the ENTP shadow: too much awareness of how things could be better, not enough will to do the work.`,
kw:['Jim Halpert MBTI','Jim personality type','ENTP The Office']},

{name:`Sheldon Cooper`,ctx:`The Big Bang Theory`,type:'INTP',
cat:'Fiction',
desc:`Sheldon Cooper is INTP at maximum amplification. He has a spot on the couch — a specific spot, with specific conditions of airflow and sightlines — that is the spatial manifestation of the INTP's need to impose a precise internal framework on a chaotic external world. His Roommate Agreement, his Relationship Agreement with Amy, his 73-reasons-why-73-is-the-best-number speech: all Ti building systems where none need exist, because building the system is the point. He is not antisocial from shyness — he simply cannot comprehend why anyone would prioritise emotional comfort over intellectual precision. His inferior Fe emerges under stress as complete, bewildering helplessness: he cannot function when sick without his mother, cannot process friendship without a written contract, cannot receive a gift without experiencing it as an obligation his framework has no protocol for.`,
kw:['Sheldon Cooper MBTI','Big Bang Theory personality type','INTP TV character']},

{name:`Dr. Gregory House`,ctx:`House M.D.`,type:'ENTP',
cat:'Fiction',
desc:`Gregory House is ENTP who has stripped away every social obligation that stood between him and the interesting problem. The medicine is not his purpose — the diagnosis is, because a diagnosis is the world's hardest puzzle: the patient's body is lying to you, the symptoms are misleading, and the truth requires following the logic past the point everyone else stopped. His team exists as instruments of Ne: four brains that generate competing hypotheses he can tear apart. His famous misanthropy — "Everybody lies" — is not cynicism but a Ti axiom that the evidence keeps confirming. His friendship with Wilson is the ENTP's one real concession to Fe: a person who will tell him uncomfortable truths and he will do the same. The leg, the Vicodin, the deliberate sabotage of his own happiness: House is the ENTP who solved every external problem and then ran out of things to focus on except himself.`,
kw:['Gregory House MBTI','House MD personality type','ENTP doctor character']},

{name:`Don Draper`,ctx:`Mad Men`,type:'INTJ',
cat:'Fiction',
desc:`Don Draper is INTJ who built himself from nothing and then spent seven seasons being destroyed by the one thing INTJs cannot fully control: the past. Dick Whitman, the Korean War deserter who took another man's identity, constructed Don Draper as a complete system — the face, the manner, the professional brilliance, the studied distance. It is a masterpiece of Ni-Te engineering, and it is also a cage. His advertising genius is the same function: he synthesises the unspoken longing underneath a consumer category and surfaces it in thirty seconds. The Kodak Carousel pitch — "nostalgia, it's delicate, but potent" — is the INTJ finding the pattern everyone was living inside without seeing. His self-destruction through alcohol and infidelity is the inferior Se running unchecked. His most honest moment comes in the Hershey pitch, when the system breaks open and the truth about Dick Whitman comes out in a boardroom. That is the INTJ when the framework can no longer hold.`,
kw:['Don Draper MBTI','Mad Men personality type','INTJ anti-hero']},

{name:`Hannibal Lecter`,ctx:`Silence of the Lambs`,type:'INTJ',
cat:'Fiction',
desc:`Hannibal Lecter is INTJ, and his operating principle is aesthetic rather than sadistic. He does not kill arbitrarily — he kills rudeness. The discourteous, the crude, the people who diminish the quality of a room: these offend the INTJ's internal standard in a way that, for Lecter, justifies removal. His entire escape from the Baltimore State Hospital is planned from behind bars, using only information he can derive from scant conversations and the sound of footsteps — pure Ni solving a physical problem without physical access. His interest in Clarice Starling is the INTJ's rarest response: recognition of an equal operating framework. "First principles, Clarice: simplicity. Read Marcus Aurelius." He tells her exactly how to think, because she is the only person he has met who is worth the instruction. His horror is inseparable from his precision, which is what makes him unforgettable.`,
kw:['Hannibal Lecter MBTI','Hannibal personality type','INTJ villain','what type is Hannibal Lecter']},

,

{name:`Frank Underwood`,ctx:`House of Cards`,type:'ENTJ',
cat:'Fiction',
desc:`Frank Underwood is ENTJ. He tells us exactly who he is in the first scene: he kills a suffering dog with his bare hands and then explains to camera that there are two kinds of pain — the kind that makes you strong and the kind that is useless. That is Te-Ni in its purest form: a ruthless taxonomy of the world, followed by immediate action consistent with the taxonomy. His entire rise from House Majority Whip to President is a masterclass in ENTJ operational thinking — every person is a variable, every relationship a leverage point, every betrayal a resource. He does not hate the people he destroys. He simply does not weight their existence as heavily as the outcome. His fourth-wall addresses are the ENTJ's interior monologue made visible: always running the next three moves, always aware of the gap between what is happening and what he is making happen.`,
kw:['Frank Underwood MBTI','House of Cards personality type','ENTJ politician character']},

{name:`BoJack Horseman`,ctx:`BoJack Horseman (Netflix)`,type:'ENFP',
cat:'Fiction',
desc:`BoJack Horseman is ENFP whose development arrested at the moment his mother told him he was not special enough to justify her love. Every self-destructive pattern in the show — the drinking, the sabotage, the inability to sustain anything good — flows from an ENFP who received the message early that his authentic self was insufficient, and has been performing and self-medicating around that wound ever since. His warmth is real. His creativity is real. His connection to Todd, Diane, Princess Carolyn — all of it is genuine ENFP warmth breaking through the cynicism he has built as armour. The tragedy is that he can see himself with total clarity: "I need you to tell me that I'm a good person. I know that's not something that's just automatically..." He knows. He always knows. The ENFP shadow is not blindness. It is knowing exactly what is wrong and doing it anyway, because the alternative requires trusting that change is possible.`,
kw:['BoJack Horseman MBTI','BoJack personality type','ENFP depression']},

{name:`Rust Cohle`,ctx:`True Detective Season 1`,type:'INTP',
cat:'Fiction',
desc:`Rust Cohle is INTP. His flat affect and nihilist monologues are consistently mistaken for INFJ mysticism, but the distinction is structural: Rust does not have visions, he has arguments. His pessimism about consciousness — "I think human consciousness is a tragic misstep in evolution" — is a position he has derived from first principles and can defend point by point. That is Ti, not Ni. His detective work is INTP at full power: he builds an internal model of the killer from fragments, maintains it with obsessive precision across seventeen years, and does not share it until he is certain. His relationship with Marty is the INTP's necessary tether: he needs someone whose ordinary human concerns pull him back into the functional world. His final line — "the light is winning" — is the INTP who followed the logic to the bottom and found, against his own argument, something he cannot fully dismiss.`,
kw:['Rust Cohle MBTI','True Detective personality type','INTP nihilist character']},

{name:`Patrick Bateman`,ctx:`American Psycho`,type:'INTJ',
cat:'Fiction',
desc:`Patrick Bateman is INTJ as total system failure. His interior monologue is pure Ni-Te architecture: status hierarchies cross-referenced with consumer brand loyalty indices cross-referenced with physical appearance metrics, all running simultaneously in a closed loop that has completely lost contact with human reality. His business card scene — the precise horror of watching someone calculate their social rank through cardstock weight and font choice — is the INTJ inferior Se catastrophising: the external world reduced to a single physical object whose details suddenly determine everything. His violence may or may not be real; the question the novel refuses to answer is the point. Whether he is killing people or fantasising about it, the framework producing the impulse is identical. Bret Easton Ellis understood that the INTJ's greatest risk is a comprehensive personal system with nothing anchoring it to other human beings.`,
kw:['Patrick Bateman MBTI','American Psycho personality type','INTJ dark character']},

{name:`Tyler Durden`,ctx:`Fight Club`,type:'ENTP',
cat:'Fiction',
desc:`Tyler Durden is ENTP as pure projection. He is what the narrator's Ne-Ti stack looks like without the Si brakes — no commitments, no continuity, no past to be accountable to. His rules for Fight Club are arguments: "The first rule of Fight Club is you do not talk about Fight Club" is not a rule but a test, and the test is whether you have the courage to break every social contract you grew up inside. His vision of men standing around fires in ruined cities is Ne running with no anchor — the ENTP who convinced himself that the destruction of civilisation is the honest conclusion of a logical chain. His most revealing line: "It's only after we've lost everything that we're free to do anything." This is the ENTP unable to build, only to tear down — the Ne that generates without the auxiliary Ti to evaluate whether what it is generating is actually correct.`,
kw:['Tyler Durden MBTI','Fight Club personality type','ENTP fictional character']},

{name:`Tony Montana`,ctx:`Scarface (1983)`,type:'ESTP',
cat:'Fiction',
desc:`Tony Montana is ESTP. He arrives in Miami with nothing but his ability to read a room faster than anyone in it, and within minutes he has already assessed the power structure of the detention facility, identified the exit condition, and begun working it. His rise through the Miami drug trade is Se-Ti in its most effective expression: he sees what is actually happening, acts before anyone else has finished thinking, and uses charm and violence as interchangeable tools. His downfall is the ESTP's precise vulnerability: he confuses tactical dominance with strategic vision, acquires everything without knowing what to do with it, and ends up alone in a mansion with a mountain of cocaine and no Ni to tell him what comes next. His last stand — "Say hello to my little friend" — is the ESTP who has nothing left but the moment, going out in the only language he ever fully spoke.`,
kw:['Tony Montana MBTI','Scarface personality type','ESTP movie character']},

{name:`Jack Sparrow`,ctx:`Pirates of the Caribbean`,type:'ENTP',
cat:'Fiction',
desc:`Jack Sparrow is ENTP whose chaos is the strategy. He appears drunk, lost, and operating entirely without plan — and then, in the same scene, the plan is revealed to have been running since the opening. He acquires the Black Pearl by convincing its mutinous crew to mutiny, then convinces the people who were trying to hang him to help him get it back, and nobody ever quite tracks how the switch happened. His negotiation with Davy Jones, his dealings with Barbossa, his arrangements with Cutler Beckett: each is an ENTP reading the situation in real time, identifying the angle nobody else saw, and acting before the other party has updated their model of what is happening. "The problem is not the problem. The problem is your attitude about the problem." That is Ne-Ti compressed into a sentence.`,
kw:['Jack Sparrow MBTI','Pirates of the Caribbean personality type','ENTP trickster character']},

{name:`Gandalf`,ctx:`Lord of the Rings`,type:'INTJ',cat:'Fiction',
desc:`Gandalf is INTJ. He operates with a strategic intelligence that others rarely comprehend in the moment - he knows more than he says, acts on long-horizon plans, and tolerates short-term chaos because he can see how it resolves. He does not explain himself. He refuses the Ring because he has already modelled exactly what would happen to him if he took it. His wisdom is not warm and relational - it is architectural. He built the conditions for the War of the Ring to be winnable decades before it started, then executed the plan with the precise detachment of someone who is never surprised by outcomes they already calculated.`,
kw:['Gandalf MBTI','Gandalf personality type','INTJ wizard character']},

{name:`Aragorn`,ctx:`Lord of the Rings`,type:'INFJ',cat:'Fiction',
desc:`Aragorn is INFJ. He has carried the weight of a destiny he did not ask for across his entire life - the hidden king, the ranger who knows what he is and refuses to claim it until the world is ready. He reads people and situations with quiet depth, leads through presence rather than force, and acts from a long vision that others around him cannot fully see. His restraint, his inner certainty, and his willingness to walk toward death at the Black Gate so that Frodo can complete the mission are all marks of the INFJ: a person who sees the end from the beginning and does what the moment requires.`,
kw:['Aragorn MBTI','Aragorn personality type','INFJ Lord of the Rings character']},

{name:`Frodo Baggins`,ctx:`Lord of the Rings`,type:'INFP',
cat:'Fiction',
desc:`Frodo Baggins is INFP. Tolkien did not choose a hobbit to carry the Ring arbitrarily — he chose the type whose inner world is both their greatest strength and the thing the Ring most directly attacks. Frodo's Fi dominant means he has a selfhood that is genuinely his own, private and non-negotiable, and the Ring works by corrupting exactly that: it does not offer power, it offers the self's own desires amplified into justification. What saves him, repeatedly, is Sam — the ISFJ whose care is concrete and present-tense and impossible to corrupt. By Mount Doom, Frodo cannot choose to destroy the Ring; the Ne-inferior INFP, exhausted and poisoned, cannot generate the alternative. He claims it. And Gollum, the INFP's shadow made physical, does what the person could not.`,
kw:['Frodo MBTI','Frodo Baggins personality type','INFP Lord of the Rings']},

{name:`Samwise Gamgee`,ctx:`Lord of the Rings`,type:'ISFJ',
cat:'Fiction',
desc:`Samwise Gamgee is ISFJ. He does not go to Mordor for adventure or glory — he goes because Frodo is going and Sam could not live with himself if Frodo went alone. His Si-Fe stack produces the most reliable moral compass in the entire story: he remembers the Shire, holds it in him as a lived thing, and carries it as both fuel and destination. His speech on the stairs of Cirith Ungol — "The great tales never end... even darkness must pass" — is not eloquence but memory: ISFJ courage is the courage to keep going because you remember what is worth protecting. He is the only member of the Fellowship whose love is both completely unconditional and completely practical. He waters the garden when they return. He has thought about the garden the whole time.`,
kw:['Samwise Gamgee MBTI','Sam personality type','ISFJ Lord of the Rings']},

{name:`Dumbledore`,ctx:`Harry Potter series`,type:'INFJ',
cat:'Fiction',
desc:`Dumbledore is INFJ. He has been running the plan since before Harry was born — the boy who must die, the horcrux he did not know he carried, the Elder Wand passed through death rather than conquest — and he does not share any of it in full with anyone, because the INFJ knows that the vision cannot survive other people's reactions to it until the moment is right. His warmth is entirely genuine and entirely strategic simultaneously, which is the INFJ paradox: he loves Harry, and he also knows exactly what Harry must do and choreographs the conditions that will make Harry choose it freely. His confession to Snape — "I have been curious whether it would work on the holder of the Elder Wand" — reveals the full depth of the plan and the full cost of being the person who makes it. He carries the weight of necessary suffering with a serenity that only makes sense if you understand that he has already lived with it for decades.`,
kw:['Dumbledore MBTI','Dumbledore personality type','INFJ wise mentor character']},

{name:`Severus Snape`,ctx:`Harry Potter series`,type:'INTJ',
cat:'Fiction',
desc:`Severus Snape is INTJ. He has been playing two sides of a war for seventeen years, and neither side has ever had access to his actual interiority — because the INTJ keeps the real framework entirely private, sharing only the outputs the current situation requires. His cruelty toward Harry is not arbitrary: it is the INTJ maintaining a cover story, punishing himself by proxy, managing an unbearable situation through the only mechanism available to someone who cannot speak the truth. His love for Lily Potter is the INTJ's most vulnerable exposure: the one value so foundational that the entire subsequent architecture of his life was built around it, invisibly. "Always" is not a romantic declaration. It is a structural report: this is what has been running my system the entire time you thought you understood me. His death, trusting that Dumbledore's plan will work without being able to see it complete, is the INTJ's final act of faith in a trusted framework.`,
kw:['Snape MBTI','Severus Snape personality type','INTJ Harry Potter character']},

{name:`Voldemort`,ctx:`Harry Potter series`,type:'ENTJ',
cat:'Fiction',
desc:`Voldemort is ENTJ who has eliminated every variable he could not control — including, in his own mind, death. His Te is total: he does not hate his enemies, he eliminates obstacles. He restructured Hogwarts, the Ministry, and the wizarding world not from ideology but from the ENTJ's most fundamental drive: here is how this should be organised, and I am the one to organise it. His fatal blind spots are both precisely ENTJ: he cannot model the variables he has no framework for — love, the choice to sacrifice oneself, the specific bond between a mother and her child — and he surrounds himself with people who fear him too much to correct his models. Every Horcrux is Ni running without Fe: a long-range strategy so rigidly personal that it cannot account for anyone else choosing something he would never choose.`,
kw:['Voldemort MBTI','Voldemort personality type','ENTJ villain']},

{name:`Elizabeth Bennet`,ctx:`Pride and Prejudice by Jane Austen`,type:'ENTP',
cat:'Fiction',
desc:`Elizabeth Bennet is ENTP. She is the most intellectually alive person in every room she enters and she knows it, which is precisely her problem. Her initial read of Darcy — proud, cold, contemptible — is a Ne-Ti hypothesis formed in seconds and held with the confidence of a conclusion. Her misread of Wickham, her blindness to Jane's feelings in the early chapters, her famous "till this moment I never knew myself" — these are the ENTP discovering that pattern-recognition deployed in place of genuine openness produces confident, elegant errors. What makes her one of literature's great characters is that the self-correction is real: she reads Darcy's letter, holds herself accountable, and updates her entire model of two people simultaneously. That is Ne-Ti at its best — the type that can be comprehensively wrong and then comprehensively right, and knows the difference.`,
kw:['Elizabeth Bennet MBTI','Pride and Prejudice personality type','ENTP literary character']},

{name:`Mr. Darcy`,ctx:`Pride and Prejudice by Jane Austen`,type:'INTJ',
cat:'Fiction',
desc:`Fitzwilliam Darcy is INTJ. He is right about nearly everything and catastrophically wrong about how to communicate it. His first proposal to Elizabeth — "In vain have I struggled. It will not do. My feelings will not be repressed" — is the INTJ's inferior Fe finally forcing its way out, and it comes out exactly as graceless as suppression produces. He tells her he loves her while listing the reasons she is beneath him, genuinely unable to understand why that is not a compliment. His letter after her refusal is the INTJ correcting the record: here is the factual basis for my positions, presented without social management, because I cannot do social management and accuracy is the only gift I have to give. His growth is the INTJ learning that other people's experience of you is part of the truth — that being correct and being understood are not the same thing.`,
kw:['Mr Darcy MBTI','Darcy personality type','INTJ Jane Austen character']},

{name:`Hamlet`,ctx:`Shakespeare`,type:'INFP',
cat:'Fiction',
desc:`Hamlet is INFP. The play is the INFP condition written at maximum amplification: he has an unambiguous moral mandate — avenge his father — and he cannot execute it because he cannot be certain enough to act on values alone, and the world keeps revealing new information that requires his Fi to reassess. His delay is not cowardice; it is the INFP's constitutive problem. He can only act when the action is certain to be right, and certainty of that kind never comes. His Ne generates every possible reading of every situation — the ghost may be a devil, Claudius may repent, killing him at prayer may send him to heaven — and his inferior Te cannot close any of them down. The play-within-a-play is the INFP finding a method: he will make the outer world generate the confirmation his inner world requires. His destruction of everyone around him is not cruelty but the cost of a conscience that cannot stop working.`,
kw:['Hamlet MBTI','Hamlet personality type','INFP Shakespeare character']},

{name:`Jay Gatsby`,ctx:`The Great Gatsby by F. Scott Fitzgerald`,type:'INFJ',
cat:'Fiction',
desc:`Jay Gatsby is INFJ. He built his entire life — the mansion, the parties, the shirts, the name itself — as a structure designed to produce one specific future: Daisy Buchanan standing in his house, returned to him. Every element of his existence is Ni in service of a singular vision so complete and so precise that the actual Daisy can only disappoint it. Nick tells him she cannot repeat the past. "Can't repeat the past?" he cries. "Why of course you can!" That is not delusion — it is the INFJ who has lived so fully inside the vision that the gap between vision and reality registers as a problem to be solved, not a limit to be accepted. His parties, which he does not attend, are Fe-infrastructure: they create the conditions that might produce the moment he has been modelling for five years. The green light at the end of Daisy's dock is the perfect symbol of the INFJ's relationship with the future: always visible, always just out of reach, always enough to keep running toward.`,
kw:['Jay Gatsby MBTI','Great Gatsby personality type','INFJ literary character']},

{name:`Holden Caulfield`,ctx:`The Catcher in the Rye by J.D. Salinger`,type:'INFP',
cat:'Fiction',
desc:`Holden Caulfield is INFP. His famous obsession with phoniness is not cynicism — it is the INFP's primary perceptual axis: the gap between what people present and what they actually are, which Holden cannot stop measuring and cannot tolerate when the gap is too wide. His grief for his brother Allie — the red baseball glove, the poems written in green ink on the fielding leather — is Fi at its most private: he cannot talk about it, but it is the central fact of everything. His plan to stand at the edge of a cliff and catch children who run too close is the INFP's positive vision made concrete: protect the innocence he cannot protect in himself. His breakdown at the end is the Fi-dominant exhausted by a world that keeps requiring performances he cannot sustain. What saves him, temporarily, is watching Phoebe on the carousel — one true moment of present-tense beauty that his internal value system can confirm is real.`,
kw:['Holden Caulfield MBTI','Catcher in the Rye personality type','INFP fictional character']},

,

{name:`Winston Smith`,ctx:`1984 by George Orwell`,type:'INFP',
cat:'Fiction',
desc:`Winston Smith is INFP. In a world designed to make inner life impossible, he keeps a diary. That act — private, dangerous, entirely without strategic value — is the INFP's core: the interior world must be maintained, even when maintaining it is fatal. His rebellion begins not with action but with the decision to remember what the truth was, which is the Fi dominant's most fundamental act of defiance. His love for Julia is not escape but confirmation: someone else exists, which means the self exists. What makes Room 101 the perfect INFP horror is that the Party does not destroy Winston's body — it invades and empties his interior world, the one place the INFP believed was unreachable. He ends the novel loving Big Brother. That is not submission. It is the obliteration of the person who had something to submit.`,
kw:['Winston Smith MBTI','1984 personality type','INFP dystopian character']},

{name:`Don Quixote`,ctx:`Cervantes`,type:'ENFP',
cat:'Fiction',
desc:`Don Quixote is ENFP. He has read so many romances of chivalry that the Ne-dominant's tendency to live inside a vision has become total — the world is not what it is but what it should be, and he is going to act accordingly until reality yields or he breaks. His jousting with windmills is not stupidity; it is ENFP commitment to a framework that makes life meaningful. Sancho Panza, the loyal pragmatist who follows him anyway out of genuine affection, is the novel's other great character precisely because he knows the windmills are windmills and goes along regardless. Cervantes understood that Don Quixote's madness and his nobility are the same thing — the ENFP who commits completely to a vision of how the world should be is simultaneously the most ridiculous and the most human person in the room.`,
kw:['Don Quixote MBTI','Don Quixote personality type','ENFP literary character']},

{name:`Captain Ahab`,ctx:`Moby Dick by Herman Melville`,type:'INTJ',
cat:'Fiction',
desc:`Ahab is INTJ who has converted a personal trauma into a comprehensive mission with one fixed objective and cannot be reached by anything outside it. The whale took his leg; Ahab has decided this constitutes a metaphysical injustice he is authorised to correct. His Ni has collapsed to a single point — the whale, always the whale — and his Te is marshalling every resource aboard the Pequod to serve it. Starbuck's rational objections are not wrong; they are simply irrelevant to a framework that has already decided the conclusion. Melville understood that the INTJ's greatest strength — the ability to hold a single vision against all opposition — is also the mechanism of catastrophe when the vision is built on a wound rather than a truth.`,
kw:['Captain Ahab MBTI','Moby Dick personality type','INTJ obsessive character']},

{name:`V`,ctx:`V for Vendetta`,type:'INFJ',
cat:'Fiction',
desc:`V is INFJ who was radicalised by a system that tried to destroy him and came back with a plan that took decades to execute. His vision — not just revenge but the transformation of an entire society's relationship to power — is Ni at its most totalising: he is not operating on a human timescale, he is operating on a historical one. His theatrical presentation, his Shakespeare, his music: Fe ensuring that the argument lands in the body, not just the mind. His relationship with Evey is the INFJ's most necessary thing — the one person he can be something other than the mission for. When he tells her "I don't know who you are, but I love you" he is the INFJ at the intersection of total commitment to the vision and total vulnerability to the person.`,
kw:['V for Vendetta MBTI','V personality type','INFJ vigilante character']},

{name:`Indiana Jones`,ctx:`Film series`,type:'ISTP',
cat:'Fiction',
desc:`Indiana Jones is ISTP. He is a professor in a classroom who is visibly more comfortable in a collapsing temple, and the gap between those two contexts is the ISTP's defining territory. He does not plan; he reads the immediate environment with the accuracy of someone who has been paying attention to physical reality his whole life and improvises solutions faster than most people form complete sentences. His whip, his gun, his leather jacket are the ISTP's toolkit: precise, physical, effective. His relationship with Marcus, with his father, with the people he drags into disaster is the ISTP's characteristic pattern — genuine loyalty expressed entirely through action, almost never through words, and always in the moment when it matters.`,
kw:['Indiana Jones MBTI','Indiana Jones personality type','ISTP action hero']},

{name:`Forrest Gump`,ctx:`Forrest Gump (1994)`,type:'ISFJ',
cat:'Fiction',
desc:`Forrest Gump is ISFJ. He keeps every promise he makes, maintains every loyalty he forms, and carries every memory with a fidelity that the people he remembers rarely deserve and always receive. His Si is absolute: Jenny matters because Jenny always mattered, and no amount of time or distance changes what was established in the beginning. His famous running is not an escape but the ISFJ's characteristic behaviour under unprocessable grief — he does what is available to be done, repeatedly, until the feeling can be survived. What makes Forrest extraordinary is not the national events he stumbles through but the consistency he brings to the smallest things: the box of chocolates, the letter, the ping-pong, and sitting at the bus stop waiting to tell Jenny he loves her.`,
kw:['Forrest Gump MBTI','Forrest Gump personality type','ISFJ movie character']},

{name:`Ferris Bueller`,ctx:`Ferris Bueller's Day Off (1986)`,type:'ENTP',
cat:'Fiction',
desc:`Ferris Bueller is ENTP as pure archetype. He does not break rules from rebellion or grievance — he bends every system he touches because to the Ne dominant, a rule is a hypothesis waiting to be tested. His day off is not laziness but a comprehensive demonstration that the systems adults treat as immovable are, in fact, completely movable if you understand how they work and approach them without fear. His relationship with Cameron is the ENTP's most honest dynamic: a person whose warmth is real but whose entire way of being is quietly asking the people around them to be braver than they were yesterday. "Life moves pretty fast. If you don't stop and look around once in a while, you could miss it." That is not philosophy — it is Ne speaking.`,
kw:['Ferris Bueller MBTI','Ferris Bueller personality type','ENTP movie character']},

{name:`Ellen Ripley`,ctx:`Alien series`,type:'ISTJ',
cat:'Fiction',
desc:`Ellen Ripley is ISTJ. She follows protocol on the Nostromo until the protocol proves inadequate, then applies the same methodical precision to improvising a new one. Her quarantine refusal — the decision that gets her overruled — is correct, and the film is the story of what happens when the person who was right gets ignored. Every subsequent film is Ripley applying Si-Te to an escalating series of situations that keep revising what adequate preparation means. She is not heroic in the theatrical sense; she does what needs to be done, documents what she can, and does not stop. Her bond with Newt in Aliens is the ISTJ's specific loyalty: not humanity in the abstract but the specific child who is there, right now, and needs protecting.`,
kw:['Ellen Ripley MBTI','Alien personality type','ISTJ female action hero']},

{name:`Raskolnikov`,ctx:`Crime and Punishment by Dostoevsky`,type:'INTJ',
cat:'Fiction',
desc:`Raskolnikov is INTJ consumed by a theory he cannot survive. His idea — that extraordinary people exist above ordinary moral law and may kill without guilt — is a Ni framework constructed with rigorous Ti logic, and he tests it empirically by murdering the pawnbroker. The experiment fails immediately: he does not feel what his theory predicted. The rest of the novel is an INTJ watching his comprehensive framework dismantled by a reality his inferior Se kept insisting on — the physical evidence, the guilt that inhabits his body before it inhabits his mind, Sonya's presence which his model has no protocol for. Dostoevsky understood that the INTJ's greatest danger is a framework built in isolation from human contact: it can be internally flawless and completely wrong about what it means to be a person.`,
kw:['Raskolnikov MBTI','Crime and Punishment personality type','INTJ Russian literature']},

// ── MARVEL & DC EXTENDED ─────────────────────────────────────────────────
{name:`Spider-Man / Peter Parker`,ctx:`Marvel`,type:'INFP',cat:'Fiction',
desc:`Peter Parker is INFP. "With great power comes great responsibility" is not a strategic calculation — it is a Fi axiom installed by one formative event that has governed every subsequent decision. He does not wear the mask because it is practical (it is not — it costs him everything) but because his internal value system does not allow him not to. His life in the MCU is the INFP's most common pattern: the inner commitment is enormous and unwavering, the outer life is a continuous disaster because Fi dominant underweights external consequences. His relationship with Tony Stark is the INFP and the ENTP: Tony models, plans, and engineers; Peter feels his way into the right answer and then acts on the feeling. When he tells an Infinity Stone-wielding Thanos "you mess with my city" and swings in anyway, he is not being strategic. He is being exactly who he is.`,
kw:['Spider-Man MBTI','Peter Parker personality type','INFP Marvel hero']},

{name:`Thor`,ctx:`Marvel Cinematic Universe`,type:'ESTP',cat:'Fiction',
desc:`Thor is ESTP. He arrives on Earth having never needed to develop anything beyond physical dominance and the authority of his name, and the MCU is the long process of that being insufficient. His Se dominant makes him extraordinary in combat and dismal in situations that require sitting still and thinking about consequences. His banishment is the ESTP's necessary confrontation: you cannot read this room with your hammer. His growth across the trilogy and into Endgame is the ESTP who has had enough losses to finally build the Ti that was always the auxiliary — the analysis that makes the action mean something rather than just happen. Ragnarok is the payoff: an ESTP who finally found the register where his particular intelligence flourishes.`,
kw:['Thor MBTI','Thor personality type','ESTP Marvel character']},

{name:`Captain America / Steve Rogers`,ctx:`Marvel`,type:'ISFJ',cat:'Fiction',
desc:`Steve Rogers is ISFJ. He does not fight for abstract ideology — he fights for the specific, personal, remembered values of a kid from Brooklyn who hated bullies, and the serum only made him bigger, not different. His Si dominant means he is anchored in who he was before anyone gave him power: the principles he held when he was small are the principles he holds when he can throw a tank. His loyalty to Bucky overrides every mission directive, every team agreement, and every strategic calculation — because ISFJ loyalty is specific and personal, not transferable or conditional. His "I can do this all day" is not bravado; it is genuinely true. His farewell at the end of Endgame — the choice to return and live a life — is the ISFJ finally allowing the present to matter as much as the duty.`,
kw:['Captain America MBTI','Steve Rogers personality type','ISFJ Marvel hero']},

{name:`Loki`,ctx:`Marvel Cinematic Universe`,type:'ENTP',cat:'Fiction',
desc:`Loki is ENTP. His mischief is not malice but Ne at play: he is perpetually finding the angle, the loophole, the interpretation of events that turns the situation inside out. His shapeshifting is not just a power but a metaphor — the ENTP who contains every possibility and commits to none of them, because commitment forecloses the game. His rivalry with Thor is ENTP and ESTP: Loki is always smarter, always three moves ahead, and always losing, because Thor acts and Loki theorises. His arc across the MCU and Loki series is the ENTP's hardest journey: discovering that some things are worth being sincere about. "I am burdened with glorious purpose" is Ne-Ti announcing itself. His sacrifice for Asgard in Infinity War — genuine, uncommented on, immediately undone — is the first time Loki acts without an angle.`,
kw:['Loki MBTI','Loki personality type','ENTP Marvel villain']},

{name:`Thanos`,ctx:`Marvel Cinematic Universe`,type:'INTJ',cat:'Fiction',
desc:`Thanos is INTJ. His plan to eliminate half of all life in the universe is presented not as villainy but as a conclusion — the only conclusion, once you follow the logic he has followed. This is the INTJ's most dangerous mode: a comprehensive framework so internally consistent, pursued with such total conviction, that the person holding it genuinely cannot understand why others have not arrived at the same place. His Ni-Te axis produces the gauntlet, the Infinity Stones, the twenty-year strategy — all of it in service of a vision whose flaw is the INTJ's precise flaw: it was built without adequate input from anything outside his own framework. His moment on Vormir — the choice to sacrifice Gamora — is the INTJ who has fully subordinated every relationship to the vision. He weeps. The vision wins anyway.`,
kw:['Thanos MBTI','Thanos personality type','INTJ MCU villain']},

{name:`Wolverine / Logan`,ctx:`X-Men, Marvel`,type:'ISTP',cat:'Fiction',
desc:`Logan is ISTP. He has been alive for over a century and the primary thing he has learned is that attachment causes damage — his or theirs, eventually both. His claws are the ISTP's physical intelligence made literal: the most direct solution, available instantly, requiring nothing except the willingness to use them. He works alone not from misanthropy but from accuracy: he has modelled the outcomes of staying. His relationship with the X-Men is the ISTP tolerating structure because the alternative is worse. His relationship with Jean Grey is the ISTP's inferior Fe breaking through the armour completely. Logan — the 2017 film — is the full ISTP arc: a man who spent his life refusing to care, in the end doing the most selfless thing possible for the one person he allowed himself to love.`,
kw:['Wolverine MBTI','Logan personality type','ISTP X-Men character']},

{name:`Professor X / Charles Xavier`,ctx:`X-Men, Marvel`,type:'ENFJ',cat:'Fiction',
desc:`Charles Xavier is ENFJ. His entire project is built on seeing potential in others. His school is not just strategy - it is the expression of a deep personal belief that people can be better than their worst impulses, given the right environment.`,
kw:['Professor X MBTI','Charles Xavier personality type','ENFJ X-Men']},

// ── VIDEO GAMES ───────────────────────────────────────────────────────────
{name:`Arthur Morgan`,ctx:`Red Dead Redemption 2`,type:'ISFP',cat:'Fiction',
desc:`Arthur Morgan is ISFP. He keeps a journal — sketches of the landscapes he rides through, brief observations about the people he meets, the animals he hunts — and that journal is the truest version of him, the one he cannot show anyone. His violence and his gentleness are equally genuine and he does not try to resolve the contradiction because he is not that kind of person. He rides because the horse is real, draws because the subject is real, helps the stranger on the road because the stranger is real and present and needs help right now. His tuberculosis arc is the ISFP's most difficult confrontation: the person who has always lived in the present suddenly given a hard deadline on it. His choice in the end — sending John away, staying back — is not strategy. It is what feels right, which is the only standard Arthur Morgan has ever applied.`,
kw:['Arthur Morgan MBTI','RDR2 personality type','ISFP video game character']},

{name:`Joel Miller`,ctx:`The Last of Us`,type:'ISTJ',
cat:'Fiction',
desc:`Joel Miller is ISTJ. Before Sarah, before the outbreak, he was a man defined by reliable competence — construction, providing, doing what the day required. What the outbreak did was reduce the ISTJ's world to its most elemental form: protect what matters, do what survives. His lie to Ellie at the end of the first game is the ISTJ making the only choice his Si-Te axis can produce: the mission succeeded, the person is safe, the framework holds. He cannot tell her the truth because telling her the truth is the same as losing her, and he has already lost one daughter. The second game is about the cost of the ISTJ who will not bend — not because he is cruel, but because the structure that makes him reliable also makes him immovable.`,
kw:['Joel Last of Us MBTI','Joel Miller personality type','ISTJ video game character']},

{name:`Ellie Williams`,ctx:`The Last of Us`,type:'ENTP',
cat:'Fiction',
desc:`Ellie Williams is ENTP. She survives the apocalypse the way ENTPs survive difficult environments: by finding everything interesting. Her jokes — delivered in the worst possible moments, landing anyway — are Ne running to keep the terror manageable. Her curiosity is genuine and constant: books, cassette tapes, butterfly knives, the way giraffes look in real life. Her anger is the inferior Si in distress: when the past cannot be processed and the hurt cannot be metabolised through humour or action, it becomes an obsession. The second game is the ENTP's darkest arc — a person who was always defined by forward movement, locked inside a loop, chasing the one thing that movement cannot outrun.`,
kw:['Ellie Last of Us MBTI','Ellie Williams personality type','ENTP video game character']},

{name:`Geralt of Rivia`,ctx:`The Witcher`,type:'ISTP',
cat:'Fiction',
desc:`Geralt of Rivia is ISTP. The Witcher mutations were supposed to strip him of emotion; they did not, and he has never fully made peace with that. He works alone by preference, solves the problem in front of him with the tools available, and maintains an elaborate performance of indifference that fools almost no one who knows him. His code — he does not kill innocents, he fulfils contracts, he tries not to get involved — is Ti discipline applied to a chaotic world. His involvement is always inevitable. His gruff nihilism is the ISTP's armour: he has seen enough to know how things go, and caring about outcomes is the first step toward being ruined by them. Ciri and Yennefer are the cracks in the armour. The whole of The Witcher is the story of a man who keeps insisting he has no stake while doing everything a person with total stake would do.`,
kw:['Geralt MBTI','The Witcher personality type','ISTP Witcher character']},

{name:`Kratos`,ctx:`God of War series`,type:'ISTJ',
cat:'Fiction',
desc:`Kratos is ISTJ. The Greek games are what the ISTJ's Si looks like under total catastrophe: every structure that gave his duty meaning — Sparta, the gods, his family — systematically destroyed, leaving only the rage and the obligation to keep moving. The Norse games are the ISTJ attempting something he has no template for: being a father without a framework for it, in a world he does not understand, after a history he cannot share. His terseness is not brutality — it is the ISTJ who genuinely does not know how to translate what he knows into words Atreus can use. His greatest scene is not combat but a conversation: "I know this. We are more." The ISTJ who has finally found a way to pass down something other than how to survive.`,
kw:['Kratos MBTI','God of War personality type','ISTJ game character']},

{name:`Link`,ctx:`The Legend of Zelda`,type:'ISFP',
cat:'Fiction',
desc:`Link is the archetypal silent ISFP hero: he acts because it is right, says almost nothing, and never questions the call. He is the embodiment of ISFP heroism: present, loyal, and unreflective.`,
kw:['Link Zelda MBTI','Link personality type','ISFP Nintendo character']},

{name:`Master Chief`,ctx:`Halo series`,type:'ISTJ',
cat:'Fiction',
desc:`Master Chief is ISTJ. Taken at six years old, trained until the person and the soldier became indistinguishable, he has spent his entire life executing missions with a consistency that borders on mechanical — except where it does not. His bond with Cortana is the ISTJ rarest development: a specific connection that begins as operational and becomes something the framework cannot categorise. His silence is not emptiness but the ISTJ complete form of presence: I am here, I am doing what needs doing, that is everything I have.`,
kw:['Master Chief MBTI','Halo personality type','ISTJ game hero']},

// ── HISTORICAL ───────────────────────────────────────────────────────────
{name:`Napoleon Bonaparte`,ctx:`French emperor and military commander`,type:'ENTJ',cat:'Historical',
desc:`Napoleon Bonaparte is ENTJ. He rose from a minor Corsican family to Emperor of France through a combination of military genius, administrative capability, and a Te-dominant's absolute conviction that the vision in his head could be imposed on the world — and a very long run of being right. His Napoleonic Code is as revealing as his battles: not just conquest but the restructuring of the legal architecture of Europe, because the ENTJ is not interested in winning without building something that lasts. His downfall in Russia and at Waterloo is the ENTJ's most complete failure mode: the belief that the model of reality he had built from his own experience was reality itself, and that winter, attrition, and coalition forces had not accounted for it adequately enough.`,
kw:['Napoleon MBTI','Napoleon personality type','ENTJ historical figure']},

{name:`Julius Caesar`,ctx:`Roman general and statesman`,type:'ENTJ',cat:'Historical',
desc:`Caesar was ENTJ. His military genius was inseparable from his political vision. He moved fast, consolidated power efficiently, and was destroyed by his refusal to believe anyone would dare oppose him - a failure of the ENTJ imagination: strong on what people can build, weak on what they can fear.`,
kw:['Julius Caesar MBTI','Caesar personality type','ENTJ Roman leader']},

{name:`Alexander the Great`,ctx:`Macedonian king and conqueror`,type:'ENTJ',cat:'Historical',
desc:`Alexander is ENTJ. He had a comprehensive vision of a world empire from his early twenties and moved toward it with relentless efficiency. His emotional volatility was the ENTJ shadow: entirely functional when winning, catastrophic when crossed.`,
kw:['Alexander the Great MBTI','Alexander personality type','ENTJ conqueror']},

,

{name:`Abraham Lincoln`,ctx:`16th President of the United States`,type:'INFJ',cat:'Historical',
desc:`Lincoln is INFJ. He carried a moral vision of the Union — and of what the Union should mean — that did not shift under the enormous political pressure to compromise it, while simultaneously holding together a cabinet of rivals and a fractured country through the force of his relational intelligence. His depression was lifelong and documented; his humour was equally lifelong and equally real — both are the INFJ maintaining the vision against a grief the vision could not fully explain. The Gettysburg Address is 272 words and redefined the purpose of the war in a register that was personal before it was political: Ni turned into Fe, the private conviction translated into something a country could hold. He was shot five days after Lee's surrender, which is the INFJ's most characteristic irony: reaching the destination just long enough to see it.`,
kw:['Abraham Lincoln MBTI','Lincoln personality type','INFJ US President']},

{name:`Martin Luther King Jr.`,ctx:`Civil rights leader, United States`,type:'INFJ',cat:'Historical',
desc:`Martin Luther King Jr. is INFJ. His speeches work not because they articulate a policy but because they make visible a moral reality that millions of people could feel but had not yet seen named: the gap between the promise of America and its practice, experienced in the body of every Black American alive. I Have a Dream is Ni turned into Fe — the private vision, articulated in a language that enters through the chest before it reaches the mind. His leadership was not managerial but prophetic: he saw where history needed to go before most people believed it was possible, and he refused to stop saying so even when the cost kept rising. The FBI surveillance, the death threats, the assassination: he knew the risks and continued with the clarity of someone who had already integrated the worst possible outcome into the framework.`,
kw:['Martin Luther King MBTI','MLK personality type','INFJ leader']},

{name:`Mahatma Gandhi`,ctx:`Independence leader, India`,type:'INFJ',cat:'Historical',
desc:`Gandhi is INFJ. He operated from a comprehensive personal vision — satyagraha, truth-force — pursued with total consistency across five decades and two continents. His method of nonviolent resistance is itself a deeply INFJ idea: you change the shape of a system not by engaging it on its own terms but by making its violence visible to the people watching. His fasts were not self-destruction but strategic Fe — he was the most important person in the room, and his body was the argument. His personal life was complicated and sometimes contradictory, as INFJ lives tend to be when the vision is total: the private person paying a price the public philosophy does not account for. His assassination in 1948, five months after Indian independence, cut off someone whose work was not finished.`,
kw:['Gandhi MBTI','Gandhi personality type','INFJ historical figure']},

{name:`Albert Einstein`,ctx:`Theoretical physicist`,type:'INTP',cat:'Historical',
desc:`Einstein is INTP. His thought experiments — riding alongside a beam of light, standing in a falling elevator — are the Ti dominant's purest methodology: build the most precise internal model possible, then push it until the framework either holds or breaks. The special theory of relativity emerged from asking what it would actually mean to travel at the speed of light; the general theory emerged from asking what it would actually mean to be in free fall. He could not drive a car and forgot to eat when working. His pacifism and his horror at the atomic bomb — he signed the letter to Roosevelt that initiated the Manhattan Project and spent the rest of his life in regret — are the INTP's inferior Fe arriving too late and with full force.`,
kw:['Einstein MBTI','Albert Einstein personality type','INTP physicist']},

,

,

{name:`Leonardo da Vinci`,ctx:`Renaissance polymath`,type:'ENTP',cat:'Historical',
desc:`Leonardo da Vinci is ENTP. He moved between anatomy, engineering, painting, hydrology, optics, and military design the way most people move between rooms — because the Ne dominant is not interested in mastery as an endpoint but as a means of generating the next question. He left an enormous number of things unfinished, including The Adoration of the Magi and The Battle of Anghiari, because the beginning — the problem, the discovery, the hypothesis — was always more compelling than completion. His notebooks are the ENTP's mind made visible: thousands of pages of ideas, observations, inventions, and questions in no particular order, cross-pollinating in real time. The Mona Lisa is the exception: the painting he could not stop working on, the one problem he kept finding new angles in.`,
kw:['Leonardo da Vinci MBTI','Da Vinci personality type','ENTP Renaissance polymath']},

{name:`Cleopatra`,ctx:`Pharaoh of Ancient Egypt`,type:'ENTJ',cat:'Historical',
desc:`Cleopatra was ENTJ. She was multilingual, politically strategic, and used every tool available to maintain power in one of the most precarious positions in the ancient world. Her relationships with Caesar and Antony were never purely romantic - they were geopolitical.`,
kw:['Cleopatra MBTI','Cleopatra personality type','ENTJ female ruler']},

{name:`Joan of Arc`,ctx:`French military leader and saint`,type:'INFJ',cat:'Historical',
desc:`Joan of Arc is INFJ. She was seventeen when she presented herself to the Dauphin, told him she had been sent by God to drive the English from France, and then did it. Her Ni was total and unquestioning: she had seen something, she knew what it required, and no practical objection penetrated the certainty. Her Fe translated the vision into leadership — she did not fight alone but inspired an exhausted army to follow someone who had never held a sword before, because conviction of that magnitude is its own kind of authority. Her trial in Rouen was the INFJ's final confrontation: a system demanding she recant what she had seen, and her refusal to do it. She was nineteen when they burned her. The Church canonised her five centuries later, which is the INFJ's characteristic timeline for vindication.`,
kw:['Joan of Arc MBTI','Joan of Arc personality type','INFJ historical figure']},

{name:`Thomas Jefferson`,ctx:`3rd US President, founding father`,type:'INTJ',cat:'Historical',
desc:`Jefferson is INTJ. He was a systematic thinker who designed institutions, not just wrote documents. His contradictions - the idealist who owned enslaved people - reflect the INTJ capacity for inhabiting a framework without confronting its internal inconsistencies.`,
kw:['Thomas Jefferson MBTI','Jefferson personality type','INTJ founding father']},

{name:`Benjamin Franklin`,ctx:`Founding Father, inventor, diplomat`,type:'ENTP',cat:'Historical',
desc:`Benjamin Franklin is ENTP. He invented bifocals, the lightning rod, and the flexible catheter; wrote Poor Richard's Almanack in the voice of a fictional persona; charmed the French court into financing the American Revolution; negotiated the Treaty of Paris; founded a university, a library, a fire department, and a postal system; and still found time to be the most quotable man of his century. This is not productivity — it is Ne running without a governor. His famous thirteen virtues, which he tracked in a notebook, are the ENTP's most characteristic project: a systematic self-improvement scheme applied with great rigour and cheerful inconsistency. He described the experiment as useful precisely because he never fully achieved the virtues. The analysis was the point.`,
kw:['Benjamin Franklin MBTI','Franklin personality type','ENTP founding father']},

{name:`Carl Jung`,ctx:`Swiss psychiatrist, founded analytical psychology`,type:'INFJ',cat:'Historical',
desc:`Jung is INFJ, which is appropriate given that he built the theoretical framework that became the foundation for all modern personality typology. His work on the unconscious, archetypes, synchronicity, and the shadow is a direct expression of the INFJ's dominant Ni: he spent his life making the invisible visible, mapping the interior territory that most people cross without a chart. His break with Freud was the INFJ refusing to let the framework be reduced to something that fit the mentor's model. His Red Book — his private visual and written record of his own active imagination, unpublished in his lifetime — is the INFJ's most unguarded document: the man who mapped the unconscious descending into his own.`,
kw:['Carl Jung MBTI','Jung personality type','INFJ psychologist']},

{name:`Sigmund Freud`,ctx:`Founder of psychoanalysis`,type:'INTJ',cat:'Historical',
desc:`Freud is INTJ. He built a comprehensive theoretical system for understanding human psychology, defended it against all comers with considerable personal ferocity, and was convinced that anyone who disagreed was simply exhibiting the resistance his framework predicted. The circularity of that position — disagreement as evidence of the theory — is the INTJ's most characteristic blind spot: the framework becomes self-sealing. His break with Jung and Adler was not intellectual but personal: the INTJ cannot tolerate a student who builds their own architecture rather than developing the one given to them. His work on the unconscious, repression, and the structure of the psyche transformed the 20th century's understanding of the mind even where the specific mechanisms he proposed have not held up.`,
kw:['Freud MBTI','Sigmund Freud personality type','INTJ psychologist']},

{name:`George Washington`,ctx:`1st US President, founding father`,type:'ISTJ',cat:'Historical',
desc:`Washington is ISTJ. He stepped down from the presidency voluntarily after two terms, at a moment when no institutional constraint would have stopped him from staying indefinitely, because the principle — that power should not accumulate in one person — mattered more than the position. This is the ISTJ at its most complete: not ambition managed by rules but a person for whom the rule has become internal and non-negotiable. His command of the Continental Army through eight years of defeat, freezing winters, and an army that kept dissolving was the ISTJ's core competence: doing the duty every single day regardless of whether conditions were favourable, because the duty does not stop when conditions are difficult. King George III, told Washington intended to return to farming after the war, said he was the greatest man alive. He was right.`,
kw:['George Washington MBTI','Washington personality type','ISTJ president']},

{name:`Genghis Khan`,ctx:`Founder of the Mongol Empire`,type:'ENTJ',cat:'Historical',
desc:`Genghis Khan is ENTJ. A ruthless strategic commander who also built complex administrative systems, promoted on merit rather than birth, and maintained a diverse coalition of peoples under a unified political structure. The brutality was instrumental, not personal.`,
kw:['Genghis Khan MBTI','Genghis Khan personality type','ENTJ conqueror']},

{name:`Adolf Hitler`,ctx:`German dictator, World War II`,type:'INFJ',cat:'Historical',
desc:`Hitler is typed INFJ by many analysts, and this serves as a critical reminder that personality type is not morality. The visionary certainty, the pattern-based worldview, the ability to inspire devotion - these are INFJ traits deployed toward genocide. Type is not destiny.`,
kw:['Hitler MBTI','Hitler personality type','INFJ dark side']},

{name:`Plato`,ctx:`Greek philosopher`,type:'INFJ',cat:'Historical',
desc:`Plato is INFJ. His philosophy is built on a single organising INFJ conviction: the world we can see is a shadow of a reality that only the mind can access. The Theory of Forms is pure Ni — the specific instance matters less than the abstract pattern it imperfectly expresses, and the philosopher's task is to see through the instance to the form. His Republic is the INFJ's most ambitious project: not describing society as it is but designing it as it should be, with philosopher-kings as rulers because they are the only ones who have glimpsed the forms. His dialogues place Socrates at the centre, which is the INFJ honouring the relationship that formed them while using it as a vehicle for their own vision.`,
kw:['Plato MBTI','Plato personality type','INFJ philosopher']},

{name:`Aristotle`,ctx:`Greek philosopher`,type:'INTJ',cat:'Historical',
desc:`Aristotle is INTJ in contrast to Plato's INFJ. Where Plato reached for the abstract ideal, Aristotle categorised the actual. He built systems of logic, of biology, of politics, of poetics. His mode is Te-Ni: organise what exists into a comprehensive framework.`,
kw:['Aristotle MBTI','Aristotle personality type','INTJ philosopher']},

{name:`Socrates`,ctx:`Greek philosopher`,type:'ENTP',cat:'Historical',
desc:`Socrates is ENTP. He did not write anything — he argued, in person, every day, in the agora, with whoever would engage. The Socratic method is the ENTP's operating system made explicit: ask the question beneath the question, expose the assumption beneath the assumption, keep going until the thing the person thought they knew has dissolved and something more honest is visible. He was put to death at seventy for corrupting the youth of Athens and impiety toward the gods, which is the most ENTP possible end to a life: prosecuted for following the argument wherever it went. He accepted the hemlock rather than escape or recant, which is the ENTP who has tested the position from every angle and is entirely certain it holds.`,
kw:['Socrates MBTI','Socrates personality type','ENTP philosopher']},

{name:`Friedrich Nietzsche`,ctx:`German philosopher`,type:'INTJ',cat:'Historical',
desc:`Nietzsche is INTJ. He built a comprehensive critique of European morality from within, was absolutely certain of his conclusions, wrote with a precision and ferocity that left almost no room for misunderstanding, and was catastrophically misunderstood anyway — first by his sister Elisabeth, who edited his papers and handed them to the Nazis, then by a century of readers who took the INTJ's framework and used it for purposes entirely opposite to what it argued. His descent into madness in Turin, collapsing at the sight of a horse being beaten, is the INTJ's inferior Se arriving all at once: the physical world, in one moment, breaking through every framework he had built to hold it at distance. His final decade of silence is the most extreme version of what happens when the architecture collapses.`,
kw:['Nietzsche MBTI','Nietzsche personality type','INTJ philosopher']},

{name:`Jesus of Nazareth`,ctx:`Historical and religious figure`,type:'INFJ',cat:'Historical',
desc:`Jesus is consistently typed INFJ. His teaching operates through paradox and parable - the INFJ mode of communicating something true that cannot be stated directly. He saw what people could become rather than what they were, and was certain about the invisible rather than the visible.`,
kw:['Jesus MBTI','Jesus personality type','INFJ religious figure']},

{name:`Confucius`,ctx:`Chinese philosopher and teacher`,type:'INFJ',cat:'Historical',
desc:`Confucius is INFJ. His teaching centred on the gap between the person and the ideal, and the lifelong cultivation required to close it. He operated quietly, through example and relationship rather than proclamation.`,
kw:['Confucius MBTI','Confucius personality type','INFJ philosopher']},

{name:`Charles Darwin`,ctx:`Naturalist and evolutionary biologist`,type:'INTP',cat:'Historical',
desc:`Darwin is INTP. He spent five years on the Beagle collecting specimens and observations, then spent twenty more years after returning home building the theoretical framework that would organise everything he had seen — because the Ti dominant cannot publish until the model is complete, internally consistent, and bulletproof against every objection it can generate for itself. On the Origin of Species was ready decades before he shared it; he shared it only when Wallace forced his hand. His self-doubt, his chronic illness, his vast correspondence network: all are the INTP managing the gap between the comprehensiveness of the internal framework and the incompleteness of the evidence. He changed the scientific understanding of life itself because he was willing to follow the logic wherever it went.`,
kw:['Charles Darwin MBTI','Darwin personality type','INTP scientist']},

{name:`Margaret Thatcher`,ctx:`British Prime Minister 1979-1990`,type:'ENTJ',cat:'Historical',
desc:`Thatcher is ENTJ. She was ideologically certain, strategically relentless, and largely indifferent to whether people liked her — the Te dominant asking only whether the analysis was correct and the strategy effective, not whether the room was comfortable. "The lady's not for turning" is the ENTJ's most famous self-description: the position has been examined, the conclusion reached, and social pressure is not a data point. She ran her cabinet as a debating team she was certain she would win, changed British economic policy and labour relations in ways that still define the country, and was eventually brought down by her own party rather than by an electoral defeat — because the ENTJ's confidence can become, in time, an inability to model the preferences of the people they lead.`,
kw:['Margaret Thatcher MBTI','Thatcher personality type','ENTJ female politician']},

{name:`Barack Obama`,ctx:`44th President of the United States`,type:'ENFJ',cat:'Politics',
desc:`Obama is ENFJ. His 2008 campaign was the ENFJ's most complete expression in modern politics: a person who made millions of people feel personally addressed by a message that was also universal. "Yes we can" is not policy — it is Fe activating shared emotional possibility, and it worked because the warmth behind it was real. His governance revealed the ENFJ's harder edge: he was more strategic than he appeared, more calculating than his empathy suggested, and occasionally willing to make decisions whose cost to individuals he understood and accepted anyway. His presidency was hardest when events required sustained confrontation rather than coalition, because the ENFJ's toolkit is built for bringing people together, not for winning wars of attrition.`,

{name:`Nelson Mandela`,ctx:`South African president, anti-apartheid leader`,type:'ENFJ',cat:'Politics',
desc:`Mandela is ENFJ. He held a vision of a non-racial South Africa through 27 years of imprisonment on Robben Island without the vision deteriorating into bitterness, which is the ENFJ's most extraordinary capacity: maintaining the relational and moral framework when the people and institutions that should sustain it are actively destroying you. His negotiation with his captors after his release was not weakness or compromise — it was ENFJ strategy at its highest level: I know what this moment requires, I know what the people of this country need to feel, and I am willing to be the person who provides it regardless of what it cost me to get here. His later years, his foundation, his public warmth toward everyone: all of it held the same note he struck in his inaugural address.`,

{name:`Angela Merkel`,ctx:`Chancellor of Germany 2005-2021`,type:'ISTJ',cat:'Politics',
desc:`Merkel is ISTJ. She was systematic, methodical, and conspicuously uninterested in the performance of leadership. She prepared exhaustively, spoke plainly, and governed through precision rather than charisma. One of the clearest ISTJ profiles in modern politics.`,

{name:`Steve Jobs`,ctx:`Co-founder of Apple`,type:'ENTJ',cat:'Business',
desc:`Steve Jobs is ENTJ. His vision of what consumer technology should be — beautiful, seamless, status-bearing, intuitive to the point of disappearing — was singular and comprehensive, and he applied it with a ruthlessness that broke teams, ended careers, and also produced the iMac, the iPod, the iPhone, and the iPad. His famous reality distortion field is Te-Ni in action: he genuinely modelled the outcome before it existed, then used that model to convince engineers that the impossible was merely difficult. His cruelty was not incidental to his genius; both came from the same source — an absolute conviction that his judgment was the correct one and that anyone slowing the vision down was not doing their job. His return to Apple after his firing and his dismantling of its product line down to four items is the ENTJ who has finally been given the authority his competence always claimed.`,

{name:`Bill Gates`,ctx:`Co-founder of Microsoft`,type:'INTP',cat:'Business',
desc:`Gates is INTP. He built the most successful software company in history through systems thinking rather than charisma. He reads constantly, builds frameworks for understanding global problems, and has more rigour per sentence than almost any public figure.`,

{name:`Jeff Bezos`,ctx:`Founder of Amazon`,type:'INTJ',cat:'Business',
desc:`Bezos is INTJ. Amazon's core architecture — customer obsession as a single organising principle, applied with mechanical consistency across every product and service decision — is a pure INTJ system: one Ni conviction implemented through Te at extraordinary scale and speed. His 1994 drive across the country to write the business plan, his practice of writing six-page memos instead of slide decks, his "regret minimisation framework" for making major decisions: all are the INTJ externalising an internal model into operational procedure. His letter to shareholders each year since 1997 is the clearest window into his actual thinking — analytical, long-horizon, structurally consistent — and consistently more interesting than most corporate communication.`,
kw:['Jeff Bezos MBTI','Bezos personality type','INTJ entrepreneur']},

{name:`Mark Zuckerberg`,ctx:`Co-founder and CEO of Meta`,type:'INTJ',cat:'Business',
desc:`Zuckerberg is INTJ. He built a system for connecting human beings at global scale with extraordinary technical precision and equally extraordinary blind spots around the human side of what that system would produce — which is the INTJ's most consistent failure mode: the framework is internally correct and externally incomplete. His famous congressional testimonies showed the INTJ operating in a domain the type finds genuinely difficult: social performance under hostile conditions, where the audience wants something other than technical accuracy. His pivot to the metaverse, his investment in AI infrastructure, his public persona transformations: each is the INTJ identifying the next long-range vision and committing to it completely, indifferent to whether the current room finds it plausible.`,
kw:['Mark Zuckerberg MBTI','Zuckerberg personality type','INTJ tech CEO']},

{name:`Oprah Winfrey`,ctx:`Media executive, TV host, philanthropist`,type:'ENFJ',cat:'Business',
desc:`Oprah is ENFJ. She built a media empire on genuine human connection, and her personal warmth is not performance - it is the product. Her ability to make a guest feel seen in front of millions of people is the ENFJ skill at its highest expression.`,
