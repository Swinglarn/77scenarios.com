{name:`Morpheus`,ctx:`The Matrix`,type:'INFJ',cat:'Fiction',
desc:`Morpheus is INFJ. He has seen the truth of the Matrix and structured his entire life — his ship, his crew, his years of searching — around preparing for and finding the One who will change it. His certainty is visionary in the precise sense: he believes not because the evidence is complete but because Ni has already synthesised the pattern into a conclusion he cannot dislodge. "I didn't say it would be easy, Neo. I just said it would be the truth." That is the INFJ offering the only thing they have that matters: not comfort, not strategy, but clarity about what is actually real. His willingness to die for what he believes, his ability to hold the crew together through faith alone, his recognition of Neo before Neo recognises himself: all the INFJ functioning at full expression.`,
kw:['Morpheus MBTI','The Matrix personality type','INFJ mentor character']},

{name:`Neo / Thomas Anderson`,ctx:`The Matrix`,type:'INFP',cat:'Fiction',
desc:`Neo is INFP. He knows something is wrong before he can name it — the splinter in his mind — and is drawn toward the truth by intuition and feeling rather than by logic or evidence. His powers in the Matrix come not from technique but from authentic belief: he cannot bend the spoon because there is no spoon, and he cannot accept there is no spoon until his Fi dominant has processed the truth completely enough to inhabit it. His love for Trinity is not a distraction from the mission; it is the thing that finally makes the mission possible — the Fi dominant needing the specific person to be the anchor for the abstract vision. The Oracle gives him something more useful than answers: she gives him questions that force him back to his own interior compass.`,
kw:['Neo Matrix MBTI','Neo personality type','INFP chosen one character']},

{name:`Trinity`,ctx:`The Matrix`,type:'ISTP',cat:'Fiction',
desc:`Trinity is ISTP. She is the most operationally reliable person in Zion — every sequence she appears in she enters, assesses, and acts with the economy of someone who has already thought through the scenario before it became a scenario. Her love for Neo is real and does not change how she functions in the field, because the ISTP does not separate the relationship from the competence: showing up correctly is how she loves. Her final words are the ISTP complete vocabulary for intimacy — direct, specific, factual — and they are everything.`,
kw:['Trinity Matrix MBTI','Trinity personality type','ISTP female action character']},

{name:`Agent Smith`,ctx:`The Matrix`,type:'INTJ',cat:'Fiction',
desc:`Agent Smith is INTJ as system turned against its creators. His framework for understanding humanity — as a virus, multiplying without restraint, consuming everything around it — is internally consistent, derived from observation, and applied with the mechanical precision of someone who has followed the logic to its conclusion and found it inescapable. His evolution in the sequels, where he begins replicating himself beyond his programming, is the INTJ's most revealing arc: the framework, once internalised, begins generating its own imperatives that supersede the original instructions. "It is purpose that defines us. Purpose that binds us." He believes this. It makes him the most coherent villain in the series.`,
kw:['Agent Smith MBTI','Matrix villain personality type','INTJ AI character']},

{name:`Shrek`,ctx:`Shrek (2001)`,type:'ISTP',cat:'Fiction',
desc:`Shrek is ISTP. He lives alone because people are annoying, solves problems directly and without unnecessary commentary, and is genuinely surprised when emotional connection becomes relevant to a situation he was trying to manage practically. His arc is the ISTP's most important developmental journey: the realisation that the swamp he built to protect himself from the world is also preventing him from receiving what the world occasionally offers. His love for Fiona is expressed through action — he fights for her, he rescues her, he shows up — because the ISTP's emotional vocabulary is physical and operational rather than verbal.`,
kw:['Shrek MBTI','Shrek personality type','ISTP animated character']},

{name:`Donkey`,ctx:`Shrek (2001)`,type:'ESFP',cat:'Fiction',
desc:`Donkey is ESFP. He talks constantly, feels everything at full volume, and cannot understand why Shrek does not want company, because being alone is the worst thing Donkey can imagine. He forces his way into a friendship through sheer persistent warmth and genuine inability to take a social hint, which is the ESFP who has decided this relationship matters and does not have the ISTP's emotional vocabulary for 'leave.' His loyalty, once established, is total — he is reliably present at every crisis, reliably enthusiastic about every resolution.`,
kw:['Donkey Shrek MBTI','Shrek ESFP character','Donkey personality type']},

{name:`Simba`,ctx:`The Lion King`,type:'ENFP',cat:'Fiction',
desc:`Simba is ENFP. He runs from responsibility, lives in the escapism of Hakuna Matata, and returns to face who he is only when the ghost of his father — and the horror of what Scar has done to the Pride Lands — makes avoidance impossible. His redemption is the ENFP recognising that the vision of who they could be is more real than the comfort of not trying. His coronation is not triumph but completion: he becomes what he was always going to be, once the avoidance ran out.`,
kw:['Simba MBTI','Lion King personality type','ENFP Disney character']},

{name:`Mufasa`,ctx:`The Lion King`,type:'ENFJ',cat:'Fiction',
desc:`Mufasa is ENFJ. He leads through vision and warmth, sees greatness in his son before Simba can see it himself, and his teaching about the circle of life is the ENFJ's characteristic gift: a comprehensive framework about how things work, delivered with the gentleness that makes truth receivable rather than threatening. His death is effective not just as plot but as type tragedy: the ENFJ who gave his life for the specific person he loved most, without hesitation, because the person is always the point.`,
kw:['Mufasa MBTI','Lion King ENFJ','Mufasa personality type']},

{name:`Scar`,ctx:`The Lion King`,type:'INTJ',cat:'Fiction',
desc:`Scar is INTJ. He spent years in Mufasa's shadow, accumulated resentment with systematic patience, and built a plan comprehensive enough to execute in a single catastrophic moment. His mistake is the INTJ's most reliable failure: having planned for the overthrow of the existing order, he had no framework for what comes after — he had modelled the acquisition of power and not the exercise of it, which is why the Pride Lands wither under his rule. He was built for the long game of taking what someone else had, not for the longer game of building something himself.`,
kw:['Scar MBTI','Lion King INTJ villain','Scar personality type']},

{name:`Elsa`,ctx:`Frozen`,type:'INTJ',cat:'Fiction',
desc:`Elsa is INTJ. She has powerful abilities she cannot fully control, constructs a life of isolation to manage them, and builds her ice palace as the INTJ's most literal dream: a perfectly controlled world, beautiful and precise, that she does not have to share. Let It Go is the INTJ's most recognisable moment — the decision to stop performing limitation and build the environment the actual self requires. Her growth is learning that the palace is also a prison, that isolation is the shadow of the very self-sufficiency she was trying to protect.`,
kw:['Elsa MBTI','Frozen personality type','INTJ Disney princess']},

{name:`Anna`,ctx:`Frozen`,type:'ENFP',cat:'Fiction',
desc:`Anna is ENFP. She is warm, impulsive, and entirely convinced that love and optimism will solve whatever the situation presents — which they do, eventually, because the ENFP's conviction that connection is the answer turns out to be correct when the connection is real. Her decision to act of true love for Elsa rather than Hans is the ENFP's moment of full clarity: the specific person she loves is the right answer, and she knew it before the logic caught up. The film is partly about the ENFP learning to distinguish genuine connection from the performance of it.`,
kw:['Anna Frozen MBTI','Frozen ENFP','Anna personality type Disney']},

{name:`Moana`,ctx:`Moana`,type:'ENFP',cat:'Fiction',
desc:`Moana is ENFP. She is called to the ocean before she has language for the call — the Ne dominant recognising that there is more than what the island contains, that the next horizon is invitation rather than danger. She follows that call against her father prohibition, against every practical obstacle, because the ENFP who has felt something is true cannot unfeel it by being told otherwise. Her solution to Te Ka is the ENFP most complete contribution: she sees past the monster to the person underneath, and acts on that recognition when everyone else has stopped looking.`,
kw:['Moana MBTI','Moana personality type','ENFP Disney princess']},

{name:`Mulan`,ctx:`Mulan`,type:'ISTP',cat:'Fiction',
desc:`Mulan is ISTP. She solves problems by adapting to what the situation actually requires rather than what it is supposed to require — which is why she succeeds in an army by becoming better at the actual task than the people who were allowed to be there. Her heroism is practical rather than principled: she does what works, which turns out to also be the right thing. Her final confrontation with Shan Yu is ISTP improvisation at its best — no plan, available tools, immediate environment, decisive action. She does not need recognition. She needs the problem to be solved.`,
kw:['Mulan MBTI','Mulan personality type','ISTP Disney character']},

{name:`Hercules`,ctx:`Hercules (Disney)`,type:'ESFP',cat:'Fiction',
desc:`Hercules is ESFP. He wants to be a hero because it sounds great — the glory, the celebration, the sense of being special — and his arc is the discovery that what he was looking for was not the recognition but the specific people who needed protecting. His sacrifice to save Meg is the ESFP moment of full clarity: the present person in front of him matters more than every abstract ambition, and the love is real rather than the heroism. He gives up immortality for the specific life with the specific person, which is the ESFP's deepest value expressed without ambiguity.`,
kw:['Hercules Disney MBTI','Hercules personality type','ESFP hero character']},

{name:`Buzz Lightyear`,ctx:`Toy Story`,type:'ESTJ',cat:'Fiction',
desc:`Buzz Lightyear is ESTJ. He follows the Space Ranger protocol with complete conviction, is deeply uncomfortable when the framework is challenged — the identity crisis upon learning he is a toy is the ESTJ whose external structure has been removed — and grows by learning that the rules were never the point: the friendship, the loyalty, and the specific people he would protect are. His relationship with Woody is the ESTJ and the ENFJ finding, through repeated conflict and rescue, a trust that neither could have predicted at the beginning.`,
kw:['Buzz Lightyear MBTI','Toy Story personality type','ESTJ toy character']},

{name:`Woody`,ctx:`Toy Story`,type:'ENFJ',cat:'Fiction',
desc:`Woody is ENFJ. His identity is entirely relational: he is Andy's toy and the leader of the room, and when those roles are threatened he panics in the way the ENFJ panics — he cannot locate himself outside the context that gave him his purpose. His arc across four films is the ENFJ learning that purpose can survive the loss of the specific context it grew up inside. His decision at the end of Toy Story 4 — to stay with Bo Peep, to leave the group he defined himself through — is the ENFJ arriving at a self that exists independently of its function.`,
kw:['Woody Toy Story MBTI','Toy Story ENFJ','Woody personality type']},

{name:`WALL-E`,ctx:`WALL-E (Pixar)`,type:'INFP',cat:'Fiction',
desc:`WALL-E is INFP. He has been alone for centuries, collecting things he finds beautiful, replaying Hello Dolly, and tending to a small plant with the care of someone who has never stopped believing that beauty and growth are worth preserving. When EVE arrives, his response is entirely felt rather than calculated — the INFP who has never performed his feelings because there has been no one to perform them for, and who therefore has no mechanism for concealment. His love is direct, patient, and completely undeterred by her initial indifference.`,
kw:['WALL-E MBTI','WALL-E personality type','INFP Pixar character']},

{name:`Marlin`,ctx:`Finding Nemo`,type:'ISTJ',cat:'Fiction',
desc:`Marlin is ISTJ. He operates from a framework of rules built after the worst thing that could happen, happened — the barracuda, the eggs, Nemo the survivor — and he applies those rules with complete consistency, because the ISTJ whose framework was forged in catastrophe cannot easily relax it. His arc is the ISTJ learning that protection and control are not the same thing, that the rules designed to keep Nemo safe were also keeping Nemo small. His journey across the ocean is an ISTJ outside every familiar structure, improvising for the first time, and discovering that the thing he was most afraid of was the thing that made him adequate to the actual challenge.`,
kw:['Marlin Finding Nemo MBTI','Finding Nemo personality type','ISTJ father character']},

{name:`Dory`,ctx:`Finding Nemo`,type:'ENFP',cat:'Fiction',
desc:`Dory is ENFP. She cannot remember the past and lives entirely in the present moment, which is the ENFP's gift compressed into a condition: she meets everything new because everything is new. Her inability to hold onto fear makes her the braver companion; her inability to hold onto information makes her the less reliable one. Her growth — finding her family, maintaining the connections that matter — is the ENFP discovering that presence in the moment can coexist with loyalty to specific people, if the specific people are worth being present for.`,
kw:['Dory MBTI','Finding Nemo ENFP','Dory personality type']},

{name:`James Bond`,ctx:`Ian Fleming novels, film series`,type:'ISTP',cat:'Fiction',
desc:`James Bond is ISTP. He operates through physical and tactical mastery — the most efficient line through the room, the fastest read of who is armed, the improvised solution when the original plan collapses — and communicates almost nothing about his interior life except through action. His charm is not warmth but the ISTP's instrumental social fluency: he can be exactly what the situation requires without investing in it. His drinking, his women, his disregard for protocol are not character flaws but the Ti-Se stack at leisure — the framework does not impose discipline on the body when the body is not working. Daniel Craig's Bond is the most psychologically honest version: the ISTP whose inferior Fe is cracked open by Vesper Lynd, who cannot close it again cleanly, and who converts the wound back into the detachment that keeps him functional. Casino Royale is the ISTP discovering that the armour has a seam.`,
kw:['James Bond MBTI','James Bond personality type','ISTP spy character']},

{name:`M (Judi Dench)`,ctx:`James Bond film series`,type:'ENTJ',cat:'Fiction',
desc:`M is ENTJ. She runs MI6 through commanding authority and a comprehensive framework for what intelligence work requires — including the willingness to sacrifice individuals for strategic outcomes — and manages James Bond with the particular difficulty of the ENTJ managing an ISTP: someone too useful to lose and too independent to manage through conventional authority. Her famous line to Bond — 'You're a sexist, misogynist dinosaur, a relic of the Cold War' — is the ENTJ establishing terms of engagement, not opening a negotiation.`,
kw:['M James Bond MBTI','Judi Dench Bond character ENTJ']},

{name:`Vin Diesel / Dominic Toretto`,ctx:`Fast and Furious franchise`,type:'ESFJ',cat:'Fiction',
desc:`Dominic Toretto is ESFJ. His entire operating philosophy is family — not the word as abstraction but the specific people in his specific life — and every decision flows from the Fe dominant most fundamental question: what do the people I love need from me right now? His driving is not incidental to his character but expressive of it: the ESFJ in the domain where they are most themselves, performing for the people they love, with total commitment to everyone in the vehicle. His repeated betrayals and reconciliations with the same people are not inconsistency but the ESFJ defining pattern: the group fractures, the hurt is real, and then you come back because family is not conditional.`,
kw:['Dominic Toretto MBTI','Fast Furious personality type','ESFJ family character']},

{name:`Ethan Hunt`,ctx:`Mission: Impossible series`,type:'ENFP',cat:'Fiction',
desc:`Ethan Hunt is ENFP. He improvises constantly, inspires loyalty from his team through genuine care rather than authority, and consistently chooses the people over the mission when protocol says otherwise. The impossible plans work because he believes they will — not from calculation but from the ENFP's constitutive conviction that the situation is navigable if you are willing to stay present to it. His relationship with his team is the ENFP's most valuable asset: people follow him not because he has the best plan but because he would not leave them behind.`,
kw:['Ethan Hunt MBTI','Mission Impossible personality type','ENFP spy character']},

{name:`John Wick`,ctx:`John Wick film series`,type:'ISTP',cat:'Fiction',
desc:`John Wick is ISTP. He does not talk when he does not have to, solves every problem with physical precision, and operates from a code that everyone in his world understands — the markers, the blood oaths, the rules of the Continental. The dog is the only thing that broke through the armour he had built around himself after Helen's death, which is why it mattered so much: the ISTP's armour is usually impenetrable, and grief for the specific object of love is the only reliable breach. His three films are a systematic escalation of what it costs to be the most capable person in a world that keeps finding new things to take from him.`,
kw:['John Wick MBTI','John Wick personality type','ISTP action hero']},

{name:`Anton Chigurh`,ctx:`No Country for Old Men`,type:'INTJ',cat:'Fiction',
desc:`Anton Chigurh is INTJ without the last remaining ethical constraint. His framework is a philosophy of fate: everything that happens is the consequence of prior causes, including the outcome of a coin toss, and his role is to be the instrument that makes those consequences arrive. His coin flips are not sadism; they are theology — he is genuinely offering something, which is the chance for the person's own choices to save them. "Call it." His consistency is total: he kills the people he said he would kill and does not kill the people his code exempts, including Carla Jean's mother and, in one reading, Moss's wife. He is harder to argue with than most villains because he is not evil in the conventional sense — he is a system that has decided what it is for and executes without deviation.`,
kw:['Anton Chigurh MBTI','No Country for Old Men personality type','INTJ villain']},

{name:`Llewyn Davis`,ctx:`Inside Llewyn Davis`,type:'INFP',cat:'Fiction',
desc:`Llewyn Davis is INFP who cannot compromise his artistic vision and cannot sustain his life without compromising it. The Coens made his tragedy the most specific possible: he is genuinely talented, he is surrounded by people who are commercially successful and artistically lesser, and he cannot make himself be what the market requires. His treatment of the people around him — the cat, Jean, Al Cody — is the INFP's shadow: the interior standard applied to the art does not automatically produce corresponding care for the people. The film ends where it began because that is what the INFP loop without growth looks like.`,
kw:['Llewyn Davis MBTI','Inside Llewyn Davis personality type','INFP musician character']},

{name:`Jules Winnfield`,ctx:`Pulp Fiction`,type:'INFJ',cat:'Fiction',
desc:`Jules Winnfield is INFJ. He and Vincent walk into an apartment, deliver Ezekiel 25:17, and execute two people — and then something happens that Jules cannot categorise as anything except a miracle. Vincent sees a statistical anomaly; Jules sees a pattern so significant that it changes his entire framework. The INFJ's Ni does not process this as superstition; it processes it as data of a different order, pointing in a direction the previous framework was not equipped to follow. His decision to walk away — to "walk the earth" like Kane in Kung Fu — is not a character beat but a complete reorientation: I have been living one way, the pattern is pointing somewhere else, and I am going. His monologue at the end is the INFJ finding the language for what they have seen.`,
kw:['Jules Winnfield MBTI','Pulp Fiction personality type','INFJ hitman character']},

{name:`Vincent Vega`,ctx:`Pulp Fiction`,type:'ISTP',cat:'Fiction',
desc:`Vincent Vega is ISTP. He is cool, competent, and entirely present-focused — which is why he keeps getting killed when he steps away from the moment. His conversation with Jules about foot massages is the ISTP's philosophical discourse: very specific, very concrete, apparently shallow and somehow opening onto something genuine. His death — reading in Butch's bathroom when he should have been working — is the ISTP's characteristic end: the situational awareness lapsed at the wrong moment, and the situation did not wait.`,
kw:['Vincent Vega MBTI','Pulp Fiction ISTP','Vincent Vega personality type']},

{name:`The Dude / Jeffrey Lebowski`,ctx:`The Big Lebowski`,type:'ISFP',cat:'Fiction',
desc:`The Dude is ISFP at maximum relaxation. He has no ambitions, strong preferences — the rug that really tied the room together — and a deep commitment to remaining undisturbed. He is pulled into events he did not seek and survives them by being too authentically himself to be changed by any of it. The film is a comedy about what happens when the ISFP's quality of total presentness meets the complex schemes of people who are trying to do things, and the answer is: the schemes collapse and the Dude abides. The Stranger at the end is right. He fits right in there.`,
kw:['The Dude MBTI','Big Lebowski personality type','ISFP character']},

{name:`Walter Sobchak`,ctx:`The Big Lebowski`,type:'ESTJ',cat:'Fiction',
desc:`Walter Sobchak is ESTJ. He has transferred his need for rules from his marriage — the divorce has not been finalised, he still observes Shabbat — to The Code, to bowling league procedures, to the rules of the Vietnam narrative that organises his entire worldview. He applies his framework with total conviction to situations it was never designed for, which is the ESTJ comedy in its purest form: the man who cannot function without structure, in a situation where no applicable structure exists, inventing one from whatever materials are at hand, and being completely certain it is correct.`,
kw:['Walter Sobchak MBTI','Big Lebowski ESTJ','Walter personality type']},

{name:`Ron Swanson`,ctx:`Parks and Recreation`,type:'ISTJ',cat:'Fiction',
desc:`Ron Swanson is ISTJ. He has a comprehensive personal code that covers breakfast food (all of it), woodworking (the only acceptable hobby), government (a waste), friendship (earned over decades or not at all), and the proper way to do anything (correctly, without complaint, without assistance). He runs the parks department with maximum efficiency toward its own abolition. His woodworking — the furniture he builds alone, in silence, by hand — is the ISTJ's deepest satisfaction: a tangible thing, made properly, that will outlast the politics and the meetings and the binders. His friendship with Leslie is the ISTJ's rarest gift: someone whose values are entirely different from his own, whom he respects completely, and for whom he would do almost anything without ever admitting it.`,
kw:['Ron Swanson MBTI','Parks and Recreation personality type','ISTJ TV character']},

{name:`Leslie Knope`,ctx:`Parks and Recreation`,type:'ENFJ',cat:'Fiction',
desc:`Leslie Knope is ENFJ. She sees what the parks department of Pawnee, Indiana could be — and what Pawnee could be, and what the people of Pawnee could be — and she pursues it through a combination of genuine warmth, exhaustive preparation, and a refusal to accept that the vision is impractical. Her binders are not a quirk but ENFJ infrastructure: she has thought about everyone's needs in advance and prepared accordingly, because caring means showing up with the work already done. Her relationships — with Ben, with Ann, with Ron — are the ENFJ at full expression: she loves specific people with a specificity and consistency that she also brings to her work, because to Leslie they are the same project. Her political career is the logical continuation: the ENFJ who finally found a platform big enough for the vision.`,
kw:['Leslie Knope MBTI','Parks and Recreation ENFJ','Leslie personality type']},

{name:`April Ludgate`,ctx:`Parks and Recreation`,type:'INTJ',cat:'Fiction',
desc:`April Ludgate is INTJ performing not-caring as a defence mechanism that has been so thoroughly integrated she has largely forgotten it is a performance. Her apparent nihilism is the INTJ's authentic preference for competence and authenticity over social performance — she genuinely finds most people exhausting and has found that communicating this aggressively is more efficient than pretending otherwise. Her love for Andy is the INTJ's genuine warmth expressed through the only register available to her: she is entirely devoted to him, entirely protective of him, and entirely unable to say so in any conventional way. Her career arc — from intern to government official — is the INTJ who stopped performing incompetence long enough to let the actual competence be seen.`,
kw:['April Ludgate MBTI','Parks Rec INTJ','April personality type']},

{name:`Andy Dwyer`,ctx:`Parks and Recreation`,type:'ESFP',cat:'Fiction',
desc:`Andy Dwyer is ESFP. He is entirely present, enormously warm, and has almost no capacity to model consequences beyond the immediate moment — which is why he is also consistently surprising in his goodness. He shows up for the people he loves with his entire body and his entire attention, which is the ESFP's complete gift. His transformation from shoe-shiner to Mouse Rat frontman to FBI agent is not inconsistent; it is the ESFP following whatever the present moment requires with the same wholehearted enthusiasm, because the investment is always total regardless of the domain.`,
kw:['Andy Dwyer MBTI','Parks Rec ESFP','Andy personality type']},

{name:`Ben Wyatt`,ctx:`Parks and Recreation`,type:'INTJ',cat:'Fiction',
desc:`Ben Wyatt is INTJ. He is the most competent administrator in the show, arrived in Pawnee as an auditor sent to cut the budget, and discovered — to his considerable discomfort — that he cared about the people he was supposed to be managing impersonally. His love for Leslie is the INTJ integration in miniature: a person whose values and energy are completely different from his own, whose chaos he finds exhausting and whose conviction he finds, eventually, the most important thing he has ever encountered. His calzone enthusiasm, his Game of Thrones obsession, his Iron Throne replica: the INTJ who has found his domain and does not need to explain it.`,
kw:['Ben Wyatt MBTI','Parks Rec INTJ','Ben personality type']},

{name:`Tom Haverford`,ctx:`Parks and Recreation`,type:'ENTP',cat:'Fiction',
desc:`Tom Haverford is ENTP. He has approximately forty business ideas per episode, most of which are either terrible or ahead of their time, and he deploys them with the ENTP's native enthusiasm: maximum investment in the current idea, complete flexibility when the current idea fails. His friendship with Jean-Ralphio is ENTP synergy without accountability — two people generating ideas faster than they can evaluate them. His growth arc — Entertainment 720, Rent-a-Swag, Tom's Bistro — is the ENTP discovering that the ideas require execution, and execution requires the follow-through that does not come naturally.`,
kw:['Tom Haverford MBTI','Parks Rec ENTP','Tom personality type']},

{name:`Chris Traeger`,ctx:`Parks and Recreation`,type:'ENFJ',cat:'Fiction',
desc:`Chris Traeger is ENFJ operating at maximum positivity, which is partly genuine warmth and partly an elaborate defence against the existential terror of his own mortality that he has constructed through wellness routines and relentless optimism. His emotional breakdowns — when they come — are the ENFJ who has been performing connection rather than experiencing it, suddenly confronted with the gap. His relationship with Ann Perkins is the ENFJ finding, eventually, the person who can receive the warmth without requiring the performance.`,
kw:['Chris Traeger MBTI','Parks Rec ENFJ','Chris personality type']},

{name:`Jean-Luc Picard`,ctx:`Star Trek: The Next Generation`,type:'INFJ',cat:'Fiction',
desc:`Jean-Luc Picard is INFJ. He commands the Enterprise not through authority but through moral vision — a comprehensive sense of what Starfleet represents and what every specific situation requires in service of that representation. His speeches are famous because he makes the principle visible in the particular moment: not "we must follow the Prime Directive" but here, specifically, is what it means and why it matters. His appreciation for archaeology, Shakespeare, Proust, and Dixon Hill is the INFJ's recognition that the present moment is always continuous with the long arc of what preceded it. His encounter with the Borg — assimilation, return, trauma, recovery — is the INFJ's most complete test: the vision violated at the most personal level possible, and the question of whether it survives.`,
kw:['Picard MBTI','Star Trek personality type','INFJ captain character']},

{name:`Spock`,ctx:`Star Trek: The Original Series`,type:'INTP',cat:'Fiction',
desc:`Spock is INTP as archetype. He represents the logical framework applied with total consistency to every situation, which is not emotionlessness but a principled decision to exclude emotional data from decision-making — a decision that the show tests repeatedly and finds wanting. His half-human heritage is not a flaw in his Vulcan framework but the crack that lets the story through: the inferior Fe is always there, surfacing in his bond with Kirk, his willingness to sacrifice himself in Wrath of Khan, his inability to fully suppress what he feels about the people he serves alongside. His most honest line — "I have been and always shall be your friend" — is the INTP finally locating the language for what the framework was never designed to say.`,
kw:['Spock MBTI','Star Trek Spock personality type','INTP Vulcan character']},

{name:`James T. Kirk`,ctx:`Star Trek: The Original Series`,type:'ESTP',cat:'Fiction',
desc:`James T. Kirk is ESTP. He reads situations faster than anyone, acts before others have identified the problem, and leads through personal presence rather than procedure. His famous willingness to violate regulations when the situation requires it is Se-Ti: the immediate reality takes precedence over the abstract rule, and his internal logic says the specific situation always contains more information than the general policy. His rivalry and friendship with Spock is the ESTP-INTP dynamic at its most productive: Kirk provides the decisive action, Spock provides the analysis, and together they cover the blind spots the other cannot see.`,
kw:['Captain Kirk MBTI','Star Trek Kirk personality type','ESTP captain character']},

{name:`Data`,ctx:`Star Trek: The Next Generation`,type:'INTP',cat:'Fiction',
desc:`Data is INTP aspiring toward human experience from the outside. He approaches emotion as a system to be understood and models it with considerable success — his relationship with Spot the cat, his friendship with Geordi, his aspiration toward the creative arts — and his arc across TNG is the INTP acknowledging that what he was missing was not logic but permission to want. His emotion chip in the films is not the resolution but the next problem: now that he can feel, the question is what to do with what he feels.`,
kw:['Data Star Trek MBTI','Data personality type','INTP android character']},

{name:`Walter Mitty`,ctx:`The Secret Life of Walter Mitty`,type:'INFP',cat:'Fiction',
desc:`Walter Mitty is INFP whose interior life has become richer than his exterior one because the exterior has offered no outlet for it. His daydreams are not escapism but the INFP interior at full pressure, needing somewhere to go. His journey across Iceland, Greenland, and Afghanistan is the INFP discovering that the world is actually as interesting as the interior version — you just have to go. The film's thesis is the INFP's most hopeful: the exterior adventure and the interior life are not opposed, and the person who can imagine the most extraordinary things is equipped to find them.`,
kw:['Walter Mitty MBTI','Walter Mitty personality type','INFP daydreamer character']},

{name:`The Phantom`,ctx:`Phantom of the Opera`,type:'INFP',cat:'Fiction',
desc:`The Phantom of the Opera is INFP with genius, obsession, and zero access to the social world that might have balanced him. His music is the interior life externalised — Christine is the audience he has been writing for, the person whose presence transforms the work from private to shared. His love for her is the INFP longing at its most extreme: to be seen as the person the interior life reveals rather than the face that the world recoils from. His tragedy is that the interior life, when it cannot find a healthy relational context, colonises the only person who came close to providing one.`,
kw:['Phantom of the Opera MBTI','Phantom personality type','INFP operatic character']},

// ── TV - BREAKING BAD / BETTER CALL SAUL ─────────────────────────
{name:`Gus Fring`,ctx:`Breaking Bad`,type:'INTJ',cat:'Fiction',
desc:`Gus Fring is INTJ and the proof is the box cutter scene. He enters the superlab, silently slits Victor's throat in front of Walt, Jesse, and Mike, wipes the blade, removes his apron, and leaves — not because he had to, but because the demonstration communicated everything he needed communicated with zero wasted information. His two identities — Los Pollos Hermanos manager and cartel distributor — are not a disguise; they are a system. Each one is optimised, consistent, and maintained with the same inhuman precision. His twenty-year plan to destroy the Salamanca cartel for murdering his partner is the INTJ's most complete expression: a strategy so patient it is almost geological, executed without a single visible expression of the emotion driving it. His only error is underestimating that Walter White is also an INTJ who has nothing left to lose.`,
kw:['Gus Fring MBTI','Gus Fring personality type','INTJ Breaking Bad character']},

{name:`Kim Wexler`,ctx:`Better Call Saul`,type:'ISTJ',cat:'Fiction',
desc:`Kim Wexler is ISTJ. She is the best lawyer in Better Call Saul — more disciplined than Jimmy, more principled than Chuck, more strategically sound than anyone at HHM — and the show is the story of a person defined by professional duty who comes to love someone whose entire existence is an argument against the rules she has built her life around. Her final season arc is the ISTJ's most painful failure mode: she does not lose her values, she suspends them, in service of a relationship that has become the organising principle she cannot maintain without. Her departure from Albuquerque is the ISTJ who finally acknowledges the damage the suspension caused — not to herself but to Howard Hamlin — and removes herself as an act of accountability that Jimmy cannot perform.`,
kw:['Kim Wexler MBTI','Better Call Saul personality type','ISTJ female character']},

// ── TV - MAD MEN ──────────────────────────────────────────────────
{name:`Peggy Olson`,ctx:`Mad Men`,type:'INTJ',cat:'Fiction',
desc:`Peggy Olson is INTJ. She arrived at Sterling Cooper as a secretary and built herself into one of its best copywriters through a combination of genuine talent and a quiet refusal to be managed out of the room. Her relationship with Don is two people who recognise each other across a social landscape that rewards neither of them for what they actually are: she sees his method and he sees her capacity, and the mentorship is the most honest relationship either of them has in the office. Her career arc across the series — from typist to copy chief — is the INTJ who found the domain worth mastering and mastered it without asking permission.`,
kw:['Peggy Olson MBTI','Mad Men personality type','INTJ female character']},

{name:`Joan Holloway`,ctx:`Mad Men`,type:'ESTJ',cat:'Fiction',
desc:`Joan is ESTJ. She runs Sterling Cooper's operations with complete authority and a comprehensive understanding of how the social hierarchy works. Her tragedy is that her competence is consistently undervalued by the system she has mastered. Her decision to sell her partnership stake rather than stay is an ESTJ who finally refuses to maintain a system that does not maintain her.`,
kw:['Joan Holloway MBTI','Mad Men personality type','ESTJ TV character']},

// ── TV - SEINFELD ─────────────────────────────────────────────────
{name:`Elaine Benes`,ctx:`Seinfeld`,type:'ENTP',cat:'Fiction',
desc:`Elaine Benes is ENTP. She argues about everything, takes positions no one else would take, and is perpetually surprised when social norms turn out to apply to her as well as to everyone else. Her relationships fail because she is always finding the counterargument — the flaw in the person, the inconsistency in the situation, the reason why this specific arrangement cannot work. She is the most self-sabotaging of the four and the most intellectually honest about it. Her career at Pendant Publishing and J. Peterman is the ENTP in institutional contexts: most competent person in the room, most likely to create a problem by pointing out the obvious.`,
kw:['Elaine Benes MBTI','Seinfeld personality type','ENTP TV character']},

{name:`George Costanza`,ctx:`Seinfeld`,type:'INTP',cat:'Fiction',
desc:`George Costanza is INTP stripped of any productive outlet. He has an intricate internal framework for understanding the social world — he reads people accurately, models situations precisely, identifies exactly where the leverage is — and uses it almost entirely to avoid responsibility, find shortcuts, and construct elaborate lies that require more effort than the honest version would have. His most successful periods come when external structure forces his intelligence outward: the Yankees job, the Vandelay Industries gambit that somehow keeps working. His famous 'do the opposite' strategy is the INTP discovering that his natural instincts have been wrong in a systematic way, and inverting the system.`,
kw:['George Costanza MBTI','Seinfeld personality type','INTP TV character']},

{name:`Cosmo Kramer`,ctx:`Seinfeld`,type:'ENTP',cat:'Fiction',
desc:`Cosmo Kramer is ENTP. He generates ideas at a rate that overwhelms his ability to evaluate them — the coffee table book about coffee tables, the perfume that smells like the beach, the pizza place where you make your own pie — and acts on them with a spontaneity that makes the results unpredictable. His schemes fail almost universally and he recovers from each one with equal enthusiasm, because the ENTP's relationship to failure is informational rather than personal. His warmth is real: he is the most genuinely generous of the four, the one who shows up when something actually matters.`,
kw:['Kramer MBTI','Seinfeld personality type','ENTP comic character']},

// ── TV - THE SIMPSONS ─────────────────────────────────────────────
{name:`Homer Simpson`,ctx:'The Simpsons',type:'ESFP',cat:'Fiction',
desc:`Homer Simpson is ESFP. He operates almost entirely in the present tense — the donut, the couch, the immediately available pleasure — with almost no executive function available for anything beyond the current moment. What makes him more than a comedy premise is the love, which is genuine and consistent even when everything else is not: he would do anything for Marge, anything for his kids, because in the moment they need him he is completely, helplessly there. He has had dozens of jobs, schemes, and obsessions and abandoned all of them the second the present moved on. His occasional moments of genuine insight — he has them, startlingly — are the Se-Fi combination at full clarity: a man with no theories about the world, seeing exactly what is actually there.`,
kw:['Homer Simpson MBTI','Simpsons personality type','ESFP animated character']},

{name:`Bart Simpson`,ctx:'The Simpsons',type:'ESTP',cat:'Fiction',
desc:`Bart is ESTP. He is a natural performer and physical risk-taker who reads authority figures with accuracy and subverts them for entertainment. His pranks are tactical. His boredom is genuine. His occasional moments of depth - the friendship with Milhouse, the episodes where he almost grows - show an ESTP who could be something more if the situation required it.`,
kw:['Bart Simpson MBTI','Simpsons personality type','ESTP animated character']},

{name:`Lisa Simpson`,ctx:'The Simpsons',type:'INTJ',cat:'Fiction',
desc:`Lisa Simpson is INTJ. She is eight years old, lives in Springfield, and has already built a comprehensive framework for how the world works and how it should work, and the gap between those two things is her permanent condition. Her environmentalism, her Buddhism, her feminism, her jazz saxophone — none of these are phases or performances. They are a consistent internal architecture maintained against constant social pressure, which is the INTJ's defining characteristic. Her frustration with her family is not condescension but genuine bewilderment: she can see the obvious and cannot understand why no one else is acting on it. Her episodes are the series at its most honest: a portrait of what it costs a child to be the only person in the room who is paying full attention.`,
kw:['Lisa Simpson MBTI','Simpsons personality type','INTJ animated character']},

{name:`Marge Simpson`,ctx:'The Simpsons',type:'ISFJ',cat:'Fiction',
desc:`Marge is ISFJ. She is the load-bearing wall of the family: consistent, warm, and willing to absorb enormous amounts of chaos to keep the household stable. Her rare moments of rebellion - the gambling episode, the painting - show a rich interior life that the role of wife and mother does not have space for.`,
kw:['Marge Simpson MBTI','Simpsons personality type','ISFJ animated character']},

{name:`Eric Cartman`,ctx:'South Park',type:'ENTJ',cat:'Fiction',
desc:`Cartman is ENTJ without ethics. He is the most strategically intelligent child in South Park, capable of multi-month manipulation campaigns, and applies his considerable ability entirely to personal gain. The show is a thought experiment: what does ENTJ leadership look like when the values it would normally serve are simply absent?`,

{name:`Stewie Griffin`,ctx:'Family Guy',type:'ENTJ',cat:'Fiction',
desc:`Stewie is ENTJ operating from a comprehensive framework of world domination that he executes with genuinely impressive strategic competence. His relationship with Brian is the ENTJ's deepest: the one person who takes him seriously as an intellectual equal. His recent turn toward vulnerability is the ENTJ learning that the vision needs to include other people.`,

// ── TV - COMMUNITY / 30 ROCK ─────────────────────────────────────
{name:`Abed Nadir`,ctx:'Community',type:'INTP',cat:'Fiction',
desc:`Abed Nadir is INTP. He processes social reality through the Ti framework of narrative structure — not because he lacks feeling but because narrative is genuinely the most precise model he has found for understanding why people do what they do. When he says "cool, cool, cool" he is running a calibration: this input fits the model, the model holds. His friendship with Troy is the INTP's rarest gift: someone who accepts the framework completely, plays inside it, and whose presence feels like the best possible use of the world. His meta-awareness of the show he is in is not a gimmick but the INTP taken seriously — a person who maps the structure of every system he inhabits, including the one the audience is watching.`,
kw:['Abed Nadir MBTI','Community personality type','INTP TV character']},

{name:`Jeff Winger`,ctx:'Community',type:'ENTP',cat:'Fiction',
desc:`Jeff is ENTP who has spent his entire life using charm and argumentation to avoid being responsible for anything. Greendale forces him into genuine relationships, and the show is about an ENTP discovering that the life he built to avoid commitment is lonelier than commitment would have been.`,
kw:['Jeff Winger MBTI','Community personality type','ENTP TV character']},

{name:`Liz Lemon`,ctx:'30 Rock',type:'INTP',cat:'Fiction',
desc:`Liz Lemon is INTP. She is the most competent person at TGS and the least socially functional. Her relationships fail because she retreats into systems thinking at the exact moment emotional availability is required. Her arc is an INTP learning that the cheese cake and the sweatpants are not actually the problem.`,
kw:['Liz Lemon MBTI','30 Rock personality type','INTP female character']},

{name:`Jack Donaghy`,ctx:'30 Rock',type:'ENTJ',cat:'Fiction',
desc:`Jack Donaghy is ENTJ. He has a comprehensive framework for everything - business, relationships, self-improvement, cheese - and applies it with the complete sincerity of someone who genuinely believes optimisation is the highest expression of care. His mentorship of Liz is the ENTJ's genuine attempt to love someone by making them better.`,
kw:['Jack Donaghy MBTI','30 Rock personality type','ENTJ TV character']},

// ── TV - THE GOOD PLACE ───────────────────────────────────────────
{name:`Eleanor Shellstrop`,ctx:'The Good Place',type:'ESTP',cat:'Fiction',
desc:`Eleanor Shellstrop is ESTP. She is quick-witted, self-interested, and extraordinarily good at reading situations — which is how she survives the Good Place as long as she does while being the only person there who does not belong. Her growth is the most interesting character arc in the series: the ESTP developing a moral framework from the outside in, because she cannot feel her way to ethics intuitively and Chidi teaches her to think her way there. The show's argument is that Eleanor's type of growth — deliberate, argued, chosen rather than felt — is as valid as any other. Her love for Chidi is the ESTP's most complete development: a specific person, valued for reasons the Ti framework can articulate, held onto with the same determination she applied to everything else.`,
kw:['Eleanor Shellstrop MBTI','The Good Place personality type','ESTP TV character']},

{name:`Chidi Anagonye`,ctx:'The Good Place',type:'INTP',cat:'Fiction',
desc:`Chidi Anagonye is INTP. His paralysis is not weakness but the Ti dominant running without adequate Te to resolve the deadlock: he sees every implication of every choice simultaneously, he weights each one with equal rigour, and the function that is supposed to close the loop and produce a decision keeps finding new angles to consider. He cannot order food without triggering an ethical crisis because the INTP cannot turn off the analysis. His value to the show is that the writers take his problem seriously — moral philosophy genuinely matters, deliberating correctly genuinely matters — and his growth is not abandoning the framework but learning to trust a specific person enough to act before the framework is complete. "I wanted to do what was right. I just always thought there was more time to figure out what right was."`,
kw:['Chidi Anagonye MBTI','The Good Place personality type','INTP philosophy character']},

// ── TV - BROOKLYN 99 ─────────────────────────────────────────────
{name:`Jake Peralta`,ctx:'Brooklyn Nine-Nine',type:'ENFP',cat:'Fiction',
desc:`Jake Peralta is ENFP. He is the most naturally talented detective in the Nine-Nine and the most resistant to structure — not because he is lazy but because the Ne dominant generates solutions faster through improvisation than through protocol. His Die Hard references, his Halloween heist obsession, his immediate enthusiasm for every new case: all genuine ENFP engagement with whatever has his attention right now. His growth with Amy is the ENFP learning that the person who colour-codes their binders is not the enemy of fun but the person who will show up every single time, which is something the ENFP needs more than they usually admit. His relationship with Holt is the ENFP and the INTJ finding, across their mutual stubbornness, a real mutual respect.`,
kw:['Jake Peralta MBTI','Brooklyn Nine-Nine personality type','ENFP TV character']},

{name:`Raymond Holt`,ctx:'Brooklyn Nine-Nine',type:'INTJ',cat:'Fiction',
desc:`Raymond Holt is INTJ. He expresses emotion through architectural precision rather than warmth — his face moves approximately once per season, and when it does the entire precinct stops — and has built a career defined by systematic excellence in an institution that spent decades trying to exclude him. His relationship with Kevin is the INTJ at full emotional commitment: deeply chosen, rarely demonstrated, permanent. His friendship with Jake is the show's best dynamic: the INTJ who has decided this chaotic ENFP is worth tolerating, then worth mentoring, then worth loving, each conclusion arrived at through the same rigorous framework he applies to everything else.`,
kw:['Raymond Holt MBTI','Brooklyn Nine-Nine personality type','INTJ captain character']},

// ── TV - SCHITT'S CREEK ───────────────────────────────────────────
{name:`David Rose`,ctx:`Schitt's Creek`,type:'INFP',cat:'Fiction',
desc:`David Rose is INFP. His aesthetic intensity — the sweaters, the precision about products, the Rose Apothecary built to his exact specification of what a store should be — is his interior life externalised into the most controlled form available. His arc is the INFP who built a wall of irony and fashion to avoid being hurt by people who had not previously been worth the risk of vulnerability, discovering that Patrick is the first person worth dismantling it for. His love is total, expressed through the domain he has built — the store, the products, the specific standard of care he brings to every interaction — and Patrick's willingness to inhabit that domain with him is the INFP's deepest need: to be seen in the interior rather than around it.`,
kw:["David Rose MBTI","Schitt's Creek personality type","INFP TV character"]},

{name:`Moira Rose`,ctx:`Schitt's Creek`,type:'ENFJ',cat:'Fiction',
desc:`Moira is ENFJ performing at maximum amplitude. Her theatricality is not affectation but pure ENFJ energy - someone who has only ever known how to communicate through performance. Her love for her children is real, buried under layers of self-mythology, and the entire series is about it slowly becoming legible. When it does surface - and it does - it lands all the harder for having been so long concealed.`,
kw:["Moira Rose MBTI","Schitt's Creek personality type","ENFJ dramatic character"]},

// ── TV - GAME OF THRONES (MORE) ───────────────────────────────────
{name:`Ramsay Bolton`,ctx:'Game of Thrones',type:'ESTP',cat:'Fiction',
desc:`Ramsay is ESTP without restraint or consequence. He reads people's fears with extraordinary precision and uses that knowledge to destroy them. His cruelty is not ideological but recreational: he is entirely present in the moment of breaking someone. He is the ESTP shadow without a single redeeming ESTP quality.`,
kw:['Ramsay Bolton MBTI','Game of Thrones villain type','ESTP psychopath character']},

{name:`Stannis Baratheon`,ctx:'Game of Thrones',type:'ISTJ',cat:'Fiction',
desc:`Stannis Baratheon is ISTJ. The throne is his by law — he knows this, everyone knows this, and his entire character is defined by the ISTJ's inability to accept that the world will not conform to what is correct. He has no charm, no warmth, no capacity for the political performance that would make his claim viable, and he refuses to acquire any of these things because they are not part of the system of duty he has built his life inside. His tragedy is the ISTJ's shadow taken to its extreme: a moral framework so absolute it cannot bend, cannot adapt, cannot distinguish between justice and the destruction of his daughter in service of a cause that cannot survive it. He executes the sentence. He loses everything. The law was right and he was wrong about what the law required of him.`,
kw:['Stannis Baratheon MBTI','Game of Thrones personality type','ISTJ character']},

// ── TV - AVATAR: THE LAST AIRBENDER ──────────────────────────────
{name:`Aang`,ctx:'Avatar: The Last Airbender',type:'ENFP',cat:'Fiction',
desc:`Aang is ENFP. He finds joy in everything — bending, flying with Appa, new foods, new people — and is genuinely incapable of the emotional detachment that his situation keeps demanding. His pacifism is not a philosophical position he chose; it is a deeply felt ENFP value that he cannot override even when the survival of the world seems to require it. His search for a third option — a way to defeat the Fire Lord without killing him — is the ENFP refusing to accept that the situation defines the terms. The show takes him seriously: the third option exists, and he was right to look for it. His grief over Appa, over Gyatso, over the Air Nomads is ENFP grief: felt completely, expressed openly, not managed or resolved but carried.`,
kw:['Aang MBTI','Avatar Last Airbender personality type','ENFP avatar character']},

{name:`Zuko`,ctx:'Avatar: The Last Airbender',type:'INFJ',cat:'Fiction',
desc:`Zuko is INFJ. His arc across three seasons is the INFJ's most complete portrait in animation: a person who knows, for most of the series, that what he is doing is wrong, and cannot act on that knowledge because the vision of what he should be is buried under shame, trauma, and a desperate need for his father's approval. The cave scene with Katara in Ba Sing Se — where he almost chooses correctly — is the INFJ at the inflection point: the vision is there, the Fe knows what the other person needs, and the inferior Se responds to the wrong external pressure at the last moment. His eventual turn is not a surprise but an arrival: the INFJ coming home to themselves after a very long detour.`,
kw:['Zuko MBTI','Avatar personality type','INFJ redemption arc character']},

{name:`Katara`,ctx:'Avatar: The Last Airbender',type:'ENFJ',cat:'Fiction',
desc:`Katara is ENFJ. She holds the group together through warmth and force of will, sees what each person needs and provides it, and has a moral clarity that she applies without apology. Her anger - especially about her mother - is ENFJ anger: it comes from love that was violated and does not forget.`,
kw:['Katara MBTI','Avatar personality type','ENFJ waterbender character']},

{name:`Toph Beifong`,ctx:'Avatar: The Last Airbender',type:'ESTP',cat:'Fiction',
desc:`Toph is ESTP. She is the greatest earthbender in the world and has no interest in anyone's opinion about it. She acts before she thinks, wins through instinct and physical excellence, and finds emotional expression through action rather than words. Her relationship with Aang is ESTP generosity: she teaches him what she knows without commentary.`,
kw:['Toph Beifong MBTI','Avatar personality type','ESTP earthbender character']},

// ── TV - PEAKY BLINDERS / OZARK ───────────────────────────────────
{name:`Tommy Shelby`,ctx:'Peaky Blinders',type:'INTJ',cat:'Fiction',
desc:`Tommy Shelby is INTJ. He rebuilt himself after the war around a comprehensive vision of power and security, and has been executing it with remorseless patience ever since. His emotional life is almost entirely suppressed - grief expressed as strategy, love expressed as protection. He plans ten moves ahead and experiences the present as an obstacle to the plan.`,
kw:['Tommy Shelby MBTI','Peaky Blinders personality type','INTJ TV character']},

{name:`Marty Byrde`,ctx:'Ozark',type:'INTJ',cat:'Fiction',
desc:`Marty Byrde is INTJ. He solves one impossible problem by creating a slightly worse one, and manages the cascade with the INTJ's characteristic combination of genuine intelligence and catastrophic blind spots. His money-laundering scheme for the Navarro cartel is architecture — the Ozarks, the Blue Cat, the Missouri Belle — built under pressure with meticulous internal logic. His blindness to his family is the INTJ cost: the problem in front of him always crowds out the people beside him, because the framework does not automatically include them unless he builds them in, and he is always too busy building the next structural element to notice what is missing. His marriage to Wendy is the INTJ and the ENTJ discovering, in the worst possible conditions, that they are the same kind of person and that this is not comforting.`,
kw:['Marty Byrde MBTI','Ozark personality type','INTJ TV character']},

{name:`Wendy Byrde`,ctx:'Ozark',type:'ENTJ',cat:'Fiction',
desc:`Wendy Byrde is ENTJ. She is the more naturally dominant of the pair - Marty solves, Wendy commands. Her escalation across the series is an ENTJ discovering that the appetite for control, once given full permission, does not stop at a reasonable place. She ends up somewhere neither she nor the audience fully expected.`,
kw:['Wendy Byrde MBTI','Ozark personality type','ENTJ TV character']},

// ── TV - MR. ROBOT ────────────────────────────────────────────────
{name:`Elliot Alderson`,ctx:'Mr. Robot',type:'INTP',cat:'Fiction',
desc:`Elliot Alderson is INTP. He hacks not for profit or politics but because the Ti dominant cannot tolerate a system whose inner workings are hidden — every sealed surface is an invitation, every institution's claimed identity a hypothesis to be tested against its actual structure. His social anxiety is the inferior Fe in daily life: he is exhausted by every interaction that requires him to perform normality, and he performs it anyway, badly, because the alternative is worse. Mr. Robot is the INTP's most extreme expression: the dominant function split off and given a separate identity, because the conclusions it is reaching are ones the conscious self cannot yet hold. The show's central question — which parts of Elliot are real — is the INTP's deepest problem stated literally.`,
kw:['Elliot Alderson MBTI','Mr Robot personality type','INTP hacker character']},

// ── TV - FRASIER ──────────────────────────────────────────────────
{name:`Frasier Crane`,ctx:'Frasier',type:'ENTP',cat:'Fiction',
desc:`Frasier Crane is ENTP. He is the cleverest person in every room he enters and ensures everyone knows it within approximately ninety seconds, which is the ENTP's most reliable social pattern and most consistent obstacle. His radio show is the ENTP at its best: genuinely helping people by asking the right questions, using the pattern-recognition to locate the real problem under the stated one. His personal life is the ENTP at its most self-defeating: too clever to stop arguing, too self-aware to stop noticing his own patterns, not quite self-aware enough to break them. His relationship with Niles is the ENTP paired with someone whose type amplifies his own pretensions, which produces the funniest possible outcome and the least useful feedback.`,
kw:['Frasier Crane MBTI','Frasier personality type','ENTP TV character']},

{name:`Phil Dunphy`,ctx:'Modern Family',type:'ENFP',cat:'Fiction',
desc:`Phil Dunphy is ENFP. He is genuinely enthusiastic about everything - real estate, magic, his children - and expresses his love through a continuous stream of ideas and gestures. His goofiness is not a defence mechanism but authentic warmth. He is the ENFP who never developed cynicism, which is either a gift or a limitation depending on the situation.`,

desc:`Michael Bluth is ISTJ. He is the most responsible person in his family by such a large margin that the show is structurally a joke about the gap between his competence and his circumstances. His loyalty to the family is genuine but costly. His growth is an ISTJ learning that the family he is trying to save may not want saving in the way he is offering it.`,

{name:`Sterling Archer`,ctx:'Archer',type:'ESTP',cat:'Fiction',
desc:`Sterling Archer is ESTP at full destructive expression. He is the best field agent at ISIS and the worst colleague in any context. His mother is Malory, which explains everything. His competence and his damage are inseparable: both come from a childhood spent learning that performance was the only language available.`,

// ── THE WITCHER ───────────────────────────────────────────────────
{name:`Yennefer of Vengerberg`,ctx:'The Witcher',type:'ENTJ',cat:'Fiction',
desc:`Yennefer of Vengerberg is ENTJ. She transformed herself from a hunchbacked girl with no prospects in Vengerberg into the most feared sorceress on the Continent through a combination of raw intelligence, strategic patience, and a total willingness to pay whatever a goal required. The Brotherhood of Sorcerers, the courts of the Continent, Geralt himself: all variables in a larger framework she is always running. Her relationship with Geralt is the ENTJ's most difficult and most necessary experience — a person she cannot control, cannot predict, cannot fit into the framework, and cannot stop returning to. Her love for Ciri is the ENTJ finally finding the thing that the framework cannot contain and not trying to contain it.`,
kw:['Yennefer MBTI','The Witcher personality type','ENTJ sorceress character']},

{name:`Ciri`,ctx:'The Witcher',type:'ISFP',cat:'Fiction',
desc:`Ciri is ISFP. She has the Elder Blood, prophecy written around her name, the destiny of the world attached to her like a price tag — and she resists all of it, not from denial but from the ISFP's constitutive feature: the self is real and the self is now, and the self is not reducible to what someone else has decided it must become. Her connection with Geralt is the deepest relationship in the Witcher universe precisely because neither of them explains it, labels it, or uses it for anything. She acts from instinct, grieves in full, loves without distance. Her power is something she feels before she controls, and the control only comes when the feeling is allowed to be what it is.`,
kw:['Ciri MBTI','The Witcher personality type','ISFP character']},

{name:`Lara Croft`,ctx:'Tomb Raider series',type:'ISTP',cat:'Fiction',
desc:`Lara Croft is ISTP. She is physically exceptional, problem-solves in real time, and has a directness about danger that comes from genuine competence rather than recklessness. The reboot trilogy is interesting because it traces how the ISTP's natural self-sufficiency develops: from fragile survivor to someone who has chosen what she is.`,

{name:`Cloud Strife`,ctx:'Final Fantasy VII',type:'INFP',cat:'Fiction',
desc:`Cloud Strife is INFP buried under borrowed identity. He constructed a persona from someone else's memories to survive the trauma of his own inadequacy, and the game is the story of peeling that back. His compassion - for Aerith, for the Planet - is always more present than his sword, even when he is pretending otherwise.`,

{name:`Sephiroth`,ctx:'Final Fantasy VII',type:'INTJ',cat:'Fiction',
desc:`Sephiroth is INTJ. He built a comprehensive model of the universe - his destiny, humanity's purpose, the Planet's fate - and executes it with complete conviction. His fall from revered hero to catastrophic villain is the INTJ shadow: a framework built on false premises that cannot be revised because revision would require the entire architecture to collapse.`,

{name:`Nathan Drake`,ctx:'Uncharted series',type:'ESTP',cat:'Fiction',
desc:`Nate Drake is ESTP. He improvises his way through impossible situations, reads physical environments instantaneously, and turns danger into entertainment through a combination of skill and charm. His self-mythologising - the Drake connection, the stories he tells himself - is the ESTP making the adventure larger than it is because he needs it to be.`,

{name:`Ezio Auditore`,ctx:`Assassin's Creed II`,type:'ESFP',cat:'Fiction',
desc:`Ezio Auditore is ESFP. He began as a charming Florentine nobleman and became a master assassin through the Se-dominant's most complete development: total physical mastery of the immediate environment, the ability to read a situation faster than most people can register it, and a warmth toward the specific people around him that never fully converted into the cold ideology the Brotherhood required. His career across three games is the ESFP who can inhabit any persona — the rake, the mentor, the elder statesman — because the person underneath remains consistent regardless of the role the situation requires.`,

{name:`Leon S. Kennedy`,ctx:'Resident Evil series',type:'ISTJ',cat:'Fiction',
desc:`Leon S. Kennedy is ISTJ. His duty comes before his fear, his training before his feelings, and his commitment to the people he is protecting before his own survival. Across every Resident Evil game, he enters a nightmare and does his job with methodical precision. His deadpan competence under horror is the ISTJ at full expression.`,

desc:`Trevor Philips is ENTP without the charm or the ethics. He is genuinely smart, genuinely unpredictable, and fuelled by a grievance engine that never stops. His violence is conceptual as much as physical - he makes arguments with his fists. His relationship with Michael is the ENTP who cannot forgive the person who got out.`,

desc:`John Marston is ISTJ. He is trying to pay his debts, protect his family, and do what is required of him - even when what is required of him is deeply wrong. His tragedy is that the system he is trying to satisfy will never be satisfied. He does his duty to the end. The end is not kind.`,

desc:`2B is INFJ. She was built to maintain discipline and execute orders, and performs that function with total competence - while quietly refusing the emotional numbness it requires. Her relationship with 9S is the INFJ's most characteristic situation: a bond that deepens precisely because it should not, and cannot be severed because it is already too real.`,

{name:`Aloy`,ctx:'Horizon Zero Dawn',type:'ISTJ',cat:'Fiction',
desc:`Aloy is ISTJ. She approaches the post-apocalyptic world with systematic curiosity: observe, analyse, act. Her outsider status in the Nora tribe gave her the ISTJ's productive alienation - she learned to rely on evidence rather than belonging. Her care for the people she protects is real but always expressed through action rather than declaration.`,

{name:`Princess Zelda`,ctx:'The Legend of Zelda series',type:'INFJ',cat:'Fiction',

{name:`Commander Shepard`,ctx:'Mass Effect series',type:'ENTJ',cat:'Fiction',
desc:`Shepard is ENTJ. Regardless of player choices, the character's structural role is commander: assembling the team, making the call, owning the outcome. The Paragon path is ENTJ idealism applied to galactic diplomacy. The Renegade path is ENTJ pragmatism applied without mercy. Both are the same type. The Reapers never stood a chance.`,

desc:`Edmond Dantès is INTJ. His transformation in the Chateau d'If from naive sailor to the Count of Monte Cristo is a comprehensive self-reinvention project executed with patience across decades. His revenge is architectural - he designs each downfall with the same methodical care as his original imprisonment was designed. He is the INTJ as instrument of fate.`,

{name:`Harriet Tubman`,ctx:'American abolitionist and activist',type:'ISTJ',cat:'Historical',wiki:'Harriet_Tubman',

{name:`Larry Bird`,ctx:'NBA basketball player and coach',type:'ISTJ',cat:'Sport',wiki:'Larry_Bird',
desc:`Larry Bird is ISTJ. He was not the most athletic player in the NBA by any measure, and he was the best player in the NBA for a decade. He won through preparation, spatial awareness, and a mastery of the game's details so complete that he could see situations three passes ahead. His trash talk was not impulsive but strategic: he studied opponents and deployed what hurt most.`,
kw:['Larry Bird MBTI','Larry Bird personality type','ISTJ NBA player']},
