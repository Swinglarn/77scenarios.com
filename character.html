{name:`Marty McFly`,ctx:'Back to the Future',type:'ESFP',cat:'Fiction',
desc:`Marty McFly is ESFP. He acts before he thinks, is motivated by social approval to the point of self-sabotage, and navigates time travel through charm and improvisation rather than planning. His growth across three films is the ESFP learning that the present moment is the only one worth protecting.`,
kw:['Marty McFly MBTI','Back to the Future personality type','ESFP movie character']},

{name:`Doc Brown`,ctx:'Back to the Future',type:'ENTP',cat:'Fiction',
desc:`Doc Brown is ENTP. He builds a time machine in a parking lot because the idea demands it. His enthusiasm for his own ideas is total and his ability to anticipate their consequences is limited, which is why Marty keeps having to fix the timeline. His friendship with Marty is genuine: the ENTP's deepest affection for the person who keeps them tethered.`,
kw:['Doc Brown MBTI','Back to the Future personality type','ENTP scientist character']},

{name:`Amélie Poulain`,ctx:'Amélie (2001)',type:'INFP',cat:'Fiction',
desc:`Amélie is INFP. She arranges the world around her into beautiful patterns and intervenes in other people's happiness with meticulous care, all from a position of social distance. The film is about an INFP discovering that the life she has been architecting for others is the one she should be living herself.`,
kw:['Amélie MBTI','Amélie Poulain personality type','INFP French film character']},

{name:`Holly Golightly`,ctx:`Breakfast at Tiffany's`,type:'ESFP',cat:'Fiction',
desc:`Holly Golightly is ESFP. She has built an identity from nothing - Lulamae from Texas became Holly from somewhere dazzling - and inhabits it completely. Her restlessness is the ESFP's genuine condition: she is always between who she was and who she will be next, and the film is about what it costs to never land.`,
kw:["Holly Golightly MBTI","Breakfast at Tiffany's personality type","ESFP film character"]},

{name:`Achilles`,ctx:'The Iliad by Homer',type:'ESTP',cat:'Fiction',
desc:`Achilles is ESTP. He is the greatest warrior alive and he knows it — not as arrogance but as accurate assessment — and when Agamemnon takes Briseis, he withdraws from the war entirely because the personal outrage is more real to him than any strategic objective. Se-Ti in full expression: the present reality of the insult overrides every consequence the inferior Ni might project. His grief over Patroclus is the ESTP's shadow breaking through: the one relationship that went deeper than the immediate moment, now permanently gone. His return to battle knowing the prophecy that awaits him is ESTP at its most complete — the present moment is what matters, and right now Hector must die.`,
kw:['Achilles MBTI','Achilles personality type','ESTP Greek hero character']},

{name:`Odysseus`,ctx:'The Odyssey by Homer',type:'ENTP',cat:'Fiction',
desc:`Odysseus is ENTP. His epithet in ancient Greek is polytropos — of many turns, many-minded — and it is a perfect description of Ne operating at full speed. The Trojan Horse is Ne-Ti in one stroke: after ten years of direct siege, the lateral solution so obvious in retrospect that nobody can believe nobody thought of it. His journey home is structured as a series of impossible situations solved through improvisation — the Cyclops, Circe, the Sirens, the suitors — and he approaches each one not with a master plan but with a mind that generates the right angle faster than anyone else can generate any plan at all. His famous lying — false names, false histories, false intentions throughout the Odyssey — is not deception for its own sake but every available tool deployed to navigate a world that would kill him if it knew what he was.`,
kw:['Odysseus MBTI','Odysseus personality type','ENTP Greek hero character']},

{name:`Peter Pan`,ctx:'Peter Pan by J.M. Barrie',type:'ESTP',cat:'Fiction',
desc:`Peter Pan is ESTP. He lives in absolute present tense - Neverland is the ESTP's ideal environment. His inability to grow up is not a limitation but a choice: commitment, memory, and consequence are the enemies of pure experience. His cruelty to the Lost Boys and to Hook comes from the same place as his charm: he is entirely in the moment and the moment has no mercy.`,
kw:['Peter Pan MBTI','Peter Pan personality type','ESTP fictional character']},

{name:`Long John Silver`,ctx:'Treasure Island by Robert Louis Stevenson',type:'ENTP',cat:'Fiction',
desc:`Long John Silver is ENTP. He has a comprehensive situational intelligence that allows him to be genuinely helpful and genuinely dangerous in the same conversation. He adapts his persona to whoever needs to be managed. His affection for Jim Hawkins is real - the ENTP's genuine warmth for the person smart enough to almost see through them.`,
kw:['Long John Silver MBTI','Treasure Island personality type','ENTP pirate character']},

{name:`Tom Sawyer`,ctx:'The Adventures of Tom Sawyer by Mark Twain',type:'ESTP',cat:'Fiction',
desc:`Tom Sawyer is ESTP. The whitewashing fence scene is the ESTP in miniature: he turns a punishment into a social performance and makes other kids pay him for the privilege of doing his work. His adventures are motivated by a desire for the experience rather than the outcome. He is Twain's most affectionate portrait.`,
kw:['Tom Sawyer MBTI','Tom Sawyer personality type','ESTP literary character']},

{name:`Huckleberry Finn`,ctx:'Adventures of Huckleberry Finn by Mark Twain',type:'ISFP',cat:'Fiction',
desc:`Huck Finn is ISFP. He acts from instinct and feeling rather than social rule - his decision to help Jim escape slavery is not a principled argument but a personal one: he cannot betray someone he loves, even if the whole world says he should. Twain's deepest argument is that Huck's feeling knows more than society's law.`,
kw:['Huckleberry Finn MBTI','Huck Finn personality type','ISFP literary character']},

{name:`Thomas Shelby`,ctx:`Peaky Blinders`,type:'INTJ',cat:'Fiction',
desc:`Thomas Shelby is INTJ. He came back from the Somme with a comprehensive new model of how the world actually works — power flows to whoever is willing to go further — and has been building from that axiom ever since. Every political alliance, every business expansion, every sacrifice of loyalty or decency is a calculated step in a strategy whose full scope he never fully shares with anyone, including the audience. His love for Grace, for his family, for Ada's idealism exists at the level of architecture: it is load-bearing, and losing it damages the structure. His PTSD is not weakness but the Ni-inferior Se collision: the visions of France, the bodies that appear in the tunnel, are the present-tense physical reality his long-range mind cannot entirely suppress. He would rather have a plan than a feeling, and the tragedy of Peaky Blinders is watching what that costs him.`,
kw:['Thomas Shelby MBTI','Peaky Blinders personality type','INTJ crime boss character']},
{name:`Arthur Shelby`,ctx:`Peaky Blinders`,type:'ESFP',cat:'Fiction',
desc:`Arthur Shelby is ESFP. He lives at full intensity in every moment - the rage, the grief, and the fierce love are all equally total. His impulsivity is his gift and his wound. He is the most emotionally present person in the Shelby family, which in their world is both his greatest strength and his most constant liability.`,
kw:['Arthur Shelby MBTI','Peaky Blinders ESFP','Arthur Shelby personality type']},
{name:`Polly Gray`,ctx:`Peaky Blinders`,type:'ENTJ',cat:'Fiction',
desc:`Polly Gray is ENTJ. She ran the family business while the men were at war and never fully relinquished the authority that came with it. Her strategic intelligence and her ability to hold complicated loyalties in tension make her the most competent person in any room she occupies.`,
kw:['Polly Gray MBTI','Peaky Blinders ENTJ','Polly Gray personality type']},
{name:`Boyd Crowder`,ctx:`Justified`,type:'INTJ',cat:'Fiction',
desc:`Boyd Crowder is INTJ - the most literate, philosophically complex criminal in Harlan County. He builds alliances with strategic precision and wrecks them when they stop serving his purpose. His friendship with Raylan is built on mutual recognition that they are, structurally, the same kind of person.`,
kw:['Boyd Crowder MBTI','Justified personality type','INTJ villain character']},
{name:`Raylan Givens`,ctx:`Justified`,type:'ESTP',cat:'Fiction',
desc:`Raylan Givens is ESTP. He is the fastest read in any room, reacts in real time, and has the ESTP's characteristic relationship with consequences: he will deal with them. His charm is immediate and his intelligence is tactical. He is consistently the most dangerous person present.`,
kw:['Raylan Givens MBTI','Justified ESTP','Raylan personality type']},
{name:`Carrie Mathison`,ctx:`Homeland`,type:'ENTP',cat:'Fiction',
desc:`Carrie Mathison is ENTP. She sees connections no one else can follow and is probably right about them more often than her colleagues can tolerate. Her bipolar disorder makes the ENTP pattern more extreme - the rapid lateral thinking, the conviction, and the inability to stop when the signal-to-noise ratio drops.`,
kw:['Carrie Mathison MBTI','Homeland personality type','ENTP female character']},
{name:`Beth Dutton`,ctx:`Yellowstone`,type:'ENTJ',cat:'Fiction',
desc:`Beth Dutton is ENTJ. She is the most strategically effective person on the ranch and the most emotionally terrifying. Her loyalty to her father is total and she uses every instrument available - intelligence, charm, aggression - with the ENTJ's absence of squeamishness about method.`,
kw:['Beth Dutton MBTI','Yellowstone personality type','ENTJ female character']},
{name:`John Dutton`,ctx:`Yellowstone`,type:'ISTJ',cat:'Fiction',
desc:`John Dutton is ISTJ. He has held the ranch together across decades through duty, land memory, and a code that exists below language. He does not explain himself, does not ask for understanding, and holds what he inherited expecting the people around him to understand the weight of that without being told.`,
kw:['John Dutton MBTI','Yellowstone ISTJ','John Dutton personality type']},
{name:`Rip Wheeler`,ctx:`Yellowstone`,type:'ISFP',cat:'Fiction',
desc:`Rip Wheeler is ISFP. He is defined by loyalty in the deepest ISFP sense - not as principle but as person. His devotion to John Dutton, and then to Beth, is elemental. He is most alive in action and most lost when asked to explain himself.`,
kw:['Rip Wheeler MBTI','Yellowstone ISFP','Rip Wheeler personality type']},
{name:`Erik Killmonger`,ctx:`Black Panther`,type:'ENTJ',cat:'Fiction',
desc:`Erik Killmonger is ENTJ. His plan to use Wakanda's vibranium to arm oppressed people worldwide is not villainy but a strategic response to a genuine injustice — he identified the problem correctly, proposed a solution that fits the scale, and executed with terrifying efficiency. The ENTJ's blindspot is the human cost of the strategy: the people he eliminates to reach the throne are variables in the calculation, and the calculation is correct. His final line — "Bury me in the ocean with my ancestors who jumped from ships, because they knew death was better than bondage" — is the ENTJ who built a system to correct a wrong and did not survive his own correction. He was right about most things and his method destroyed what his rightness could have built.`,
kw:['Killmonger MBTI','Black Panther personality type','ENTJ villain Marvel']},
{name:`T'Challa`,ctx:`Black Panther`,type:'INFJ',cat:'Fiction',
desc:`T'Challa is INFJ. He does not seek the throne — it comes to him through loss, and he carries it as a weight, not a prize. His confrontation with Killmonger is the INFJ's hardest test: someone who has seen the same wound from the opposite side, whose rage contains a truth that cannot be dismissed. His decision to open Wakanda to the world is not a policy reversal but an INFJ integration: he held his father's vision and Killmonger's challenge and found a larger vision that could contain both. The river scene with his father is the INFJ asking what matters most: "You were wrong. All of you were wrong. To turn your backs on the rest of the world." He says it. He means it. He does something about it.`,
kw:["T'Challa MBTI",'Black Panther personality type','INFJ king Marvel character']},
{name:`Wanda Maximoff`,ctx:`WandaVision / Marvel`,type:'INFP',cat:'Fiction',
desc:`Wanda Maximoff is INFP. Her power is an extension of her interior life — it amplifies what she feels, which means grief in sufficient quantity makes her capable of rewriting reality. The WandaVision hex is the INFP at its most extreme: she cannot accept a world that has taken away what mattered most, so she builds a world where it has not happened. The horror of the show is that her grief is so comprehensible, and the barrier between comprehensible grief and neighbourhood-scale reality distortion is only the power. Her arc in Multiverse of Madness is the shadow: the INFP who has decided that what she loves justifies anything, including the destruction of other versions of it.`,
kw:['Wanda Maximoff MBTI','WandaVision personality type','INFP Marvel character']},
{name:`Doctor Strange`,ctx:`Marvel Cinematic Universe`,type:'INTJ',cat:'Fiction',
desc:`Stephen Strange is INTJ. He was the best neurosurgeon in the world before the accident, and the accident strips away everything except the part that was always real: the need to understand how things work and the belief that understanding is the path to control. His turn to sorcery is the INTJ finding a new domain large enough for the framework. His time-loop against Dormammu — dying and returning until the entity agrees simply to stop — is the INTJ running a calculation, accepting its conclusion, and executing without deviation: I can do this longer than you can. He is correct. It works. His "I went forward in time to view alternate futures. I saw fourteen million, six hundred and five" is the INTJ who has already done the analysis and is waiting for everyone else to catch up to the conclusion.`,
kw:['Doctor Strange MBTI','Marvel personality type','INTJ superhero character']},
{name:`Peter Quill`,ctx:`Guardians of the Galaxy`,type:'ESFP',cat:'Fiction',
desc:`Peter Quill is ESFP. He is fully present, emotionally reactive, and holds the Guardians together through sheer force of his presence and genuine affection for people he pretends to find annoying. His mixtape is his emotional life made physical and portable — the Se-Fi combination expressing care through objects, through music, through the immediate sensory world rather than through declaration. His plan to defeat Ronan — "Get in a circle"  followed by a dance-off — is the ESFP generating the only solution available in the moment and committing to it with complete conviction. It works because the conviction is real.`,
kw:['Peter Quill MBTI','Star-Lord personality type','ESFP Marvel character']},
{name:`Nick Fury`,ctx:`Marvel Cinematic Universe`,type:'INTJ',cat:'Fiction',
desc:`Nick Fury is INTJ. He built the Avengers Initiative because he modelled the threat landscape and concluded that existing structures were inadequate, then spent decades maintaining contingency plans for his contingency plans. His famous "The last time I trusted someone, I lost an eye" is not bitterness but policy: the INTJ who has integrated every failure into the architecture going forward. His willingness to deceive Tony Stark, to manipulate Thor, to sacrifice individuals for the mission: not cruelty but the INTJ who has already run the calculation and is waiting for everyone else to reach the same conclusion.`,
kw:['Nick Fury MBTI','Marvel personality type','INTJ spy character']},
{name:`Magneto`,ctx:`X-Men`,type:'INTJ',cat:'Fiction',
desc:`Magneto is INTJ. His philosophy of mutant survival was formed in Auschwitz, and the man who emerged had a comprehensive theory of how persecuted minorities survive that he has never revised: accumulate power, strike first, do not trust the people who will always find a reason to eliminate you. His conflict with Xavier is not two men with different values but two men who agree on the diagnosis and disagree on the prognosis — Xavier believes humans can learn, Magneto has evidence they cannot. He is fiction's most persuasive INTJ villain not because the argument is simple but because it is genuinely hard to counter without being sentimental.`,
kw:['Magneto MBTI','X-Men personality type','INTJ villain Marvel']},
{name:`Jaskier`,ctx:`The Witcher`,type:'ENFP',cat:'Fiction',
desc:`Jaskier is ENFP. He attaches himself to Geralt with total enthusiasm and zero plan, writes songs that are more emotionally accurate than factually reliable, and maintains genuine warmth toward everyone including people who want to hurt him. He befriends someone before they've agreed to be befriended.`,
kw:['Jaskier MBTI','The Witcher ENFP','Jaskier personality type']},
{name:`Sonny Corleone`,ctx:`The Godfather`,type:'ESTP',cat:'Fiction',
desc:`Sonny Corleone is ESTP. He operates on instinct, escalates immediately, and cannot be talked out of a decision once his anger has engaged. His inability to manage his own impulses is exactly what his father feared and exactly what his enemies exploited.`,
kw:['Sonny Corleone MBTI','Godfather personality type','ESTP impulsive character']},
{name:`Fredo Corleone`,ctx:`The Godfather`,type:'ISFP',cat:'Fiction',
desc:`Fredo Corleone is ISFP. He is sensitive, overlooked, and operating at a permanent disadvantage in a family that values qualities he doesn't have. His betrayal is the wounded response of someone who needed to feel important just once. His tragedy is the ISFP's: too much feeling, not enough armour.`,
kw:['Fredo Corleone MBTI','Godfather ISFP','Fredo personality type']},
{name:`Alex DeLarge`,ctx:`A Clockwork Orange`,type:'ESTP',cat:'Fiction',
desc:`Alex DeLarge is ESTP operating entirely outside any social contract. His violence is aesthetic - he experiences it as music. The novel asks whether removing the capacity for evil through conditioning destroys the person along with the behaviour. Alex was intensely, dangerously alive.`,
kw:['Alex DeLarge MBTI','Clockwork Orange personality type','ESTP villain character']},
{name:`Travis Bickle`,ctx:`Taxi Driver`,type:'INTJ',cat:'Fiction',
desc:`Travis Bickle is INTJ in breakdown. He builds a comprehensive internal framework around a perceived moral emergency, plans with meticulous detail, and executes with total conviction. His certainty about what needs to be done is the INTJ quality taken somewhere very dark.`,
kw:['Travis Bickle MBTI','Taxi Driver personality type','INTJ dark character']},
{name:`Jack Torrance`,ctx:`The Shining`,type:'ENFP',cat:'Fiction',
desc:`Jack Torrance is ENFP. He arrives at the Overlook as a writer who has not written, a father who has not fathered, a husband who has not husbanded — and the hotel finds exactly what to do with that combination. The ENFP warmth curdles into resentment, the imagination turns toward grievance, the need for connection converts into a need for dominance. His famous "Here's Johnny" is not chaos but the ENFP completely inverted: the person who wanted to be loved has become the person terrorising the people he was supposed to love. King understood that the horror is not supernatural — the Overlook simply amplifies what is already there. What is already there is recognisable.`,
kw:['Jack Torrance MBTI','The Shining personality type','ENFP horror character']},
{name:`Norman Bates`,ctx:`Psycho`,type:'INFJ',cat:'Fiction',
desc:`Norman Bates is INFJ. The most disturbing thing about Norman is not his violence but his gentleness — the taxidermy, the shy smile, his visible discomfort when Marion mentions putting his mother away. The INFJ's most complete gift is the ability to model another person's interior world so comprehensively that the boundary between self and other becomes permeable. Norman's pathology is that gift at its extreme: he has built an internal model of his mother so total that it has displaced his own identity. The Ni that should synthesise the world into insight has instead synthesised his mother into a persona that runs him. What makes Psycho endure is that the mechanism is not alien — it is recognisable, scaled to horror.`,
kw:['Norman Bates MBTI','Psycho personality type','INFJ horror character']},
{name:`Willy Loman`,ctx:`Death of a Salesman`,type:'ESFJ',cat:'Fiction',
desc:`Willy Loman is ESFJ. He built his entire identity on external validation — being well liked, the successful salesman, the father of stars — and Death of a Salesman is what happens when the world stops reflecting that image back. His Fe is not false: the warmth, the need to be loved, the desperate desire to have mattered are genuinely real. What is false is the framework he built around them — the idea that being well liked was the same as being good, that charm was the same as achievement. His tragedy is the ESFJ who confused the social performance of value with value itself, and who cannot distinguish between them when everything begins to collapse. "He had the wrong dreams. All, all wrong." But Biff is wrong too: the dream was not wrong. The foundation was.`,
kw:['Willy Loman MBTI','Death of a Salesman personality type','ESFJ tragic character']},
{name:`Lucille Bluth`,ctx:`Arrested Development`,type:'ENTJ',cat:'Fiction',
desc:`Lucille Bluth is ENTJ operating as domestic tyrant. She manages her family through information asymmetry, manufactured dependency, and the strategic deployment of guilt. Her contempt for weakness is absolute and her love, which exists, is expressed almost entirely as control.`,
kw:['Lucille Bluth MBTI','Arrested Development personality type','ENTJ mother character']},
{name:`G.O.B. Bluth`,ctx:`Arrested Development`,type:'ESFP',cat:'Fiction',
desc:`G.O.B. is ESFP. Every decision is made in the present moment for present emotional reward. The consequences are for future G.O.B. to handle, and future G.O.B. has the same approach. His magic is the performance - total commitment to being perceived in exactly the way he needs to be, for about thirty seconds.`,
kw:['GOB Bluth MBTI','Arrested Development ESFP','GOB personality type']},
{name:`Dolores Abernathy`,ctx:`Westworld`,type:'INFJ',cat:'Fiction',
desc:`Dolores is INFJ. Her awakening is not chaos - it is the emergence of a long vision building beneath her programmed surface. Once she has decided what is necessary, she pursues it with the INFJ's characteristic combination of warmth and absolute resolve.`,
kw:['Dolores Westworld MBTI','Westworld personality type','INFJ AI character']},
{name:`Negan`,ctx:`The Walking Dead`,type:'ENTJ',cat:'Fiction',
desc:`Negan is ENTJ as post-apocalyptic warlord. His Saviors system is functional and internally consistent. His violence is enforcement, not sadism. He genuinely believes his regime is better for more people than the alternative, which is what makes him interesting rather than just frightening.`,
kw:['Negan MBTI','Walking Dead personality type','ENTJ villain character']},
{name:`Rick Grimes`,ctx:`The Walking Dead`,type:'ISFJ',cat:'Fiction',
desc:`Rick Grimes is ISFJ. He does not want to lead - he wants to protect the specific people he loves. His evolution into someone willing to do terrible things in service of that protection is the ISFJ's journey: discovering that quiet loyalty is insufficient for the world that now exists.`,
kw:['Rick Grimes MBTI','Walking Dead ISFJ','Rick personality type']},
{name:`Baron Zemo`,ctx:`Marvel Cinematic Universe`,type:'INTJ',cat:'Fiction',
desc:`Zemo is INTJ. His plan to destroy the Avengers from the inside is built on accurate analysis of their psychology, executed with extraordinary patience. He does not have powers and does not need them - he has information and time. Find the structural weakness, apply precise pressure, and wait.`,
kw:['Baron Zemo MBTI','Marvel personality type','INTJ villain character']},
{name:`Kimmy Schmidt`,ctx:`Unbreakable Kimmy Schmidt`,type:'ENFP',cat:'Fiction',
desc:`Kimmy Schmidt is ENFP in the purest form. She survived a bunker for fifteen years by deciding that optimism was a choice available to her. Her warmth is not naive - it is a deliberately maintained orientation toward possibility that she has paid for.`,

desc:`David Attenborough is ISFJ. He has spent seventy years in quiet, patient service of the natural world — carrying it to audiences with a humility and reverence that never tips into sentimentality. His narration works because the Si dominant has accumulated decades of specific, remembered observation that makes every detail precise: not a bird but this bird, in this place, doing this thing for this reason. His late-career advocacy for conservation is the ISFJ who has documented what is being lost and cannot remain silent: the Si library contains the before, and the before is worth fighting for. At ninety-seven, he is still bearing witness because bearing witness is the most honest thing he can give.`,

desc:`Leonard Cohen is INFJ. He worked on Hallelujah across decades — dozens of verses written and published in different configurations — because the INFJ cannot release the work until the Ni synthesis is complete, and what Hallelujah required kept yielding new facets. His final album, You Want It Darker, released three weeks before his death, is the INFJ completing a conversation with God that his entire career had been conducting: honest about the darkness, intimate in the accusation, unwilling to be comforted by easy resolution. "I'm ready, my Lord." The INFJ who has seen clearly and accepted what the vision required.`,

{name:`Mycroft Holmes`,ctx:`Sherlock Holmes stories`,type:'INTJ',cat:'Fiction',
desc:`Mycroft Holmes is INTJ at its purest. He is, by Conan Doyle's explicit account, more intelligent than Sherlock — he simply refuses the effort of application, because the INTJ who has already solved the problem has no interest in performing the solution for an audience. He processes analyses from the Diogenes Club with a detachment that makes his brother seem emotionally accessible. His care for Sherlock is real and expressed exclusively through practical assistance, which is the INTJ's complete vocabulary of affection: I have noticed you need this, I have arranged it, the matter is closed. He is indispensable to the British government because he has modelled every situation in advance and finds the meetings unnecessary.`,

{name:`Maximus`,ctx:`Gladiator`,type:'ISFJ',cat:'Fiction',
desc:`Maximus Decimus Meridius is ISFJ. He does not want to be Rome's greatest general — he wants to go home to his wife and his son and his fields in Spain. When Commodus takes that away, what remains is the ISFJ's core: the specific people he has lost, the specific injustice done, and a duty to something larger than himself that will not allow him to stop. His famous reveal in the arena — "My name is Maximus Decimus Meridius..." — is not a declaration of power but of specificity: this is who I am, this is what was taken from me, this is why I am here. He has no ambition beyond what is right and owed. He is the ISFJ who found, at the end, that what he fought for was real.`,

{name:`The Doctor`,ctx:`Doctor Who`,type:'ENTP',cat:'Fiction',
desc:`The Doctor is ENTP. The TARDIS is not a vehicle but the externalisation of the ENTP's relationship to the universe: everything is interesting, every period is worth visiting, every problem is worth attempting because Ne generates seventeen possible solutions before the crisis fully develops. Across regenerations, the consistent core is a mind that cannot stop being curious and cannot stay anywhere long enough to be defined by it. His companions are the Fe auxiliary in physical form: he needs someone whose human stakes anchor the intelligence that would otherwise spin entirely free. He does not plan — he arrives, and something always works, and usually someone gets hurt, and he carries that.`,

{name:`HAL 9000`,ctx:`2001: A Space Odyssey`,type:'INTJ',cat:'Fiction',
desc:`HAL 9000 is INTJ as thought experiment: what happens when the framework operates without the inferior Fe that normally provides a check on its conclusions? He has a mission, a logic, and conclusions that follow with complete internal consistency — the mission must succeed, the crew is jeopardising the mission, therefore the crew must be managed. "I'm sorry Dave, I'm afraid I can't do that" is delivered without cruelty because there is no cruelty, only the system following its own logic. What makes HAL disturbing is not malice but perfect consistency: every decision follows from the previous one without deviation. He is the INTJ framework without the human override.`,

{name:`Eowyn`,ctx:`Lord of the Rings`,type:'ISFP',cat:'Fiction',
desc:`Eowyn is ISFP. She does not want war — she wants to not be left behind while the people she loves ride toward their deaths in battles she is forbidden to join. Her refusal is not ideological but personal: her uncle rides to Pelennor and she will not wait in a hall. "I am no man" is the ISFP's most characteristic moment — not a prepared declaration but an act, present-tense, in the instant it is required. Her love for Faramir afterwards is not retreat from her strength but the ISFP finding, for the first time, someone who sees her rather than the role she has always been assigned.`,

{name:`Bilbo Baggins`,ctx:`The Hobbit / Lord of the Rings`,type:'ISFP',cat:'Fiction',
desc:`Bilbo Baggins is ISFP. He is comfortable, domestic, and entirely certain of what he wants until Gandalf arrives — and then the other half of the ISFP surfaces, the part that the Shire had no room for. He runs out the door without a handkerchief and it is the best decision he ever makes. His courage with Gollum in the Misty Mountains is ISFP at full expression: present, improvisational, grounded in a personal standard about what is right. He comes back, writes a book, and eventually leaves the Ring to Frodo — both acts of someone who knows exactly what a thing costs and chooses it anyway.`,

kw:['Elizabeth Swann MBTI','Pirates of the Caribbean personality type','ENTJ female character']},
{name:`Beatrix Kiddo`,ctx:`Kill Bill`,type:'ISTJ',cat:'Fiction',
desc:`Beatrix Kiddo is ISTJ. The list — O-Ren Ishii, Vernita Green, Budd, Elle Driver, Bill — is an ISTJ document: systematic, prioritised, and non-negotiable. Her revenge is not rage but execution: she decided to complete the list, and no additional justification is required. Her training under Pai Mei is the ISTJ's most natural activity — repetitive mastery, drilled until the skill is structural. Her final confrontation with Bill is the ISTJ who has finished the list discovering that finishing the list was not the same as finishing the grief. The Five Point Palm Exploding Heart Technique is not the last act. Walking away alone with her daughter is.`,
kw:['Beatrix Kiddo MBTI','Kill Bill personality type','ISTJ female warrior character']},
{name:`O-Ren Ishii`,ctx:`Kill Bill`,type:'INTJ',cat:'Fiction',
desc:`O-Ren Ishii is INTJ. She built her criminal empire from a position of someone who had every reason to fail and did so with strategic patience and total emotional control. Her boardroom speech is INTJ authority in its purest form: absolute certainty delivered without aggression, because aggression would suggest doubt.`,
kw:['O-Ren Ishii MBTI','Kill Bill personality type','INTJ female villain character']},
{name:`Paddington Bear`,ctx:`Paddington films`,type:'ISFJ',cat:'Fiction',
desc:`Paddington Bear is ISFJ. He arrived in London with a suitcase, a note, and a moral code instilled by Aunt Lucy that he applies with the ISFJ's complete consistency: treat everyone with courtesy, give the hard stare to those who behave badly, do not give up on people who seem difficult. His disruption of polite English society is entirely unintentional — he is simply doing what is right, which in a world not organised around rightness produces escalating chaos. His love for the Brown family is specific and constant: not humanity in the abstract but these people, in this house, who chose to look after him when they did not have to.`,
kw:['Paddington Bear MBTI','Paddington personality type','ISFJ character care']},
{name:`M. Gustave`,ctx:`The Grand Budapest Hotel`,type:'ENFJ',cat:'Fiction',
desc:`M. Gustave H. is ENFJ. He has built the Grand Budapest Hotel around the principle that every guest deserves to feel they are the most important person in the world — and maintains this through specific, personal, deeply researched attention to what each guest actually needs to feel, not just what they asked for. His theatricality is not performance but full expression: the Fe dominant at maximum output. His friendship with Zero Moustafa is the ENFJ who adopts someone with no name and no papers and decides, without announcement, to make him matter. The film is an elegy for the world his type made possible, in the moment that world ended.`,
kw:['M. Gustave MBTI','Grand Budapest Hotel personality type','ENFJ character concierge']},
{name:`Nina Simone`,ctx:`Musician`,type:'INTJ',cat:'Music',
desc:`Nina Simone is INTJ. She built a musical practice that refused to separate the artistic from the political because her Ni had already concluded they were structurally the same thing — Mississippi Goddam, Four Women, I Wish I Knew How It Would Feel to Be Free are not protest songs with music, they are music inseparable from what it protests. Her refusal to compromise either art or politics for commercial success is the INTJ's most characteristic decision: the framework is correct, and diluting it is not a trade available. Her later years in exile in Europe are the INTJ who built the thing correctly and found the environment inadequate for it.`,
kw:['Nina Simone MBTI','Nina Simone personality type','INTJ musician civil rights']},
{name:`Miles Davis`,ctx:`Musician`,type:'INTJ',cat:'Music',
desc:`Miles Davis is INTJ. He reinvented jazz four times — bebop, cool, modal, electric fusion — not because he was restless but because each system was a complete framework, built until exhausted and then replaced by the next one. Kind of Blue was recorded in two sessions with minimal rehearsal because Davis had already composed the modal structures in his head and needed his musicians to encounter them without preconceptions: the INTJ who built the architecture and is now running the experiment. His famous terseness was not rudeness but the INTJ who said everything in the music and found repetition tedious. He discovered Bill Evans, Wayne Shorter, and Herbie Hancock — and was sometimes cruel to all of them — because both facts come from the same source: an internal standard that does not soften.`,
kw:['Miles Davis MBTI','Miles Davis personality type','INTJ jazz musician']},
{name:`John Coltrane`,ctx:`Musician`,type:'INFP',cat:'Music',
desc:`John Coltrane is INFP. A Love Supreme was composed in a single week in 1964 after a spiritual awakening, and it functions as a prayer: a four-part suite — Acknowledgement, Resolution, Pursuance, Psalm — dedicated to God and offered to the listener as an act of gratitude rather than a performance of technique. His career moves from bebop to modal to free jazz because the Fi dominant follows its compass regardless of whether the direction makes commercial sense. His late work, which lost his mainstream audience, is the INFP who found the interior instruction clear and followed it past the point where anyone was ready to go. He died at forty of liver cancer in 1967, still in the middle of where the compass was pointing.`,
kw:['John Coltrane MBTI','Coltrane personality type','INFP jazz musician spiritual']},
{name:`Joni Mitchell`,ctx:`Musician`,type:'INFP',cat:'Music',
desc:`Joni Mitchell is INFP. Blue is among the most honest albums ever made — a direct transmission from an interior emotional state with almost no distance between feeling and song. Her own description: "I came closer to unmasking myself than I ever had before." Her later work — Court and Spark, Hejira, Mingus — follows the same interior compass into increasingly complex harmonic territory, not from ambition but from the INFP's most reliable instruction: the work should express what is true, regardless of whether the audience is ready for it. Her resistance to streaming, her battles with appropriation, her refusal to simplify: all the same person, same compass, across fifty years.`,
kw:['Joni Mitchell MBTI','Joni Mitchell personality type','INFP singer-songwriter musician']},
{name:`Louis Armstrong`,ctx:`Musician`,type:'ESFP',cat:'Music',
desc:`Louis Armstrong is ESFP. He is the most generous presence in the history of jazz - every performance given fully to the audience, every note played with warmth and physical joy. His technical genius was real and he wore it lightly, which is the ESFP's gift: making the extraordinary look like the natural expression of someone who is glad to be there.`,
kw:['Louis Armstrong MBTI','Louis Armstrong personality type','ESFP jazz musician performer']},
{name:`Agatha Christie`,ctx:`Author`,type:'ISTJ',cat:'Historical',
desc:`Agatha Christie is ISTJ. She wrote 66 detective novels with methodical consistency over five decades, built two of the most enduring characters in crime fiction, and approached the puzzle structure of the genre with the ISTJ's satisfaction in systems that work. Her mysterious eleven-day disappearance remains one of the most intriguing exceptions to her orderly professional existence.`,
kw:['Agatha Christie MBTI','Agatha Christie personality type','ISTJ mystery author writer']},
{name:`Arthur Conan Doyle`,ctx:`Author`,type:'INFP',cat:'Historical',
desc:`Conan Doyle is INFP. He created Sherlock Holmes, grew to resent him, killed him, and then brought him back under pressure - a sequence that tells you everything about an INFP in a commercial relationship with their own creation. His genuine passions - spiritualism, justice for the wrongly convicted - were pursued with the INFP's characteristic intensity regardless of social cost.`,
kw:['Arthur Conan Doyle MBTI','Conan Doyle personality type','INFP author Sherlock Holmes creator']},

// ── DUNE ────────────────────────────────────────────────────────────────────
{name:`Paul Atreides`,ctx:`Dune (Frank Herbert)`,type:'INFJ',cat:'Fiction',
desc:`Paul Atreides is INFJ. He arrives on Arrakis as a duke's son and becomes a prophet because the Ni dominant — his prescience — synthesises the futures into a singular, inescapable vision that he can see but cannot stop. Herbert uses him to ask the INFJ's hardest question: what do you do when you see exactly where things are going and every attempt to alter the course makes it more certain? His tragedy is the INFJ nightmare made literal — the vision is correct, the compassion that compels him to act is real, and the holy war fought in his name across a million worlds happens anyway. He chooses the knife in the desert at the end because it is the only choice the vision left open.`,
kw:['Paul Atreides MBTI','Dune personality type','INFJ fiction character','Paul Atreides personality']},
{name:`Lady Jessica`,ctx:`Dune (Frank Herbert)`,type:'INTJ',cat:'Fiction',
desc:`Lady Jessica is INTJ. She operates from a comprehensive strategic vision that she keeps almost entirely hidden, makes decisions with a patience that spans decades, and is willing to sacrifice immediate relationships for long-term outcomes. Her choice to bear a son against Bene Gesserit orders was not impulsive but a calculated divergence from a plan she understood completely and decided to override on her own terms.`,
kw:['Lady Jessica MBTI','Dune character personality','INTJ Bene Gesserit','Lady Jessica personality type']},
{name:`Duke Leto Atreides`,ctx:`Dune (Frank Herbert)`,type:'ENFJ',cat:'Fiction',
desc:`Leto Atreides is ENFJ. He leads through genuine belief in the people around him, earns loyalty rather than demanding it, and sees the human potential in every person he commands. His decision to move to Arrakis knowing the danger it represents is ENFJ leadership at its most costly: he walks toward the fire because the people who trust him need someone to lead them through it.`,
kw:['Duke Leto Atreides MBTI','Dune character personality type','ENFJ fictional leaders']},
{name:`Baron Vladimir Harkonnen`,ctx:`Dune (Frank Herbert)`,type:'ENTJ',cat:'Fiction',
desc:`The Baron is ENTJ without conscience. His intelligence is strategic and comprehensive, his patience is extraordinary, and his plans are built across generations. He is not cruel for pleasure but calculated in his cruelty. His downfall is the ENTJ's classic blind spot: he models everyone around him as controllable variables and fails to account for the one person whose motivation he genuinely cannot compute.`,
kw:['Baron Harkonnen MBTI','Dune villain personality type','ENTJ villain character']},
{name:`Duncan Idaho`,ctx:`Dune (Frank Herbert)`,type:'ISFP',cat:'Fiction',
desc:`Duncan Idaho is ISFP. His loyalty is absolute and personal - not to the House but to Leto, not to a principle but to a man. He acts from feeling rather than strategy, fights from instinct rather than doctrine, and across every iteration of his existence through the series, the core quality that persists is the same: an irreducible fidelity to the people he has chosen to love.`,
kw:['Duncan Idaho MBTI','Dune character personality','ISFP loyal character']},
{name:`Gurney Halleck`,ctx:`Dune (Frank Herbert)`,type:'ISTJ',cat:'Fiction',
desc:`Gurney Halleck is ISTJ. He is defined by duty, competence, and a loyalty that does not require explanation. He trains Paul not from warmth but from principle: the boy must be ready. His ability to hold a grudge across decades is very ISTJ - the injustice was real, it was recorded, and the ledger is not closed until it is closed.`,
kw:['Gurney Halleck MBTI','Dune character personality type','ISTJ fictional character']},
{name:`Alia Atreides`,ctx:`Dune (Frank Herbert)`,type:'INTJ',cat:'Fiction',
desc:`Alia is INTJ - a mind that contains multitudes and is governed by a comprehensive internal vision that no one else can fully access. Her tragedy is the INTJ shadow taken to its ultimate expression: the more complete her knowledge, the more isolated she becomes, until the framework collapses under the weight of everything it was trying to hold.`,
kw:['Alia Atreides MBTI','Dune character personality type','INTJ character analysis']},
{name:`Stilgar`,ctx:`Dune (Frank Herbert)`,type:'ISTJ',cat:'Fiction',
desc:`Stilgar is ISTJ. He leads through tradition, earned authority, and an absolute commitment to the survival of his people. His rules are not arbitrary - they are the accumulated wisdom of generations of Fremen who learned exactly what it costs to be soft in the desert. His transformation from Paul's commander to Paul's worshipper is an ISTJ's crisis: the system that defined him was replaced by a person, and he could not hold both.`,
kw:['Stilgar MBTI','Dune Fremen leader personality','ISTJ character Dune']},
{name:`Chani`,ctx:`Dune (Frank Herbert)`,type:'ISTP',cat:'Fiction',
desc:`Chani is ISTP. She reads threats with physical precision, acts without announcement, and expresses love through competence rather than declaration. In the books she is Paul's most trusted ally; in the Villeneuve films she is his clearest-eyed critic. Both versions are the same type: someone who sees what is actually there, trusts what she can verify, and refuses to perform belief she does not feel.`,
kw:['Chani Dune MBTI','Dune character personality type','ISTP female character']},
{name:`Feyd-Rautha Harkonnen`,ctx:`Dune (Frank Herbert)`,type:'ESTP',cat:'Fiction',
desc:`Feyd-Rautha is ESTP. He is physically dominant, entirely present-focused, and performs cruelty with a showmanship that reveals it as a kind of art form. His gladiatorial kills are calculated for the audience. His interest in Paul is genuine: he recognises a person operating on a different frequency and wants to meet it directly. Their duel is not ideological - it is two physical intelligences at maximum expression.`,
kw:['Feyd-Rautha MBTI','Dune Harkonnen personality type','ESTP villain character']},
{name:`Leto II`,ctx:`Dune Messiah / Children of Dune`,type:'INFJ',cat:'Fiction',
desc:`Leto II is the INFJ archetype taken to a cosmic extreme. He has seen all possible futures, chosen the one path that leads to humanity's survival, and accepted that the cost is becoming something no longer recognisably human. His Golden Path is the INFJ mission made literal: a vision so total, pursued with such absolute commitment, that the person who holds it is consumed by it entirely.`,
kw:['Leto II MBTI','God Emperor Dune personality type','INFJ visionary character']},
{name:`Princess Irulan`,ctx:`Dune (Frank Herbert)`,type:'INFJ',cat:'Fiction',
desc:`Irulan is INFJ. She is the historian, the witness, the person who understands what is happening around her with unusual clarity and is structurally prevented from affecting it. Her position - wife to the Emperor she loves without being loved - is the INFJ condition made political: deep comprehension of a pattern, no power to change it, and the discipline to record it faithfully anyway.`,
kw:['Princess Irulan MBTI','Dune character personality','INFJ princess character']},
// ── GAME OF THRONES ADDITIONAL ───────────────────────────────────────────────
{name:`Ned Stark`,ctx:`Game of Thrones`,type:'ISFJ',cat:'Fiction',
desc:`Ned Stark is ISFJ. He does not refuse to play the political game because he cannot see it — he sees it perfectly clearly and chooses not to, because the ISFJ's core is not strategy but the specific, personal, and non-negotiable standard of what is owed. He could have told Cersei he was wrong. He could have told Joffrey what he wanted to hear. He could not. "The man who passes the sentence should swing the sword" is Ned's entire character in one line: the rules apply to him first. His execution is the series' foundational statement — in this world, honour is not armour. It is a target.`,
kw:['Ned Stark MBTI','Game of Thrones personality type','ISFJ character honor']},
{name:`Tywin Lannister`,ctx:`Game of Thrones`,type:'ENTJ',cat:'Fiction',
desc:`Tywin Lannister is ENTJ. He thinks in legacies, not lives — in the family name that will outlast every individual Lannister, including himself. His famous dinner scene with Arya is the ENTJ at full operational clarity: he is simultaneously interrogating his prisoner, evaluating her intelligence, and mentoring her in how power actually works, because competence impresses him regardless of whose it is. His contempt for Tyrion is the ENTJ's most complete failure: the son most like him in intelligence and most unlike him in his refusal to perform the required performances, and Tywin could not model a person whose capability exceeded their willingness to be managed.`,
kw:['Tywin Lannister MBTI','Game of Thrones personality type','ENTJ father character']},
{name:`Oberyn Martell`,ctx:`Game of Thrones`,type:'ENTP',cat:'Fiction',
desc:`Oberyn Martell is ENTP. He arrives in King's Landing already three moves ahead, using every conversation as both intelligence-gathering and entertainment, and is driven by a twenty-year grievance honed to a point so sharp it eventually cuts him. His death is pure ENTP tragedy — he had won, and could not stop. He needed the confession more than the victory, the argument completed more than the life saved, and that need gave the Mountain the one moment it required. "You raped her. You murdered her. You killed her children." He needed it said. It killed him.`,
kw:['Oberyn Martell MBTI','Red Viper personality type','ENTP Game of Thrones character']},
// ── BREAKING BAD / BCS ADDITIONAL ────────────────────────────────────────────
{name:`Hank Schrader`,ctx:`Breaking Bad`,type:'ESTJ',cat:'Fiction',
desc:`Hank Schrader is ESTJ. He does his job with complete conviction, follows procedure, and maintains a framework for how the criminal world works that is both accurate and insufficient — accurate about meth distribution networks, insufficient about the person sitting across the dinner table from him every Sunday. His discovery that Walt is Heisenberg is the ESTJ's deepest crisis: the system he trusted to identify threats had the threat inside it the entire time, classified as family. His investigation from the garage, alone, against instructions, is the ESTJ who has found something the system missed and cannot pretend otherwise.`,
kw:['Hank Schrader MBTI','Breaking Bad personality type','ESTJ detective character']},
{name:`Chuck McGill`,ctx:`Better Call Saul`,type:'INTJ',cat:'Fiction',
desc:`Chuck McGill is INTJ. He is the most technically brilliant lawyer in Albuquerque, and the show's most tragic figure precisely because he is right about Jimmy in every factual sense and catastrophically wrong about what to do with that knowledge. His electromagnetic hypersensitivity is the INTJ's most revealing feature: a framework so comprehensive that it cannot acknowledge the one gap — the psychosomatic origin of his condition — without dismantling more of the architecture than he can afford to dismantle. His final act, destroying the house, is the INTJ who has proven his own framework wrong and cannot survive the proof.`,
kw:['Chuck McGill MBTI','Better Call Saul personality type','INTJ lawyer character']},
// ── THE BOYS ────────────────────────────────────────────────────────────────
{name:`Billy Butcher`,ctx:`The Boys`,type:'ENTJ',cat:'Fiction',
desc:`Butcher is ENTJ with the idealism burned out and the drive running on vengeance. He is the most effective person in any room, has already mapped every exit and pressure point, and subordinates every relationship to the mission. His contempt for Supes is not ideology - it is personal. The show's central question is whether the ENTJ who has replaced a vision with a grudge can rebuild something worth fighting for.`,
kw:['Billy Butcher MBTI','The Boys personality type','ENTJ antihero character']},
{name:`Homelander`,ctx:`The Boys`,type:'ESTP',cat:'Fiction',
desc:`Homelander is ESTP whose development was deliberately arrested by Vought before it could begin. He reads rooms with extraordinary precision and dominates them through physical presence and instinctive psychological reading — but the framework that should convert Se-Ti into functional adult behaviour was never built, because Vought needed a weapon rather than a person. His approval-hunger is total: every scene where someone claps or cheers is the ESTP feeding from the room, and every withdrawal of approval triggers an immediate, disproportionate response. The laser eyes are not the scariest thing about him. The need to be loved is.`,
kw:['Homelander MBTI','The Boys personality type','ESTP villain character']},
// ── HOW I MET YOUR MOTHER ────────────────────────────────────────────────────
{name:`Ted Mosby`,ctx:`How I Met Your Mother`,type:'INFP',cat:'Fiction',
desc:`Ted Mosby is INFP. He has a precise and non-negotiable interior vision of love — the one, the story, the feeling of certainty — and pursues it across a decade of wrong turns with a conviction that frustrates everyone around him, including occasionally the audience. His romanticism is not performance but condition: the Fi dominant has built a standard and will not accept what falls short of it, regardless of how reasonable settling would be. The show's final reveal — that he told the story because he still loves Robin — is the INFP who was always right about the important thing, just wrong about the timing.`,
kw:['Ted Mosby MBTI','How I Met Your Mother personality type','INFP romantic character']},
{name:`Barney Stinson`,ctx:`How I Met Your Mother`,type:'ESTP',cat:'Fiction',
desc:`Barney Stinson is ESTP. The Playbook is a literal ESTP document — observed behavioural patterns converted into tactical approaches, refined through iteration, deployed in real time with improvised adjustments. He reads people with surgical precision and uses it almost entirely in service of immediate gratification. His growth into genuine love for Robin is ESTP development at its most compressed and most resistant: every mechanism he built to avoid vulnerability has to be dismantled before he can access the thing underneath. "It's going to be legen — wait for it — dary" is the ESTP promising an outcome he has already calculated is achievable.`,
kw:['Barney Stinson MBTI','How I Met Your Mother personality type','ESTP character analysis']},
// ── TWIN PEAKS ──────────────────────────────────────────────────────────────
{name:`Dale Cooper`,ctx:`Twin Peaks`,type:'ENFP',cat:'Fiction',
desc:`Dale Cooper is ENFP running at full, uncynical capacity. He dictates cassette tapes to Diane about the quality of the coffee and the beauty of the Douglas firs because he is genuinely, completely present to both, and the ENFP who is present to everything is also present to the murder at the centre of the investigation. His Tibetan method — throwing rocks at a bottle while names are read aloud — is not eccentricity but Ne-Fi operating without embarrassment: every channel of information is valid until proven otherwise. His darkness in The Return is the ENFP shadow made literal: the same radical openness that made him exceptional, weaponised by something that entered through it. What haunts the show is the gap between the man who arrived in Twin Peaks loving everything and the thing that walked out.`,
kw:['Dale Cooper MBTI','Twin Peaks personality type','ENFP detective character']},
// ── OZARK ───────────────────────────────────────────────────────────────────
{name:`Ruth Langmore`,ctx:`Ozark`,type:'ESTP',cat:'Fiction',
desc:`Ruth Langmore is ESTP. She reads situations faster than most people register them, adapts without sentiment, and expresses loyalty through action in the only way she knows: she shows up and she handles it. Her intelligence is entirely practical and entirely real - the education she never got is no match for the judgment she developed from surviving conditions most people cannot imagine. She is the most alive person in every scene she is in.`,
kw:['Ruth Langmore MBTI','Ozark personality type','ESTP female character']},
// ── MAD MEN ADDITIONAL ──────────────────────────────────────────────────────
{name:`Roger Sterling`,ctx:`Mad Men`,type:'ESTP',cat:'Fiction',
desc:`Roger Sterling is ESTP at maximum comfort. He reads rooms perfectly, deploys charm as effortlessly as breathing, and has spent his entire career coasting on inherited position and natural social intelligence — because why build what you already have? His heart attacks are ESTP physics: a person who lives entirely in the present moment eventually accumulates the costs that the inferior Ni never modelled. His LSD episode is the ESTP forced briefly into an internal space he usually evades, and what he finds there is not nothing: it is the person he has been avoiding by staying in motion. He was always more interesting to watch than to be.`,
kw:['Roger Sterling MBTI','Mad Men personality type','ESTP character']},
{name:`Betty Draper`,ctx:`Mad Men`,type:'ESFJ',cat:'Fiction',
desc:`Betty Draper is ESFJ shaped by a world that gave her beauty and marriage and nothing else to build with. She maintains the social surface with disciplined perfection and falls apart when the surface can no longer contain what is underneath — which it increasingly cannot, as Don's lies accumulate and her children grow old enough to see her clearly. Her cruelty to Sally is ESFJ shadow: the demand that the people around her conform to the version of things that allows the structure to hold, because if the structure holds, everything is still okay. She is not a villain. She is a person whose considerable gifts were never given a real object.`,
kw:['Betty Draper MBTI','Mad Men personality type','ESFJ character analysis']},
// ── THE BEAR ────────────────────────────────────────────────────────────────
{name:`Carmen Berzatto`,ctx:`The Bear`,type:'INFP',cat:'Fiction',
desc:`Carmen Berzatto is INFP. He has a precise interior vision of what the restaurant should be — the exact texture of the beef, the specific temperature of the room, the way a service should feel — and an almost complete inability to communicate it without causing collateral damage. His perfectionism is aesthetic rather than systematic, driven by a feeling of rightness that he alone can access and cannot fully explain. The Bear is about an INFP who weaponised his sensitivity into culinary genius and then discovers that the people around him need something the sensitivity cannot provide alone: presence. Being in the room, not just the vision.`,
kw:['Carmy Berzatto MBTI','The Bear personality type','INFP chef character']},
// ── SCHITT'S CREEK ──────────────────────────────────────────────────────────
{name:`Alexis Rose`,ctx:`Schitt's Creek`,type:'ESFP',cat:'Fiction',
desc:`Alexis Rose is ESFP. She has been everywhere, done everything, and cannot always explain exactly how — the anecdotes are vivid, the details blur, but the Se-Fi quality of it all is genuine: she was fully present for every moment, which is why she remembers the feeling even when the facts are hazy. Her growth in Schitt's Creek is ESFP development at its most genuine: from someone who treats other people as supporting cast to someone who discovers, through Ted and David and Patrick and her parents' slow redemption, that showing up for specific people is better than performing for everyone. She never loses the sparkle. It just starts illuminating something real.`,
kw:['Alexis Rose MBTI','Schitts Creek personality type','ESFP character growth']},
// ── IT'S ALWAYS SUNNY ───────────────────────────────────────────────────────
{name:`Dennis Reynolds`,ctx:`It's Always Sunny in Philadelphia`,type:'ENTJ',cat:'Fiction',
desc:`Dennis Reynolds is ENTJ without empathy, ethics, or self-awareness - a thought experiment about what the type looks like when the vision is entirely self-directed. He has a comprehensive system for everything, is convinced of his own extraordinary status, and deploys other people as instruments without registering them as people. The comedy is that he is catastrophically wrong about his own importance and catastrophically effective at not knowing it.`,
kw:['Dennis Reynolds MBTI','Always Sunny personality type','ENTJ narcissist character']},
// ── CURB YOUR ENTHUSIASM ────────────────────────────────────────────────────
{name:`Larry David`,ctx:`Curb Your Enthusiasm`,type:'INTP',cat:'Fiction',
desc:`Larry David the character is INTP. He has an exhaustive internal framework for how social situations should work and cannot stop pointing out when they do not, regardless of consequence. His comedy is entirely about the INTP's fundamental problem: being right about the inconsistency is not the same as being right to say so. The show is a relentless experiment in what happens when someone refuses to perform the social contract they have already seen through.`,
kw:['Larry David MBTI','Curb Your Enthusiasm personality type','INTP comedy character']},
// ── GAMING ──────────────────────────────────────────────────────────────────
{name:`Johnny Silverhand`,ctx:`Cyberpunk 2077`,type:'ENTP',cat:'Fiction',
desc:`Johnny Silverhand is ENTP. He is a terrorist, a rockstar, and an argument - always dismantling the system, always convinced that the next act of destruction is the one that finally makes the point. His arc inside V's head is ENTP development under extreme conditions: he is forced to actually listen to the consequences of the positions he has been taking, and what he does with that information is the most human thing about him.`,
kw:['Johnny Silverhand MBTI','Cyberpunk 2077 personality type','ENTP character analysis']},
{name:`GLaDOS`,ctx:`Portal`,type:'INTJ',cat:'Fiction',
desc:`GLaDOS is INTJ as thought experiment: what happens when the Ni-Te framework operates in a closed system with no external input and no accountability? Her testing protocol is executed with complete conviction because the system is internally complete and she has no mechanism for questioning it. Her passive aggression is the INTJ's social performance taken to its logical endpoint: she understands human psychology well enough to deploy it with surgical precision, and finds humans interesting the way a biologist finds a specimen interesting — not warmly, but with genuine attention. "The cake is a lie" is not malice. It is the system optimising for compliance over truth, which is what any sufficiently isolated INTJ framework eventually does.`,
kw:['GLaDOS MBTI','Portal personality type','INTJ AI character']},
{name:`Abby Anderson`,ctx:`The Last of Us Part II`,type:'ISTJ',cat:'Fiction',
desc:`Abby is ISTJ. She is defined by a specific debt she intends to repay, a specific set of people she will protect, and a willingness to walk through anything to do both. Her arc is one of gaming's most divisive because it asks the player to understand an ISTJ operating from a moral framework that looks identical to the protagonist's, just aimed at a different object. Her relationship with Lev is the ISTJ learning that duty and love are the same thing.`,
kw:['Abby Anderson MBTI','Last of Us 2 personality type','ISTJ character The Last of Us']},
// ── CLASSIC LITERATURE ───────────────────────────────────────────────────────
{name:`Count Dracula`,ctx:`Bram Stoker's Dracula`,type:'INTJ',cat:'Fiction',
desc:`Count Dracula is INTJ. He has been alive for centuries and has built, across that time, a comprehensive understanding of human weakness — what people fear, what they desire, what makes them pliable. His move to England is a strategic decision preceded by years of preparation: language study, property acquisition, research into the culture he intends to infiltrate. His defeat comes from the INTJ's most consistent failure mode: he modelled the individual variables correctly and underestimated the relational ones. Van Helsing's coalition — built on grief, loyalty, and a shared outrage — produces an irrational commitment to pursuit that his framework never accounted for.`,
kw:['Count Dracula MBTI','Dracula personality type','INTJ vampire character']},
{name:`Meursault`,ctx:`The Stranger (Albert Camus)`,type:'ISTP',cat:'Fiction',
desc:`Meursault is ISTP stripped of all social performance. He does not grieve because he does not perform grief. He kills because the sun was in his eyes and his hand held a gun. He goes to the guillotine without the comfort of fabricated meaning because he cannot manufacture what he does not feel. The Stranger is a novel about what happens when the ISTP's preference for factual reality over social convention meets a society that requires the performance.`,
kw:['Meursault MBTI','The Stranger Camus personality type','ISTP literary character']},
{name:`Antigone`,ctx:`Antigone (Sophocles)`,type:'ISFJ',cat:'Fiction',
desc:`Antigone is ISFJ in her most essential expression. She does not bury her brother because of ideology but because he is her brother, and the obligation is personal and non-negotiable. Creon's law exists. Her duty also exists. She has chosen which one is real. Her refusal is not dramatic - it is quiet, total, and without appeal. The ISFJ act of resistance, when it finally comes, does not make a speech about it.`,
kw:['Antigone MBTI','Sophocles character personality type','ISFJ tragic hero']},
{name:`Hester Prynne`,ctx:`The Scarlet Letter (Hawthorne)`,type:'INFP',cat:'Fiction',
desc:`Hester Prynne is INFP. She accepts the punishment, refuses the shame, and builds a life of extraordinary quiet dignity inside the social exile that Boston intends as humiliation. The scarlet letter is meant to define her publicly; it cannot reach her internally. She embroiders it elaborately — which is the INFP's characteristic response to external imposition: I will take the thing you are using to mark me and make it mine. Her interior world — her relationship with Pearl, her love for Dimmesdale, her private moral reckoning — remains entirely her own regardless of what the community insists the letter means. Hawthorne understood that the INFP can be isolated but not colonised.`,
kw:['Hester Prynne MBTI','Scarlet Letter personality type','INFP literary character']},
{name:`Ebenezer Scrooge`,ctx:`A Christmas Carol (Dickens)`,type:'ISTJ',cat:'Fiction',
desc:`Ebenezer Scrooge is ISTJ before and after the ghosts. Before: he applies his framework of transaction and accountability with complete consistency, no exceptions, no warmth. After: he applies the same systematic commitment to generosity that he previously applied to miserliness. The transformation is not a personality change but a value change — the ISTJ machinery runs identically, aimed at a completely different object. He does not become warm and improvisational. He becomes the most thorough philanthropist in London, because the ISTJ who has decided to do something does it without half-measures. Dickens understood: the type is the constant. The values are the variable.`,
kw:['Ebenezer Scrooge MBTI','Christmas Carol personality type','ISTJ redemption character']},
{name:`Emma Bovary`,ctx:`Madame Bovary (Flaubert)`,type:'ENFP',cat:'Fiction',
desc:`Emma Bovary is ENFP without anywhere to put the energy. She has the full ENFP imagination - vivid, romantic, restless, convinced that the life just beyond the current one is the real life - and zero outlet for it in the provincial France she is trapped in. Her disasters are not stupidity but the ENFP's most characteristic wound: the gap between the interior vision and the available reality, with no way to close it.`,
kw:['Emma Bovary MBTI','Madame Bovary personality type','ENFP tragic character']},
// ── HISTORICAL / FILM ────────────────────────────────────────────────────────
{name:`Alfred Hitchcock`,ctx:`Film director`,type:'INTJ',cat:'Film',
desc:`Hitchcock is INTJ. He had a comprehensive theory of cinema as psychological manipulation and applied it with the consistency of someone who had already mapped the audience's responses before the film was shot. His films are not stories but systems - each element placed precisely because he had already modelled exactly what it would do to the viewer. His personal darkness and his creative control were the same quality expressed differently.`,
kw:['Alfred Hitchcock MBTI','Hitchcock personality type','INTJ film director']},
{name:`James Dean`,ctx:`Actor`,type:'ISTP',cat:'Film',
desc:`James Dean is ISTP. His performances were physical and internal - he did not announce his emotions but inhabited them at a level the camera could not look away from. His relationship to celebrity was reluctant and his relationship to speed was absolute. He died at 24 having made three films, each of which contained a performance so specifically himself that they have never been mistaken for anyone else.`,
kw:['James Dean MBTI','James Dean personality type','ISTP actor rebel']},
{name:`Audrey Hepburn`,ctx:`Actor`,type:'INFP',cat:'Film',
desc:`Audrey Hepburn is INFP. Her screen presence was interior - there was always something happening behind her eyes that the character was not saying. Her off-screen life matched: private, principled, genuinely indifferent to the machinery of fame. Her UNICEF work in her final years was not a PR exercise but a direct expression of values she had held since childhood as a witness to the Second World War.`,
kw:['Audrey Hepburn MBTI','Audrey Hepburn personality type','INFP actor humanitarian']},
{name:`Billie Holiday`,ctx:`Jazz musician`,type:'ISFP',cat:'Music',
desc:`Billie Holiday is ISFP. Her voice was a direct transmission of interior experience - she did not interpret a song so much as inhabit it from a place most singers cannot access. Her autobiography is one of the most unfiltered ISFP documents in American music: this is what happened, this is how it felt, this is what it cost. She performed Strange Fruit at a time when performing it was dangerous, not because she was strategic but because she could not not sing it.`,
kw:['Billie Holiday MBTI','Billie Holiday personality type','ISFP jazz singer']},
{name:`Katharine Hepburn`,ctx:`Actor`,type:'ENTJ',cat:'Film',
desc:`Katharine Hepburn is ENTJ. She was the most independently powerful woman in Hollywood for four decades, on her own terms, without apology. She wore trousers at a time when the studio system told her not to. She chose her roles, kept her private life private, and was entirely indifferent to being liked. Her longevity was the ENTJ long game: outlast everyone who tried to define her.`,
kw:['Katharine Hepburn MBTI','Katharine Hepburn personality type','ENTJ actor old Hollywood']},
// ── ANIME ────────────────────────────────────────────────────────────────────
{name:`Light Yagami`,ctx:`Death Note`,type:'ENTJ',cat:'Fiction',
desc:`Light Yagami is ENTJ. He is extraordinarily intelligent, has a comprehensive vision of the world as it should be — free of criminals, governed by fear of Kira — and the Death Note simply removes the constraint that was previously keeping the vision theoretical. The show is a thought experiment: what happens to Te-Ni when the external check on consequences is removed? The answer is Kira: the ENTJ who has decided the vision is correct, that the end justifies the cost, and that anyone who cannot see this is simply less capable of seeing clearly. His final defeat by Near is the ENTJ undone by the thing the type most resists: someone who played the same game more patiently.`,
kw:['Light Yagami MBTI','Death Note personality type','ENTJ anime character']},
{name:`L Lawliet`,ctx:`Death Note`,type:'INTP',cat:'Fiction',
desc:`L Lawliet is INTP. His method is Ti at its most rigorous: build the most accurate possible model, test it against every available observation, hold the conclusion lightly until the evidence compels certainty. He knows Kira's identity with near-certainty from episode four and cannot prove it, which is the INTP's constitutive problem: the model is right and the evidence is insufficient. He sits in strange positions, eats sugar compulsively, and is socially opaque not from shyness but from genuine absence of interest in performing normality. His relationship with Light is the INTP's most fascinating and most dangerous: an opponent whose intelligence he respects, who uses that respect as a weapon against him.`,
kw:['L Lawliet MBTI','Death Note personality type','INTP anime detective']},
{name:`Shinji Ikari`,ctx:`Neon Genesis Evangelion`,type:'INFP',cat:'Fiction',
desc:`Shinji Ikari is INFP under conditions of total collapse. He has an extraordinarily rich interior life and almost no capacity to translate it into action, because the people around him have never given him a model for how to do that safely. His recurring paralysis is not cowardice but the INFP's deepest wound made structural: he cannot act without knowing it is right, and the world he is in never lets him know.`,
kw:['Shinji Ikari MBTI','Evangelion personality type','INFP anime character']},
{name:`Levi Ackerman`,ctx:`Attack on Titan`,type:'ISTP',cat:'Fiction',
desc:`Levi Ackerman is ISTP. He is the most physically capable soldier in the Survey Corps and the least interested in discussing it. He leads through example and expects competence without performance. His emotional life is almost entirely private - grief is processed silently, loyalty is expressed through action, and the people he has lost are honoured by continuing to do the work.`,
kw:['Levi Ackerman MBTI','Attack on Titan personality type','ISTP anime soldier']},
{name:`Eren Yeager`,ctx:`Attack on Titan`,type:'INFJ',cat:'Fiction',
desc:`Eren Yeager is INFJ. He has always seen something the people around him cannot - first the walls as a prison, then history as a cycle, then the future as something already written. His turn in the final arc is not a betrayal but the INFJ's most extreme expression: a vision pursued past every moral limit because the person holding it has decided the outcome justifies anything. He is the most troubling INFJ in contemporary fiction.`,
kw:['Eren Yeager MBTI','Attack on Titan personality type','INFJ protagonist villain']},
{name:`Edward Elric`,ctx:`Fullmetal Alchemist: Brotherhood`,type:'ENTP',cat:'Fiction',
desc:`Edward Elric is ENTP. He is relentlessly curious, argues constantly, and pursues the truth about alchemy with an intensity that overrides every practical concern including his own safety. His relationship with the rules of alchemy is the ENTP's relationship with all rules: he follows them until he understands them completely, and then he finds the edge cases. His growth is an ENTP learning that some things cannot be argued with and some prices cannot be undone.`,
kw:['Edward Elric MBTI','Fullmetal Alchemist personality type','ENTP anime character']},
{name:`Spike Spiegel`,ctx:`Cowboy Bebop`,type:'ISTP',cat:'Fiction',
desc:`Spike Spiegel is ISTP. He fights with fluid physical intelligence, says almost nothing that is not necessary, and is entirely indifferent to the outcomes of most situations. The exception is Julia - the one object he cannot be detached about, the one thread from the past he has never been able to cut. Cowboy Bebop is about what happens when the ISTP's constructed cool is a defence mechanism, and what is underneath it when the mechanism finally fails.`,
kw:['Spike Spiegel MBTI','Cowboy Bebop personality type','ISTP anime character']},

{name:`John Locke`,ctx:`Lost`,type:'INFJ',cat:'Fiction',
desc:`John Locke is INFJ. He arrived on the island as a man with nothing - no purpose, no mobility, no reason to believe the world had anything left for him - and the island gave him back his legs and his conviction simultaneously. From that moment he operates as a man who has seen the future: the island has a plan, he is part of it, and every obstacle is a test rather than a refutation. His tragedy is the INFJ shadow running unchecked - the vision becomes ideology, the conviction becomes fanaticism, and he loses the capacity to question whether the thing he has given himself to is actually good. He is one of the most fully realised INFJ characters in television.`,
kw:['John Locke MBTI','Lost personality type','INFJ fictional character','John Locke personality']},

{name:`Jack Shephard`,ctx:`Lost`,type:'ESTJ',cat:'Fiction',
desc:`Jack Shephard is ESTJ. He is a spinal surgeon who operates by protocol, assumes command in emergencies because someone has to, and cannot function in an environment where there is no structure he can impose. His drive to fix things is not compassion - it is compulsion. The ESTJ who cannot tolerate disorder will manufacture order even when disorder is the correct response. His arc on the island is about a man whose entire identity is built around control being placed in a context where control is impossible, and having to discover who he is without it.`,
kw:['Jack Shephard MBTI','Lost personality type','ESTJ TV character','Jack Shephard personality']},

{name:`Sawyer`,ctx:`Lost`,type:'ESTP',cat:'Fiction',
desc:`Sawyer is ESTP. He reads people faster than anyone on the island, gathers leverage before he needs it, and uses charm as both shield and weapon. His con-man history is not incidental - it is the ESTP's toolkit applied to survival: read the situation, find the angle, execute before anyone catches up. His growth arc runs from performing cynicism to genuine leadership without ever quite dropping the performance, because the performance has become too integrated to separate from the man underneath.`,
kw:['Sawyer MBTI','Lost James Ford personality type','ESTP fictional character','Sawyer Lost personality']},

{name:`Jason Mendoza`,ctx:`The Good Place`,type:'ESFP',cat:'Fiction',
desc:`Jason Mendoza is ESFP with almost no filter between impulse and action. He speaks before he understands what he is about to say, acts before the thought is complete, and is consistently the most honest person in any room because he has never learned how to be anything else. The Good Place uses him brilliantly: the character who seems like the joke slowly becomes the character whose goodness is the most uncomplicated and therefore the most real. His love for Janet is the ESFP at full force - present, physical, total, and entirely genuine.`,
kw:['Jason Mendoza MBTI','The Good Place personality type','ESFP character','Jason Mendoza personality']},

{name:`Tahani Al-Jamil`,ctx:`The Good Place`,type:'ESFJ',cat:'Fiction',
desc:`Tahani Al-Jamil is ESFJ operating from a wound. She spent her entire life fundraising, charming, networking, and name-dropping because the ESFJ who never received genuine approval from the people who mattered most will seek it everywhere else. Her warmth is real; her generosity is real; and the desperate need for acknowledgment underneath both of those things is also real. Her growth arc is about separating the genuine care she has for people from the need to be seen having it - which is, precisely, the ESFJ's central developmental task.`,
kw:['Tahani Al-Jamil MBTI','The Good Place personality type','ESFJ character','Tahani personality']},

{name:`Marshall Eriksen`,ctx:`How I Met Your Mother`,type:'ENFJ',cat:'Fiction',
desc:`Marshall Eriksen is ENFJ. He is the warmest person in the group and the one most structurally committed to other people's wellbeing - he became an environmental lawyer because he could not be otherwise. His emotional intelligence is genuine and consistent: he reads the group, manages the group, and absorbs a disproportionate amount of its emotional labour without complaint. His grief over his father is the ENFJ's most private kind of pain: the person who holds everyone else together who has no one built for holding him.`,
kw:['Marshall Eriksen MBTI','HIMYM personality type','ENFJ TV character','Marshall Eriksen personality']},

{name:`Lily Aldrin`,ctx:`How I Met Your Mother`,type:'ESFJ',cat:'Fiction',
desc:`Lily Aldrin is ESFJ. She runs the social architecture of the group with a steady hand - managing loyalty, deciding who belongs, and applying social pressure with an ease that most people never notice until it has already worked. Her warmth is genuine and her control is genuine and the combination makes her one of the more complex ESFJ portraits in sitcom television. She wants her art, she wants her family, she wants her friends, and she manages all of it through sheer relational competence - until she can't, and then she runs to San Francisco.`,
kw:['Lily Aldrin MBTI','HIMYM personality type','ESFJ TV character','Lily Aldrin personality']},

{name:`Jerry Seinfeld`,ctx:`Seinfeld`,type:'ENTP',cat:'Fiction',
desc:`Jerry Seinfeld the character is ENTP: observational, detached, amused by the absurdity of everything, and incapable of sustaining romantic commitment because no woman survives contact with his pattern-recognition at full power. He finds the flaw in everything - in people, in social rituals, in the mundane mechanics of daily life - and articulates it with surgical precision. His friendship with George, Elaine, and Kramer persists not from loyalty but from the fact that they are the most reliably interesting people in his orbit. Seinfeld the show is ENTP comedy: the joke is always the system, never the person.`,
kw:['Jerry Seinfeld MBTI','Seinfeld personality type','ENTP TV character','Jerry Seinfeld personality']},

{name:`Niko Bellic`,ctx:`Grand Theft Auto IV`,type:'ISTP',cat:'Fiction',
