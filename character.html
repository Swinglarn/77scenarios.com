{name:`Joseph Stalin`,ctx:`Soviet leader`,type:'INTJ',cat:'Historical',
desc:`Joseph Stalin is INTJ at its most destructive. He was a systematic thinker who applied a comprehensive framework — Marxist-Leninist ideology — with total conviction and total flexibility, changing tactics whenever necessary while never revising the fundamental thesis. His purges, his collectivisation, his management of the Second World War: all expressions of a mind that modelled human beings as variables in a calculation and made the calculation correctly in its own terms. His paranoia was not irrational — he understood that the people closest to power are the people most likely to use it — which made it both strategically sound and catastrophic for everyone around him.`,

{name:`Mao Zedong`,ctx:`Chinese communist revolutionary and leader`,type:'INTJ',cat:'Historical',
desc:`Mao Zedong is INTJ. He built a comprehensive ideological framework, pursued it through decades of revolution with relentless consistency, and remade China in its image. The catastrophic policy failures — the Great Leap Forward, which killed tens of millions, the Cultural Revolution — are the INTJ most extreme failure mode: the framework applied without adequately accounting for the human variables it was grinding through, because the Ni conviction that the system is correct can override the Te feedback that the system is killing people. He built a nation and destroyed it simultaneously.`,

{name:`Che Guevara`,ctx:`Marxist revolutionary`,type:'INFJ',cat:'Historical',
desc:`Che Guevara is INFJ. His revolutionary commitment was total and personal — he gave up a medical career, a comfortable life, his family, eventually his life, for a vision of liberation that he pursued with the INFJ's characteristic consistency: once the Ni synthesis is complete, the course does not change regardless of what it costs. His Motorcycle Diaries is the INFJ before the vision crystallised: a young man encountering the suffering that would become the organising principle of everything that followed. His death in Bolivia was not miscalculation but the INFJ who had already modelled the cost and decided it was acceptable.`,

{name:`Fidel Castro`,ctx:`Cuban revolutionary leader`,type:'ENTJ',cat:'Historical',
desc:`Fidel Castro is ENTJ. He held power in Cuba for fifty years through a combination of commanding personal authority, strategic intelligence, and the ENTJ's most characteristic quality: a comprehensive framework for how society should be organised, applied with total conviction regardless of the human cost. His four-hour speeches were not vanity but function — he genuinely believed the argument mattered and that delivering it thoroughly was a form of respect. His longevity against American opposition is the ENTJ long game executed across half a century: outlast the opposition, adapt the tactics, never revise the fundamental thesis.`,

{name:`Eleanor Roosevelt`,ctx:`American diplomat and activist`,type:'ENFJ',cat:'Historical',
desc:`Eleanor Roosevelt is ENFJ. She built her public role from a private self that had been systematically diminished — by her mother-in-law, by Franklin's infidelity, by the social constraints of her class — and turned the pain of that construction into a political vision that outlasted everyone who tried to contain her. Her work with the UN Declaration of Human Rights is the ENFJ at full expression: a comprehensive vision of what human dignity requires, assembled from genuine care for specific people, transmitted into a document that still matters. Her famous line — 'No one can make you feel inferior without your consent' — is the ENFJ who found the escape from the cage and is offering the key.`,

{name:`Princess Diana`,ctx:`Princess of Wales`,type:'ENFP',cat:'Historical',
desc:`Princess Diana is ENFP. Her warmth was genuine and her instinct for human connection cut through every protocol the Royal Family had built to prevent exactly that kind of contact. Her visits to AIDS hospices, her landmine campaigns, her embrace of children in hospitals: the ENFP who could not encounter a specific person in pain without responding to the specific person, regardless of what the occasion demanded. Her interview with Martin Bashir was the ENFP making the interior public in the only way the ENFP knows how: completely, without the managed distance that the institution required and that she was constitutionally incapable of providing.`,

{name:`Queen Elizabeth II`,ctx:`British monarch 1952-2022`,type:'ISTJ',cat:'Historical',
desc:`Queen Elizabeth II is ISTJ. She defined her role as duty and applied it with a consistency so total and so undeviating that it became the constitutional principle itself: the monarch is continuous service, personal preferences irrelevant, private grief managed so the public function can proceed. She assumed the throne at twenty-five and maintained that standard for seventy years, through fifteen prime ministers, the collapse of the Empire, and the complete transformation of the country she was sworn to serve. Her famous restraint was not coldness but discipline: the ISTJ who has decided what the role requires and does not allow anything to interfere with the requirement.`,

{name:`John Adams`,ctx:`2nd US President, founding father`,type:'INTJ',cat:'Historical',
desc:`John Adams is INTJ. He was the most intellectually rigorous of the founding fathers, the most difficult to like, and the most consistently right about the things that mattered most: the importance of an independent judiciary, the rule of law over popular sentiment, the danger of faction. His Defence of the Constitutions is a systematic comparative analysis of republican governments that no one else could have written because no one else had read as widely or thought as precisely. His presidency was a single term partly because the INTJ's relationship to political popularity is indifferent — he did what the analysis required and found the approval question less interesting than the correctness question.`,
kw:['John Adams MBTI','Adams personality type','INTJ founding father']},

{name:`Theodore Roosevelt`,ctx:`26th US President`,type:'ESTP',cat:'Historical',
desc:`Theodore Roosevelt is ESTP. He was physically bold, instinctively decisive, and operated on a theory of engagement that the world rewarded with one of the most eventful presidencies in American history. He charged up San Juan Hill, hunted in Africa, explored the Amazon, and wrote thirty-five books — all the ESTP who treats the world as a series of situations to be entered at full force and departed with something learned. His conservation policy was Se reading the landscape and Ti concluding that the resource was finite and the extraction was not. He did not wait for consensus. He acted on the assessment.`,

{name:`Winston Churchill`,ctx:`British Prime Minister, World War II`,type:'ENTJ',cat:'Historical',
desc:`Churchill is ENTJ. His wartime leadership was the Te-dominant's most complete expression: commanding certainty deployed at the moment when certainty was the most needed resource a nation could have, sustained across five years of genuine danger through will alone. His "We shall fight on the beaches" speech is not oratory but instruction — a Te leader telling the people what they are going to do, in a tone that forecloses the alternative. He was also a prolific writer, a painter, a bricklayer, a cavalryman, a prisoner of war who escaped, and a chancellor of the exchequer — the ENTJ who requires constant stimulus and multiple domains, because one mission is never quite enough. His peacetime governance was less successful: without a crisis large enough to require the full capability, the dominance became suffocating.`,
kw:['Winston Churchill MBTI','Churchill personality type','ENTJ wartime leader']},

{name:`Martin Luther`,ctx:`Protestant reformer, theologian`,type:'INFJ',cat:'Historical',
desc:`Martin Luther is INFJ. He nailed ninety-five theses to a church door because the Ni synthesis had already completed: the Church's practice of indulgences was not an administrative error but a structural corruption, and naming it clearly was the only honest response. His translation of the Bible into German is the INFJ's deepest contribution: making the text directly accessible to the people it claimed to serve, bypassing the interpretive monopoly that was the institutional power. His stubbornness at Worms — 'Here I stand, I can do no other' — is the INFJ who has seen something true and cannot unsee it regardless of what compliance would cost.`,
kw:['Martin Luther MBTI','Martin Luther personality type','INFJ reformer']},

{name:`Isaac Newton`,ctx:`Physicist and mathematician`,type:'INTJ',cat:'Historical',
desc:`Isaac Newton is INTJ. He built the mathematical framework that described the physical world with a comprehensiveness that physics operated inside for two hundred years — calculus, universal gravitation, the laws of motion — and he did it largely alone, in a farmhouse during a plague year, because the university had closed and he had time to think without interruption. His famous statement that he stood on the shoulders of giants is the INTJ's most honest self-assessment: he had read everything, synthesised it, and built the next level. He was also profoundly difficult, engaged in bitter priority disputes with Leibniz and Hooke, and spent decades pursuing alchemy and biblical chronology with the same systematic intensity.`,

{name:`Immanuel Kant`,ctx:`German philosopher`,type:'INTJ',cat:'Historical',
desc:`Immanuel Kant is INTJ. He built a comprehensive philosophical system from first principles — the Critique of Pure Reason, the Critique of Practical Reason, the Critique of Judgment — that restructured Western philosophy so completely that subsequent philosophy has largely consisted of responding to it. His categorical imperative is the INTJ's ethical expression: a rule derivable from pure reason, universally applicable, requiring no appeal to consequence or feeling. He lived in Konigsberg his entire life, walked the same route every afternoon at the same time, and produced some of the most demanding intellectual work in the history of thought. He found the regularity enabling, not limiting.`,
kw:['Immanuel Kant MBTI','Kant personality type','INTJ German philosopher']},

{name:`Karl Marx`,ctx:`German philosopher and economist`,type:'INTJ',cat:'Historical',
desc:`Karl Marx is INTJ. He built a comprehensive theory of history, economics, and human social organisation from first principles — the materialist conception of history, the labour theory of value, the analysis of capital — that was internally consistent, systematically developed, and wrong in specific ways that took decades to identify. His collaboration with Engels was the INTJ finding the person who could translate the framework into political action. Das Kapital is an INTJ document: exhaustive, rigorously argued, deeply convinced of its own correctness, and produced in conditions of poverty that would have defeated a less internally-driven person. His influence on the subsequent century was larger than any other nineteenth-century thinker.`,
kw:['Karl Marx MBTI','Marx personality type','INTJ philosopher economist']},

{name:`Jacinda Ardern`,ctx:`Prime Minister of New Zealand 2017-2023`,type:'ENFJ',cat:'Politics',
desc:`Jacinda Ardern is ENFJ. Her response to the Christchurch mosque attacks in 2019 — wearing a hijab to meet survivors, refusing to name the shooter, declaring 'They are us' — became a global model for grief leadership because it was entirely coherent: the ENFJ whose Fe dominant knew exactly what the moment required and delivered it without hesitation. Her willingness to hold her infant daughter at the UN General Assembly, her openness about the personal cost of leadership, her eventual resignation citing the need for a full tank: all the ENFJ who could not sustain the output the role demanded and was honest about why.`,

{name:`Justin Trudeau`,ctx:`Prime Minister of Canada`,type:'ENFP',cat:'Politics',

{name:`Emmanuel Macron`,ctx:`President of France`,type:'ENTJ',cat:'Politics',
desc:`Emmanuel Macron is ENTJ. He built a political movement from scratch in under a year, won the French presidency at thirty-nine, and has governed through a comprehensive framework for European integration and French modernisation that he has pursued regardless of whether the electorate is moving with him or against him. His capacity to absorb enormous political damage — the gilets jaunes movement, the pension reform crisis — without revising the fundamental thesis is the ENTJ's most characteristic quality: I have run the analysis, I am correct, the opposition is wrong about the cost. His difficulty with opposition is the ENTJ blind spot: people who disagree are not just wrong but have failed to understand the framework properly.`,

{name:`Xi Jinping`,ctx:`President of China`,type:'ISTJ',cat:'Politics',
desc:`Xi Jinping is ISTJ. He consolidated power through methodical institutional capture rather than dramatic confrontation — the anti-corruption campaign, the removal of term limits, the subordination of the party factions — because the ISTJ's tool is the existing structure, patiently redirected. His ideological framework, Xi Jinping Thought, is presented as a comprehensive system rather than a set of preferences, which is the ISTJ's relationship to their own values: not opinions but the correct understanding of how things are. His management of Hong Kong, Taiwan policy, the Belt and Road Initiative: all expressions of a long-held framework being systematically implemented.`,

{name:`Steve Bannon`,ctx:`Political strategist`,type:'ENTP',cat:'Politics',
desc:`Steve Bannon is ENTP using his considerable pattern recognition for political disruption. He identifies the contradictions inside a system — the gap between elite consensus and popular sentiment, the fracture lines in party coalitions — and finds the arguments that exploit those contradictions fastest. His lack of institutional loyalty is the ENTP's native relationship to organisations: the argument matters more than the structure that houses it, and when the structure stops serving the argument he moves on. His influence on the 2016 election was real and his subsequent legal difficulties are consistent: the ENTP who will run the argument to its conclusion regardless of which rules it violates.`,
kw:['Steve Bannon MBTI','Bannon personality type','ENTP political strategist']},

{name:`Sheryl Sandberg`,ctx:`Facebook COO, author of Lean In`,type:'ENTJ',cat:'Business',
desc:`Sheryl Sandberg is ENTJ. She built her career through strategic excellence and a belief in comprehensive frameworks for leadership — Lean In is an ENTJ document: here is the system, here is how to operate inside it most effectively, here is what women are doing wrong and how to correct it. Her time at Facebook as COO was the ENTJ's most valuable role: translating Zuckerberg's product vision into a business that actually generated revenue. Her handling of her husband's death and subsequent public writing about grief showed the ENTJ integrating an experience the framework had not planned for, with characteristic thoroughness.`,
kw:['Sheryl Sandberg MBTI','Sandberg personality type','ENTJ business leader']},

{name:`Larry Page`,ctx:`Co-founder of Google`,type:'INTP',cat:'Business',
desc:`Larry Page is INTP. His founding of Google was the Ti-Ne combination at its most productive: what if the entire web were treated as a citation network and ranked by link authority? The insight was not intuitive but systematic — he had a framework for how academic citation worked and applied it to a new domain. His subsequent projects at Alphabet — self-driving cars, life extension, Project Loon — follow the same pattern: identify a domain where the existing framework is inadequate, build a better one, test at scale. His famous difficulty with small talk and preference for working in his own domain is the INTP who has never pretended that the social performance was interesting.`,
kw:['Larry Page MBTI','Larry Page personality type','INTP Google founder']},

{name:`Jack Ma`,ctx:`Co-founder of Alibaba`,type:'ENFP',cat:'Business',
desc:`Jack Ma is ENFP. He built Alibaba on the strength of his vision and his communication rather than technical expertise — he has said he understands little about technology and hired people who did, which is the ENFP's most reliable management strategy: hold the vision, find the people who can execute it. His story — rejected from Harvard thirty times, rejected from KFC, teaching English before founding one of the world's largest companies — is the ENFP who treats every rejection as information rather than conclusion. His retirement speeches, his public persona, his subsequent political difficulties in China: the ENFP who was too publicly himself in a system that preferred discretion.`,
kw:['Jack Ma MBTI','Jack Ma personality type','ENFP Chinese entrepreneur']},

{name:`Richard Branson`,ctx:`Founder of Virgin Group`,type:'ENFP',cat:'Business',
desc:`Richard Branson is ENFP. He has started hundreds of businesses across industries — music, airlines, trains, space tourism, health — the way ENFPs start conversations: because the idea is interesting and the next domain is always more compelling than the current one. His personal brand is the business: the ballooning, the kite-surfing, the island, the consistent projection of someone who is genuinely enjoying himself. His many business failures are absorbed with the ENFP's characteristic resilience: they are data, not conclusions. His Virgin Galactic project is the ENFP's most complete expression — the next frontier, literally.`,
kw:['Richard Branson MBTI','Branson personality type','ENFP entrepreneur']},

{name:`Marie Curie`,ctx:`Physicist and chemist, Nobel laureate`,type:'INTJ',cat:'Science',
desc:`Marie Curie is INTJ. She was the first woman to win a Nobel Prize, and then won a second one in a different field, because the INTJ's internal standard does not reduce its ambitions in response to external resistance — it becomes more precise. She worked in a shed with no adequate ventilation, poisoning herself with radioactive materials across decades, because the research required it and she had already modelled the necessity. Her refusal to patent the isolation of radium was a Te-Te decision, not generosity: the knowledge belongs to science, not to the person who found it. Her personal life — the affair with Paul Langevin, the press campaigns against her — was managed as the INTJ manages everything that threatens the work: with minimum engagement and maximum focus on what actually matters.`,
kw:['Marie Curie MBTI','Curie personality type','INTJ female scientist']},

{name:`Neil Armstrong`,ctx:`Astronaut, first person on the moon`,type:'ISTJ',cat:'Science',
desc:`Neil Armstrong is ISTJ. He was chosen for Apollo 11 partly because of his psychological steadiness — the ISTJ capacity to execute correctly under conditions that would destabilise most people and then return home without seeking further recognition. His famous fluffed line on the moon — 'one small step for man' rather than 'a man' — is the only deviation in a career of perfect execution. His subsequent decades of deliberate privacy, his refusal of most interviews and commercial opportunities, his teaching career: the ISTJ who completed the task and found no need to keep performing it.`,
kw:['Neil Armstrong MBTI','Armstrong personality type','ISTJ astronaut']},

{name:`Elon Musk`,ctx:`CEO of Tesla, SpaceX, X`,type:'INTJ',cat:'Science',
desc:`Elon Musk is INTJ. His operating framework is a set of first-principles convictions — humanity must become multi-planetary, sustainable energy is existentially necessary, the speed of AI development requires immediate attention — pursued with the INTJ's characteristic indifference to whether the timeline is credible to others. SpaceX was told reusable rockets were impossible; Tesla was told electric cars were a hobbyist product; his social presentation at interviews and on X is the INTJ operating in the social domain without a convincing translation layer. His acquisition of Twitter and transformation into X is the INTJ applying a comprehensive framework to a system he had decided was broken, with no particular interest in the users' experience of the process. His mistakes follow the pattern: he is certain, he acts, the certainty occasionally outpaces the evidence.`,
kw:['Elon Musk MBTI','Musk personality type','INTJ visionary entrepreneur']},

{name:`Michio Kaku`,ctx:`Theoretical physicist and futurist`,type:'ENFP',cat:'Science',
desc:`Michio Kaku is ENFP. His gift is making the scale of the universe feel personally relevant rather than abstractly overwhelming — the ENFP bridging from the cosmic to the specific human reaction, finding the angle that produces wonder rather than alienation. His books, his television appearances, his lectures: all the same quality, the same enthusiasm that does not diminish with repetition because it is genuine rather than performed. He moves between physics, speculation, and philosophy with ENFP ease, and his work functions as an invitation: this is what is possible, this is how beautiful it is, come and see.`,
kw:['Michio Kaku MBTI','Kaku personality type','ENFP physicist author']},

{name:`Jane Goodall`,ctx:`Primatologist and anthropologist`,type:'INFP',cat:'Science',
desc:`Jane Goodall is INFP. She spent years living among chimpanzees at Gombe because she was genuinely interested in them as individuals — she gave them names, which was then considered scientifically inappropriate, because the INFP who pays complete attention to a particular being cannot help but see the particular being rather than the specimen. Her methodology was her worldview: the interior life of the other creature is as real as your own, and the only way to understand it is to be present without the distance that conventional science required. Her subsequent advocacy for conservation and environmental education is the same INFP compass, pointing consistently toward the specific living things in the specific world.`,
kw:['Jane Goodall MBTI','Goodall personality type','INFP primatologist']},

{name:`Simone Biles`,ctx:`Olympic gymnast`,type:'ISFP',cat:'Sport',
desc:`Simone Biles is ISFP. Her gymnastics is direct physical artistry — she performs skills that were, before her, considered biomechanically impossible for a human body, and she does it with a fluency that suggests feeling rather than calculation. Her decision to withdraw at the 2020 Tokyo Olympics rather than compete with the twisties was a pure ISFP act: the internal reality — her body, her safety, the disconnect between mind and movement — was non-negotiable, and no external expectation could override it. She was criticised. She was right. Her return at the 2024 Paris Olympics, older and more complete, showed the ISFP who has integrated the lesson: the interior standard was always the correct one.`,
kw:['Simone Biles MBTI','Biles personality type','ISFP Olympic gymnast']},

{name:`Conor McGregor`,ctx:`MMA fighter`,type:'ESTP',cat:'Sport',
desc:`Conor McGregor is ESTP. His trash talk is tactical, his physical confidence is total, and he enters every fight — and every press conference — as a performance he has already determined the outcome of. His ability to read an opponent's emotional state and exploit it verbally before the fight begins is Se-Ti at work: the situation assessed, the pressure point identified, the action taken before the opponent has recovered. His rise from welfare payments in Dublin to world champion in under four years is the ESTP who identified the game, learned its mechanics at speed, and performed at the moment of maximum consequence. His subsequent decline followed the same pattern: the game changed and the adaptation was slower than the original ascent.`,
kw:['Conor McGregor MBTI','McGregor personality type','ESTP MMA fighter']},

{name:`Novak Djokovic`,ctx:`Professional tennis player`,type:'INTJ',cat:'Sport',
desc:`Novak Djokovic is INTJ. He optimised every variable — diet, fitness, mental preparation, equipment — with the systematic thoroughness of someone who had decided that the ceiling was higher than his contemporaries believed and that he would find it. His career-long rivalry with Federer and Nadal is the INTJ in the domain: not intimidated by legends but energised by the precision they required. His anti-vaccination stance, his deportation from Australia, his public positions on various health claims: the INTJ who has built his own framework for his own body and applied it with the same conviction he applies to everything else, regardless of the institutional consensus.`,
kw:['Djokovic MBTI','Novak Djokovic personality type','INTJ tennis player']},

{name:`Pelé`,ctx:`Brazilian footballer`,type:'ESFP',cat:'Sport',
desc:`Pelé is ESFP. He played football with joy, spontaneity, and a physical relationship to the ball that suggested the game was easy, not because it was but because he was fully inhabiting it. Three World Cups, 1,279 goals, and the smile that appeared in the middle of matches: the ESFP who found the domain where being completely present was the complete skill. His generosity with his time and his image, his warmth in interviews across sixty years of fame: the same person who played was the person who showed up afterward, which is rarer than it sounds at that level.`,
kw:['Pelé MBTI','Pele personality type','ESFP Brazilian footballer']},

{name:`Ayrton Senna`,ctx:`Formula One racing driver`,type:'INFJ',cat:'Sport',
desc:`Ayrton Senna is INFJ. He described a qualifying lap at Monaco 1988 where he was no longer consciously controlling the car — he had entered a state where he and the machine were continuous, where he was simply going faster than anyone had gone before without being able to explain how. That is the Ni dominant at full expression: a pattern-recognition so total that the conscious mind steps aside and lets the vision operate directly. His faith, his charity work in Brazil, his certainty that he was destined to achieve something larger than racing: all the same function. His refusal to move for Prost at Suzuka 1990, his willingness to take risks that killed him at Imola in 1994 — the INFJ who had modelled what was required and acted without hesitation, regardless of cost.`,
kw:['Ayrton Senna MBTI','Senna personality type','INFJ racing driver']},

{name:`Michael Phelps`,ctx:`Olympic swimmer`,type:'ISTJ',cat:'Sport',
desc:`Michael Phelps is ISTJ. His dominance across five Olympic Games was built not on natural talent alone — though the wingspan and body proportions helped — but on a training consistency that no one else in swimming was willing or able to maintain for as long. He trained every day for years, including Christmas, including his birthday, because the ISTJ's relationship to duty does not negotiate with the calendar. His coach Bob Bowman built the programme; Phelps executed it with the ISTJ's characteristic precision. His struggles after retirement — the depression, the DUI arrests, the frank public discussion of mental health — are the ISTJ whose structure has been removed: the person defined by the protocol, suddenly without one.`,
kw:['Michael Phelps MBTI','Phelps personality type','ISTJ Olympic swimmer']},

{name:`Neymar Jr.`,ctx:`Brazilian footballer`,type:'ESFP',cat:'Sport',
desc:`Neymar Jr. is ESFP. He plays with flair and expressiveness, takes risks that are instinctive rather than calculated, and has never found the distance between the person and the performer that most professional athletes maintain. His drama — the rolling, the showboating, the visible emotion — is not calculation but the ESFP unable to suppress what they feel, which in his case includes joy, frustration, and the complete inability to be neutral about anything happening on the pitch. His best football, at Barcelona alongside Messi and Suarez, was the ESFP in an environment that contained and directed the expressiveness rather than requiring him to manage it alone.`,
kw:['Neymar MBTI','Neymar personality type','ESFP Brazilian footballer']},

{name:`Rafael Nadal`,ctx:`Professional tennis player`,type:'ISFJ',cat:'Sport',
desc:`Rafael Nadal is ISFJ. His game is built on relentless consistency and a physical and mental commitment to the court surface — especially clay — that functions as a kind of devotion. His ritual preparation before each point, his relationship with his team and family, his post-match interviews conducted with the same humility whether he has won or lost a final: all the ISFJ who found the domain and serves it completely. His twenty-two Grand Slams are the product not of the most talented player but of the most consistently excellent one — the ISFJ's gift applied to a domain that rewards exactly that quality.`,
kw:['Rafael Nadal MBTI','Nadal personality type','ISFJ tennis player']},

{name:`Wayne Gretzky`,ctx:`Professional ice hockey player`,type:'INFP',cat:'Sport',
desc:`Wayne Gretzky is INFP. His genius was not physical — he was undersized by NHL standards, not the fastest skater, not the hardest shooter — but perceptual: he saw the ice differently from everyone else on it. His famous observation that he skated to where the puck was going rather than where it was is the INFP's interior processing applied to spatial dynamics, the implicit model of the whole situation running ahead of the explicit situation. His soft-spoken public persona, his generosity toward younger players, his discomfort with the business dimensions of the sport: the INFP who found the one domain where the interior perception was exactly the required skill.`,
kw:['Wayne Gretzky MBTI','Gretzky personality type','INFP hockey player']},

{name:`Steph Curry`,ctx:`NBA basketball player`,type:'ISFP',cat:'Sport',
desc:`Steph Curry is ISFP. His game is defined by an aesthetic sensibility — the pull-up three from thirty feet, the behind-the-back dribble, the precise arc of a shot that should not go in and does — that expresses something about how basketball can feel when the player is fully inhabiting the moment rather than executing a plan. His competitiveness is real and his joy is also real, which is rarer than it sounds at that level. His faith, his family, his specific relationships with his teammates: the ISFP who found a domain large enough to contain the interior and plays as if the game itself is a form of prayer.`,
kw:['Steph Curry MBTI','Stephen Curry personality type','ISFP basketball player']},

{name:`Ricky Gervais`,ctx:`Comedian, writer, actor`,type:'ENTP',cat:'Film',
desc:`Ricky Gervais is ENTP. The Office is an ENTP creation: a precise, uncomfortable examination of how the social contract functions in a specific institutional context, delivered through a character — David Brent — whose self-deception is so complete it becomes a mirror for the audience's own. His stand-up sets up arguments and dismantles them; his interviews do the same. His BAFTA and Golden Globe hosting is the ENTP at maximum: given a room full of powerful people and a microphone, he cannot stop himself from saying the thing everyone is thinking but that no one in his position is supposed to say. He finds this irresistible. It shows.`,
kw:['Ricky Gervais MBTI','Gervais personality type','ENTP comedian writer']},

{name:`Conan O'Brien`,ctx:`Comedian and TV host`,type:'ENTP',cat:'Film',
desc:`Conan O'Brien is ENTP. His humour is self-referential, associative, and faster than most comedians' best material delivered at half his speed. He builds jokes by taking a premise and following it through multiple lateral turns that arrive somewhere the audience did not see coming, which is Ne doing what it does: the unexpected connection that only becomes obvious in retrospect. His public persona — lanky, self-deprecating, slightly manic — is the ENTP being honest about the experience of having a mind that generates connections faster than it can evaluate them. His podcast Conan O'Brien Needs a Friend is the ENTP finally finding the format that fits: conversation without stakes, with people he finds genuinely interesting.`,
kw:[`Conan O'Brien MBTI`,'Conan personality type','ENTP talk show host']},

{name:`Dave Chappelle`,ctx:`Comedian and actor`,type:'INFP',cat:'Film',
desc:`Dave Chappelle is INFP. His comedy is built on moral seriousness about race, power, and authenticity that he holds with a consistency that has cost him considerably. His departure from Chappelle's Show — walking away from fifty million dollars because the show was being consumed for the wrong reasons — is the INFP's most complete act: the interior standard is non-negotiable, regardless of the external cost. His subsequent specials, his return to stand-up, his positions on trans issues: all the INFP who has decided what he believes and cannot perform a different position because performance in place of conviction is the thing he finds most contemptible.`,
kw:['Dave Chappelle MBTI','Chappelle personality type','INFP comedian']},

{name:`Chris Rock`,ctx:`Comedian and actor`,type:'INTP',cat:'Film',
desc:`Chris Rock is INTP. His stand-up is built around precise internal frameworks about race, relationships, and class in America — he sets up the logical structure and then finds the observation that reveals the contradiction inside it. His famous 'Black people versus niggas' routine is INTP comedy: take a category that is treated as monolithic, identify the internal variation, and follow the logic. His quietness, his bookishness, his reputation as the hardest-working man in stand-up: the INTP who does not perform the work but does the work, and whose output reflects the accumulation rather than the performance.`,
kw:['Chris Rock MBTI','Chris Rock personality type','INTP comedian']},

{name:`Eddie Murphy`,ctx:`Comedian and actor`,type:'ESTP',cat:'Film',
desc:`Eddie Murphy is ESTP. His early stand-up — Delirious, Raw — is pure physical charisma and improvised energy delivered at a speed and volume that leaves the audience catching up. He reads a crowd faster than most comedians read a single person, and adapts the performance in real time. His film career — Beverly Hills Cop, Trading Places, Coming to America — shows the ESTP's natural screen presence: he does not perform the character, he inhabits the situation, and the situation becomes a vehicle for the physical and social intelligence that is his actual gift.`,
kw:['Eddie Murphy MBTI','Eddie Murphy personality type','ESTP comedian actor']},

{name:`Slavoj Žižek`,ctx:`Slovenian philosopher`,type:'ENTP',cat:'Science',
desc:`Slavoj Zizek is ENTP. He finds the ideological contradiction inside any apparently settled position and makes it visible through a combination of Hegelian philosophy, Lacanian psychoanalysis, and whatever film he watched last week. His method is the ENTP's native mode: take the thing everyone agrees about, identify the assumption underneath it, find the argument that the assumption cannot survive. His lectures are performances of associative thinking at speed: he begins with one idea and arrives somewhere completely different through a route that is only visible in retrospect. His politics are difficult to place, his influence is enormous, and his consistency is the consistency of the method rather than the conclusion.`,
kw:['Slavoj Žižek MBTI','Zizek personality type','ENTP philosopher']},

{name:`Peter Singer`,ctx:`Australian philosopher, ethicist`,type:'INTP',cat:'Science',
desc:`Peter Singer is INTP. He builds rigorous ethical frameworks from first principles and follows the conclusions wherever they lead, regardless of whether the conclusions are comfortable. Effective altruism, the case for animal liberation, the argument that affluent people are morally obligated to give until it hurts: all derived from frameworks he constructs with the INTP's characteristic precision and applies without the social modulation that most ethicists build in. His willingness to say things that are logically entailed by his premises but that most people find repellent is the INTP's relationship to argument: if the premise is correct and the logic is valid, the conclusion stands.`,
kw:['Peter Singer MBTI','Singer personality type','INTP ethicist philosopher']},

{name:`Yuval Noah Harari`,ctx:`Israeli historian and author`,type:'INFJ',cat:'Science',
desc:`Yuval Noah Harari is INFJ. Sapiens and Homo Deus are INFJ works: comprehensive pattern recognition applied to the entirety of human history and projected forward into futures that the pattern suggests. His gift is the synthesis — he reads across evolutionary biology, history, philosophy, and economics and produces a unified framework that makes the whole visible at once. His meditation practice, his vegetarianism, his relationship with his husband: all the INFJ who has decided that the vision requires a specific kind of interior discipline to maintain. His critics accuse him of oversimplification; his readers recognise the specific pleasure of having the pattern made visible.`,
kw:['Yuval Noah Harari MBTI','Harari personality type','INFJ historian author']},

{name:`Malcolm Gladwell`,ctx:`Canadian journalist and author`,type:'ENFP',cat:'Science',
desc:`Malcolm Gladwell is ENFP. His books work by finding the unexpected angle on a settled idea — the tipping point, the ten thousand hours, the power of thin-slicing — and making it feel like a discovery you could have made yourself if you had been paying attention differently. His New Yorker writing is the same quality applied at shorter length: the ENFP who cannot encounter an interesting person or phenomenon without finding the aspect of it that no one else has noticed. His critics argue that the research does not always support the conclusion; the counter-argument is that the conclusion always generates better questions than the one it replaced.`,
kw:['Malcolm Gladwell MBTI','Gladwell personality type','ENFP author journalist']},

{name:`Jane Eyre`,ctx:`Jane Eyre by Charlotte Brontë`,type:'INFJ',cat:'Fiction',
desc:`Jane Eyre is INFJ. She acts from a moral vision that is entirely her own — developed in the red room at Gateshead, refined at Lowood, clarified across her time at Thornfield — and she will not negotiate it regardless of the cost. Her refusal of Rochester when she learns of Bertha Mason is the INFJ's defining moment: the Ni vision of who she is and what love requires is non-negotiable even when the emotion says otherwise, even when leaving is the most painful choice she has ever made. She does not stay for religious obligation; she leaves for self-respect, which is a different thing. Her return — "Reader, I married him" — is equally INFJ: she comes back when the conditions finally match what she always knew was true.`,
kw:['Jane Eyre MBTI','Jane Eyre personality type','INFJ literary heroine']},

{name:`Heathcliff`,ctx:`Wuthering Heights by Emily Brontë`,type:'INFP',cat:'Fiction',
desc:`Heathcliff is INFP consumed by obsession. His love for Cathy became the organising principle of his entire interior life — and then his entire revenge. He returns transformed, wealthy, and systematically destroys the families whose social contempt separated them, not from ideology but from the INFP interior wound that has been calcifying for twenty years. What makes him compelling rather than simply monstrous is that the injury was real: the love was real, the exclusion was real, and the INFP who has no adequate outlet for what they feel with that intensity will find an inadequate one. Wuthering Heights is the INFP interior life, uncontained.`,
kw:['Heathcliff MBTI','Wuthering Heights personality type','INFP gothic character']},

{name:`Sherlock Holmes`,ctx:`Arthur Conan Doyle stories`,type:'INTP',cat:'Fiction',
desc:`Sherlock Holmes is INTP. The most revealing evidence is what he does not know: he is ignorant of the heliocentric solar system because it has no utility for his framework, and he deleted it. That is Ti dominant in one sentence — knowledge exists to serve the internal architecture, not for its own sake. His famous "deductions" are Ti-Ne operating at speed: he builds the most precise logical framework possible from available data, then generates the full range of hypotheses Ne can produce, then eliminates until one remains. His relationship with Watson is the INTP's lifeline to Fe: he needs someone who will translate his outputs into human terms and drag him back to the functional world when the boredom becomes dangerous. His violin playing at three in the morning, the chemical experiments, the periods of complete inertia: all of it is the INTP without a problem worthy of the framework, waiting for the game to be afoot again.`,
kw:['Sherlock Holmes MBTI','Sherlock Holmes personality type','INTP detective']},

{name:`Hercule Poirot`,ctx:`Agatha Christie novels`,type:'INTJ',cat:'Fiction',
desc:`Hercule Poirot is INTJ where Holmes is INTP. He uses his "little grey cells" to build a complete internal model of the crime before he moves — the Ni dominant synthesising every available pattern into a singular conclusion — and he does not share his working until the reveal, because the INTJ does not need external validation of the process, only of the result. His theatrical denouements — everyone in a room, the explanation delivered in sequence — are Te: here is the system, here is how it produced the outcome, here is who is responsible. His fastidiousness, his symmetry obsession, his horror at inefficiency: the INTJ's physical environment as an extension of internal order. His willingness to commit a murder himself, in Curtain, to prevent a greater evil, is the INTJ's most consistent position: the framework can justify anything if the logic is sound.`,
kw:['Poirot MBTI','Hercule Poirot personality type','INTJ detective character']},

{name:`Miss Marple`,ctx:`Agatha Christie novels`,type:'ISFJ',cat:'Fiction',
desc:`Miss Marple is ISFJ. Her detective method is comparison: the pattern of this village mirrors the pattern of the crime because human behaviour repeats, and the ISFJ who has accumulated sixty years of Si observations about how people actually behave — not how they claim to behave — can identify the pattern before the investigators with their logic and their laboratories. Her unassuming appearance is not a strategy but simply who she is: a small, elderly woman who knits, who nobody looks at twice, which means nobody manages their behaviour around her. She is underestimated constantly and uses it never — it simply allows the observations to arrive undistorted.`,
kw:['Miss Marple MBTI','Miss Marple personality type','ISFJ detective character']},

{name:`Tom Ripley`,ctx:`The Talented Mr. Ripley by Patricia Highsmith`,type:'INTJ',cat:'Fiction',
desc:`Tom Ripley is INTJ without empathy or remorse. He identifies the life he wants — Dickie Greenleaf's life, the boats and sun and ease and style — builds a comprehensive plan to acquire it, and executes with total precision. His crimes are not passionate or impulsive; they are tactical responses to threats to the plan. The forgeries, the identities, the sustained deception across multiple novels: the INTJ's framework applied to the project of becoming someone else. Highsmith understood that the most unsettling villains are not the emotional ones but the architectural ones — the person who builds a system that happens to include murder as a necessary function, and feels nothing about the necessity except satisfaction that the problem is resolved.`,
kw:['Tom Ripley MBTI','Talented Mr Ripley personality type','INTJ psychological thriller']},

{name:`Lolita narrator Humbert Humbert`,ctx:`Lolita by Nabokov`,type:'INTJ',cat:'Fiction',
desc:`Humbert Humbert is INTJ constructing an elaborate internal justification for evil. His prose — the most beautiful in Nabokov's English work — is the system he builds to make his own monstrousness invisible to himself: the aesthetic framework that converts exploitation into a love story, the literary allusions that place him in a tradition of tragic passion. The reader sees what he is doing, which is Nabokov's point. The INTJ's capacity for self-contained frameworks can operate entirely without moral content, and when it does, the comprehensiveness that makes the type impressive becomes the mechanism of rationalisation.`,
kw:['Humbert Humbert MBTI','Lolita narrator personality type','INTJ unreliable narrator']},

{name:`Ignatius J. Reilly`,ctx:`A Confederacy of Dunces`,type:'INTP',cat:'Fiction',
desc:`Ignatius J. Reilly is INTP whose internal framework has become entirely self-referential. He has a comprehensive theory of geometry, theology, and human decline derived from Boethius that he applies to every situation with complete conviction and zero feedback from reality. His journal, A Confederacy of Dunces, is the INTP shadow document: the framework running without the corrective input that would normally identify where it has departed from the world it claims to describe. He is unemployable, unhygienic, and brilliant in ways that serve no one, including himself. Toole understood that the type's greatest strength — the internal architecture — is also its greatest vulnerability when the architecture stops being tested.`,
kw:['Ignatius Reilly MBTI','Confederacy of Dunces personality type','INTP comic character']},

{name:`Atticus Finch`,ctx:`To Kill a Mockingbird by Harper Lee`,type:'INFJ',cat:'Fiction',
desc:`Atticus Finch is INFJ. He acts from a moral vision of what Maycomb could be — not what it is, not what it has always been — and pursues it through the only method available to someone who lives inside the community they are trying to change: sustained, visible, consistent example. He does not march. He does not protest. He takes the case, he makes the argument in open court with full knowledge of the outcome, and he makes sure Scout and Jem watch from the balcony. His patience with the racism around him is not acceptance but strategy: the INFJ knows that transformation requires presence, and presence requires not being expelled. Go Set a Watchman complicates the portrait, which is probably more accurate to reality anyway.`,
kw:['Atticus Finch MBTI','To Kill a Mockingbird INFJ','Atticus personality type']},

{name:`Jo March`,ctx:`Little Women by Louisa May Alcott`,type:'ENTP',cat:'Fiction',
desc:`Jo March is ENTP. She writes constantly, argues constantly, and refuses to conform to what the world expects of a young woman in nineteenth-century America — not from rebellion but from the ENTP's constitutive inability to perform positions they have not reasoned their way to. Her rejection of Laurie is an ENTP act: she knows what she actually wants and will not settle for the comfortable option that everyone else thinks is obvious. Her eventual marriage to Professor Bhaer is the ENTP finding someone who engages with her on intellectual terms rather than romantic ones, which turns out to be what she needed. Her writing career is the ENTP who found the domain large enough.`,
kw:['Jo March MBTI','Little Women personality type','ENTP literary character']},

{name:`Amy March`,ctx:`Little Women by Louisa May Alcott`,type:'ENTJ',cat:'Fiction',
desc:`Amy March is ENTJ. She is strategic, socially intelligent, and entirely clear about what she wants and how to get it — and she is consistently underestimated because her goals are social and romantic rather than artistic, which the novel frames as shallow. But Amy is the only March sister who successfully builds the life she planned: she studies art, positions herself in Europe, marries the man she wanted, and manages the family's finances when the situation requires it. The ENTJ who is dismissed as calculating because the calculation is accurate and the execution is competent. She knew what she was doing. She was right.`,
kw:['Amy March MBTI','Little Women ENTJ','Amy personality type']},

{name:`Dorian Gray`,ctx:`The Picture of Dorian Gray by Oscar Wilde`,type:'ESFP',cat:'Fiction',
desc:`Dorian Gray is ESFP who outsourced his conscience to a painting and spent the rest of his life discovering what the ESFP without consequence looks like. He lives entirely in the present moment — the party, the beauty, the next sensation — because the portrait absorbs the cost that should be accumulating in his face. Wilde understood that the ESFP's gift and its shadow are the same thing: total presence in pleasure becomes total absence of accountability, and what Dorian purchases with the portrait is not immortality but the permanent present tense, which turns out to be the worst possible prison.`,
kw:['Dorian Gray MBTI','Picture of Dorian Gray personality type','ESFP literary character']},

{name:`Robinson Crusoe`,ctx:`Robinson Crusoe by Daniel Defoe`,type:'ISTJ',cat:'Fiction',
desc:`Robinson Crusoe is ISTJ. He is cast away and immediately begins building a systematic life: a shelter, a calendar, a larder, a defence. He does not mourn the ship for long. The ISTJ's response to catastrophe is to construct the structure that catastrophe removed, and Crusoe constructs it with a thoroughness that becomes its own satisfaction. His relationship to Friday is the ISTJ's most characteristic interpersonal dynamic: he teaches, he structures, he provides, and he gradually develops something like genuine regard within a hierarchy he never questions. Defoe understood that the most compelling portrait of ISTJ resilience is not drama but method.`,
kw:['Robinson Crusoe MBTI','Crusoe personality type','ISTJ survival character']},

{name:`Sancho Panza`,ctx:`Don Quixote by Cervantes`,type:'ESFP',cat:'Fiction',
desc:`Sancho Panza is ESFP. He follows Don Quixote not from ideology but from affection — and from the ESFP's constitutive quality: he is present for the specific person in front of him, fully, regardless of whether that person is making sense. His practical commentary on the windmills, the giants, the enchanted helmet: not scepticism but the ESFP's honest report from immediate sensory reality. His loyalty accumulates slowly into genuine love, which is the ESFP's arc: what begins as presence in the moment becomes, over enough moments, the deepest commitment available. He stays because the man is more important than the delusion.`,
kw:['Sancho Panza MBTI','Don Quixote ESFP sidekick']},

// ── MORE TV & STREAMING ───────────────────────────────────────────────────
{name:`Tyrion Lannister`,ctx:`Game of Thrones`,type:'ENTP',cat:'Fiction',
desc:`Tyrion Lannister is ENTP. He is the cleverest person in Westeros and cannot stop demonstrating it even when silence would save his life — his impromptu trial speech at the Eyrie, his confession at King's Landing, his demand for trial by combat both times are Ne-Ti refusing to accept the premise of the situation and generating a lateral exit nobody else saw. His wit is not a defence mechanism; it is his actual mode of engagement with the world. His politics — Hand of the King, defender of the Blackwater, survivor of the Lannister family — are ENTP politics: he is genuinely good at power, genuinely idealistic about what power should do, and genuinely unable to hold the two together for long. His best scene is every scene with Cersei: ENTP vs ENTJ, where he always finds the better argument and she always has more actual power.`,
kw:['Tyrion MBTI','Game of Thrones ENTP','Tyrion Lannister MBTI']},

{name:`Nate Shelley`,ctx:`Ted Lasso`,type:'ISFJ',cat:'Fiction',
desc:`Nate Shelley begins the show as ISFJ: quiet, dedicated, loyal to the point of self-erasure, finding his worth entirely in service to the team. His arc — from equipment manager to first-team coach to antagonist — is the ISFJ's shadow activated by sudden recognition: once he saw that his competence was real, the years of invisibility became a wound rather than a condition. His betrayal of Ted is not malice but the ISFJ who finally asked what they were owed and answered incorrectly. His redemption — the return, the apology — is the ISFJ recorrecting: the values were always there, they were just briefly captured by the injury.`,
kw:['Nate Shelley MBTI','Ted Lasso character types','ISFJ villain arc']},

{name:`Rebecca Welton`,ctx:`Ted Lasso`,type:'INTJ',cat:'Fiction',
desc:`Rebecca Welton is INTJ. She buys AFC Richmond to destroy it as revenge on her ex-husband, which is a very INTJ plan: precise, patient, comprehensive. Her arc is the INTJ discovering that the framework she built around the revenge was a structure to avoid feeling the grief underneath it, and that Ted Lasso — the most unlikely possible person — is the one who dismantles it. Her subsequent commitment to the club is the INTJ redirecting the same systematic care toward something worth caring about. She does not become warm and open; she becomes warm in the specific way the INTJ can, which is deliberate, chosen, and total.`,
kw:['Rebecca Welton MBTI','Ted Lasso INTJ','Rebecca personality type']},

{name:`Omar Little`,ctx:`The Wire`,type:'ISTP',cat:'Fiction',
desc:`Omar Little is ISTP. He robs drug dealers, lives by a strict personal code — he does not harm civilians, does not use profanity, does not break his word — and is the most dangerous person in the room in any room he enters. The code is not performative; it is the Ti dominant's internal architecture made operational: these are the principles, they do not bend, the consequences of breaking them are not negotiable. His shotgun, his duster, his whistle in the morning: all deliberate, all precise. The police use him, the Barksdale organisation fears him, and nobody manages him. His death — shot in a convenience store by a child — is The Wire's most savage irony: the man who survived everything killed by the one thing his framework could not model.`,
kw:['Omar Little MBTI','The Wire personality type','ISTP TV character']},

{name:`Jimmy McNulty`,ctx:`The Wire`,type:'ENTP',cat:'Fiction',
desc:`Jimmy McNulty is ENTP who cannot stop himself from dismantling whatever system he is in, even when it is in his interest not to. He makes everything more complicated because simplicity bores him, and the investigation that should have ended three seasons ago keeps going because he cannot let go of the argument he is making — about the BPD, about Carcetti, about the way the city actually works — even when the argument is costing him everything. His downfall is always the same: he was right, and could not let it go. The Wire uses him to demonstrate that being right about the system does not protect you from the system.`,
kw:['Jimmy McNulty MBTI','The Wire ENTP','McNulty personality type']},

{name:`Stringer Bell`,ctx:`The Wire`,type:'INTJ',cat:'Fiction',
desc:`Stringer Bell is INTJ. He attends economics classes at a community college while running Baltimore's drug trade, because he has concluded that the drug game operates on the same principles as any other market and he intends to master those principles. His board meetings, his application of price theory to territory disputes, his attempt to move out of the drug business into legitimate real estate — all Ni-Te: here is how the system actually works, here is how to operate inside it most effectively. His tragedy is the INTJ's most precise failure: he was right about the economics and wrong about the people. Clay Davis takes his money. Avon sells him out. He had modelled the market and failed to model the humans inside it.`,
kw:['Stringer Bell MBTI','The Wire INTJ','Stringer Bell personality type']},

{name:`Marlo Stanfield`,ctx:`The Wire`,type:'INTJ',cat:'Fiction',
desc:`Marlo Stanfield is INTJ. He is strategic, patient, and entirely uninterested in what anyone thinks of him — which in the drug trade, where reputation is currency, is itself a strategic choice. His famous exchange — 'You want it to be one way. But it's the other way' — is the INTJ's relationship to reality: the framework is correct, your preference is not data. He does not need to be feared in the conventional sense; he needs to be obeyed, which requires a different kind of terror, colder and more systematic. His tragedy is that his intelligence had no adequate object: the corner was too small for what he was.`,
kw:['Marlo Stanfield MBTI','The Wire INTJ villain']},

{name:`Harvey Specter`,ctx:`Suits`,type:'ENTJ',cat:'Fiction',
desc:`Harvey Specter is ENTJ. He wins cases not only because he is smart but because he has a comprehensive system for reading people — their fears, their leverage points, their exits — and he enters every negotiation having already run the outcome. His famous "I don't have dreams, I have goals" is the ENTJ's operating thesis. His emotional armour is the ENTJ's most familiar pattern: a private interior life treated as a liability in professional contexts, accessible only to the specific few he has chosen to trust. His dynamic with Mike is Te meeting Ne across an unequal power structure — Harvey provides the frame, Mike finds the angles, and neither is fully complete without the other. His therapy sessions with Dr. Agard are the ENTJ forced to account for the fact that the system he built around himself is also a cage.`,
kw:['Harvey Specter MBTI','Suits personality type','ENTJ lawyer character']},

{name:`Mike Ross`,ctx:`Suits`,type:'ENTP',cat:'Fiction',
desc:`Mike Ross is ENTP. His photographic memory is the ENTP's pattern retention operating at an extraordinary level: he absorbs everything and can access it laterally, finding the connection between a 1987 precedent and a current contract clause before anyone has found the clause. His greatest flaw and greatest asset are the same — he finds the argument faster than he finds the wisdom to know when the argument should stop. His relationship with Harvey is the ENTP and the ENTJ in their most productive configuration: Harvey provides the strategic frame, Mike finds the angles, and neither is fully complete without the other.`,
kw:['Mike Ross MBTI','Suits ENTP','Mike Ross personality type']},

{name:`Dr. House`,ctx:`House M.D.`,type:'ENTP',cat:'Fiction',
desc:`Gregory House is ENTP who has abandoned social pretence so completely that the pretence is no longer available even when it would be useful. He solves medical cases because the problem is interesting — not the patient, the puzzle — and the medicine is simply the arena in which the most interesting puzzles arrive. His misanthropy is intellectual: people disappoint him by being predictable, which they almost always are. Wilson is the Fe auxiliary in human form: the one person who translates his outputs into human terms and drags him back from the boredom that is more dangerous than anything else. His self-destruction is the ENTP pattern: he is more interested in understanding his own pain than in stopping it.`,
kw:['House MD MBTI','Gregory House type','ENTP doctor TV']},

{name:`Meredith Grey`,ctx:`Grey's Anatomy`,type:'INFP',cat:'Fiction',
desc:`Meredith Grey is INFP. She narrates her own life as a series of interior experiences that she is always a half-step behind understanding, which is the INFP's characteristic relationship to their own depth — the feeling is fully present before the comprehension arrives. Her medicine is personal in a way that professional distance cannot reach: every patient is a mirror of something she is working through, every crisis a context in which the question of how to live gets tested against actual flesh. Her relationship with Cristina is the INFP's necessary counterpart: someone who asks nothing from the interior life except that it show up reliably, which is exactly what the INFP needs most.`,
kw:[`Meredith Grey MBTI`,`Grey's Anatomy personality type`,'INFP medical character']},

{name:`Cristina Yang`,ctx:`Grey's Anatomy`,type:'INTJ',cat:'Fiction',
desc:`Cristina Yang is INTJ. She is the best surgeon in the programme, knows it, and has no interest in the performance of humility that the medical hierarchy expects. Her friendship with Meredith is the INTJ's rarest and most necessary relationship: one person who requires nothing from her in exchange for understanding — no warmth performance, no emotional availability protocol, just the actual Cristina at full capacity. Her growth arc is not about becoming more feeling but about learning to be an INTJ inside relationships that require more than the INTJ's default output. Her exit — to Geneva, to run her own cardiothoracic research unit — is the INTJ arriving at the only destination that was ever plausible: the domain is hers, the standards are hers, the work goes on.`,
kw:['Cristina Yang MBTI','Grey\'s Anatomy INTJ','Yang personality type']},

{name:`Claire Underwood`,ctx:`House of Cards`,type:'INTJ',cat:'Fiction',
desc:`Claire Underwood is INTJ. She is more calculating than Frank, more patient, and ultimately more dangerous because she has modelled longer time horizons and is willing to sacrifice things Frank cannot. Her position beside him is not support but parallel strategy: they are pursuing the same object from different angles, and the show's final arc reveals that she had always known which one of them would outlast the other. Her coldness is not absence of feeling but the INTJ's characteristic relationship to it: registered, managed, deployed only when it serves the framework.`,
kw:['Claire Underwood MBTI','House of Cards INTJ','Claire personality type']},

{name:`Nora Durst`,ctx:`The Leftovers`,type:'ISTJ',cat:'Fiction',
desc:`Nora Durst is ISTJ. Her entire family disappeared in the Sudden Departure and what she is left with is the ISTJ most devastating condition: the organisational framework that gave life its structure, suddenly without an object. Her grief is not performed but architectural — she keeps trying to build a new system in the ruins, and every system either reminds her of what is gone or requires her to act as if it was not. Her final scene — claiming she went through the machine and came back — is the ISTJ who found the ending the system required, even if no one can verify it. She says it with complete, quiet certainty.`,
kw:['Nora Leftovers MBTI','The Leftovers personality type','ISTJ grief character']},

{name:`Kevin Garvey`,ctx:`The Leftovers`,type:'ISFP',cat:'Fiction',
desc:`Kevin Garvey is ISFP. He acts from feeling rather than ideology, keeps trying to be a good person by instinct rather than principle, and is consistently unable to explain why he does what he does — which is the ISFP's most honest condition. His supernatural experiences across the series are the show asking what the ISFP interior life looks like when it is allowed to be literally true: the feelings that cannot be explained are as real as anything observable. His survival of multiple apparent deaths is The Leftovers saying that the person who cannot articulate their own significance is sometimes the person whose significance is most complete.`,
kw:['Kevin Garvey MBTI','The Leftovers ISFP']},

{name:`Succession Roy family - Logan`,ctx:`Succession`,type:'ENTJ',cat:'Fiction',
desc:`Logan Roy is ENTJ at its most corrosive. He built a media empire from poverty in Scotland and has spent the second half of his life refusing to let anyone else hold it — including, perhaps especially, his own children. His cruelty is not emotional; it is systematic: he has calculated that a child who is never secure will always be motivated, and he applies this calculation with the consistency of someone who genuinely cannot distinguish between building a company and building a person. His rare moments of warmth — the football game with Kendall, the late-night call with Shiv — are the ENTJ inferior Fi surfacing briefly and being withdrawn. His final season is the ENTJ who has run the model so long he can no longer imagine the model being wrong. He dies mid-decision, which is the only way he could have.`,
kw:['Logan Roy MBTI','Succession personality type','ENTJ patriarch character']},

{name:`Kendall Roy`,ctx:`Succession`,type:'ENFP',cat:'Fiction',
desc:`Kendall Roy is ENFP who has never had a stable enough foundation to develop. His enthusiasms are genuine — the rap performance, the Logan eulogy, the Waystar vision — and they arrive with total conviction and collapse when the next external force arrives. His tragedy is the ENFP whose Ne-Fi stack generates an enormous interior life that his father spent forty years systematically invalidating: every time Kendall tries to be something real, Logan reframes it as weakness or naivety. His final decision — stepping back from the CEO vote so Siobhan can win, then watching Siobhan give it to Tom — is the ENFP who finally acts from Fi rather than from the need for approval, and is destroyed by the one person he trusted to do the same.`,
kw:['Kendall Roy MBTI','Succession ENFP','Kendall personality type']},

{name:`Siobhan Roy`,ctx:`Succession`,type:'ENTJ',cat:'Fiction',
desc:`Siobhan Roy is ENTJ. She spent years in progressive political work genuinely believing she had escaped the family gravity — and then Waystar needed someone with her skills, and the pull of the power was stronger than the ideology she had built around refusing it. Her political beliefs are real; her appetite for control is also real; and she is the only one in the family who recognises both things are true without being able to resolve the contradiction. Her betrayal of Kendall in the final vote is the ENTJ who, in the moment of decision, chose the version of power immediately available over the version that required trusting someone else.`,
kw:['Siobhan Shiv Roy MBTI','Succession ENTJ','Shiv personality type']},

{name:`Roman Roy`,ctx:`Succession`,type:'ENTP',cat:'Fiction',
desc:`Roman Roy is ENTP using humour as a survival mechanism so deeply embedded he can no longer locate where the mechanism ends and the person begins. He is the sharpest reader of the room in the Roy family — sharper than Siobhan, sharper than Logan — and he uses that sharpness almost entirely defensively: the joke arrives before the feeling, the deflection before the vulnerability. His relationship with Gerri is the ENTP's most honest dynamic: someone whose approval he seeks without being able to admit it, whose authority he mocks because proximity to it is the closest he can get to belonging. His final vote — the one that destroys the deal, destroys himself, destroys everything — is the ENTP who looked at the system and chose dissolution. Not from cowardice. From the one moment of clarity the humour had been protecting him from.`,
kw:['Roman Roy MBTI','Succession ENTP','Roman personality type']},

{name:`Tom Wambsgans`,ctx:`Succession`,type:'ESFJ',cat:'Fiction',
desc:`Tom Wambsgans is ESFJ. He made a strategic marriage and then fell into something real he had not planned for, and the show is the long, uncomfortable account of a man who cannot separate what he calculated from what he actually feels. His loyalty to the Roys is partly calculation and partly genuine need to belong — the ESFJ who chose the wrong group and cannot leave because the group is now his identity. His eventual betrayal of Shiv is the ESFJ who finally puts self-preservation above the group when the group has made clear it will not protect him.`,
kw:['Tom Wambsgans MBTI','Succession ESFJ','Tom personality type']},

{name:`Cousin Greg`,ctx:`Succession`,type:'ENFP',cat:'Fiction',
desc:`Cousin Greg is ENFP without strategy. He stumbles into situations, makes decisions impulsively, and somehow accumulates influence through a combination of luck, genuine confusion, and the Ne-dominant's ability to generate unexpected angles on any situation. He does not know what he wants except more of whatever room he is in. His partnership with Tom is the ENFP finding an anchor in someone who is more strategically coherent — not because Greg has become strategic but because Tom's strategy keeps producing situations that Greg can accidentally exploit.`,
kw:['Cousin Greg MBTI','Succession Greg personality type','ENFP comedy character']},

// ── RELIGION & PHILOSOPHY ─────────────────────────────────────────────────
{name:`St. Francis of Assisi`,ctx:`Catholic friar and saint`,type:'INFP',cat:'Historical',
desc:`Francis of Assisi is INFP. He gave up wealth and family position for an interior vision of poverty, service, and direct relationship with the natural world that he pursued with total consistency for the rest of his life. His relationship with animals — preaching to birds, negotiating with a wolf — is the INFP's deep identification with other living things expressed at its most literal. His rebuilding of the church at San Damiano with his own hands, his care for lepers, his composition of the Canticle of the Sun: all the same Fi compass, pointing toward the particular living being rather than the abstract category.`,
kw:['St Francis MBTI','Francis of Assisi personality type','INFP religious figure']},

{name:`Thomas Aquinas`,ctx:`Catholic theologian and philosopher`,type:'INTP',cat:'Historical',
desc:`Thomas Aquinas is INTP. He built the most comprehensive theological and philosophical synthesis of the medieval period — the Summa Theologica — by taking every available objection to every theological position seriously, constructing the strongest possible version of each objection, and then answering it with a precision that defined Catholic doctrine for the next seven centuries. His method is INTP at its most complete: the framework is built by engaging with the best arguments against it rather than by ignoring them. His famous silence in his final months — 'all that I have written seems like straw' — is the INTP who encountered an experience the framework could not contain.`,
kw:['Thomas Aquinas MBTI','Aquinas personality type','INTP Catholic philosopher']},

{name:`Rumi`,ctx:`Persian poet and Sufi mystic`,type:'INFP',cat:'Historical',
desc:`Rumi is INFP. His poetry is the interior experience of spiritual yearning expressed with unusual directness — not philosophy about love and the divine but reports from inside those experiences, as immediate as a letter and as permanent as stone. The Masnavi and the Divan-e Shams are the INFP's interior life made entirely public: the longing, the dissolution of self, the ecstatic union that the type experiences as the most real thing available. His Sufi practice, his transformation after meeting Shams of Tabriz, his complete poetic output in the years following Shams's disappearance: all the INFP who found the one experience that the interior had been preparing for and could not stop writing about it.`,
kw:['Rumi MBTI','Rumi personality type','INFP Sufi poet']},

{name:`Marcus Aurelius`,ctx:`Roman emperor and Stoic philosopher`,type:'INTJ',cat:'Historical',
desc:`Marcus Aurelius is INTJ. His Meditations were a private notebook — never intended for publication, addressed to himself — in which he applies the same systematic rigour he brought to governing the Roman Empire to the problem of governing himself. "You have power over your mind, not outside events. Realise this, and you will find strength." That is the INTJ's relationship to the world: the external is a domain of variables; the internal framework is what you control and what you build. He ruled Rome for nineteen years while fighting constant wars, managing political rivals, and watching his children die, and he spent his nights writing instructions to himself about how to be better. The Meditations are the INTJ's most complete document: the framework held up against its own hardest tests.`,
kw:['Marcus Aurelius MBTI','Marcus Aurelius personality type','INTJ Stoic philosopher']},

{name:`Lao Tzu`,ctx:`Ancient Chinese philosopher, Taoism`,type:'INFP',cat:'Historical',
desc:`Lao Tzu is INFP. The Tao Te Ching communicates through paradox and indirection because the INFP who has seen something true knows that direct statement kills it. The text resists systematic reading because it was not written systematically: it emerged from an interior experience that language can only gesture toward. Its eighty-one short chapters are an INFP attempt to share an interior reality with a reader who has to arrive at it themselves, which is the only way it can be received. It has been in continuous use for 2,500 years because the interior it maps does not change.`,
kw:['Lao Tzu MBTI','Lao Tzu personality type','INFP Taoist philosopher']},

// ── ENTREPRENEURS & CREATIVES ──────────────────────────────────────────────
{name:`Walt Disney`,ctx:`Animator, filmmaker, entrepreneur`,type:'ENFP',cat:'Business',
desc:`Walt Disney is ENFP. He built an entertainment empire from a vision of what stories could do to an audience — how they could produce joy, wonder, and emotional catharsis simultaneously — and pursued that vision with the ENFP's characteristic combination of imagination and stubborn optimism. His failures were spectacular and his recoveries were built on the same quality: an imagination that could not be contained by commercial reversals. Snow White, Fantasia, Disneyland: each was declared impossible before it existed. His authoritarian management style was the ENFP's shadow — the vision so total that the people implementing it become instruments rather than collaborators.`,
kw:['Walt Disney MBTI','Walt Disney personality type','ENFP visionary entrepreneur']},

{name:`Coco Chanel`,ctx:`Fashion designer`,type:'INTJ',cat:'Business',
desc:`Coco Chanel is INTJ. She had a comprehensive vision of what women's clothing should be — comfortable, functional, unencumbered by the corsets and elaboration that had defined female fashion for a century — and applied it with systematic consistency across decades. The little black dress, the jersey fabric, the Chanel suit: each a deliberate argument against the prevailing assumption about what elegance required. Her personal life was complex and frequently difficult; her aesthetic vision was not. She saw the solution before the problem was fully articulated and built a brand around it.`,
kw:['Coco Chanel MBTI','Chanel personality type','INTJ fashion designer']},

{name:`Steve Wozniak`,ctx:`Co-founder of Apple, engineer`,type:'INTP',cat:'Business',
desc:`Steve Wozniak is INTP. He built the Apple I and II because the engineering problems were genuinely interesting — the challenge of designing a functional personal computer within tight constraints using available components — and he solved them with an elegance that reflected the INTP's standard: the solution should be as simple as the problem allows, and no simpler. His generosity with employees — he sold his own shares to ensure they were compensated fairly — reflects the INTP who is not motivated by wealth or status but by the problem and the people who helped solve it. He was, by most accounts, the more naturally talented engineer; Jobs was the one who understood what to do with the engineering.`,
kw:['Steve Wozniak MBTI','Wozniak personality type','INTP Apple engineer']},

{name:`Nikola Tesla`,ctx:`Inventor and electrical engineer`,type:'INTJ',cat:'Business',
desc:`Nikola Tesla is INTJ. He carried a comprehensive vision of how the world's energy could be harnessed and distributed — alternating current, the rotating magnetic field, wireless power transmission across the globe — and pursued it with an intensity that left no room for the political and financial realities that Edison understood and Tesla dismissed as beneath the work. His eidetic memory, his ability to design and test entire machines in his mind before building them, his insistence on working alone: all Ni-Te operating at the highest level, without Fe to manage the human variables. His decline — the failed Wardenclyffe Tower, the bankruptcy, the pigeons in the hotel room — is the INTJ who ran the framework correctly and still lost, because the framework assumed the world would recognise what it needed.`,
kw:['Tesla inventor MBTI','Nikola Tesla INTJ','Tesla personality type inventor']},

{name:`Howard Hughes`,ctx:`Aviator, filmmaker, entrepreneur`,type:'INTJ',cat:'Business',
desc:`Howard Hughes is INTJ taken to its tragic extreme. His vision was total — aviation, film, hotel empire — and his execution was brilliant, and his mental deterioration in his final decades was the INTJ's isolation problem given a physical form: he withdrew into a self-contained environment so completely that the external checks on the framework stopped functioning. His OCD, his germ phobia, his final years in hotel penthouses where he allowed no one in: the INTJ architecture without the corrective input that might have identified where the system was failing. He was right about almost everything that could be calculated and had no mechanism for the things that could not.`,
kw:['Howard Hughes MBTI','Hughes personality type','INTJ aviator businessman']},

{name:`P.T. Barnum`,ctx:`Showman and circus founder`,type:'ENTP',cat:'Business',
desc:`P.T. Barnum is ENTP. He understood that people want to be astonished and that the astonishment does not need to be strictly real — it needs to feel real long enough to produce the experience of wonder, which the audience actually came for. His greatest hoaxes worked because they gave people what they already wanted: a mermaid, a 161-year-old woman, a genuine curiosity. The ENTP who runs this programme is not cruel but observational: he identified the gap between what people claimed to want and what they actually wanted, and filled the gap efficiently. The subsequent era of media is arguably his most successful exhibit.`,
kw:['PT Barnum MBTI','Barnum personality type','ENTP showman entrepreneur']},
