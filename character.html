desc:`Niko Bellic is ISTP carrying a war he cannot put down. He came to Liberty City because the American Dream was the only story left that he had not yet disproved, and he disproves it methodically. He is physically lethal and emotionally minimal: he does what the situation requires, says what needs to be said, and processes almost nothing out loud. His tragedy is the ISTP's shadow - a man defined by competence in a world that rewards only the wrong kinds of competence, unable to stop doing what he is best at even when it keeps costing him everything.`,
kw:['Niko Bellic MBTI','GTA IV personality type','ISTP video game character','Niko Bellic personality']},

{name:`Big Boss`,ctx:`Metal Gear Solid`,type:'INTJ',cat:'Fiction',
desc:`Big Boss is INTJ. He began as the perfect soldier - loyal, lethal, and entirely dedicated to a mission - and became something more dangerous when he started forming his own conclusions about what the mission should be. Outer Heaven is the INTJ's endgame: a system built to his own specifications, outside the reach of the institutions he no longer trusts. His tragedy is the gap between the vision and the means required to sustain it - an INTJ who discovers that the world he wanted to build requires him to become the thing he originally fought against.`,
kw:['Big Boss MBTI','Metal Gear personality type','INTJ video game character','Big Boss personality']},

{name:`Hunter S. Thompson`,ctx:`Journalist and author`,type:'ENTP',cat:'Historical',wiki:'Hunter_S._Thompson',
desc:`Hunter S. Thompson is ENTP. He invented a genre by refusing to separate the observer from the observed, because the ENTP cannot pretend that objectivity is possible when the situation is clearly absurd. Fear and Loathing is not a drug memoir - it is a systematic argument, conducted through chaos, that the American Dream had already failed by 1971. He needed the adrenaline, needed the deadline, needed the crisis to function at full output. Without the edge, as he noted, there is no thrill - and for an ENTP who has weaponised their nervous system, the edge becomes the only place they can actually think.`,
kw:['Hunter S. Thompson MBTI','Hunter Thompson personality type','ENTP journalist writer','gonzo journalism personality']},

{name:`Charles Bukowski`,ctx:`Poet and novelist`,type:'ISTP',cat:'Historical',wiki:'Charles_Bukowski',
desc:`Charles Bukowski is ISTP. He wrote about the post office, the racetrack, the bar, and the woman leaving - not to philosophise but to report what was actually there. His prose is stripped because he did not trust decoration, and he did not trust decoration because the ISTP trusts the concrete above all else. His drinking, his gambling, his working-class anonymity were not romantic choices but the actual conditions of his life, recorded with the same precision an ISTP brings to anything worth paying attention to. He had no programme, no ideology, no career plan - only the next poem and the next bottle and the truth about the distance between them.`,
kw:['Charles Bukowski MBTI','Bukowski personality type','ISTP poet writer','Bukowski MBTI type']},

{name:`John Steinbeck`,ctx:`American novelist`,type:'INFP',cat:'Historical',wiki:'John_Steinbeck',
desc:`John Steinbeck is INFP. The Grapes of Wrath is not a political argument - it is a grief document. He cared about the Joads personally before he cared about them politically, and the novel works because the reader can feel that. The INFP does not write manifestos; they write people, and let the system be indicted by what it does to those people. East of Eden goes further: it is the INFP wrestling with free will, inherited guilt, and the question of whether a person can be more than their worst impulse. His moral seriousness was never abstract. It was always about specific human beings in specific circumstances, which is the only place the INFP knows how to look.`,
kw:['John Steinbeck MBTI','Steinbeck personality type','INFP American novelist','Grapes of Wrath author personality']},

{name:`Diogenes`,ctx:`Ancient Greek philosopher`,type:'ENTP',cat:'Historical',
desc:`Diogenes of Sinope is ENTP at its most uncompromising. He lived in a barrel, masturbated in public, and told Alexander the Great to get out of his sunlight - not from madness but from a rigorously argued philosophical position that the entire architecture of civilised life was a collective delusion. His Cynicism was not pessimism but the ENTP's native move: take the operating assumptions of the culture, apply logic without social deference, and follow the argument wherever it goes. He used shock because he understood that comfort is the enemy of thought. Every social convention he violated was an argument he was making. He is the prototype of every intellectual provocateur who has followed.`,
kw:['Diogenes MBTI','Diogenes personality type','ENTP philosopher','ancient Greek MBTI']},

{name:`Frédéric Chopin`,ctx:`Polish composer and pianist`,type:'INFP',cat:'Historical',wiki:'Frédéric_Chopin',
desc:`Frédéric Chopin is INFP. He almost never performed in large concert halls - the crowd overwhelmed him, the scale diluted something he needed to keep intimate. His music is not architecture; it is private correspondence. Each nocturne is a single mood held at full intensity for three minutes - the INFP's relationship with feeling made audible. He was exacting about how his work was interpreted, refused to compromise his harmonic language for popular taste, and spent his short life producing music that could not have been made by someone less invested in the precise texture of interior experience.`,
kw:['Frederic Chopin MBTI','Chopin personality type','INFP composer','romantic era composer personality']},

{name:`Nora Helmer`,ctx:`A Doll's House (Ibsen)`,type:'ISFJ',cat:'Fiction',
desc:`Nora Helmer begins the play as a textbook ISFJ: she has organised her entire life around the comfort and approval of her husband, accommodating his needs so completely that she has nearly erased herself in the process. She has kept a secret for years not from deception but from care - she forged a signature to save his life and has been quietly paying the debt alone ever since. What makes her one of literature's most consequential characters is the ending: the ISFJ who finally recognises that the structure she has been protecting is a structure that has been imprisoning her. She walks out. Ibsen understood that the bravest thing a certain kind of person can do is stop accommodating.`,
kw:['Nora Helmer MBTI','A Dolls House personality type','ISFJ literary character','Ibsen character personality']},

{name:`Blanche DuBois`,ctx:`A Streetcar Named Desire (Williams)`,type:'ENFJ',cat:'Fiction',
desc:`Blanche DuBois is ENFJ in total collapse. At her peak she would have been magnetic - she reads people with precision, performs warmth as naturally as breathing, and shapes every room she enters around a version of herself she needs them to believe. By the time we meet her, the gap between the performance and the reality has become unsurvivable. The plantation is gone, her husband is dead, and she is in New Orleans constructing a fiction so elaborate that it has become her only reality. Her tragedy is the ENFJ's central wound taken to its extreme: the person who needs to be seen a certain way, who loses their grip when the seeing stops.`,
kw:['Blanche DuBois MBTI','Streetcar Named Desire personality type','ENFJ literary character','Tennessee Williams character']},

{name:`Stanley Kowalski`,ctx:`A Streetcar Named Desire (Williams)`,type:'ESTP',cat:'Fiction',
desc:`Stanley Kowalski is ESTP. He is fully present in the physical world - his body, his apartment, his poker game, his wife - and has no patience for anything that operates at the level of abstraction or pretence. His destruction of Blanche is not calculated; it is the ESTP's reflex when the social reality someone is performing does not match the actual reality he can see. He cannot tolerate the fiction because he has no use for fiction. His violence is real and his clarity is real, and Tennessee Williams understood that making a character irredeemably brutal while also making him comprehensible is the harder dramatic choice.`,
kw:['Stanley Kowalski MBTI','Streetcar Named Desire personality type','ESTP literary character','Marlon Brando character MBTI']},

{name:`Ahsoka Tano`,ctx:`Star Wars: The Clone Wars`,type:'ENFJ',cat:'Fiction',
desc:`Ahsoka Tano is ENFJ. She is defined by her relationships - to Anakin, to the clones, to the Order - and her growth is defined by what she does when those relationships fail her. Her departure from the Jedi Order is the ENFJ's hardest act: choosing integrity over belonging, choosing what she knows is right over the group that gave her identity. She returns not as a Jedi but as something the category system cannot hold - a person who has integrated her own values without the structure that formed them. Her arc across Clone Wars, Rebels, and beyond is one of the most complete character developments in the Star Wars universe.`,
kw:['Ahsoka Tano MBTI','Star Wars personality type','ENFJ Jedi character','Ahsoka personality type']},

{name:`Empress Wu Zetian`,ctx:`Tang Dynasty China, 690–705 AD`,type:'ENTJ',cat:'Historical',wiki:'Wu_Zetian',
desc:`Wu Zetian is ENTJ. She is the only woman in Chinese history to rule as emperor in her own name, and she achieved it through a combination of strategic intelligence, political ruthlessness, and an ability to identify and consolidate power that her contemporaries - all of whom underestimated her - could not match. She reformed the civil examination system, expanded the empire, and kept court factions balanced against each other with a precision that most male emperors never achieved. The ENTJ does not wait for permission to lead - they assess the system, identify the path, and move. Wu Zetian moved further than anyone thought the path allowed.`,
kw:['Wu Zetian MBTI','Empress Wu personality type','ENTJ historical figure','Chinese empress MBTI']},

{name:`Rasputin`,ctx:`Imperial Russian mystic`,type:'ENFJ',cat:'Historical',wiki:'Grigori_Rasputin',
desc:`Rasputin is ENFJ without ethical constraint. His power over the Romanov family was not political in the conventional sense - it was relational. He read the Empress Alexandra with total accuracy: a woman terrified for her son, isolated in a foreign court, spiritually hungry. He gave her exactly what she needed and never stopped. The ENFJ at their most effective can make a person feel so completely understood that rational judgment stops functioning as a check. His influence on imperial Russian policy in the final years before the revolution was real and catastrophic, channelled entirely through the emotional authority he had established over one family.`,
kw:['Rasputin MBTI','Rasputin personality type','ENFJ historical figure','Russian mystic personality']},

{name:`P.G. Wodehouse`,ctx:`English comic novelist`,type:'ENFP',cat:'Historical',wiki:'P._G._Wodehouse',
desc:`P.G. Wodehouse is ENFP. He wrote ninety-seven books, none of them about anything heavy, and produced a body of work so consistently pleasurable that it is almost philosophically confusing. His world - Blandings Castle, Bertie Wooster, Jeeves, the Drones Club - is the ENFP ideal made permanent: a place where competence is comic, disaster is reversible, and warmth is the governing principle of the universe. He was not avoiding serious literature; he had a more ambitious project, which was to make people feel better. He maintained this project through two world wars, internment, and the full weight of the twentieth century, and he never broke once.`,
kw:['PG Wodehouse MBTI','Wodehouse personality type','ENFP English author','Jeeves author personality']},

{name:`Troy Barnes`,ctx:`Community`,type:'ESFP',cat:'Fiction',
desc:`Troy Barnes is ESFP. He was a high school football star who gave it up because he did not want to be that person anymore, and then spent his college years discovering what he actually was - which turned out to be genuinely kind, physically gifted in unpredictable ways, and capable of a friendship with Abed that became the emotional centre of the entire show. His warmth is not performed. He cries without embarrassment, loves without irony, and brings a full-body enthusiasm to most situations that the more self-conscious characters around him have long since learned to suppress. He is the ESFP before the type learns to protect itself.`,
kw:['Troy Barnes MBTI','Community personality type','ESFP TV character','Troy Barnes personality']},

{name:`Britta Perry`,ctx:`Community`,type:'ENFP',cat:'Fiction',
desc:`Britta Perry is ENFP who cannot stop performing sincerity long enough to actually be sincere. She has every instinct of the idealistic ENFP - she cares about the world, about justice, about doing the right thing - but she has attached these genuine instincts to a self-image so completely that she cannot separate the caring from the being-seen-to-care. The show uses her as a comic target and then, in its best moments, lets her be genuinely right about something without letting her enjoy it. Her arc is about learning that the ENFP's authentic warmth does not require an audience, which is harder than it sounds for someone who has always needed one.`,
kw:['Britta Perry MBTI','Community personality type','ENFP TV character','Britta Community personality']},

{name:`Anthony Bourdain`,ctx:`Chef, author, and TV host`,type:'ENTP',cat:'Historical',wiki:'Anthony_Bourdain',
desc:`Anthony Bourdain is ENTP. Kitchen Confidential is the ENTP's autobiography: a systematic dismantling of every romantic idea about restaurants, told from inside the system, with enough affection for the chaos to make the demolition feel like love. He spent the second half of his career travelling not as a food critic but as someone genuinely curious about what people eat and why - and the curiosity was the constant, not the eating. He could not be comfortable. He could not be satisfied. He needed the next place, the next conversation, the next angle that would make him reconsider something he thought he already understood. Parts Unknown is what happens when an ENTP gets unlimited resources and total creative freedom, and the result is the best travel television ever made.`,
kw:['Anthony Bourdain MBTI','Bourdain personality type','ENTP chef writer','Parts Unknown host personality']},
];
</script>
<script>
/* ── RENDER ── */
function getPathSlug(){
  const parts=location.pathname.split('/').filter(Boolean);
  // expects /character/slug
  if(parts[0]==='character'&&parts[1])return parts[1];
  return null;
}

function renderPage(){
  const ps=getPathSlug();
  if(!ps){renderNotFound();return;}
  const p=people.filter(Boolean).find(x=>slug(x.name)===ps);
  if(!p){renderNotFound();return;}

  // ── SEO meta ──
  const title=`${p.name} MBTI Personality Type (${p.type}) · 77 Scenarios`;
  const desc=`${p.name} is ${p.type}. ${p.desc.slice(0,150).trim()}…`;
  const url=`https://77scenarios.com/character/${ps}`;
  document.getElementById('page-title').textContent=title;
  document.getElementById('page-desc').setAttribute('content',desc);
  document.getElementById('page-kw').setAttribute('content',(p.kw||[]).join(', ')+`, ${p.type} personality type, ${p.type} MBTI, cognitive functions ${p.type}`);
  document.getElementById('og-title').setAttribute('content',title);
  document.getElementById('og-desc').setAttribute('content',desc);
  document.getElementById('og-url').setAttribute('content',url);
  document.getElementById('canonical-url').setAttribute('href',url);

  // ── Schema ──
  const schema={
    '@context':'https://schema.org',
    '@type':'Article',
    headline:`${p.name} - ${p.type} Personality Type Analysis`,
    description:desc,
    url:url,
    about:{
      '@type':'Person',
      name:p.name,
      description:p.ctx
    },
    isPartOf:{
      '@type':'WebSite',
      name:'77 Scenarios',
      url:'https://77scenarios.com'
    }
  };
  document.getElementById('page-schema').textContent=JSON.stringify(schema);

  // ── Functions ──
  const stack=fnStack[p.type]||{fns:[],labels:[]};
  const fnCardsHTML=stack.fns.map((fn,i)=>`
    <div class="fn-card${i===0?' dominant':''}">
      <div class="fn-label">${stack.labels[i]}</div>
      <div class="fn-name">${fn} <span style="font-family:'DM Sans';font-size:13px;color:var(--muted);font-weight:300;">${fnFullName[fn]||''}</span></div>
      <div class="fn-desc">${fnDesc[fn]||''}</div>
    </div>`).join('');

  // ── Related (same type, different entries) ──
  const related=people.filter(Boolean).filter(x=>x.type===p.type&&slug(x.name)!==ps).sort(()=>Math.random()-0.5).slice(0,6);
  const relatedHTML=related.map(r=>`
    <a class="related-card" href="/character/${slug(r.name)}">
      <div class="related-type">${r.type}</div>
      <div class="related-name">${r.name}</div>
      <div class="related-ctx">${r.ctx}</div>
    </a>`).join('');

  // ── Avatar ──
  const avatarHTML=p.wiki
    ?`<img class="hero-avatar" id="hero-avatar" alt="${p.name}" style="opacity:0;transition:opacity 0.3s;">`
    :`<div class="hero-avatar-placeholder"><span>${p.type.slice(0,1)}</span></div>`;

  // ── Keywords / tags ──
  const tagsHTML=(p.kw&&p.kw.length)?`<div class="tag-row">${p.kw.map(k=>`<span class="tag">${k}</span>`).join('')}</div>`:'';

  // ── Full body HTML ──
  document.getElementById('page-body').innerHTML=`
    <div class="breadcrumb r" data-d="0">
      <a href="/archive">Archive</a>
      <span>/</span>
      <span>${p.cat}</span>
      <span>/</span>
      <span>${p.name}</span>
    </div>

    <div class="hero r" data-d="1">
      ${avatarHTML}
      <div class="hero-info">
        <div class="hero-type">${p.type}</div>
        <h1 class="hero-name">${p.name}</h1>
        <div class="hero-ctx">${p.ctx}</div>
        <span class="hero-cat-badge">${p.cat}</span>
      </div>
    </div>

    <div class="verdict r" data-d="2">
      <div class="verdict-label">The Verdict</div>
      <p>${p.desc}</p>
    </div>

    <div class="section r" data-d="3">
      <div class="section-label">Who They Are</div>
      <h2>${p.name} and the ${p.type} Mind</h2>
      <p id="who-they-are-text">Loading expanded analysis…</p>
    </div>

    <div class="section r" data-d="4">
      <div class="section-label">Cognitive Function Stack</div>
      <h2>How ${p.type} Processes the World</h2>
      <p>Every ${p.type} operates through the same hierarchy of cognitive functions. Here is how that stack maps onto how ${p.name} actually thinks, decides, and acts.</p>
      <div class="fn-grid" style="margin-top:20px;">${fnCardsHTML}</div>
    </div>

    <div class="section r" data-d="5">
      <div class="section-label">The Journey</div>
      <h2 id="journey-heading">Story, Choices, and Type</h2>
      <p id="journey-text">Loading journey analysis…</p>
    </div>

    <div class="section r" data-d="6">
      <div class="section-label">Why Not Another Type?</div>
      <h2 id="mistype-heading">Common Mistyping Arguments</h2>
      <p id="mistype-text">Loading mistype analysis…</p>
    </div>

    <div class="section r" data-d="7">
      <div class="section-label">About ${p.type}</div>
      <h2>The ${p.type} Personality</h2>
      <p>${typeDesc[p.type]||''}</p>
      <div style="margin-top:16px;">
        <a class="cta-btn" href="/type?t=${p.type}" style="display:inline-block;">Full ${p.type} Breakdown &#8594;</a>
      </div>
    </div>

    ${related.length?`
    <div class="section r" data-d="8">
      <div class="section-label">Same Type</div>
      <h2>Other ${p.type} Characters &amp; Figures</h2>
      <div class="related-grid">${relatedHTML}</div>
    </div>`:''}

    ${tagsHTML?`<div class="r" data-d="9" style="margin-top:16px;">${tagsHTML}</div>`:''}

    <div class="cta-row r" data-d="10">
      <a class="cta-btn" href="/">Take the Test &#8594;</a>
      <a class="cta-btn sec" href="/archive">Back to Archive</a>
      <a class="cta-btn sec" href="/compatibility">Compatibility</a>
    </div>
  `;

  // ── Avatar lazy load ──
  if(p.wiki){
    fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(p.wiki))
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        const img=document.getElementById('hero-avatar');
        if(!img)return;
        const src=data&&data.thumbnail&&data.thumbnail.source;
        if(src){img.src=src;img.onload=function(){img.style.opacity='1';};}
        else{img.outerHTML=`<div class="hero-avatar-placeholder"><span>${p.type.slice(0,1)}</span></div>`;}
      })
      .catch(()=>{
        const img=document.getElementById('hero-avatar');
        if(img)img.outerHTML=`<div class="hero-avatar-placeholder"><span>${p.type.slice(0,1)}</span></div>`;
      });
  }

  // ── Animate in ──
  requestAnimationFrame(()=>{
    document.querySelectorAll('.r').forEach((el,i)=>{
      setTimeout(()=>el.classList.add('in'),i*60);
    });
  });

  // ── Load expanded AI content (deferred, non-blocking) ──
  loadExpandedContent(p);
}

/* ── EXPANDED CONTENT ──────────────────────────────────────────────
   Deterministic, character-aware content generation.
   Uses p.name, p.type, p.ctx, p.desc and per-type lookup tables
   to produce content that feels specific to this character and world,
   not just the generic MBTI type. Zero API calls, zero latency.
   ─────────────────────────────────────────────────────────────── */
function loadExpandedContent(p){
  const name=p.name.split('/')[0].trim();
  const type=p.type;
  const ctx=p.ctx||'their source material';
  const stack=fnStack[type]||{fns:['?','?','?','?'],labels:[]};
  const dom=stack.fns[0]||'?';
  const aux=stack.fns[1]||'?';
  const ter=stack.fns[2]||'?';
  const inf=stack.fns[3]||'?';

  /* ── Per-type: what this cognitive stack looks like in practice ── */
  const typeProfile={
    INTJ:`${name} operates from a private internal model that most people around them never fully see. The dominant function, Ni (Introverted Intuition), synthesises patterns into long-range convictions - ${name} often knows where something is heading before anyone else does, and acts on that knowledge without needing to explain it. Te (Extraverted Thinking) then channels that vision into structure, plans, and decisive action. The result is a character who appears certain, independent, and difficult to redirect - because they usually are. The vulnerability is the inferior Se (Extraverted Sensing): ${name} can be blindsided by immediate physical realities they did not model, or become dangerously detached from the present while living entirely inside their own projections.`,
    INTP:`${name}'s mind is a precision instrument. Ti (Introverted Thinking) is the dominant function - it builds internal logical frameworks that are more important to ${name} than external consensus or social approval. Ne (Extraverted Intuition) as the auxiliary generates the possibilities and angles that Ti then analyses. The result is a character who is endlessly curious, difficult to satisfy with simple answers, and genuinely uncomfortable with conclusions that cannot be fully justified. The inferior Fe (Extraverted Feeling) is the tell: in moments of stress or depth, ${name} reveals a need for connection and validation that sits in awkward tension with their usual detachment.`,
    ENTJ:`${name} leads by default - not from ego but from the Te (Extraverted Thinking) dominant that scans every situation for what needs to be organised and who needs to do it. Ni (Introverted Intuition) as the auxiliary provides the long-range vision that makes ${name}'s leadership more than just management: they are moving toward something specific, and they expect the people around them to keep up. Their weakness is the inferior Fi (Introverted Feeling): ${name} can run roughshod over what people actually value and need, not from cruelty but from a genuine inability to weight personal feeling as heavily as strategic outcome.`,
    ENTP:`${name} runs on Ne (Extraverted Intuition) - the constant generation of angles, possibilities, and arguments. Every conversation is an opportunity to explore the edges of an idea, and every system is something to be tested against its own contradictions. Ti (Introverted Thinking) provides the analytical rigour that keeps ${name}'s ideas from being merely entertaining. The result is a character who is stimulating, unpredictable, and occasionally exhausting. The inferior Si (Introverted Sensing) is the shadow: ${name} can be remarkably bad at the mundane, the routine, the past-as-reference - they prefer the next idea to the last commitment.`,
    INFJ:`${name} holds two things simultaneously that most people cannot: a long-range vision of how things should be, and a precise sensitivity to how people actually feel right now. Ni (Introverted Intuition) is the dominant function - it works beneath the surface, synthesising patterns into convictions that arrive fully formed and are difficult to dislodge. Fe (Extraverted Feeling) is the auxiliary - it ensures that the vision is always oriented toward people, not just ideas. The inferior Se (Extraverted Sensing) is where ${name} is most vulnerable: the immediate, physical, present-tense reality can ambush them in ways the pattern-recognition never saw coming.`,
    INFP:`${name}'s inner life is the primary reality. Fi (Introverted Feeling) is the dominant function - a deeply personal value system that ${name} uses to judge everything, quietly and constantly. It is not visible on the surface, which is why ${name} is often misread as passive or vague: the intensity is internal. Ne (Extraverted Intuition) as the auxiliary generates the possibilities and connections that allow ${name} to imagine things differently, to see how something could be rather than just how it is. The inferior Te (Extraverted Thinking) is the consistent weak point: execution, structure, external accountability are where ${name} loses ground.`,
    ENFJ:`${name} reads the room before they walk into it. Fe (Extraverted Feeling) is the dominant function - a social attunement so precise that ${name} often knows what people need before those people can articulate it themselves. Ni (Introverted Intuition) as the auxiliary means this attunement is strategic as well as empathic: ${name} is working toward something, and the warmth is both genuine and directional. The inferior Ti (Introverted Thinking) is the weak spot: ${name} can be remarkably inconsistent in their internal logic, rationalising decisions that are primarily emotional, and becoming defensive when those rationalisations are challenged.`,
    ENFP:`${name} is driven by Ne (Extraverted Intuition) - a perpetual enthusiasm for what could be, what might happen, what connections nobody else has made yet. Fi (Introverted Feeling) as the auxiliary anchors this in genuine personal values: ${name} is not just interested in possibilities, they care about which ones matter. The result is a character who is warm, creative, and capable of real depth - but who struggles with the gap between enthusiasm and follow-through. The inferior Si (Introverted Sensing) is the tell: ${name} tends to under-value the past, the established, the routine, and pays a recurring price for it.`,
    ISTJ:`${name} is built around Si (Introverted Sensing) - a vast internal library of accumulated experience, precedent, and established procedure. What has worked before is the most reliable guide to what will work now, and ${name} trusts that library above almost anything else. Te (Extraverted Thinking) as the auxiliary translates this into action: clear duties, clear expectations, clear accountability. The inferior Ne (Extraverted Intuition) is where ${name} is least comfortable - in the face of novelty, uncertainty, and change, they can become rigid or anxious in ways that seem disproportionate to outsiders.`,
    ISFJ:`${name} is oriented toward the people in their world with a consistency that can be invisible precisely because it never stops. Si (Introverted Sensing) as the dominant function means ${name} keeps detailed internal records of what people need, what they have been promised, what the established norms are. Fe (Extraverted Feeling) as the auxiliary directs all of this outward into care, accommodation, and the maintenance of harmony. The inferior Ne (Extraverted Intuition) is where the shadow lives: ${name} can catastrophise about future possibilities, or resist change so persistently that the accommodation becomes constraint.`,
    ESTJ:`${name} imposes structure on every situation they enter - not from a desire for control but from Te (Extraverted Thinking) dominant, which genuinely cannot function efficiently in disorder. Si (Introverted Sensing) as the auxiliary grounds the organisation in precedent: ${name} does not reinvent the wheel, they apply what has been proven to work. The result is reliable, effective, and sometimes inflexible. The inferior Fi (Introverted Feeling) is what ${name} struggles to access: personal values, individual exceptions, the weight of how someone actually feels rather than what they should do.`,
    ESFJ:`${name} holds the social fabric of their world together through sheer relational attentiveness. Fe (Extraverted Feeling) is the dominant function - ${name} is continuously reading the emotional register of every situation and adjusting accordingly. Si (Introverted Sensing) as the auxiliary grounds this in continuity: ${name} honours what was promised, values tradition, and maintains norms because norms are what make people feel safe. The inferior Ti (Introverted Thinking) is the consistent weak spot: internal logical consistency is not ${name}'s strong suit, and they can be surprisingly defensive when their reasoning is examined too closely.`,
    ISTP:`${name} thinks in systems and acts in the physical world. Ti (Introverted Thinking) is the dominant function - a precise internal logical framework that ${name} builds and refines constantly, usually silently. Se (Extraverted Sensing) as the auxiliary means that framework is always in contact with concrete reality: ${name} is not a theorist, they are someone who applies their logic to what is actually happening right now. The inferior Fe (Extraverted Feeling) is where ${name} is most exposed: emotional situations, vulnerability, the social register of a room - these require a function they rarely use, and it shows.`,
    ISFP:`${name} acts from personal feeling in the present moment. Fi (Introverted Feeling) is the dominant function - a deep, private value system that ${name} does not usually articulate but consistently acts from. Se (Extraverted Sensing) as the auxiliary means the feeling is always grounded in the immediate, physical, real world: ${name} is not abstract or theoretical about what matters, they are present-tense about it. The inferior Te (Extraverted Thinking) is the tell: ${name} can struggle with external structure, long-range planning, and the kind of systematic accountability that other types find natural.`,
    ESTP:`${name} reads the immediate situation faster than anyone around them. Se (Extraverted Sensing) is the dominant function - full, alert engagement with what is actually happening right now, processed and acted upon before most people have finished assessing. Ti (Introverted Thinking) as the auxiliary provides the analytical frame: ${name} is not just reactive, they are quick and precise. The inferior Ni (Introverted Intuition) is the consistent blind spot: long-range consequences, patterns that only emerge over time, the shape of things years from now - these are where ${name} consistently underestimates.`,
    ESFP:`${name} is entirely present. Se (Extraverted Sensing) is the dominant function - ${name} engages with the immediate world with more openness and less defensiveness than almost any other type. Fi (Introverted Feeling) as the auxiliary means this engagement is grounded in genuine personal warmth: ${name} cares, and the caring is visible. The inferior Ni (Introverted Intuition) is where ${name} struggles most: long-range vision, abstract patterns, consequences that are not yet visible - these are the domains where ${name} is most likely to be blindsided.`,
  };

  /* ── Per-type: common mistypes with character-specific framing ── */
  const mistypeProfile={
    INTJ:{alt:'INFJ or ENTJ',conf:`${name} can appear to have INFJ's private depth or ENTJ's commanding external drive`,tell:`the decisive evidence is the Te-Ni axis: ${name}'s judgments are systematic and results-oriented, not primarily relational (which would be INFJ's Fe) or grounded in external sensory data (which would rule out both)`},
    INTP:{alt:'INTJ or INFP',conf:`${name} can seem as directed as an INTJ or as values-anchored as an INFP`,tell:`Ti dominant is the tell: the framework ${name} builds is internally consistent first, and only secondarily concerned with external execution or personal feeling — the INTJ drives toward a vision, the INFP from values, but ${name} is building a logical architecture`},
    ENTJ:{alt:'INTJ or ESTJ',conf:`${name} can appear as strategically private as an INTJ or as procedurally grounded as an ESTJ`,tell:`Te dominant running externally is the key: ${name}'s energy is directed outward toward organising the world, not inward toward perfecting a private model (INTJ) or backward toward established procedure (ESTJ)`},
    ENTP:{alt:'ENFP or INTJ',conf:`${name} can seem as warm and idealistic as an ENFP or as strategically certain as an INTJ`,tell:`Ne dominant is the signature: ${name}'s primary mode is generating angles, arguments, and possibilities — not leading with personal values (ENFP's Fi) or converging on a single internal vision (INTJ's Ni)`},
    INFJ:{alt:'INFP or INTJ',conf:`${name} can seem as deeply personal as an INFP or as strategically withdrawn as an INTJ`,tell:`Ni-Fe is the decisive combination: ${name}'s vision is always held in relation to people — the intuition is oriented outward via Fe, which is what separates INFJ from INTJ's Te-driven execution and INFP's purely personal Fi`},
    INFP:{alt:'ISFP or INFJ',conf:`${name} can seem as physically present as an ISFP or as quietly visionary as an INFJ`,tell:`Fi-Ne is the tell: ${name}'s values are internal and personal, and the perception is possibility-based and future-facing — ISFP's Fi pairs with present-tense Se, not Ne's imagination; INFJ converges rather than explores`},
    ENFJ:{alt:'INFJ or ENFP',conf:`${name} can seem as privately visionary as an INFJ or as enthusiastically possibility-focused as an ENFP`,tell:`Fe dominant running externally is the key: ${name}'s primary orientation is toward the emotional reality of other people in real time — INFJ leads with private Ni, ENFP leads with idea-generating Ne`},
    ENFP:{alt:'ENTP or INFP',conf:`${name} can seem as argument-driven as an ENTP or as values-anchored as an INFP`,tell:`Ne-Fi is the signature pairing: ${name} generates possibilities (Ne) anchored in personal warmth and values (Fi) — ENTP pairs Ne with Ti for analysis rather than feeling, INFP reverses the order with Fi dominant`},
    ISTJ:{alt:'ISFJ or INTJ',conf:`${name} can seem as quietly caring as an ISFJ or as strategically minded as an INTJ`,tell:`Si-Te is the decisive axis: ${name}'s primary reference is accumulated experience and established procedure directed toward external results — ISFJ's Te is replaced by Fe (warmth-oriented), INTJ's Si is replaced by Ni (vision-oriented)`},
    ISFJ:{alt:'ISTJ or INFJ',conf:`${name} can seem as procedurally reliable as an ISTJ or as quietly perceptive as an INFJ`,tell:`Si-Fe is the combination that settles it: ${name} is oriented toward people through the lens of established norms and accumulated care — ISTJ's Fe is replaced by Te (results-oriented), INFJ leads with Ni not Si`},
    ESTJ:{alt:'ENTJ or ISTJ',conf:`${name} can seem as strategically ambitious as an ENTJ or as quietly dutiful as an ISTJ`,tell:`Te-Si is the diagnostic: ${name} organises externally and grounds that organisation in precedent — ENTJ's Si is replaced by Ni (vision-driven), ISTJ's Te is the auxiliary not the dominant, meaning ${name} initiates where ISTJ maintains`},
    ESFJ:{alt:'ENFJ or ISFJ',conf:`${name} can seem as charismatically relational as an ENFJ or as quietly devoted as an ISFJ`,tell:`Fe-Si is the combination: ${name}'s social attunement is grounded in established norms and continuity — ENFJ's Si is replaced by Ni (strategic vision), ISFJ's Fe is the auxiliary not the dominant so ${name} leads outward where ISFJ prefers to work behind the scenes`},
    ISTP:{alt:'ISTJ or ESTP',conf:`${name} can seem as duty-oriented as an ISTJ or as boldly action-first as an ESTP`,tell:`Ti-Se is the tell: ${name}'s internal logical framework is the engine and Se is what keeps it in contact with reality — ISTJ leads with Si (precedent-based), ESTP reverses the order with Se dominant and Ti auxiliary`},
    ISFP:{alt:'INFP or ISTP',conf:`${name} can seem as idea-driven as an INFP or as physically tactical as an ISTP`,tell:`Fi-Se is the combination: ${name}'s values are present-tense and embodied, not abstract and future-facing (INFP's Ne) — and the physical engagement is in service of feeling rather than logical analysis (ISTP's Ti)`},
    ESTP:{alt:'ENTP or ISTP',conf:`${name} can seem as conceptually sharp as an ENTP or as internally focused as an ISTP`,tell:`Se dominant is what settles it: ${name}'s primary engagement is with the immediate physical reality, read and acted upon in real time — ENTP leads with Ne (ideas and possibilities), ISTP reverses the order with Ti primary and Se secondary`},
    ESFP:{alt:'ENFP or ESTP',conf:`${name} can seem as idea-focused as an ENFP or as tactically sharp as an ESTP`,tell:`Se-Fi is the signature: ${name}'s dominant engagement is physical and present-tense, anchored not by logic (ESTP's Ti) or abstract possibility (ENFP's Ne) but by genuine personal warmth in the moment`},
  };

  const tp=typeProfile[type]||`${name} operates through the ${type} function stack, with ${dom} (${fnFullName[dom]}) as the engine of every major decision.`;
  const mt=mistypeProfile[type]||{alt:'other types',conf:`surface behaviours can point elsewhere`,tell:`the full function stack, examined across ${name}'s defining moments, is what settles the type`};

  // ── Who They Are ──
  const whoEl=document.getElementById('who-they-are-text');
  if(whoEl) whoEl.outerHTML=`
    <p>${name} is ${type}. The type is defined by a specific hierarchy of cognitive functions - not a list of personality traits, but an ordered stack of mental processes. For ${name}, that stack leads with ${dom} (${fnFullName[dom]}) and is supported by ${aux} (${fnFullName[aux]}). Understanding that order explains not just what ${name} does but why - and why they cannot easily do otherwise.</p>
    <p>${tp}</p>
    <p>What makes ${name} a strong example of ${type} is not that they tick every item on the type's description, but that the function stack holds under pressure. In the moments that define their story in ${ctx} - the decisions under stress, the failures of judgment, the rare moments of genuine growth - the pattern is consistent. The dominant function is what ${name} reaches for. The inferior is what catches them off guard.</p>
  `;

  // ── Journey ──
  const journeyEl=document.getElementById('journey-text');
  const journeyH=document.getElementById('journey-heading');
  if(journeyH) journeyH.textContent=`${name}: What the Type Explains`;
  if(journeyEl) journeyEl.outerHTML=`
    <p>In ${ctx}, ${name}'s ${type} profile is not incidental - it is the architecture of every significant choice they make. The dominant ${dom} (${fnFullName[dom]}) is what ${name} trusts most and reaches for first. It is the source of their competence, their characteristic strengths, and the reason they are effective in the ways they are effective.</p>
    <p>The inferior function, ${inf} (${fnFullName[inf]}), is the other side of that coin. It is the least developed function in ${name}'s stack - the one that surfaces under stress, in moments of vulnerability, or at the turning points of their arc. Where ${name} fails, where they are surprised, where they are genuinely out of their depth: those moments are almost always the inferior function breaking through the competence that normally contains it.</p>
    <p>The tertiary function, ${ter} (${fnFullName[ter]}), is less dramatic but equally revealing. It is the function ${name} uses when the dominant is strained - a partial support system that can look like a different type altogether to casual observers. Understanding that ${name}'s apparent flexibility or occasional warmth or rare structure is the tertiary at work, not a sign of a different type, is part of reading the stack correctly.</p>
  `;

  // ── Mistype ──
  const mistypeEl=document.getElementById('mistype-text');
  const mistypeH=document.getElementById('mistype-heading');
  if(mistypeH) mistypeH.textContent=`Why ${name} Is ${type}, Not ${mt.alt}`;
  if(mistypeEl) mistypeEl.outerHTML=`
    <p>${name} is sometimes typed as ${mt.alt}. The confusion is understandable: ${mt.conf}. But surface-level trait-matching is how typing errors happen. The function stack is what resolves it.</p>
    <p>The key diagnostic is the dominant function. For ${name}, that is ${dom} (${fnFullName[dom]}). Every major decision in ${name}'s story in ${ctx} can be traced back to this function running first. The confidence, the blind spots, the specific texture of how ${name} succeeds and how they fail - all of it maps to a ${dom}-led stack, not to the alternatives.</p>
    <p>The decisive evidence: ${mt.tell}. Once you track ${name}'s behaviour not across casual scenes but across their defining moments - the highest-stakes decisions, the most characteristic failures, the instincts that surface under genuine pressure - the ${type} reading is consistent and the alternatives are not.</p>
  `;
}

function renderNotFound(){
  document.getElementById('page-body').innerHTML=`
    <div class="not-found r">
      <h1>404</h1>
      <p>No character found at this URL. They may have been renamed or removed.</p>
      <a class="cta-btn" href="/archive">Browse the Archive</a>
    </div>`;
  requestAnimationFrame(()=>document.querySelector('.not-found')?.classList.add('in'));
}

// ── Page transition ──
window.addEventListener('DOMContentLoaded',()=>{
  renderPage();
  const ov=document.getElementById('t-overlay');
  if(ov){requestAnimationFrame(()=>{ov.style.transition='opacity 0.45s ease';ov.style.opacity='0';});}
});

// ── Intercept internal links for smooth transition ──
document.addEventListener('click',e=>{
  const a=e.target.closest('a[href]');
  if(!a)return;
  const href=a.getAttribute('href');
  if(!href||href.startsWith('http')||href.startsWith('#')||href.startsWith('mailto:'))return;
  e.preventDefault();
  const ov=document.getElementById('t-overlay');
  if(ov){ov.style.transition='opacity 0.3s ease';ov.style.opacity='1';}
  setTimeout(()=>window.location.href=href,300);
});
</script>
</body>
</html>
