{name:`Warren Buffett`,ctx:`Investor and philanthropist`,type:'INTP',cat:'Business',
desc:`Buffett is INTP. His investment philosophy is a precise internal model — buy wonderful businesses at fair prices, hold them for decades, ignore the noise — applied with a patience that most investors cannot sustain because most investors let the external environment update their internal framework constantly. Buffett's framework updates only when the evidence genuinely requires it. He reads annual reports for pleasure. He has lived in the same Omaha house since 1958. His self-presentation as a simple Midwestern guy is both authentic — he genuinely does not value the trappings of wealth — and quietly strategic: the INTP who prefers to be underestimated. His partnership letters, written over six decades, are the clearest window into how Ti-dominant thinking actually works when applied consistently to a single domain over a lifetime.`,
kw:['Warren Buffett MBTI','Buffett personality type','INTP investor']},

{name:`Stephen Hawking`,ctx:`Theoretical physicist and cosmologist`,type:'INTP',cat:'Science',
desc:`Hawking is INTP. He constructed increasingly comprehensive theoretical frameworks for understanding black holes, the Big Bang, and the nature of time — all from inside a body that progressive motor neurone disease had reduced to almost complete immobility — because the Ti dominant's relationship with its work is interior and the body is beside the point. His insistence on communicating with the public, his television appearances, his cameos on The Simpsons and Star Trek: the inferior Fe finding the warmth that theory does not express. A Brief History of Time sold ten million copies not because it was simple but because it was honest — an INTP explaining the framework without condescension, trusting the reader to follow. His humour, which was constant and dry, was the Ti checking its own self-importance.`,
kw:['Stephen Hawking MBTI','Hawking personality type','INTP physicist']},

{name:`Richard Feynman`,ctx:`Theoretical physicist, Nobel laureate`,type:'ENTP',cat:'Science',
desc:`Feynman is ENTP. He taught himself to pick locks, played bongo drums in strip clubs, decoded Mayan hieroglyphics for fun, joined the Rogers Commission to investigate the Challenger disaster and produced the most memorable moment of the entire inquiry by dunking an O-ring into a glass of ice water, and along the way produced QED and contributed more to theoretical physics than almost anyone of his century. His delight in the world was not performance — it was the Ne dominant's authentic relationship with existence: everything is interesting, everything connects, and the person who tells you something cannot be understood has simply not explained it correctly yet. His Feynman lectures exist because he believed that wonder was the prerequisite for understanding.`,
kw:['Richard Feynman MBTI','Feynman personality type','ENTP Nobel laureate']},

{name:`Alan Turing`,ctx:`Mathematician, computer scientist`,type:'INTP',cat:'Science',
desc:`Alan Turing is INTP. He invented the theoretical foundations of modern computing in a 1936 paper that described a machine that did not yet exist — Ti building a complete logical framework before the physical instantiation was possible. His Bombe at Bletchley Park broke Enigma not through luck but through a sustained, systematic, Ti-driven effort to find the logical vulnerabilities in a system that most people accepted as impenetrable. His 1950 paper proposing the Turing Test is the INTP at play: he could not solve the hard problem of consciousness, so he reformulated the question into one that was actually answerable. The British government's treatment of him after the war — prosecution, chemical castration, death at 41 — is the 20th century's most complete portrait of what a society does to a mind it cannot use when it is no longer useful.`,
kw:['Alan Turing MBTI','Turing personality type','INTP mathematician']},

{name:`Noam Chomsky`,ctx:`Linguist, philosopher, political thinker`,type:'INTP',cat:'Science',
desc:`Chomsky is INTP. He built a comprehensive theory of language from first principles, then applied the same method to political analysis. Both fields were transformed. He is famously uninterested in consensus and interested only in whether the argument holds.`,
kw:['Noam Chomsky MBTI','Chomsky personality type','INTP intellectual']},

{name:`Jordan Peterson`,ctx:`Psychologist, author, public intellectual`,type:'INFJ',cat:'Science',
desc:`Jordan Peterson is INFJ. His work is pattern recognition applied at the broadest possible scale: across Jungian psychology, evolutionary biology, religious mythology, and clinical experience, he identifies recurring structural themes and synthesises them into a framework for how individuals should live. Maps of Meaning, written over thirteen years, is the Ni dominant's most complete project — a comprehensive theory of why human beings construct the narratives they do, and what happens when those narratives collapse. His emotional intensity in interviews and lectures is real, not performed: the INFJ for whom the ideas are inseparable from the stakes they represent. His public controversies are the INFJ's characteristic situation: someone who sees a pattern clearly and says it plainly, into an environment that has strong views about whether that pattern should be named.`,
kw:['Jordan Peterson MBTI','Jordan Peterson personality type','INFJ psychologist']},

{name:`Neil deGrasse Tyson`,ctx:`Astrophysicist and science communicator`,type:'ENFP',cat:'Science',
desc:`Tyson is ENFP. His gift is making the scale of the universe feel personally relevant. He connects, contextualises, and enthuses. His communication style is warmer than most scientists and his range of interests is genuinely wider.`,

desc:`Sagan is INFP. Cosmos is an INFP work: it is about the significance of small things in vast contexts, and about the feeling of understanding rather than just the fact of it. He communicated science through wonder, which is the INFP's natural mode.`,

{name:`Bob Dylan`,ctx:`Singer-songwriter, Nobel laureate in Literature`,type:'INFP',cat:'Music',
desc:`Dylan is INFP. He has changed direction at every point when an audience thought they had him figured out — folk protest singer, electric rock, country, gospel, Sinatra standards — because the Fi dominant's internal compass does not answer to external expectation. His Nobel Prize for Literature was not a surprise to anyone who had been reading the lyrics rather than hearing the tunes: Blood on the Tracks is a novel; Blonde on Blonde is a confession; Highway 61 Revisited is a manifesto. His famous non-answers in interviews are not evasion but accuracy: the INFP's inner life is the source of everything, and it cannot be reduced to a three-sentence explanation for a journalist. He said everything in the songs. He does not also need to explain the songs.`,
kw:['Bob Dylan MBTI','Bob Dylan personality type','INFP musician']},

{name:`David Bowie`,ctx:`Singer, musician, actor`,type:'INFP',cat:'Music',
desc:`Bowie is INFP. Ziggy Stardust, Aladdin Sane, the Thin White Duke, Major Tom: his personas were not evasions of a true self but explorations of interior spaces that needed different containers. The INFP's Ne-auxiliary makes the imagination wide enough to inhabit entirely different modes of being, and Bowie was the fullest expression of that capacity in popular music. His final album, Blackstar, released two days before his death and made in full knowledge of what was coming, is the INFP completing the work — not a goodbye but a last exploration, with the same curiosity intact. His creative restlessness was never about reinvention as strategy; it was a person whose interior life kept producing new material that the old forms could not hold.`,
kw:['David Bowie MBTI','Bowie personality type','INFP rock icon']},

{name:`Kurt Cobain`,ctx:`Musician, Nirvana`,type:'ISFP',cat:'Music',
desc:`Kurt Cobain is ISFP. He made music from a place so interior and undefended that fame was not just uncomfortable but structurally incompatible with the source of the work. Nirvana's success brought millions of people to something he had made in private, and the ISFP's experience of that is not triumph but violation — the work was supposed to be felt, not consumed. His journals, his artwork, his recordings: all of them show an Fi dominant whose entire relationship with the world ran through aesthetic and emotional channels that public life kept demanding he flatten into a persona. His interviews were painful not because he was difficult but because he was genuinely unable to perform an accessibility he did not feel.`,
kw:['Kurt Cobain MBTI','Kurt Cobain personality type','ISFP Nirvana']},

{name:`Freddie Mercury`,ctx:`Lead singer of Queen`,type:'ENFP',cat:'Music',
desc:`Freddie Mercury is ENFP. His stage presence was not a costume but an amplification: the ENFP's warmth, enthusiasm, and physical aliveness turned up to the voltage that Wembley Stadium required. His ability to hold 70,000 people in a call-and-response at Live Aid — a crowd he had never performed for before — is Fe operating in total freedom: he read the room, felt what they needed, and gave it to them in real time, improvised. Offstage he was known for extraordinary personal warmth and loyalty to the people he loved. His final years, working on The Show Must Go On and Innuendo while his illness progressed, are the ENFP refusing to let the interior go dark even when everything external is failing.`,
kw:['Freddie Mercury MBTI','Freddie Mercury personality type','ENFP Queen singer']},

{name:`Michael Jackson`,ctx:`Pop musician and entertainer`,type:'ISFP',cat:'Music',
desc:`Michael Jackson is ISFP. He lived inside his art with a total absorption that left almost no managed distance between the interior experience and the external product — which is why Thriller and Off the Wall feel inhabited rather than constructed, and why the perfectionism in the studio was aesthetic rather than systematic. His childhood, which was not a childhood, produced an adult who had no reliable framework for the ordinary world and retreated further into the interior when the exterior became unbearable. His facial surgeries, his relationships with children, his Neverland ranch: all are the ISFP building a physical world that matches an interior one that never developed past a certain point. His dancing was the one domain where the interior and the exterior were perfectly continuous, which is why watching it still feels different from watching anyone else.`,
kw:['Michael Jackson MBTI','Michael Jackson personality type','ISFP pop icon']},

{name:`Kanye West`,ctx:`Rapper, producer, designer`,type:'ENFP',cat:'Music',
desc:`Kanye is ENFP. His output across music, fashion, and public statement is the product of an imagination that never stops. He is also a textbook example of the ENFP shadow: the gap between the magnitude of the vision and the capacity to realise it without destroying relationships.`,

{name:`Taylor Swift`,ctx:`Singer-songwriter`,type:'ESFJ',cat:'Music',
desc:`Taylor Swift is ESFJ. She has built one of the most sustained and loyal fan relationships in music history through a Fe-dominant's genuine attunement to what her audience needs — not through marketing strategy but through an instinct for emotional reciprocity that runs in both directions: she knows what they feel because she has written about what she feels, and the overlap is real. Her business decisions — the Scooter Braun dispute, re-recording her albums, the Eras Tour structure — are Si-grounded: she remembers exactly what was promised and what was taken, and she works methodically to correct it. The parasocial closeness her fans feel is not manufactured; it is the ESFJ's authentic warmth operating at scale, which is a different thing from performance.`,

{name:`John Lennon`,ctx:`Musician, The Beatles`,type:'ENFP',cat:'Music',
desc:`John Lennon is ENFP. He moved through creative phases at the speed his Ne demanded — skiffle to rock to psychedelia to political activism to confessional minimalism — and each phase was genuine, not strategic. His anger was as real as his idealism, which is the ENFP's full range: enormous warmth and enormous frustration when the world fails to meet the vision. Imagine is the ENFP's most complete statement: not a policy but a feeling — "I wonder if you can" — an invitation to share the internal state rather than adopt a programme. His interviews were uncomfortable because he could not stop saying what he actually thought, which is the ENFP's most reliable characteristic. His murder outside the Dakota in 1980 ended someone who was still moving, still generating, still in the middle of something.`,
kw:['John Lennon MBTI','Lennon personality type','ENFP Beatles musician']},

{name:`Paul McCartney`,ctx:`Musician, The Beatles`,type:'ESFP',cat:'Music',
desc:`Paul McCartney is ESFP. Where Lennon drove toward abstraction and confrontation, McCartney drove toward the melody, the hook, the thing that arrives in the chest before it reaches the mind. Yesterday came to him in a dream; he played it to everyone he met for weeks asking if they had heard it before, because a song that complete didn't feel like something he had written. His gift is presence — he inhabits the moment of a song entirely, which is why his live performances at eighty retain the quality of his twenty-year-old recordings. His Wings years, his solo work, his decades of touring: the ESFP who found the arena large enough to contain the warmth and never stopped filling it.`,
kw:['Paul McCartney MBTI','McCartney personality type','ESFP Beatles musician']},

{name:`Jimi Hendrix`,ctx:`Guitarist and musician`,type:'ISFP',cat:'Music',
desc:`Hendrix is ISFP. His playing was entirely intuitive - a direct expression of an interior state with almost no gap between feeling and sound. He was reportedly shy offstage, which is the ISFP pattern: enormous presence in the medium, quiet outside it.`,
kw:['Jimi Hendrix MBTI','Hendrix personality type','ISFP guitar legend']},

{name:`Ludwig van Beethoven`,ctx:`Classical composer`,type:'INTJ',cat:'Music',
desc:`Beethoven is INTJ. He continued composing after losing his hearing because the music existed entirely inside an interior space that did not require ears — the Ni dominant building comprehensive structures independent of sensory input. His late quartets were considered unperformable and incomprehensible by his contemporaries; they were simply ahead of the framework anyone else was using. He argued with patrons, ignored social conventions, treated commissions as starting points rather than contracts, and produced work that kept revising what music was allowed to do. The Ninth Symphony, conducted deaf, stands as the most complete INTJ artistic statement: a long-range vision sustained to completion against every practical obstacle, then delivered to the world without apology.`,
kw:['Beethoven MBTI','Beethoven personality type','INTJ classical composer']},

{name:`Mozart`,ctx:`Classical composer`,type:'ENFP',cat:'Music',
desc:`Mozart is ENFP. He produced music at a rate and with a lightness that suggests ideas arriving faster than he could write them down. His personal life was chaotic and his financial management catastrophic - the ENFP who cannot make the practical world match the creative one.`,

{name:`Tupac Shakur`,ctx:`Rapper and activist`,type:'INFP',cat:'Music',
desc:`Tupac Shakur is INFP. His music held contradictions — the activist and the gangster, the poet and the provocateur, the son of a Black Panther and the subject of federal surveillance — because the INFP does not need contradictions to resolve in order to contain them. Dear Mama and Hit Em Up exist in the same discography because both are true expressions of an interior that is large enough to hold both without needing them to be consistent. His verse on Keep Ya Head Up, written in one session, is the Fi dominant at full force: a fierce, specific, personal love for Black women expressed through the medium rather than about it. His death at twenty-five cut off someone who was still in the middle of becoming something, which is the only kind of death the INFP's legacy ever gets.`,

{name:`Elton John`,ctx:`Musician and performer`,type:'ESFP',cat:'Music',
desc:`Elton John is ESFP. The rhinestones, the platform boots, the succession of extraordinary glasses: none of this is concealment but expression — the ESFP who found, in performance, the only context large enough to hold what he actually is. His partnership with Bernie Taupin across fifty years produced some of the most enduring songs of the twentieth century because the Fe-Se combination Elton brings to Bernie's lyrics turns private emotion into communal experience in real time. His AIDS Foundation, his sobriety, his honest memoir: all at the same volume as the concerts. He has never found a half-measure comfortable.`,

{name:`Frank Sinatra`,ctx:`Singer and entertainer`,type:'ESTP',cat:'Music',
desc:`Frank Sinatra is ESTP. He dominated every room he entered before doing anything in it — pure Se-Ti operating as social gravity. His phrasing in the recording studio was instinctive and non-repeatable: rarely more than a few takes because the spontaneity was the point, the first feeling the truest one. His Rat Pack was the ESTP social world made manifest: improvised hierarchy, high energy, complete presentness, and contempt for anyone who seemed to be trying too hard. His relationship with the music was physical — he understood a lyric through breath and timing, not through analysis.`,
kw:['Frank Sinatra MBTI','Sinatra personality type','ESTP entertainer']},

{name:`Johnny Cash`,ctx:`Country singer-songwriter`,type:'ISFP',cat:'Music',
desc:`Johnny Cash is ISFP. He sang about what he had actually done, actually survived, and actually felt — the prison, the addiction, the faith, the love for June — and the authority in the music comes from the fact that none of it was constructed. His voice at seventy, covering Hurt by Nine Inch Nails in a crumbling mansion, is the ISFP's final gift: the direct expression of an interior state with no filter, no performance, just the truth of what it feels like to be at the end of a life that contained all of that. The video made the original songwriter, Trent Reznor, feel the song no longer belonged to him. That is the ISFP's particular power: the most authentic version of a feeling becomes the definitive one.`,

{name:`William Shakespeare`,ctx:`English playwright and poet`,type:'INFP',cat:'Arts',
desc:`Shakespeare is INFP. His plays are sustained explorations of interior states that no one had previously named with this precision: the specific quality of Othello's jealousy, the texture of Lear's grief, the exact shape of Hamlet's paralysis. He writes from inside the experience rather than about it, which is the Fi dominant's irreplaceable contribution. The range of his empathy — Falstaff and Iago and Portia and Cleopatra and Caliban, none of them simple, all of them inhabited from within — is the INFP capacity for imaginative identification taken as far as it has ever been taken. What we know about his actual life is almost nothing, which is also typical: the INFP's interior is the full story, and the exterior is beside the point.`,
kw:['Shakespeare MBTI','Shakespeare personality type','INFP playwright']},

{name:`J.R.R. Tolkien`,ctx:`Author of The Lord of the Rings`,type:'INFP',cat:'Arts',
desc:`Tolkien is INFP. He built an entire world — Quenya and Sindarin, the Silmarillion, the histories of the Second and Third Ages, the mythology of Arda — not because a publisher asked for it but because the INFP's inner world produces more than any single work can contain, and he needed somewhere to put it. Middle-earth is a private cosmology made external. The hobbits are the INFP's self-image: small, domestic, unregarded, and unexpectedly capable of the one thing the world requires when it matters. His friendship with C.S. Lewis is the INFP's most necessary relationship: someone who understood the interior project and took it seriously. Sam Gamgee is the character Tolkien identified with most, which tells you everything you need to know about how the INFP experiences their own heroism.`,
kw:['Tolkien MBTI','J.R.R. Tolkien personality type','INFP fantasy author']},

{name:`C.S. Lewis`,ctx:`Author, theologian, professor`,type:'INFJ',cat:'Arts',
desc:`Lewis is INFJ. Narnia, the Screwtape Letters, and his theological writing all work the same way: making the invisible visible through allegory and story. He was a logician by training and a mythmaker by temperament, which is a characteristically INFJ combination.`,
kw:['C.S. Lewis MBTI','Lewis personality type','INFJ Christian author']},

{name:`George Orwell`,ctx:`Author of 1984 and Animal Farm`,type:'INTJ',cat:'Arts',
desc:`Orwell is INTJ. He saw the direction of the 20th century with unusual clarity and said so plainly, which made him unwelcome in several political camps simultaneously — because he was not interested in whose side he was on but in whether the argument was correct. Homage to Catalonia dismantled both fascism and the Stalinist left with the same structural precision. Animal Farm and 1984 are systems analyses: here is how power corrupts language, here is what that produces, here is the endpoint if nothing changes. His personal life — fighting in Spain with a bullet through his throat, living in poverty to avoid being owned by any institution — was the INTJ living in alignment with the framework he had built. He died at 46 still working, which is also the pattern.`,
kw:['George Orwell MBTI','Orwell personality type','INTJ author']},

desc:`Woolf is INFP. Her novels are interior experiences more than external events. The stream-of-consciousness technique is a formal expression of the INFP mode of being: consciousness as continuous flow rather than discrete episodes.`,

{name:`Oscar Wilde`,ctx:`Irish poet and playwright`,type:'ENFP',cat:'Arts',
desc:`Oscar Wilde is ENFP. His epigrams were not polished over years but arrived whole and immediately — Ne-Fi generating the perfect inversion of received wisdom at conversational speed. "The truth is rarely pure and never simple." "I can resist everything except temptation." These are not jokes; they are compressed arguments. His trial and imprisonment were the ENFP's characteristic failure to model the power of the machine he was amusing himself against: he was better at the argument than at calculating what losing the argument would cost. His prison letter, De Profundis, is the ENFP stripped of the performance and speaking from the interior that the performance had always been protecting. The Ballad of Reading Gaol is what comes after: the warmth intact, the wit quieter, the cost fully understood.`,
kw:['Oscar Wilde MBTI','Wilde personality type','ENFP Irish writer']},

{name:`Franz Kafka`,ctx:`Czech novelist`,type:'INFP',cat:'Arts',
desc:`Kafka is INFP. His fiction externalises interior experiences that most people can feel but never name: the guilt that has no identifiable source, the authority that cannot be reasoned with, the trial that never explains what you did, the castle that can be seen but never reached. These are not metaphors about society; they are accurate descriptions of what it feels like to be an INFP inside an institution that was not designed for the way an INFP processes reality. He asked his friend Max Brod to burn everything after his death. Brod understood — correctly — that this was the INFP's self-erasure impulse speaking, not a genuine final instruction. He kept it. The world has been reading it ever since.`,
kw:['Kafka MBTI','Franz Kafka personality type','INFP existential writer']},

{name:`Fyodor Dostoevsky`,ctx:`Russian novelist`,type:'INFP',cat:'Arts',
desc:`Dostoevsky is INFP. His novels are not arguments about ideas — they are arguments conducted entirely through people who are consumed by ideas, which is a completely different thing. Raskolnikov, Alyosha, Ivan, the Grand Inquisitor: each is a position in a living debate, and Dostoevsky gives each position enough force to almost win. This is what the INFP's Ne-auxiliary produces at full stretch: the imaginative capacity to genuinely inhabit every side of a moral question while the Fi dominant holds out for the truth it cannot yet name. His years in Siberian exile, the firing squad rehearsal that was called off at the last moment, the epilepsy, the gambling: his life provided the material that only someone constitutionally unable to look away from suffering could have turned into Crime and Punishment and The Brothers Karamazov.`,
kw:['Dostoevsky MBTI','Dostoevsky personality type','INFP Russian novelist']},

{name:`Leo Tolstoy`,ctx:`Russian novelist`,type:'INFJ',cat:'Arts',
desc:`Tolstoy is INFJ. War and Peace and Anna Karenina are both systems: exhaustive maps of how human beings behave under moral pressure. He eventually gave up fiction for philosophy and then tried to give up his estate, which is very INFJ: the vision eventually overrides the life.`,
kw:['Tolstoy MBTI','Tolstoy personality type','INFJ Russian novelist']},

{name:`Vincent van Gogh`,ctx:`Dutch post-impressionist painter`,type:'INFP',cat:'Arts',
desc:`Van Gogh is INFP. His paintings are not observations of how the world looks but expressions of how it felt to be inside it — the Starry Night is not a night sky, it is a night sky experienced by someone for whom the boundary between self and world was unusually permeable. He sold one painting in his lifetime. His letters to his brother Theo are among the most direct INFP writing in existence: intense, searching, self-aware, and without the armour that most people build to survive sustained rejection. He wrote to Theo about his work the way another person might confess to a priest — not explaining the paintings but trying to locate the feeling they came from. The irony of his posthumous fame is that it finally gives the work the attention it always deserved, arriving too late for the person who made it to know.`,
kw:['Van Gogh MBTI','Van Gogh personality type','INFP artist']},

{name:`Frida Kahlo`,ctx:`Mexican painter`,type:'INFP',cat:'Arts',
desc:`Frida Kahlo is INFP. Her paintings are self-portraits in the deepest sense — not images of how she looked but of how she experienced being herself, from the inside. The Two Fridas, The Broken Column, Without Hope: pain, identity, the body as a site of meaning, the interior world as the only reliable territory. She made her interior life visible with a precision that most people spend their lives avoiding, which is the INFP's characteristic gift and characteristic cost. Her relationship with Diego Rivera, her politics, her surgery and recovery — all of it went into the work because for the Fi dominant there is no clean line between what happens and what is felt and what is made from the feeling.`,
kw:['Frida Kahlo MBTI','Kahlo personality type','INFP female artist']},

{name:`Salvador Dali`,ctx:`Spanish surrealist artist`,type:'ENTP',cat:'Arts',
desc:`Salvador Dali is ENTP. Surrealism is the ENTP's methodology applied to visual art: take a logic and follow it past the point where comfort would stop it, then keep going until you arrive somewhere nobody expected. The melting clocks in The Persistence of Memory are not dreamlike — they are precise; it is time itself that is being argued with. His persona — the waxed moustache, the theatrical declarations, the ocelot — was partly performance and partly conviction, and he may not always have known which was which, which is also very ENTP. His collaboration with Hitchcock, his lobster telephone, his work with Disney: the Ne dominant finding new domains to colonise before the current one is finished.`,
kw:['Salvador Dali MBTI','Dali personality type','ENTP surrealist']},

{name:`Andy Warhol`,ctx:`American pop artist`,type:'ISFP',cat:'Arts',
desc:`Andy Warhol is ISFP. He took commercial imagery — soup cans, Brillo boxes, celebrity photographs — and by repeating it, by treating it with the same attention usually reserved for classical subjects, made its conditions visible. This required a very specific aesthetic sensibility that operates through feeling rather than concept: the decision of what to look at long enough to make into art is Fi-Se in action. His public persona of blankness — "I want to be a machine" — was either total performance or total authenticity, and he may have been the only person who knew which. His Factory was the ISFP's most unusual experiment: the private person building a public world and then operating from within it, watching.`,
kw:['Andy Warhol MBTI','Warhol personality type','ISFP pop artist']},

{name:`Edgar Allan Poe`,ctx:`American writer and poet`,type:'INFP',cat:'Arts',
desc:`Poe is INFP. His work is an interior landscape externalised as horror and beauty. The terror in his stories is not external - it is what the mind does to itself. His life was chaotic and his deaths multiple, which INFP biographers sometimes use to explain the work.`,

{name:`Robin Williams`,ctx:`Actor and comedian`,type:'ENFP',cat:'Film',
desc:`Robin Williams is ENFP. His improvisational mind was the Ne dominant running without a brake: ideas connecting to ideas connecting to impressions connecting to observations in real time, in front of an audience, faster than the audience could track. His warmth was genuine and constant — the affection for people that came through even in the most anarchic performances. The depression that ran underneath was the shadow of the same intensity: the ENFP who cannot redirect the associative energy inward without it becoming destructive, the person who makes everyone else feel better and has no equivalent mechanism for themselves. Good Will Hunting is the film where he played closest to what he actually was: the person who has been through something, who understands grief without having to explain it, who knows when to sit down and be quiet.`,
kw:['Robin Williams MBTI','Robin Williams personality type','ENFP comedian actor']},

{name:`Jim Carrey`,ctx:`Actor and comedian`,type:'ENFP',cat:'Film',
desc:`Jim Carrey is ENFP. His physical comedy is Ne expressed through a body that refuses to hold still — every idea immediately externalised, every association followed to its most extreme physical conclusion. His dramatic work in The Truman Show and Eternal Sunshine of the Spotless Mind uses the same quality toward different ends: the imagination that produces rubber-faced excess also produces precise interior grief. His public interviews reveal the ENFP in full: genuinely philosophical, prone to existential tangents, uncomfortable with the performance of celebrity even while being one of its most visible practitioners.`,
kw:['Jim Carrey MBTI','Jim Carrey personality type','ENFP comedian']},

{name:`Johnny Depp`,ctx:`Actor`,type:'INFP',cat:'Film',
desc:`Depp is INFP. He has consistently chosen roles that let him disappear into an interior character rather than play himself. His most famous performances - Jack Sparrow, Edward Scissorhands - are about the outsider who does not quite fit the world around them.`,

{name:`Marlon Brando`,ctx:`Actor`,type:'INFP',cat:'Film',
desc:`Marlon Brando is INFP. He transformed acting by performing from the inside — the Method approach, which is not a technique so much as a permission: access the real internal state and let that drive the performance, rather than demonstrating what the emotion should look like. This is the INFP's natural mode. His Vito Corleone, his Stanley Kowalski, his Colonel Kurtz: all built from an interior place so specific that the specificity is what makes them archetypal. His later career, the weight gain, the reclusiveness, the eccentric interviews — all consistent with an INFP who has done the interior work publicly for decades and has run out of interest in the exterior requirements of celebrity.`,
kw:['Marlon Brando MBTI','Brando personality type','INFP method actor']},

{name:`Meryl Streep`,ctx:`Actress`,type:'INFJ',cat:'Film',
desc:`Streep is INFJ. Her approach to character is comprehensive and deeply researched, but the result is not academic - it is alive. She builds the complete internal world of the person before the camera sees any of it.`,
kw:['Meryl Streep MBTI','Streep personality type','INFJ actress']},

{name:`Christopher Nolan`,ctx:`Film director`,type:'INTJ',cat:'Film',
desc:`Christopher Nolan is INTJ. Every film he has made is built on a structural idea that determines everything else before a word of dialogue is written: Memento's reversed chronology, Inception's nested dream levels, Interstellar's gravitational time dilation, Oppenheimer's three timeframes converging. The structure is not a gimmick but the argument — the form carries the meaning. His refusal to use digital cameras, his insistence on practical effects, his preference for IMAX: all Te decisions, each with a specific rationale that he can and does explain at length. His films ask the audience to do cognitive work and do not apologise for it, which is the INTJ's consistent position: the idea is correct, the audience will follow if they are paying attention.`,
kw:['Christopher Nolan MBTI','Nolan personality type','INTJ director']},

{name:`Stanley Kubrick`,ctx:`Film director`,type:'INTJ',cat:'Film',
desc:`Stanley Kubrick is INTJ. He worked slowly, controlled everything — every shot, every music cue, every prop in every frame — and made films that operate at a deliberate distance from conventional emotional manipulation. 2001 does not explain itself. The Shining does not comfort you. Full Metal Jacket does not resolve. This is the INTJ's refusal to simplify: here is the system as it actually operates, here are the forces that actually shape people, and if watching it is uncomfortable that is because comfort is not the point. His reported reclusion, his technical perfectionism, his comprehensive knowledge of every department on his shoots: the INTJ who has modelled the entire environment and does not see a reason to delegate what he has already worked out.`,
kw:['Stanley Kubrick MBTI','Kubrick personality type','INTJ filmmaker']},

{name:`Steven Spielberg`,ctx:`Film director and producer`,type:'ENFP',cat:'Film',
desc:`Spielberg is ENFP. His films work through immediacy and emotional connection. He is the most technically sophisticated filmmaker of his generation who is also the most accessible - which is the ENFP paradox: depth that does not require you to work for it.`,
kw:['Steven Spielberg MBTI','Spielberg personality type','ENFP director']},

{name:`Quentin Tarantino`,ctx:`Film director`,type:'ENTP',cat:'Film',
desc:`Tarantino is ENTP. His films are arguments about film conducted through film. He is consumed by genre, references, and the question of what movies are actually doing when they appear to be doing something else. His dialogue is pure ENTP: ideas in competition, faster than they can be resolved.`,

{name:`Tom Hanks`,ctx:`Actor`,type:'ISFJ',cat:'Film',
desc:`Hanks is ISFJ. He plays decency without making it boring, which is the ISFJ skill. His off-screen reputation - reliably warm, consistent, genuinely kind - matches the roles he chooses. He is the rare celebrity whose public and private selves appear to be the same person.`,

{name:`Muhammad Ali`,ctx:`Professional boxer, activist`,type:'ESFP',cat:'Sport',
desc:`Muhammad Ali is ESFP. His boxing was physical poetry and his trash talk was performance art operating at the same level — both were him, fully present, in the moment, at maximum expression. "Float like a butterfly, sting like a bee" is not a tactical description; it is a self-portrait in ten words, which is what the ESFP does: they show you who they are in the act of doing the thing. His refusal to be drafted for Vietnam — "I ain't got no quarrel with them Viet Cong" — was not a departure from his character but an expression of it at full volume: the ESFP's Se-Fi in direct confrontation with an authority that was demanding something that violated what he felt was true. He gave up his title and three years of his prime for it and did not hesitate.`,
kw:['Muhammad Ali MBTI','Ali personality type','ESFP boxing champion']},

{name:`Michael Jordan`,ctx:`NBA basketball player`,type:'ISTP',cat:'Sport',wiki:'Michael_Jordan',
desc:`Michael Jordan is ISTP. His dominance was never about charisma or performance - it was about a cold, internal obsession with mastery. He studied opponents like machines to be disassembled. He practised in near-silence and competed with a terrifying emotional detachment that his teammates found as hard to live with as opponents found it to beat. The Mamba Mentality before Kobe named it: ISTP at its most extreme, a person who reduced everything to mechanics and then executed perfectly. His competitiveness was not the ESTP's hunger for the spotlight - it was the ISTP's refusal to accept an unsolved problem.`,
kw:['Michael Jordan MBTI','MJ personality type','ISTP basketball legend']},

{name:`LeBron James`,ctx:`NBA basketball player`,type:'ENFJ',cat:'Sport',
desc:`LeBron James is ENFJ. His most celebrated performances are frequently about elevation — the pass that makes someone else the hero, the timeout conversation that lifts a teammate, the locker room presence that changes the psychological register of an entire team. His off-court work in education through the I Promise School, his media company, his political advocacy: all consistent with the ENFJ who thinks about legacy as something that extends beyond the self into the people you brought with you. His famous pettiness when slighted — the Instagram feuds, the carefully placed interviews — is the ENFJ's inferior Ti occasionally surfacing as a need for the record to be correct, for the argument to be won on its own terms. He is one of the most complete athletes in the history of team sport and he knows it, and he has spent his career trying to share it.`,
kw:['LeBron James MBTI','LeBron personality type','ENFJ basketball player']},

{name:`Cristiano Ronaldo`,ctx:`Professional footballer`,type:'ENTJ',cat:'Sport',
desc:`Cristiano Ronaldo is ENTJ. His career is a comprehensive self-improvement project conducted with military consistency over two decades: the physique, the technique, the free kicks drilled until every variable is accounted for. He is motivated by being the greatest rather than by love of the game — which is not a flaw but an ENTJ characteristic: the goal is the organising principle, and the process serves the goal. His feud with Messi, his trophies displayed and catalogued, his CR7 brand applied to hotels, underwear, and gyms: all expressions of a single long-range vision of what he intended to become and the infrastructure required to sustain it. His famous work ethic is not discipline imposed from outside but Te running its natural programme.`,
kw:['Cristiano Ronaldo MBTI','Ronaldo personality type','ENTJ footballer']},

{name:`Lionel Messi`,ctx:`Professional footballer`,type:'ISFP',cat:'Sport',
desc:`Lionel Messi is ISFP. He plays from physical intuition, not verbal strategy — his genius does not pass through the part of the mind that produces explanations. His dribbling, his sense of where the space will be before it opens, his finishing: all Se-Fi operating at a level that cannot be coached because it cannot be articulated. He is conspicuously private and visibly uncomfortable with celebrity, which is the ISFP's consistent experience of fame: the work is internal, the attention is external, and the two things do not comfortably share the same space. His 2022 World Cup — the final, the golden boot, the performance across the tournament — felt like watching the ISFP's interior world finally receive the external validation it had always deserved and never particularly wanted.`,
kw:['Lionel Messi MBTI','Messi personality type','ISFP footballer']},

{name:`Kobe Bryant`,ctx:`NBA basketball player`,type:'INTJ',cat:'Sport',
desc:`Kobe Bryant is INTJ. The Mamba Mentality is not a motivational framework — it is an INTJ operating manual. Study the opponent's every tendency on film. Find the physical and psychological vulnerabilities before you step on the court. Build a system for excellence so comprehensive that failure is accounted for as a data point rather than a deviation. His five-hour pre-practice workouts, his mastery of multiple languages, his study of other sports for transferable principles: all Ni-Te in a single domain, applied with the patience and precision that the INTJ brings to any system they have decided to master. His post-basketball career — Academy Award, storytelling company, business investments — was the same architecture applied to new domains.`,
kw:['Kobe Bryant MBTI','Kobe personality type','INTJ basketball player']},

{name:`Tiger Woods`,ctx:`Professional golfer`,type:'ISTP',cat:'Sport',
desc:`Tiger is ISTP. He dominated golf by bringing unprecedented physical and technical precision to a sport that had never been approached that way. His personal life operated separately from the performance life, in classic ISTP compartmentalisation.`,
kw:['Tiger Woods MBTI','Tiger personality type','ISTP golfer']},

{name:`Serena Williams`,ctx:`Professional tennis player`,type:'ENTJ',cat:'Sport',
desc:`Serena Williams is ENTJ. She redefined what professional tennis could look like — physically, psychologically, commercially — through a consistency of vision and will that operated across every dimension of her career simultaneously. Her game was power and precision; her business was brands and ventures; her advocacy was for equal prize money, for Black women in sport, for herself on every court she ever walked onto. She does not compartmentalise her ambition: it is the same force regardless of context. Her longevity — competing and winning at the highest level across four decades — is the ENTJ's long-game applied to athletic development: she understood that the body could be built and maintained as a system, and she built it accordingly.`,
kw:['Serena Williams MBTI','Serena personality type','ENTJ tennis champion']},

{name:`Roger Federer`,ctx:`Professional tennis player`,type:'ISFP',cat:'Sport',
desc:`Roger Federer is ISFP. His tennis is famous for its aesthetic quality — it looks different from anyone else's not because of a tactical system but because it flows from a physical intuition that no coaching programme produced or could have produced. His backhand is not technically correct by the standards his contemporaries were taught; it is correct by the standard of what his body found through feeling. His composure under pressure is not emotional suppression but genuine presence — the ISFP in the moment, with no distance between intention and action. His farewell at the Laver Cup in 2022, crying on court next to Nadal after their final doubles match together, was the ISFP's most characteristic gift: a moment of complete emotional honesty, in public, without managing it.`,
kw:['Roger Federer MBTI','Federer personality type','ISFP tennis champion']},

{name:`Mike Tyson`,ctx:`Professional boxer`,type:'ESTP',cat:'Sport',
desc:`Tyson is ESTP. He was the most physically dominant fighter of his era and operated almost entirely in the present moment. His emotional instability was the ESTP shadow: no long-term framework to fall back on when the immediate advantage disappeared.`,

{name:`Walter Bishop`,ctx:`Fringe`,type:'INTP',cat:'Fiction',
desc:`Walter Bishop is INTP. He did experiments on children in the 1970s not from cruelty but from a Ti framework so absorbed in the problem that the welfare of the subjects was simply not a live variable — which is the INTP's most catastrophic failure mode: the logic is internally complete and the people affected by it are abstractions. His institutionalisation gave him something most INTPs never get: a forced pause in which the inferior Fe, usually buried under theory, began to re-emerge. His relationship with Peter is the result — the INTP who went to the bottom of the shadow and came back needing, specifically and embarrassingly, his son. His milk and pudding pops and random tangents are not affectation; they are the INTP's mind navigating a world it cannot fully inhabit, finding small sensory anchors.`,
kw:['Walter Bishop MBTI','Fringe personality type','INTP mad scientist character']},

{name:`Dexter Morgan`,ctx:`Dexter`,type:'INTJ',cat:'Fiction',
desc:`Dexter Morgan is INTJ. His Dark Passenger is not a disorder but a framework — Harry's Code, the kill room, the slide collection — a comprehensive system engineered to satisfy an impulse while keeping it inside survivable limits. The social performance of Dexter the blood-spatter analyst, the brother, the boyfriend, is a second system run in parallel: every interaction is a model, every relationship a managed variable. His trouble begins when the models develop gaps he did not design for — Debra's love, Harrison's existence, Hannah McKay — which is the INTJ's constitutive problem: the framework does not account for what it does not already know. His final act — sailing into the hurricane — is the INTJ's bleakest exit: I cannot integrate what I am with what is required to deserve the people I love, so I remove the problem entirely.`,
kw:['Dexter Morgan MBTI','Dexter personality type','INTJ TV character']},

{name:`Daario Naharis`,ctx:`Game of Thrones`,type:'ESTP',cat:'Fiction',
desc:`Daario is ESTP: bold, physical, and entirely present. He fights because he enjoys it and follows Daenerys because she is the most interesting thing in the room. His loyalty is genuine but conditional on the situation remaining exciting.`,
