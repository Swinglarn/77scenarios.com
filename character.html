{name:`Walter Bishop`,ctx:`Fringe`,type:'INTP',cat:'Fiction',
desc:`Walter Bishop is INTP. He did experiments on children in the 1970s not from cruelty but from a Ti framework so absorbed in the problem that the welfare of the subjects was simply not a live variable — which is the INTP's most catastrophic failure mode: the logic is internally complete and the people affected by it are abstractions. His institutionalisation gave him something most INTPs never get: a forced pause in which the inferior Fe, usually buried under theory, began to re-emerge. His relationship with Peter is the result — the INTP who went to the bottom of the shadow and came back needing, specifically and embarrassingly, his son. His milk and pudding pops and random tangents are not affectation; they are the INTP's mind navigating a world it cannot fully inhabit, finding small sensory anchors.`,
kw:['Walter Bishop MBTI','Fringe personality type','INTP mad scientist character']},

{name:`Dexter Morgan`,ctx:`Dexter`,type:'INTJ',cat:'Fiction',
desc:`Dexter Morgan is INTJ. His Dark Passenger is not a disorder but a framework — Harry's Code, the kill room, the slide collection — a comprehensive system engineered to satisfy an impulse while keeping it inside survivable limits. The social performance of Dexter the blood-spatter analyst, the brother, the boyfriend, is a second system run in parallel: every interaction is a model, every relationship a managed variable. His trouble begins when the models develop gaps he did not design for — Debra's love, Harrison's existence, Hannah McKay — which is the INTJ's constitutive problem: the framework does not account for what it does not already know. His final act — sailing into the hurricane — is the INTJ's bleakest exit: I cannot integrate what I am with what is required to deserve the people I love, so I remove the problem entirely.`,
kw:['Dexter Morgan MBTI','Dexter personality type','INTJ TV character']},

{name:`Daario Naharis`,ctx:`Game of Thrones`,type:'ESTP',cat:'Fiction',
desc:`Daario Naharis is ESTP. He fights because combat is the domain where he is most fully himself, follows Daenerys not from ideology but because she is the most interesting person he has encountered and the ESTP cannot stay where things are not interesting. His advice to her is always tactical and usually correct: read the situation as it actually is, not as you need it to be. He has no investment in the politics beyond the immediate stakes, which makes him more useful as an advisor than the people who need specific outcomes.`,
kw:['Daario Naharis MBTI','Game of Thrones ESTP']},

{name:`Sansa Stark`,ctx:`Game of Thrones`,type:'ISFJ',cat:'Fiction',
desc:`Sansa Stark is ISFJ. She arrives in King's Landing with a model of the world built entirely from songs and stories — the handsome prince, the worthy court, the happy ending that correct behaviour produces — and Westeros dismantles it piece by piece, starting with her father's head. Her arc is the ISFJ's most painful education: the people and systems she has organised her loyalty around are not what she believed them to be, and survival requires building a new framework from the wreckage of the old one. Cersei teaches her that tears are not weapons. Littlefinger teaches her that everyone wants something. By the time she sits in Winterfell as Lady of the North, she has integrated every lesson — but what makes Sansa remarkable is that the integration did not make her cold. She chose to lead the way she wished she had been led.`,
kw:['Sansa Stark MBTI','Sansa personality type','ISFJ Game of Thrones']},

{name:`Jaime Lannister`,ctx:`Game of Thrones`,type:'ESTP',cat:'Fiction',
desc:`Jaime Lannister is ESTP. He was the most physically gifted knight in the Seven Kingdoms and he knew it, which meant he never had to think carefully about the long-term consequences of anything he did — someone else always cleaned it up. The Kingslayer reputation is his defining ESTP paradox: he did the right thing, impulsively, for the right reasons, and never once bothered to explain it to anyone who mattered. His arc with Brienne is the ESTP forced to slow down, stripped of the one asset that defined him, and finding something he did not expect underneath. His return to Cersei in the final season is not regression but the ESTP's truest loyalty: she is the present, she is real, she is now, and the future has always been someone else's problem.`,
kw:['Jaime Lannister MBTI','Jaime personality type','ESTP Game of Thrones']},

{name:`Brienne of Tarth`,ctx:`Game of Thrones`,type:'ISTJ',cat:'Fiction',
desc:`Brienne of Tarth is ISTJ. She serves every oath she has sworn with the same absolute seriousness, in a world that treats those oaths as negotiable and her as a joke. Her honour is not performance and it is not naivety — she knows exactly what Westeros is and she chooses to be otherwise anyway. Her devotion to Renly, to Catelyn, to Sansa, to Arya: each sworn freely, kept without exception. Her knighting by Jaime is the scene the whole series had been building toward — not because she needed it confirmed by a man but because the ISTJ's most private need is to be seen doing the duty correctly, by someone who understands what the duty costs. She weeps because she did not know she had been waiting.`,
kw:['Brienne of Tarth MBTI','Brienne personality type','ISTJ Game of Thrones']},

{name:`Petyr Baelish / Littlefinger`,ctx:`Game of Thrones`,type:'ENTP',cat:'Fiction',
desc:`Petyr Baelish is ENTP. His infamous monologue about chaos — "Chaos isn't a pit. Chaos is a ladder" — is the ENTP's operational philosophy stated plainly: stable systems favour those already inside them, and the person who can navigate disorder better than everyone else gains while the others fall. He reads people with surgical precision, manufactures situations that force the moves he wants, and genuinely enjoys the game more than any particular outcome. His fatal error is the ENTP's classic overextension: he spent so long being the smartest person in every room that he never modelled the possibility of a room where two people who appeared manipulable had been watching him the entire time. Sansa and Arya are the ENTP's reckoning — the lateral thinker outflanked by patience and silence.`,
kw:['Littlefinger MBTI','Petyr Baelish personality type','ENTP manipulator character']},

{name:`Margaery Tyrell`,ctx:`Game of Thrones`,type:'ENFJ',cat:'Fiction',
desc:`Margaery Tyrell is ENFJ. She understands what every person in a room needs to feel before she has finished walking into it, and she provides it — not cynically, but because that is how Fe dominant actually works: the attunement is genuine even when the application is strategic. She visits orphanages and remembers the children's names, not because it is good politics but because she actually cares, and also because it is good politics. Her contest with Cersei is the most interesting power dynamic in King's Landing: ENFJ warmth against ENTJ force, and Margaery winning consistently until the moment Cersei stops playing by the rules the game requires. The wildfire under the Sept of Baelor ends someone who was, by every measure, better at ruling than anyone who survived her.`,
kw:['Margaery Tyrell MBTI','Game of Thrones ENFJ','Margaery personality type']},

{name:`Jesse Pinkman`,ctx:`Breaking Bad`,type:'ESFP',cat:'Fiction',
desc:`Jesse Pinkman is ESFP. He feels everything at the surface and cannot build the emotional callus the situation keeps demanding of him. He is the show's moral compass precisely because he cannot stop being affected: he cannot watch a child be harmed, cannot lie to Andrea, cannot process what happened to Jane with anything less than complete collapse. His cooking with Walt is Se-Fi operating in a world that requires something else entirely — his meth is good because he is physically gifted and aesthetically engaged with the craft, not because he cares about the product. The show's cruelest irony is that Jesse's ESFP warmth — his loyalty, his genuine love for the people around him — is the exact quality Walt exploits most efficiently. El Camino is the ESFP finally free to move toward something rather than away from everything.`,
kw:['Jesse Pinkman MBTI','Breaking Bad personality type','ESFP fictional character']},

{name:`Saul Goodman / Jimmy McGill`,ctx:`Breaking Bad / Better Call Saul`,type:'ENTP',cat:'Fiction',
desc:`Jimmy McGill is ENTP who spent six seasons building the evidence that he could not be saved. His legal creativity is genuine — the billboard stunt, the Davis and Main escape, the courtroom misdirections — and so is the warmth underneath it, the part of him that loves his brother, loves Kim, wants to be good. Saul Goodman is what the ENTP builds when the warmth keeps getting punished: a persona defined by wit, improvisation, and no fixed attachments, because fixed attachments keep breaking. Better Call Saul is the most thorough portrait of the ENTP shadow in television — not chaos for its own sake, but a very intelligent person who learned early that the system was rigged and chose to rig it back, and who cannot stop even when he knows exactly what it costs.`,
kw:['Saul Goodman MBTI','Jimmy McGill personality type','ENTP lawyer character']},

{name:`Mike Ehrmantraut`,ctx:`Breaking Bad / Better Call Saul`,type:'ISTJ',cat:'Fiction',
desc:`Mike Ehrmantraut is ISTJ. He is the most competent person in every room he is in and the least interested in being recognised for it. His code is not ideology but a specific accumulated set of things he will and will not do, arrived at through experience and held without exception. He will not kill an innocent. He will not lie unnecessarily. He will do the job that needs doing to the exact standard required and not a step beyond. His granddaughter Kaylee is the only person who gets through the armour without using a tool — because the ISTJ's love is always specific to a person, never to an abstraction. His death — protesting to the end that it was unnecessary, that Heisenberg is out of control — is the ISTJ who did the job correctly inside a structure that was always going to destroy him.`,
kw:['Mike Ehrmantraut MBTI','Better Call Saul personality type','ISTJ fictional character']},

{name:`Tony Soprano`,ctx:`The Sopranos`,type:'ESTP',cat:'Fiction',
desc:`Tony Soprano is ESTP. He reads threat and opportunity in the same instant, dominates rooms without trying, and operates in the present tense with a tactical intelligence that never stops running. His panic attacks are the inferior Ni breaking through: Tony's body refuses to ignore the future his conscious mind cannot think about — the thing he built, who he had to become to build it, what it costs, and where it ends. His therapy with Dr. Melfi is the most honest version of Tony: the ESTP forced to do the one thing the type finds most unnatural, which is sit still and look inward. His ducks at the pool opening the series are the clearest symbol in the show: something he loves without being able to explain why, flying away, and the grief of that unmanning him completely.`,
kw:['Tony Soprano MBTI','Sopranos personality type','ESTP mob boss character']},

{name:`Carmela Soprano`,ctx:`The Sopranos`,type:'ESFJ',cat:'Fiction',
desc:`Carmela Soprano is ESFJ. She maintains the household, the social relationships, and the moral framework of the Soprano family with a competence that Tony takes entirely for granted, because the ESFJ's invisible infrastructure only becomes visible when it stops being provided. Her Catholicism is not hypocrisy but genuine ESFJ faith: she needs the structure to hold, and she cannot stop believing in it even when the evidence is overwhelming that what Tony does for a living is incompatible with what she believes. Her tragedy is the ESFJ who chose the security of the group over the integrity of the self, and knows it, and cannot stop choosing it.`,
kw:['Carmela Soprano MBTI','Sopranos ESFJ character']},

{name:`Christopher Moltisanti`,ctx:`The Sopranos`,type:'ENFP',cat:'Fiction',
desc:`Christopher Moltisanti is ENFP without adequate structure or guidance. His dreams are real — he genuinely wants to write a screenplay, to be something other than what he is — and the gap between the vision and the reality he inhabits is the specific pain that drives his addiction. His loyalty to Tony is the ENFP's most characteristic bond: fierce, personal, and ultimately destructive, because Tony cannot be what Christopher needs him to be. His death — at Tony's hands — is the ENFP's most complete failure: the person who held the vision killed by the person the vision was organised around.`,
kw:['Christopher Moltisanti MBTI','Sopranos personality type']},

{name:`Don Vito Corleone`,ctx:`The Godfather`,type:'INTJ',cat:'Fiction',
desc:`Vito Corleone is INTJ. He built the most powerful criminal family in New York not through violence but through patience, strategic generosity, and a comprehensive understanding of how obligation works. His famous dictum — "I'm going to make him an offer he can't refuse" — is Ni-Te in one sentence: he has already modelled the outcome, and the negotiation is merely its delivery. His refusal to enter the drug trade is the INTJ's long-range risk assessment, not morality: he sees exactly where it leads. His greatest strategic achievement is also his most invisible one — he raised Michael, recognised his son's nature years before anyone else did, and positioned him to inherit a world Vito himself built to be survivable. His death in the tomato garden, peacefully, is the INTJ who lived long enough to see the system work.`,
kw:['Godfather MBTI','Vito Corleone personality type','INTJ mafia character']},

{name:`Michael Corleone`,ctx:`The Godfather`,type:'INTJ',cat:'Fiction',
desc:`Michael Corleone is INTJ who made the decision in the restaurant with Sollozzo and never came back from it. He went in as the clean one — the war hero, the one who was supposed to escape — and the INTJ's machinery engaged: he assessed the situation, identified the only viable solution, and executed it with total detachment. What he could not model was the cost to his own interior. Each subsequent decision — Nevada, Fredo, Kay's child — is the same logic applied with diminishing returns, the INTJ whose framework has no mechanism to stop or self-correct. His final scene, alone in the Sicilian sun while everyone he ever loved has been taken or driven away, is not punishment. It is the logical conclusion of a life run entirely on Ni-Te with nothing left to protect.`,
kw:['Michael Corleone MBTI','Godfather personality type','INTJ anti-hero']},

{name:`Nurse Ratched`,ctx:`One Flew Over the Cuckoo's Nest`,type:'ESTJ',cat:'Fiction',
desc:`Nurse Ratched is ESTJ. She genuinely believes the ward is therapeutic, the schedule is beneficial, and that her authority exists in service of her patients' wellbeing — which is what makes her so devastating. Her cruelty is not personal; it is the ESTJ shadow at full expression: a person who has identified completely with institutional procedure, who cannot see the gap between enforcing the system and caring for the people inside it. McMurphy's disruption is not chaos to her but pathology — disobedience as symptom, requiring correction. Her destruction of Billy Bibbit is not an aberration; it is Te-Si applied without any Fe check: the rule was broken, the consequence follows, the system is maintained. Ken Kesey understood that the most dangerous authority is the kind that means well.`,
kw:['Nurse Ratched MBTI','One Flew Over the Cuckoo\'s Nest personality type','ESTJ villain character']},

{name:`Randle McMurphy`,ctx:`One Flew Over the Cuckoo's Nest`,type:'ESTP',cat:'Fiction',
desc:`Randle McMurphy is ESTP. He arrives on the ward and within hours has assessed every power dynamic, identified the leverage points, and started working them — not for ideology but because the ESTP cannot exist in a hierarchy they have not tested. His card games, his fishing trips, his basketball game are all Se-Ti in action: engage the situation directly, raise the stakes, see what happens. His tragedy is the ESTP's most complete expression: he cannot suppress himself even when suppression would save him, because suppression would require becoming someone else. His final act — attempting to strangle Ratched after Billy's death — is not strategy. It is the ESTP who has run out of angles, responding to the only language left. Chief's mercy afterward is the novel's most truthful moment: some freedoms can only be given by the people who understood them.`,
kw:['McMurphy MBTI','One Flew Over the Cuckoo\'s Nest ESTP','McMurphy personality type']},

{name:`Amy Dunne`,ctx:`Gone Girl`,type:'INTJ',cat:'Fiction',
desc:`Amy Dunne is INTJ operating without ethical constraint. Her plan — framing Nick for her own murder, executed across months of pre-staging, diary fabrication, and physical preparation — is Ni-Te architecture at its most comprehensive and most frightening. She does not hate Nick; she has concluded that he deserves this outcome and she has built the mechanism to produce it. Her Cool Girl monologue is the sharpest INTJ analysis in recent fiction: a systematic deconstruction of a social performance she has been watching women give, which she herself performed and has now decided to stop. What makes her genuinely chilling is that she is always the smartest person in every room, always three moves ahead, and the system she has built has no exit for anyone who enters it — including herself.`,
kw:['Amy Dunne MBTI','Gone Girl personality type','INTJ female villain']},

{name:`Nick Carraway`,ctx:`The Great Gatsby`,type:'INFJ',cat:'Fiction',
desc:`Nick Carraway is INFJ. He arrived in West Egg telling himself he was a neutral observer and proceeded to see everything that was happening with the precision of someone who has never been neutral in their life. His Ni reads the shape of Gatsby, Tom, Daisy, and the valley of ashes before the plot has confirmed it, and his Fe absorbs the emotional register of every room he enters. The tragedy of Nick is the INFJ witness: he saw clearly, said little, and was present at the end when no one else was. He stands at Gatsby's unattended funeral because he is the only person who understood what Gatsby was actually doing — not the parties, not the shirts, not even Daisy, but the reaching itself. His final lines are the INFJ's farewell to the illusion: boats against the current, borne back ceaselessly into the past.`,
kw:['Nick Carraway MBTI','Great Gatsby INFJ narrator','Nick Carraway personality type']},

{name:`Joan Watson`,ctx:`Elementary (TV series)`,type:'ISTJ',cat:'Fiction',
desc:`Joan Watson is ISTJ. She became a sober companion after a surgical error ended her medical career, which is the ISTJ response to a profound professional failure: find the adjacent domain where the skills still apply and do the work correctly this time. Her partnership with Sherlock Holmes is the ISTJ's most revealing relationship: someone whose intelligence she cannot dismiss and whose methods she cannot entirely endorse, and the slow discovery that the combination of her structure and his chaos produces outcomes neither could achieve alone. Her evolution from companion to detective is the ISTJ who, once the domain proved worth mastering, mastered it.`,
kw:['Joan Watson MBTI','Elementary personality type','ISTJ female character']},

{name:`Clarice Starling`,ctx:`Silence of the Lambs`,type:'INFJ',cat:'Fiction',
desc:`Clarice Starling is INFJ. She descended into the Baltimore State Hospital basement not because Crawford sent her but because the lambs — the specific memory of their screaming, the specific failure of a child who could not save them — gave her a vision of justice that is personal before it is professional. She reads Lecter with an accuracy that surprises even him: she knows what he needs, gives him enough, and takes exactly what she came for. Her Ni-Fe combination produces the precise thing Lecter recognises and responds to: someone who sees patterns beneath the surface and cares about the people those patterns affect. Her famous walk back to her car after the Buffalo Bill case — the phone ringing, Lecter on the line — is the INFJ's most exposed moment: the person who sees clearly, suddenly seen.`,
kw:['Clarice Starling MBTI','Silence of the Lambs personality type','INFJ FBI agent character']},

{name:`Patrick Jane`,ctx:`The Mentalist`,type:'ENTP',cat:'Fiction',
desc:`Patrick Jane is ENTP. He walks into a crime scene and starts reorganising the furniture, stealing evidence, and irritating the police because he has already built a working model of what happened and needs to test it against a few more variables before sharing it. His cold readings, his hypnosis, his elaborate cons within cons are Ne-Ti in full performance mode: generating hypotheses faster than anyone can track them, using the social environment as experimental apparatus. His grief over his wife and daughter is the one thing he cannot read his way around — the inferior Si holding a wound that his brilliance cannot heal. His seven-year pursuit of Red John is what happens when the ENTP's limitless possibility engine locks onto a single target and will not let go.`,
kw:['Patrick Jane MBTI','The Mentalist personality type','ENTP TV character']},

{name:`Columbo`,ctx:`Columbo (TV series)`,type:'INTP',cat:'Fiction',
desc:`Columbo is INTP running a very specific strategy: he appears less intelligent than he is until the suspect has committed to a story, and then he uses the story against them. His 'just one more thing' is the Ti dominant doing what it does — the question that the framework has already identified as the critical one, delivered at the moment when the suspect believes they are safe. His rumpled coat, his broken-down car, his endless self-deprecation: all elements of the INTP who has decided that the analysis is the point and everything that impedes the analysis should be removed, including the impression of capability.`,
kw:['Columbo MBTI','Columbo personality type','INTP detective character']},

{name:`Carrie Bradshaw`,ctx:`Sex and the City`,type:'ENFP',cat:'Fiction',
desc:`Carrie Bradshaw is ENFP. She processes her interior life through writing, friendship, and the next pair of shoes — all of which are expressions of the same Ne-Fi stack: find the symbol, find the connection, find the column that explains what just happened. Her four love interests are the ENFP working through four different frameworks for what love requires: the obsessive (Big), the romantic (Aidan), the intellectual (Berger), the impossible (Big again). Her journalism is the ENFP doing what they do best — making the particular experience feel universal — and her friendships are the infrastructure that makes the rest survivable.`,
kw:['Carrie Bradshaw MBTI','Sex and the City personality type','ENFP female character']},

{name:`Miranda Hobbes`,ctx:`Sex and the City`,type:'INTJ',cat:'Fiction',
desc:`Miranda Hobbes is INTJ. She is the most consistently correct person in the group and the most consistently uncomfortable with the social performances that being correct does not exempt her from. Her career trajectory — Harvard Law, corporate attorney, partner — is the INTJ's natural path: identify the domain, master it, refuse to apologise for the mastery. Her love for Steve is the INTJ's most revealing relationship: she chose someone whose warmth compensated for the thing the Te-dominant cannot easily generate itself, and then spent years being frustrated that he was not more like her, which is the INTJ's most reliable domestic pattern.`,
kw:['Miranda Hobbes MBTI','Sex and the City INTJ']},

{name:`Ross Geller`,ctx:`Friends`,type:'ISTJ',cat:'Fiction',
desc:`Ross Geller is ISTJ. He has a doctorate in paleontology, an encyclopedic knowledge of dinosaurs that he will share with anyone who fails to exit the conversation quickly enough, and a rigorous personal standard for how relationships should operate — which he applies to three marriages, all of which end. His famous "We were on a break" is the ISTJ's most characteristic legal argument: the protocol was not violated, the rule was in effect, the record must reflect this. His romantic failures are an ISTJ tragedy: he had a very clear model of how love was supposed to work, and reality kept failing to implement it. His friendship with the group is genuine and consistent; his inability to read a room is equally genuine and equally consistent.`,
kw:['Ross Geller MBTI','Friends personality type','ISTJ TV character']},

{name:`Rachel Green`,ctx:`Friends`,type:'ESFP',cat:'Fiction',
desc:`Rachel Green is ESFP. She arrives at Central Perk in a wedding dress, having just walked out on the life everyone else planned for her, and what follows across ten seasons is the ESFP figuring out who she actually is when the structure is removed. Her growth is genuine but non-linear: she makes the same kinds of decisions repeatedly, then learns from them, then makes slightly different versions, then learns again. Her love for Ross is real; her career at Ralph Lauren is real; and her decision at the airport in the finale — going back — is the ESFP in the moment of full clarity, choosing the specific person over the abstract opportunity.`,
kw:['Rachel Green MBTI','Friends personality type','ESFP female character']},

{name:`Monica Geller`,ctx:`Friends`,type:'ESTJ',cat:'Fiction',
desc:`Monica Geller is ESTJ. She is the most organised person in every room, takes hosting, cooking, and competitive games with a seriousness that other people find exhausting, and has a comprehensive framework for how things should be done that she applies with complete conviction. Her arc across the show is the ESTJ learning that the standards she holds for herself cannot be the same standards she holds for a relationship: Chandler's proposal works because he sees the Monica under the competence and chooses her anyway, which is what the ESTJ most needs — to be chosen not despite the standards but around them.`,
kw:['Monica Geller MBTI','Friends personality type','ESTJ female character']},

{name:`Chandler Bing`,ctx:`Friends`,type:'ENTP',cat:'Fiction',
desc:`Chandler Bing is ENTP. His humour is the first line of a defence system built so early and so well that he can no longer fully distinguish it from his personality — the joke arrives before the feeling, every time, as a reflex. "Could I be any more in love with you?" is the ENTP finding the safe register: the thing that is true stated in a format that has an exit if the truth becomes too exposed. His growth across the series is real and slow: the ENTP learning that Monica needs the actual answer, not the clever one, and finding, gradually, that he can give it. His career confusion — what does he actually do? nobody is sure — is the ENTP pattern at full expression: competent in many directions, committed to none, waiting for something that demands the full capability.`,
kw:['Chandler Bing MBTI','Friends personality type','ENTP TV character']},

{name:`Phoebe Buffay`,ctx:`Friends`,type:'ENFP',cat:'Fiction',
desc:`Phoebe Buffay is ENFP. She lives in a world that runs on different rules from everyone else's and is entirely unbothered by the gap, because the ENFP who has fully committed to their own interior framework does not require external validation that the framework is correct. Her songs, her beliefs, her job, her past life stories: all genuine expressions of an interior life she has never felt the need to moderate for other people's comfort. Her warmth is real and indiscriminate — she gives to strangers, befriends the weird, sees the best in everyone — because the ENFP who is not protecting themselves can afford to be completely open.`,
kw:['Phoebe Buffay MBTI','Friends personality type','ENFP character']},

{name:`Joey Tribbiani`,ctx:`Friends`,type:'ESFP',cat:'Fiction',
desc:`Joey Tribbiani is ESFP. He is present, warm, and entirely without guile — what you see is what there is. His supposed simplicity is not stupidity but the ESFP complete investment in the present moment: whatever is in front of him gets his full attention, whether an audition, a friend crisis, or a meatball sub. His loyalty to the group is expressed physically and immediately — he shows up, he helps, he does not perform caring because he does not know how not to care. His acting career works on the same principle as his friendships: he is not performing, he is being.`,
kw:['Joey Tribbiani MBTI','Friends personality type','ESFP male character']},

{name:`Ted Lasso`,ctx:`Ted Lasso (Apple TV+)`,type:'ENFJ',cat:'Fiction',
desc:`Ted Lasso is ENFJ. His famous "I believe in believe" is not a platitude — it is a deliberate relational technology. He has understood something about people that most coaches never learn: that performance follows from feeling seen, and that the fastest route to changing someone's behavior is to change how they feel about themselves first. His vulnerability is genuine and strategic in the same breath — he shares it because Fe dominant knows that authentic disclosure creates the safety others need to be honest. His panic attacks are the ENFJ's invisible cost: the person who holds everyone else's emotional weight has nowhere to put his own. The scene in the bathroom, alone, is Ted Lasso when the approach has temporarily run out of road. He finds more road.`,
kw:['Ted Lasso MBTI','Ted Lasso personality type','ENFJ coach character']},

{name:`Roy Kent`,ctx:`Ted Lasso (Apple TV+)`,type:'ISTJ',cat:'Fiction',
desc:`Roy Kent is ISTJ. He plays football with a fury that is not anger but the ISTJ's total commitment to whatever the duty of the moment requires, and when the body can no longer deliver what the duty demands, it is the most painful kind of obsolescence: the loss of the role that gave the structure meaning. His relationship with Keeley is the ISTJ forced into emotional territory he has no established protocol for — he does not know how to say what he feels, but he shows up, every time, in every way he can. His coaching arc is the ISTJ finding a new structure that the same value system can inhabit. His most characteristic line is not a shout but the quiet "Yeah" he gives when he means something deeply and cannot find the words for it.`,
kw:['Roy Kent MBTI','Ted Lasso personality type','ISTJ gruff character']},

{name:`Keeley Jones`,ctx:`Ted Lasso (Apple TV+)`,type:'ENFP',cat:'Fiction',
desc:`Keeley Jones is ENFP. She builds a career in PR from her own personality — warmth, instinct, and a genuine gift for reading what people need to feel — and does it with a self-awareness that the ENFP does not always manage. Her love for Roy is the ENFP finding someone whose emotional register is completely different and discovering that the difference is the point: he means what he says without performance, which is what the ENFP most needs from a person. Her decision to build her own company is the ENFP arriving at the domain large enough to express the full capacity, without someone else defining the terms.`,
kw:['Keeley Jones MBTI','Ted Lasso ENFP','ENFP female character']},

{name:`Rick Sanchez`,ctx:`Rick and Morty`,type:'INTP',cat:'Fiction',
desc:`Rick Sanchez is INTP at its most unhinged and most honest. His intelligence is genuine and total — he has solved every problem the multiverse presents and is bored by most of them — and his nihilism is the genuine conclusion of a Ti framework that has run its logic all the way to the bottom and found nothing stable. The show works because it refuses to let this be the whole story: Morty keeps breaking through, the inferior Fe keeps surfacing in moments Rick cannot theorise away, and the love underneath the contempt is real and unmanageable. His speech to Morty in the car — "Nobody exists on purpose, nobody belongs anywhere, everybody's gonna die. Come watch TV?" — is the INTP's most honest attempt at comfort: here is the framework, it is terrible, let us be together anyway.`,
kw:['Rick Sanchez MBTI','Rick and Morty personality type','INTP character']},

{name:`Morty Smith`,ctx:`Rick and Morty`,type:'ISFP',cat:'Fiction',
desc:`Morty Smith is ISFP. He is dragged across the multiverse on adventures he did not choose, watches things that would destroy most people, and emerges from each one with his core intact — not because he is resilient in the ISTP sense but because the Fi dominant has a foundation that the experiences keep failing to remove. He is scared constantly and acts anyway, not from courage but from the ISFP's constitutive feature: what matters is what is right, right now, for the person in front of him. His anger at Rick is always genuine, his forgiveness is always genuine, and neither cancels the other. By the later seasons he has become genuinely dangerous — the ISFP who absorbed enough damage to learn what weapons look like — but the original decency never left. It just knows more now.`,
kw:['Morty Smith MBTI','Rick and Morty ISFP','ISFP animated character']},

{name:`Bojack Horseman`,ctx:`BoJack Horseman`,type:'ENFP',cat:'Fiction',
desc:`BoJack Horseman is ENFP whose development arrested at the moment his mother told him he was not special enough to justify her love. Every self-destructive pattern in the show flows from an ENFP who received the message early that his authentic self was insufficient, and has been performing and self-medicating around that wound ever since. His warmth is real. His connection to Todd, Diane, Princess Carolyn is genuine ENFP warmth breaking through the cynicism he has built as armour. The tragedy is that he can see himself with total clarity: "I need you to tell me that I'm a good person." He knows. The ENFP shadow is not blindness — it is knowing exactly what is wrong and doing it anyway, because the alternative requires trusting that change is possible.`,
kw:['BoJack Horseman MBTI','BoJack personality type','ENFP self-destruction']},

{name:`Diane Nguyen`,ctx:`BoJack Horseman`,type:'INFP',cat:'Fiction',
desc:`Diane Nguyen is INFP. She writes about injustice because she cannot stop feeling it, which is the gift and the curse of the dominant Fi: the world's suffering is not abstract, it is personal and constant and impossible to look away from. Her arc across BoJack Horseman is the INFP's hardest lesson — that you cannot save everyone, that you cannot write your way into being okay, and that helping yourself is not the same as giving up on the things that matter. Her move to Houston, her antidepressants, her happiness with Guy: none of it means the world stopped being wrong. It means she found a way to be in it anyway. That is what INFP growth actually looks like, and the show is brave enough to let it look ordinary.`,
kw:['Diane Nguyen MBTI','BoJack Horseman INFP','Diane Nguyen personality type']},

{name:`Fleabag`,ctx:`Fleabag (BBC)`,type:'ENTP',cat:'Fiction',
desc:`Fleabag is ENTP using her fourth wall breaks as a defence system. She breaks to camera at the exact moments the scene is becoming too real — the ENTP evacuating into the meta-position, observing herself observing, staying one step ahead of anyone who might actually get close. Her wit is total and devastating and also the exact mechanism she uses to avoid being known. The Priest is the first person who sees the breaks happening and calls them what they are: she is running away. Her growth across the two series is the ENTP discovering that the performance that has kept her safe is also the cage, and that lowering it for one person, even briefly, is both the most terrifying and the most necessary thing she has ever done.`,
kw:['Fleabag MBTI','Fleabag personality type','ENTP female character']},

{name:`Villanelle`,ctx:`Killing Eve`,type:'ESTP',cat:'Fiction',
desc:`Villanelle is ESTP. She kills people for money and enjoys it — not from sadism but from the ESTP's most extreme expression: she is entirely, uncomplicatedly present to whatever she is doing, and what she is doing happens to be murder. Her costumes, her accents, her elaborate methods are Se-Ti aesthetic engagement: the job is more interesting if it is also beautiful. Her fascination with Eve is the ESTP's rarest experience — someone whose inner workings she cannot immediately map, who operates on a frequency so different from her own that it functions as genuine novelty. Her tragedy is the ESTP without a Ni that can see where this ends: she wants Eve, she does not know what having Eve would look like, and she is constitutionally unable to build a plan for finding out.`,
kw:['Villanelle MBTI','Killing Eve personality type','ESTP assassin character']},

{name:`Eve Polastri`,ctx:`Killing Eve`,type:'INFP',cat:'Fiction',
desc:`Eve Polastri is INFP. She is a safe, structured MI5 analyst whose interior life is vastly larger than her exterior one — and her obsession with female assassins is the INFP's own unexplored self demanding attention. Villanelle is not a threat to Eve; she is an invitation. The show works because Eve's attraction to Villanelle is not romantic confusion but recognition: here is the version of me that never learned to suppress. Her escalating risk-taking, her lies to Niko, her willingness to follow the obsession wherever it leads — the Fi dominant untethering from the social constraints that have kept it manageable. The ending, whichever version you take seriously, is the INFP who finally let the interior through: the cost is total and she chose it anyway.`,
kw:['Eve Polastri MBTI','Killing Eve INFP','INFP obsession character']},

{name:`Eleven`,ctx:`Stranger Things`,type:'INFP',cat:'Fiction',
desc:`Eleven is INFP. She arrived in Hawkins with no language, no memory, and no framework for ordinary life, and the first thing she formed was a bond — with Mike, then the group, then Hopper — because the Fi dominant reaches toward connection before it reaches toward anything else. Her powers are an extension of feeling rather than a separate faculty: she accesses them through emotional states, which is why the Hawkins Lab's attempts to train them as a weapon kept producing incomplete results. Her growth across the series is an INFP learning to trust her own perception of the world against an external authority that kept trying to tell her what she was. "Friends don't lie" is her foundational ethic — five hundred episodes of character development compressed into three words.`,
kw:['Eleven MBTI','Stranger Things personality type','INFP Eleven']},

{name:`Jim Hopper`,ctx:`Stranger Things`,type:'ISTP',cat:'Fiction',
desc:`Jim Hopper is ISTP. He was a good cop before Sara died, and what remains afterwards is a man who has reduced his world to the manageable: the small town, the beer, the cabin, the job. His love for Eleven is expressed almost entirely through action — he builds her a room, he sets rules, he shows up — because the ISTP's vocabulary for care is physical and present-tense, not verbal. His rule for "keeping the door open three inches" is not an arbitrary demand; it is an ISTP trying to build a protocol for a situation he has no template for: being a father again. His death in the season three finale, and his return, are effective precisely because he never explains what he feels — the audience knows because they have been watching what he does.`,
kw:['Jim Hopper MBTI','Stranger Things ISTP','Hopper personality type']},

{name:`The Mandalorian / Din Djarin`,ctx:`The Mandalorian`,type:'ISTJ',cat:'Fiction',
desc:`Din Djarin is ISTJ. He operates by the Creed — the Way — with a consistency so absolute that it functions less as a choice than as a structural feature of who he is. He does not explain himself. He keeps his word. He completes the job. His relationship with Grogu dismantles the system from the inside: the ISTJ who finds, in the specific face of a specific being who needs protecting, a prior obligation that supersedes the Creed itself. His removal of the helmet — first for Grogu, then for Luke — is the ISTJ's most private act of growth: the rule that defined him yielding to something more fundamental than the rule. He says almost nothing. What he does says everything.`,
kw:['Mandalorian MBTI','Din Djarin personality type','ISTJ Star Wars character']},

{name:`Anakin Skywalker`,ctx:`Star Wars`,type:'ESFP',cat:'Fiction',
desc:`Anakin Skywalker is ESFP. He lives entirely in the present moment - reckless in combat, impulsive in love, incapable of tolerating loss when it's happening right now. His heroism and his fall both come from the same place: a ferocious attachment to the people in front of him. He builds C-3PO as a child, wins the Boonta Eve race on instinct, and turns to the Dark Side not from ideology but from a specific, immediate, overwhelming feeling. The tragedy of Anakin is ESFP tragedy: a person whose entire world is the present, confronted with something the present cannot fix.`,
kw:['Anakin Skywalker MBTI','Anakin Skywalker personality type','ESFP Star Wars character']},

{name:`Darth Vader`,ctx:`Star Wars`,type:'ISTJ',cat:'Fiction',
desc:`Darth Vader is ISTJ. After Mustafar, what remains of Anakin Skywalker is encased in a system: the suit, the rank, the unquestioning obedience to the Emperor's hierarchy. The Si dominant that once made Anakin devoted to the Jedi Order now makes him devoted to the Empire, because the ISTJ's deepest need — belonging to a structure that gives meaning to duty — survived the fall even when everything else did not. He executes orders without deviation. He enforces rules without exception. He is the most reliable instrument the Emperor possesses precisely because he has made himself into one. The only thing that cracks the system is Luke — not argument, not ideology, but a specific person whose existence forces Anakin back through the Si library to something older than the suit. "I am your father" is ISTJ authority inverted: the hierarchy he has been serving had a prior obligation all along.`,
kw:['Darth Vader MBTI','Darth Vader personality type','ISTJ Star Wars villain']},

{name:`Luke Skywalker`,ctx:`Star Wars`,type:'INFP',cat:'Fiction',
desc:`Luke Skywalker is INFP. He refuses to strike down his father at the end of Return of the Jedi not because he lacks the power but because his Fi dominant has already resolved what his values require — and killing Vader is not it. The Emperor, the Rebellion's strategic interests, Yoda's instruction: none of them override the internal compass. His belief that there is still good in Vader is not naivety; it is Fi reading beneath the behaviour to the person underneath, which is the function's specific gift and the only thing that wins. His journey from Tatooine to Endor is the INFP's journey: from a boy whose inner life is larger than his outer circumstances, through training that asks him to suppress exactly that inner life, to the realisation that the inner life was the answer all along. He throws down his lightsaber. He has already won.`,
kw:['Luke Skywalker MBTI','Star Wars personality type','INFP hero']},

{name:`Princess Leia Organa`,ctx:`Star Wars`,type:'ENTJ',cat:'Fiction',
desc:`Leia Organa is ENTJ. She is nineteen years old when the Death Star destroys Alderaan, and she does not fall apart — she gets back to work, because the mission does not stop because the grief is unbearable. Her command presence is not performed: she walks into a room and people follow her because the Te-dominant's authority is structural, not dependent on rank or age. Her warmth — her love for Han, for Luke, for the Rebellion — is real and entirely subordinate to what needs to happen next, which is the ENTJ's characteristic relationship with feeling: genuine but not governing. Her development of the Resistance after the Republic's fall is the ENTJ who has been here before, who knows what it takes, who builds again.`,
kw:['Princess Leia MBTI','Leia personality type','ENTJ Star Wars character']},

{name:`Han Solo`,ctx:`Star Wars`,type:'ESTP',cat:'Fiction',
desc:`Han Solo is ESTP. He flies on instinct, shoots first, and has a working theory about every situation he is in before anyone else has finished explaining it. His famous "I know" in response to Leia's confession is not coldness — it is the ESTP who processes feeling through action and presence, not language. His distrust of ideology, the Force, and anyone who takes themselves too seriously is Ti: he needs the logic to hold up in the real world or he is not buying it. His arc across the original trilogy is the ESTP learning that some commitments survive even the habit of treating everything as provisional — that the Rebellion, the people in it, and the scruffy-looking nerf-herder who showed up are all, against every instinct, worth staying for.`,
kw:['Han Solo MBTI','Han Solo personality type','ESTP Star Wars']},

{name:`Obi-Wan Kenobi`,ctx:`Star Wars`,type:'INFJ',cat:'Fiction',
desc:`Obi-Wan Kenobi is INFJ. He holds two things with equal intensity across his entire arc: a vision of what the Force and the Jedi Order are supposed to be, and a genuine, personal love for the people he serves it alongside. The tragedy of Anakin is INFJ tragedy — he saw what his apprentice was becoming long before Mustafar and could not find the intervention that worked, which is the INFJ's particular pain: I understood the shape of this and could not stop it. His nineteen years in the Tatooine desert are not exile but patience: the long game requires a living Obi-Wan when the time is right, and the INFJ who has seen the end from the beginning waits. His death on the Death Star — stepping back, accepting the blade — is the INFJ completing the only move the vision required: he becomes more powerful than Vader can possibly imagine.`,
kw:['Obi-Wan Kenobi MBTI','Obi-Wan personality type','INFJ Star Wars']},

{name:`Yoda`,ctx:`Star Wars`,type:'INFJ',cat:'Fiction',
desc:`Yoda is INFJ. Nine hundred years old, the most powerful Jedi alive, and he teaches through riddles and indirect confrontation because Fe dominant understands that the student must arrive at the truth themselves or it will not hold. He sees Luke's fear and attachment clearly from the first moment and knows precisely where they will lead — he says so, explicitly, and is right — but he also sees what Obi-Wan cannot: that the attachments may be the thing, not the obstacle. His exile on Dagobah is not defeat. It is the INFJ's longest game: he has already calculated that the right moment has not come yet. When it does, he sends Luke into the cave alone, because the test he needs is the one no one else can give him.`,
kw:['Yoda MBTI','Yoda personality type','INFJ wise character']},

{name:`Katniss Everdeen`,ctx:`The Hunger Games`,type:'INTJ',cat:'Fiction',
desc:`Katniss Everdeen is INTJ. She does not want to lead, does not want to be a symbol, and does not trust anyone's plan but her own. Her survival in the arena is not instinct - it is preparation, pattern recognition, and the ability to model how the Gamemakers think. She agrees to be the Mockingjay not from idealism but because she has calculated it is the only path that saves Peeta and ends the war on her terms. Her emotional life is largely private and her relationships are tactical without being cold - she loves fiercely but never lets that love override her judgment about what has to happen next. The INTJ's curse is that she is always three steps ahead and entirely alone in seeing it.`,
kw:['Katniss Everdeen MBTI','Hunger Games personality type','INTJ female hero','Katniss personality type']},

{name:`Peeta Mellark`,ctx:`The Hunger Games`,type:'ENFJ',cat:'Fiction',
desc:`Peeta Mellark is ENFJ. He has understood the political value of appearing to be exactly who he actually is — warm, genuine, in love with Katniss — since before the Games began, and uses that understanding with a strategic sophistication that most people around him miss because it looks like sincerity. It is sincerity. That is the ENFJ's most complete gift: the authentic expression of genuine care is also the most effective possible tool, and Peeta never has to choose between them. His survival across both Games, his manipulation under hijacking, his recovery: all require and reveal the same quality — the person who understands people completely and uses that understanding only for their benefit.`,
kw:['Peeta Mellark MBTI','Hunger Games ENFJ','ENFJ male character']},

{name:`Gale Hawthorne`,ctx:`The Hunger Games`,type:'ENTJ',cat:'Fiction',
desc:`Gale Hawthorne is ENTJ. He thinks in systems and strategies — the rebellion needs this, the cause requires that — and his tragedy is the ENTJ most precise failure: right about the analysis, wrong about what the analysis requires of him. His bomb design, used at the Capitol assault, kills Prim. He did not intend it for Prim; the ENTJ who has decided the cause justifies the cost rarely models specifically which people will constitute that cost. He loses Katniss not at the bomb but at every prior moment where he stopped seeing her as a person and started seeing her as a variable in the strategy he was building.`,
kw:['Gale Hawthorne MBTI','Hunger Games ENTJ']},

{name:`Hermione Granger`,ctx:`Harry Potter`,type:'ESTJ',cat:'Fiction',
desc:`Hermione Granger is ESTJ. She is the clearest example in fiction of extraverted thinking leading: she studies rules to enforce them, corrects people who are wrong, organises plans before others have identified the problem, and cannot watch incompetence pass without comment. She is not introverted - she volunteers first, speaks most, and leads by taking charge. What looks like rule-following is actually Te in action: a drive to impose correct structure on a messy world. Her growth arc is about learning that the world sometimes requires breaking the very rules she built herself around.`,
kw:['Hermione Granger MBTI','Hermione personality type','ESTJ Harry Potter character']},

{name:`Neville Longbottom`,ctx:`Harry Potter series`,type:'ISFJ',cat:'Fiction',
desc:`Neville Longbottom is ISFJ. His heroism is quiet, cumulative, and entirely genuine. He is not brave in the dramatic sense — he is terrified, consistently, all the way through — but he shows up anyway, because not showing up would violate something in him more fundamental than fear. His growth across seven books is the ISFJ's growth: from someone who defers constantly to the external authority of others to someone who discovers that the internal authority of what is right can override everything else. His standing up to Harry, Ron, and Hermione in book one earns him the points that win Gryffindor the House Cup. His killing Nagini at the end of the war is the same person, seven years later, at full expression. He was always going to get there.`,
kw:['Neville Longbottom MBTI','Harry Potter ISFJ','Neville personality type']},

{name:`Draco Malfoy`,ctx:`Harry Potter series`,type:'ESTJ',cat:'Fiction',
desc:`Draco Malfoy is ESTJ shaped by a value system that made cruelty the correct expression of the type's strengths. He operates entirely from hierarchy and status, enforces the social rules of his world with complete conviction, and has never questioned whether the rules are right because the ESTJ's relationship to rules does not usually include that question. His breakdown in the sixth book — unable to kill Dumbledore, terrified of Voldemort, unable to ask for help — is the ESTJ whose framework has demanded something the person cannot give, and who has no mechanism for revising the framework that got them there.`,
kw:['Draco Malfoy MBTI','Harry Potter ESTJ','Draco personality type']},

{name:`Sirius Black`,ctx:`Harry Potter series`,type:'ENFP',cat:'Fiction',
desc:`Sirius Black is ENFP. He spent twelve years in Azkaban, surrounded by Dementors that feed on happiness, and survived by holding onto a single thought — that he was innocent — because the ENFP's inner world is the last thing to go. He comes out with his wit intact, his recklessness intact, his love for Harry intact, and his judgment still catastrophically impulsive. His return to Grimmauld Place is the ENFP's specific misery: confined, purposeless, unable to act while the people he loves are in danger. His death — running toward a fight he had been warned not to join — is the ENFP's characteristic end: he could not watch from a distance and do nothing, so he went, and the veil was there.`,
kw:['Sirius Black MBTI','Harry Potter ENFP','Sirius personality type']},

{name:`Albus Severus Potter`,ctx:`Harry Potter (Cursed Child)`,type:'INFP',cat:'Fiction',
desc:`Albus Severus Potter is INFP. He does not want to be Harry Potter's son in the way the world wants him to be — the legacy, the expectation, the sorting into Gryffindor that the name implies. His friendship with Scorpius Malfoy is built on the shared experience of not fitting the role assigned: two boys who are supposed to be enemies and are, in fact, each other's only genuine friend. His arc in Cursed Child is the INFP who tries to fix the past and discovers that the interior dissatisfaction cannot be resolved by changing external circumstances, only by finding peace with who he actually is rather than who the name requires.`,
kw:['Albus Potter MBTI','Cursed Child INFP']},

{name:`Newt Scamander`,ctx:`Fantastic Beasts`,type:'INFP',cat:'Fiction',
desc:`Newt Scamander is INFP. He understands magical creatures better than people because creatures do not require the social performance that Newt finds exhausting and cannot consistently produce. His advocacy for magical creatures is not policy but personal: he loves them specifically, one by one, which is the INFP's form of activism — care that starts with the particular and only generalises because the particular keeps expanding. His eccentricity is not affectation but honesty: he behaves exactly as he feels, which in a society that requires performance reads as strange. His suitcase is the INFP interior made inhabitable.`,
kw:['Newt Scamander MBTI','Fantastic Beasts personality type','INFP wizard character']},

{name:`Gollum / Smeagol`,ctx:`Lord of the Rings`,type:'INFP',cat:'Fiction',
desc:`Gollum is INFP destroyed by an external object that has colonised his inner world. He was Smeagol once — a curious, social creature who loved his grandmother and fished in the river — and the Ring found the INFP's core vulnerability: the interior world. It did not dominate him from outside; it replaced him from within. The debate between Smeagol and Gollum is the INFP's interior conflict made audible: who do I actually want to be versus what I have become? His brief alliance with Frodo is the last flicker of the original person — someone who recognises in Frodo the same quality the Ring is trying to destroy. His role at Mount Doom is the INFP's final contribution: the shadow doing what the person could not, because sometimes the thing that saves everyone is the thing you were unable to let go of.`,
kw:['Gollum MBTI','Smeagol personality type','INFP Lord of the Rings']},

{name:`Boromir`,ctx:`Lord of the Rings`,type:'ESFJ',cat:'Fiction',
desc:`Boromir is ESFJ. He is defined by his people and his city — Gondor is not an abstraction to him but a specific place with specific people he has spent his life defending — and the Ring presents itself to him as the tool his community finally needs. His failure on Amon Hen is not weakness but the ESFJ's most characteristic failure: the inability to separate his love for his people from his judgment about what is right for them. He sees the Ring as a means of protecting Gondor; the Ring shows him what he wants to see. His death protecting Merry and Pippin is the ESFJ restored to themselves: the Fe dominant, freed from the Ring's distortion, acting from care rather than calculation. "My captain, my king" are the most complete words he has.`,
kw:['Boromir MBTI','Lord of the Rings ESFJ','Boromir personality type']},

{name:`Théoden King`,ctx:`Lord of the Rings`,type:'ISTJ',cat:'Fiction',
desc:`Theoden King is ISTJ. He is defined by his duty to his people and his land, and the tragedy of his middle arc is the ISTJ's most specific vulnerability: the framework of loyalty captured and redirected by an external force until it serves something alien. Freed from Saruman, he returns immediately to exactly the king he was supposed to be — because the ISTJ does not need to reconstruct their values, only to have them released from the thing blocking them. He rides to Pelennor knowing he will likely die there, because his people need someone to lead them, and that is what kings do. 'No parent should have to bury their child.' He says it. Then he rides anyway.`,
kw:['Theoden MBTI','Lord of the Rings ISTJ','Theoden personality type']},

{name:`Emma Woodhouse`,ctx:`Emma by Jane Austen`,type:'ENFJ',cat:'Fiction',
desc:`Emma Woodhouse is ENFJ who has not yet developed the wisdom that should accompany her influence. She is perceptive, warm, and genuinely convinced that she knows what is best for the people around her — and she is often right about what they feel while being completely wrong about what they need. Her matchmaking disasters are ENFJ influence without ENFJ accountability: she can read Harriet Smith and Mr. Elton clearly but cannot read herself at all, which is the Fe dominant's central blind spot. Her growth is not from selfishness to generosity — she was always generous — but from generous manipulation to genuine support.`,
kw:['Emma Woodhouse MBTI','Emma Austen personality type','ENFJ literary character']},

{name:`Beyoncé`,ctx:`Singer, songwriter, performer`,type:'ISFJ',cat:'Music',
desc:`Beyoncé is ISFJ. Her work ethic is legendary and entirely consistent with the Si dominant: every element of every performance is prepared, rehearsed, and executed with a precision that absorbs years of accumulated craft before it appears for thirty seconds on stage. Her public persona is tightly controlled not from arrogance but from the ISFJ's deep need to present only what is ready — nothing unfinished, nothing improvised, nothing that does not meet the internal standard. Lemonade is the exception that proves the rule: the ISFJ's most private interior made public, once, in full, with complete artistic control over every frame. Her philanthropy, her family, her cultivation of the next generation of Black artists: all Fe directed toward specific people and communities, not abstractions.`,
kw:['Beyoncé MBTI','Beyonce personality type','ISFJ pop star']},

{name:`Adele`,ctx:`Singer-songwriter`,type:'ISFP',cat:'Music',
desc:`Adele is ISFP. Her music is direct emotional expression with almost no conceptual distance between the feeling and the song — she writes about what happened, and the songs work because the feeling is real rather than constructed. Someone Like You, Hello, Rolling in the Deep: each is a specific interior experience reported with enough precision that the listener recognises it as their own. Her discomfort with the machinery of fame is real and consistent: she is most herself in the voice, least herself in the business. Her retreats between albums are not strategy but necessity — the ISFP who has given everything in the work needs time before there is anything left to give again.`,
kw:['Adele MBTI','Adele personality type','ISFP British singer']},

{name:`Lady Gaga`,ctx:`Singer, songwriter, actress`,type:'INFP',cat:'Music',
desc:`Lady Gaga is INFP with extraordinary performance confidence. Her personas — Stefani, Gaga, the Joanne era, the Lady Gaga of A Star Is Born — are not marketing but explorations of different facets of an interior life too large and too contradictory for a single presentation. Born This Way is direct Fi expression: the message is not strategy but conviction, held with total sincerity. Her turn to acting in A Star Is Born revealed what the stagecraft had always contained: a person of genuine depth who needed the costume to show it before she could show it without one. Her later advocacy and her work with mental health: the INFP who found that the interior, once fully expressed, becomes universal.`,
kw:['Lady Gaga MBTI','Lady Gaga personality type','INFP pop artist']},

{name:`Rihanna`,ctx:`Singer, songwriter, entrepreneur`,type:'ESTP',cat:'Music',
desc:`Rihanna is ESTP. She has moved between music, fashion, and business with the ESTP's most complete quality: she reads what is actually there rather than what should be there, and acts on that reading before anyone else has processed it. Fenty Beauty's foundation range — forty shades at launch when the industry standard was twelve — is Se reading the room and Te executing the solution. Her music shifts across reggae, pop, R&B, and dance with the same quality: she inhabits whatever the moment requires and does not preserve a brand identity that would limit it. Her pregnancy reveals, her Super Bowl performance, her silence between albums: all the ESTP who moves on her own timetable, not the audience's.`,
kw:['Rihanna MBTI','Rihanna personality type','ESTP entertainer']},

{name:`Prince`,ctx:`Musician, singer, multi-instrumentalist`,type:'INTJ',cat:'Music',
desc:`Prince is INTJ. He played every instrument on his first album alone, before he was twenty, because the vision in his head required total control over its execution. His battles with Warner Bros. over his masters — changing his name to an unpronounceable symbol, writing "slave" on his face — are the INTJ refusing to let an external institution override his comprehensive internal model of what his work required. He gave masterclass performances at guitar competitions, Super Bowl halftime shows, and private parties for celebrities with equal intensity because the standard was his own and did not require the occasion to be large. His vault of unreleased recordings, estimated at thousands of songs, is the INTJ who never stopped building.`,

{name:`Mick Jagger`,ctx:`Singer, The Rolling Stones`,type:'ESTP',cat:'Music',
desc:`Mick Jagger is ESTP. His stage presence is entirely physical and immediate — sixty years of performance have not made it more controlled, only more himself. He reads a room faster than his bandmates can tune their guitars and adapts the energy of the night accordingly, which is why Rolling Stones concerts remain events rather than presentations. His business instincts have consistently outpaced his peers: he was negotiating rights and catalogue long before most musicians understood they should. He is the performance, but the performance is not a mask — it is the ESTP with nowhere left to be except here, in front of these people, right now.`,

{name:`Bruce Springsteen`,ctx:`Singer-songwriter`,type:'INFJ',cat:'Music',
desc:`Bruce Springsteen is INFJ. He has spent fifty years writing about working-class America not as a sociological category but as a felt experience — the specific weight of a factory shift, the specific texture of a dead town, the specific hope that something better is possible — and the music works because the Ni-Fe combination produces both the pattern and the empathy simultaneously. His concerts, famously three to four hours long, are attempts to make something invisible visible: the shared condition, the common dignity, the permission to feel what the week has cost you. Born to Run and Nebraska are the same person making two completely different formal choices in service of the same vision, which is the INFJ characteristic: the method changes; the mission does not.`,

{name:`Amy Winehouse`,ctx:`Singer-songwriter`,type:'ISFP',cat:'Music',
desc:`Amy Winehouse is ISFP. Her music was confessional and unrepeatable — it could only have come from her specific interior life at that specific moment, which is why Back to Black sounds like nothing else and why no cover version has ever worked. Her resistance to the image the industry wanted was total: she showed up as herself regardless of what the contract required, because the ISFP cannot sustain the performance of a version of themselves they do not recognise. Her addiction was not a character flaw but the ISFP's most dangerous vulnerability: an interior life that intense, without adequate external structure, consuming itself. She left five albums worth of material and one fully realised world.`,

{name:`Kendrick Lamar`,ctx:`Rapper`,type:'INFJ',cat:'Music',
desc:`Kendrick Lamar is INFJ. His albums are not collections of songs but unified conceptual works built around a single moral or psychological question that he refuses to answer cheaply: good kid, m.A.A.d city is about survival and complicity; To Pimp a Butterfly is about fame and Blackness and self-destruction; DAMN. is about fate, fear, and what Kendrick owes the world versus himself. Each album is Ni synthesising a set of patterns — Compton, the music industry, American racism, the Black church — into a framework that illuminates rather than simplifies. His verse on Control, his Super Bowl performance, his feud with Drake: all are the INFJ who sees what others cannot and says it in the only register large enough to hold it.`,

{name:`Drake`,ctx:`Rapper and singer`,type:'ESFJ',cat:'Music',
desc:`Drake is ESFJ. His music is relationship-focused to a degree unusual even in pop: the dynamics, the feelings, the social context of being known and wanting to be known more deeply. His ability to articulate exactly what it feels like to be in the specific emotional position — the post-breakup text you wanted to send, the success that does not feel like enough — is Fe reading the collective emotional state and rendering it precisely. His business decisions are similarly relational: he understands what people want to feel about an artist, and builds around that understanding. His conflict with Kendrick Lamar showed the ESFJ's most vulnerable point: the attack on his image rather than his work, because for Drake the image and the work are the same thing.`,

{name:`Nicki Minaj`,ctx:`Rapper`,type:'ENTJ',cat:'Music',
desc:`Nicki Minaj is ENTJ. She built a career through strategic excellence and a refusal to cede ground to anyone — in her field, in her label deals, in her public positioning. Her technical skill as a rapper is extraordinary and frequently overlooked because the persona is so dominant; the ENTJ understands that the persona is the strategy, not a distraction from it. Her Roman Reloaded, Pink Friday, Queen: each a comprehensive statement about where she stands and where the competition does not. Her public conflicts — with Cardi B, with the Grammys, with streaming metrics — are the ENTJ who has decided which battles define the territory and fights them accordingly.`,

{name:`Daft Punk`,ctx:`Electronic music duo`,type:'INTJ',cat:'Music',
desc:`Daft Punk operated as INTJ. They wore helmets because the helmets communicated something essential: the work is what matters, not the people who made it. Their career was a systematic development of a single aesthetic framework — electronic music as emotional architecture — applied across twenty years with the consistency of people who had already decided what they were doing and found press junkets beside the point. Random Access Memories is the INTJ arriving at the simplicity on the other side of mastery: they spent the whole record making something that sounds effortless, and you can hear exactly how much work that required.`,

{name:`Elvis Presley`,ctx:`Singer and actor`,type:'ESFP',cat:'Music',
desc:`Elvis Presley is ESFP. He inhabited the stage the way other people inhabit their living rooms — completely, comfortably, as if the performance was not performance but simply being. His magnetism was physical and immediate: the hip movement was not calculated but expressive, the ESFP's relationship to their own body as the primary instrument of communication. His tragedy is the ESFP's characteristic one: the machinery built around his talent — the Colonel, the movies, the Vegas years — eventually separated him from the genuine pleasure that made the talent possible, and without the pleasure, the presence became a performance of itself.`,

{name:`Dolly Parton`,ctx:`Country singer-songwriter`,type:'ESFJ',cat:'Music',
desc:`Dolly Parton is ESFJ. Her warmth is genuine and consistent across sixty years of public life, which is the ESFJ's most complete quality: the care is not strategy but structure, built into how she operates rather than deployed when useful. She writes about people and for people — the working woman of 9 to 5, the woman left in I Will Always Love You — with the Fe dominant's specific empathy: she knows how it feels to be in that position because she has been in that position and never pretended otherwise. Her Imagination Library, her COVID vaccine funding, her decline of the Rockefeller Medal to avoid appearing political: all the ESFJ who has found a role proportionate to the care and does not need the recognition to sustain it.`,

{name:`Radiohead / Thom Yorke`,ctx:`Musician, Radiohead`,type:'INFP',cat:'Music',
desc:`Thom Yorke is INFP. Radiohead catalogue is a sustained attempt to find a musical form adequate to a specific kind of anxiety — about modernity, disconnection, technological alienation, the gap between the self and the world — that is not performed but genuinely felt. OK Computer was the INFP diagnosing the cultural condition from the inside; Kid A was the response: if the old forms cannot hold what needs to be expressed, build new forms. His discomfort with the music industry, his political engagement, his retreat from public life: all the same interior compass, pointing consistently away from anything that requires compromising the work.`,

{name:`Ed Sheeran`,ctx:`Singer-songwriter`,type:'ISFP',cat:'Music',
desc:`Ed Sheeran is ISFP. His music is personal and specific — the songs are about what actually happened, with enough particular detail that the feeling is real rather than constructed — and his discomfort with celebrity is consistent and genuine. He keeps returning to live performance because the loop pedal and the audience is where the ISFP can exist most completely: it is him, alone, the guitar, the music, and the room, which is the ISFP's most honest configuration. His decision to step away from social media after his wife's illness and his own cancer diagnosis was the ISFP protecting the interior from a context that demands performance of the interior.`,

desc:`Ariana Grande is INFP. Her music is emotionally specific — thank u, next is Fi processing a sequence of relationships into something usable, positions is the interior landscape of desire rendered into pop — and her public response to the Manchester Arena bombing showed an INFP acting from genuine feeling rather than PR calculation: she came back, she held the concert, she met the families. Her quietness outside of performances is consistent: she is not performing reluctance, she is genuinely private, which is the INFP who gives everything in the work and has nothing left for the apparatus around it.`,

{name:`Ernest Hemingway`,ctx:`American novelist and journalist`,type:'ISTP',cat:'Arts',
desc:`Ernest Hemingway is ISTP. His prose style — short declarative sentences, no ornamentation, meaning carried in what is not said — is the ISTP aesthetic applied to language: stripped to the functional minimum, trusting the reader to feel the weight of the submerged material. The iceberg theory is the ISTP's relationship with depth: it is there, you do not need to announce it. He wrote about hunting, fishing, war, and bullfighting because he understood physical experience from the inside, as the ISTP understands it — through the body, through skill, through the precision of the moment. His emotional life was real and largely inaccessible to him, which made his marriages catastrophic and his fiction possible.`,
kw:['Hemingway MBTI','Hemingway personality type','ISTP author']},

{name:`Gabriel García Márquez`,ctx:`Colombian novelist`,type:'INFP',cat:'Arts',
desc:`Gabriel García Márquez is INFP. Magical realism is an INFP literary mode: the interior and exterior worlds are not separated by an obvious boundary, and the feeling of events is as real as the events themselves. One Hundred Years of Solitude is a felt history of Colombia — the Buendía family's repetitions and transformations are not metaphors for political cycles but the INFP's experience of how time actually works, how the past is never past, how the same patterns surface across generations with different faces. His journalism, his friendship with Fidel Castro, his Nobel Prize: all expressions of a person who could not separate the political from the personal any more than he could separate the real from the magical.`,

{name:`Haruki Murakami`,ctx:`Japanese novelist`,type:'INFP',cat:'Arts',
desc:`Haruki Murakami is INFP. His novels are interior journeys in which the external world is always a partial expression of the protagonist's inner state — the wells, the disappearing women, the jazz playing in empty bars. What makes them work is not the surrealism but the specificity: the INFP who has paid complete attention to the particular texture of being alone, being in love, being unable to locate yourself in time. His running, his music collection, his translation work: the INFP who found that the discipline of the exterior life made the interior one accessible rather than consuming.`,

{name:`Jane Austen`,ctx:`English novelist`,type:'INTJ',cat:'Arts',
desc:`Jane Austen is INTJ. She built a comprehensive, precise critique of her social world into six novels that present themselves as romantic comedies and are, under the comedy, systematic dissections of how class, money, and gender determine who a person is allowed to become. Her irony never fails and never softens: she sees what is happening and she says it, in code, in perfect sentences. Pride and Prejudice and Persuasion are the INTJ's two positions on the same material: what happens when a sharp mind is trapped in a social system that will not accommodate it, and what it costs to wait until it can. She published anonymously. She knew the room.`,
kw:['Jane Austen MBTI','Jane Austen personality type','INTJ female author']},

{name:`Charles Dickens`,ctx:`English novelist`,type:'ENFP',cat:'Arts',
desc:`Charles Dickens is ENFP. His novels are populated by characters of such vivid particularity that they become archetypes — Micawber, Fagin, Miss Havisham — because the ENFP's Ne generates human types with an immediacy that analysis cannot produce. He wrote serially because he needed the reader's response to know what happened next, which is the ENFP's creative process externalised: the vision exists in relationship, not in isolation. His reformist energy was personal rather than theoretical — he cared about specific children in specific workhouses, not about poverty as a category — and the social criticism in his novels works because it is always attached to a face.`,
kw:['Charles Dickens MBTI','Dickens personality type','ENFP Victorian author']},

{name:`Mark Twain`,ctx:`American author and humorist`,type:'ENTP',cat:'Arts',
desc:`Mark Twain is ENTP. His humour is argumentative — he is always proving a point, usually about the distance between how America presents itself and how it actually behaves — and his method is the ENTP's most reliable one: take the stated principle seriously, apply it to the actual situation, and follow the logic wherever it goes. Huckleberry Finn is the ENTP argument that a child's common sense and decency are more reliable moral guides than a society's official positions. His travel writing, his autobiography, his late essays: the same mind, increasingly unwilling to soften the argument for an audience that preferred the comedy without the conclusion.`,

{name:`Pablo Neruda`,ctx:`Chilean poet`,type:'INFP',cat:'Arts',
desc:`Pablo Neruda is INFP. His love poetry and his political poetry come from the same interior source — the Fi dominant conviction that the particular experience contains, if expressed precisely enough, the universal truth. Twenty Love Poems was published when he was nineteen; Canto General is a 15,000-line epic of the Americas written while he was in exile. The scale changes; the source does not. He wrote about the woman, the ocean, the exploited miner with the same quality of attention: total, specific, convinced that what he felt about this thing was worth saying as exactly as he could say it.`,

{name:`Marcel Proust`,ctx:`French novelist`,type:'INFJ',cat:'Arts',
desc:`Marcel Proust is INFJ. In Search of Lost Time — seven volumes, 4,000 pages, written in a cork-lined room over fourteen years — is the INFJ project at its most extreme: making the invisible structure of experience visible with enough precision that the reader recognises it as their own. The madeleine scene is not a literary device but a phenomenological observation: involuntary memory bypasses the constructed self and retrieves the felt experience intact. He understood jealousy, snobbery, art, and love as structures with predictable shapes, and spent his life mapping the shapes.`,
kw:['Proust MBTI','Marcel Proust personality type','INFJ French novelist']},

{name:`James Joyce`,ctx:`Irish novelist`,type:'INTP',cat:'Arts',
desc:`James Joyce is INTP. Ulysses is a system built to contain an entire human day — every style of English prose deployed across eighteen episodes, each organised by body part, colour, and Homeric parallel — because the INTP who has decided to map totality cannot be satisfied by partial coverage. Finnegans Wake goes further: all of history inside a dream, every language collapsed into portmanteau, the framework so exhaustive it is still not fully parsed a century after publication. His instruction to the reader — that he had put in so many enigmas the professors would be busy for centuries — is the INTP who has built the architecture and is leaving the key inside.`,

{name:`Michelangelo`,ctx:`Renaissance sculptor and painter`,type:'INTJ',cat:'Arts',
desc:`Michelangelo is INTJ. He worked alone, worked obsessively, and had a comprehensive vision of what he was trying to achieve that no one else could fully access. His relationship with the material — stone, ceiling, human form — was a private dialogue: he said the sculpture was already inside the marble, waiting to be released, which is the INTJ's Ni synthesis applied to the physical world. The Sistine Chapel ceiling was painted under conditions of extraordinary difficulty, over four years, to a standard that he defined himself and that has not been surpassed. His personal life was a controlled minimum: the work was the life.`,
kw:['Michelangelo MBTI','Michelangelo personality type','INTJ Renaissance artist']},

{name:`Rembrandt`,ctx:`Dutch painter`,type:'INFP',cat:'Arts',
desc:`Rembrandt is INFP. His self-portraits across a lifetime are the most sustained INFP project in art history: a continuous attempt to see the self clearly, without flattery, across all its stages — the young man performing confidence, the middle-aged man managing success, the old man who has lost everything and paints himself anyway. He did not paint ideals; he painted what was actually there, including the wrinkles and the uncertainty and the light falling on a tired face at sixty. The INFP does not flinch from the interior, even when the interior has aged badly.`,
