  'INFP-INFP':'Two INFPs understand each other at a depth that is rare, but neither naturally provides the external grounding or structure the other needs. The connection is genuine and often profound, but the relationship may drift in beautiful circles without anyone steering it toward the concrete.',

  'INTJ-INTJ':'Two INTJs respect each other\'s independence and share a love of depth and systems. They are unlikely to be clingy or overemotional. The challenge is emotional distance  -  both tend to retreat inward under pressure, and neither naturally creates the warmth a close relationship needs.',

  'ESFJ-ESFJ':'Two ESFJs are warm, sociable, and highly attentive to each other. There is real harmony here in the day-to-day. The challenge is that both care deeply what others think, and if the relationship hits difficulty, both may perform wellness rather than address what is actually wrong.',
  'ISTJ-ISTJ':'Two ISTJs create a relationship built on reliability, shared values, and quiet commitment. It is stable and dependable. Neither is likely to create unnecessary drama. The limitation is that both tend toward routine and neither naturally pushes the other toward growth or new experience.',
  'ESTJ-ESTJ':'Two ESTJs are organised, direct, and hardworking. They understand each other\'s drive and respect each other\'s standards. The tension is around control  -  both have strong opinions about how things should be done, and disagreements about practical matters can become more loaded than they need to be.',
  'INFP-ENFP':'A rich inner world shared between two idealists who connect easily over values and imagination. The warmth between them is real and the bond often forms quickly. The risk is that neither pushes the other toward the grounding and structure a lasting relationship requires.',
  'INFP-INFJ':'Both are deeply private, values-driven, and prone to idealism. They understand each other at an unusual depth and rarely have to explain themselves. The relationship may lack momentum, but the connection is genuine and tends to deepen quietly over time.',
  'INFP-ENFJ':'A deeply resonant pairing. The ENFJ draws the INFP out of their inner world with warmth and genuine care, and the INFP offers the ENFJ a rare depth of authenticity. Both are driven by meaning and values, and each tends to bring out the other\'s best.',
  'ENFP-INFJ':'One of the most frequently cited ideal matches. The ENFP brings spark and possibility, the INFJ brings depth and direction. They share intuition and feeling in a way that creates genuine mutual understanding, and each tends to naturally fill the other\'s gaps.',
  'ENFP-ENFJ':'Two warm, expressive NF types who connect easily and understand each other\'s emotional language. The ENFP brings spontaneity and possibility; the ENFJ brings focus and warmth. They energise each other well, though both may avoid addressing problems in favour of keeping the peace.',
  'INFJ-ENFJ':'Two NF types who share the same feeling function and a deep orientation toward meaning and connection. The INFJ brings depth and interiority; the ENFJ brings warmth and presence. They understand each other unusually well, though both may share the same blind spot of avoiding conflict.',
  'INFP-INTJ':'Both are introverted, private, and more values-driven than they first appear. They can build something very deep together, though their emotional languages differ considerably. The INTJ will need to open up more than is natural; the INFP will need more resilience to the INTJ\'s directness.',
  'INFP-ENTJ':'An unlikely pairing that often surprises both parties. The ENTJ is drawn to the INFP\'s depth and authenticity; the INFP admires the ENTJ\'s drive and vision. The friction comes from pace and style  -  the ENTJ wants results, the INFP wants meaning  -  but both can learn significantly from the other.',
  'INFP-INTP':'Both are introverted and drawn to ideas, but where the INFP leads with values, the INTP leads with logic. They can have genuinely interesting conversations but the INFP may find the INTP emotionally distant, and the INTP may find the INFP too focused on feelings over analysis.',
  'INFP-ENTP':'The ENTP is drawn to ideas and debate; the INFP is drawn to meaning and emotional resonance. They can have rich, unusual conversations. The problem is that the ENTP\'s tendency to argue for sport can wound the INFP without realising it. Requires the ENTP to develop more care, and the INFP more resilience.',
  'ENFP-INTJ':'A classic pairing in MBTI lore  -  and for good reason. The ENFP\'s enthusiasm and the INTJ\'s depth create a complementary dynamic where each provides what the other lacks. Both are independent thinkers who respect each other\'s inner world. One of the more naturally satisfying cross-type pairings.',
  'ENFP-ENTJ':'The ENTJ admires the ENFP\'s creativity and energy; the ENFP is energised by the ENTJ\'s drive and decisiveness. But the ENTJ wants results and structure while the ENFP wants exploration and flexibility. A productive pairing if they can navigate the pace difference without one feeling rushed and the other held back.',
  'ENFP-INTP':'Both are idea-driven and intellectually restless. The ENFP brings warmth and enthusiasm; the INTP brings depth and precision. They balance each other\'s blind spots naturally and tend to have unusually stimulating conversations. One of the stronger cross-quadrant pairings.',
  'ENFP-ENTP':'Two extroverted intuitives who thrive on possibilities, debate, and new ideas. The energy between them is high and the connection is rarely strained. Both can be undisciplined about follow-through, and neither naturally provides stability  -  but the connection itself is rarely the problem.',
  'INFJ-INTJ':'Two Ni-dominant types who understand each other\'s inner depth without explanation. Both are private, strategic, and driven by vision. The INTJ is more analytical; the INFJ more emotionally attuned. A strong and naturally deep pairing where both feel genuinely understood.',
  'INFJ-ENTJ':'The ENTJ\'s drive and decisiveness can complement the INFJ\'s depth and vision, but the ENTJ\'s bluntness can be wounding and the INFJ\'s emotional needs can frustrate the results-focused ENTJ. Not a natural fit, but possible with real mutual respect and willingness to adapt.',
  'INFJ-INTP':'Both are private, idea-driven, and drawn to depth. The INTP brings analytical rigour; the INFJ brings emotional and intuitive clarity. They can build unusually rich conversations and connections. One of the stronger cross-quadrant pairings that often surprises both people involved.',
  'INFJ-ENTP':'The INFJ\'s depth meets the ENTP\'s relentless curiosity. Both love ideas and truth-seeking, and the dynamic is genuinely complementary  -  the ENTP challenges the INFJ to articulate their intuitions, the INFJ grounds the ENTP\'s restlessness in something deeper. One of the more natural cross-temperament pairings.',
  'ENFJ-INTJ':'The ENFJ brings warmth and people-focus; the INTJ brings strategy and independence. They can respect each other\'s competence, but the ENFJ\'s need for emotional engagement may feel draining to the INTJ, and the INTJ\'s detachment can hurt the ENFJ. Workable with genuine mutual accommodation.',
  'ENFJ-ENTJ':'Both are driven and decisive, but the ENFJ leads with people and the ENTJ leads with results. They can collaborate effectively and respect each other\'s drive. Both are used to being the one who shapes the room, which means they need to deliberately make space for each other.',
  'ENFJ-INTP':'The ENFJ\'s warmth and vision draws the INTP out of their head and into connection; the INTP\'s intellectual depth gives the ENFJ something genuinely stimulating. A complementary dynamic that works surprisingly well  -  each has what the other quietly lacks.',
  'ENFJ-ENTP':'Both are engaging and energetic, but the ENFJ wants harmony and the ENTP wants debate. The ENTP\'s tendency to challenge every position can exhaust the ENFJ. The ENFJ\'s desire for consensus can frustrate the ENTP. Requires real adjustment on both sides to work well.',
  'INFP-ISFP':'Two gentle introverts who share a deep, values-driven core and understand each other\'s need for space and authenticity. Peaceful and quietly affirming. The limitation is that neither is likely to push things forward when they stall  -  both tend to wait for the other to act.',
  'INFP-ESFP':'The INFP lives inside their inner world; the ESFP lives in the present moment of the external one. They may enjoy each other\'s company but struggle to sustain a deep connection. Their fundamental motivations  -  meaning versus experience  -  pull in different directions.',
  'INFP-ISTP':'The INFP values emotional depth and meaning; the ISTP values competence and practical autonomy. They share introversion but little else in how they process the world. Getting past the surface takes patience and genuine curiosity from both, but it is possible.',
  'INFP-ESTP':'Two very different people whose core values rarely overlap. The INFP seeks depth, meaning, and emotional resonance. The ESTP seeks action, sensation, and directness. What one values the other tends to see as either impractical or shallow. Rare and requires significant growth from both.',
  'ENFP-ISFP':'Both lead with feeling and value authenticity, but the ISFP is more grounded in the present while the ENFP is oriented toward future possibilities. They connect over shared values but can frustrate each other  -  the ENFP wants to explore new territory; the ISFP wants to be fully in the moment.',
  'ENFP-ESFP':'Both are warm, energetic, and people-oriented. They enjoy each other easily. The difference is in depth  -  the ENFP wants meaning and ideas behind the connection; the ESFP is happy in the present. A pairing that can stay at the surface without deliberate effort to go deeper.',
  'ENFP-ISTP':'The ENFP is expressive, emotionally engaged, and future-focused. The ISTP is reserved, practical, and present-focused. They find each other interesting at first but struggle to sustain it over time. Neither naturally meets the deeper needs of the other.',
  'ENFP-ESTP':'Both are energetic and can be action-oriented, but their drivers are very different. The ENFP is motivated by meaning and human connection; the ESTP by results and sensation. They can have fun together but rarely build something with real depth.',
  'INFJ-ISFP':'Both are introverted and values-driven, but the INFJ is future-oriented and the ISFP is present-oriented. They can connect over shared authenticity and care for people. A gentle pairing that can deepen given patience, though it may lack natural momentum.',
  'INFJ-ESFP':'The INFJ\'s inner world and long-range thinking sits in contrast to the ESFP\'s present-moment focus and social energy. They are drawn to each other\'s differences initially but find sustained compatibility harder to maintain as the novelty fades.',
  'INFJ-ISTP':'The INFJ leads with deep intuition and feeling; the ISTP leads with precise, practical thinking. They respect each other\'s competence but rarely connect at depth. Both are private, which makes the gap between them harder to close.',
  'INFJ-ESTP':'Quite different in approach and priority. The INFJ is inward, long-view, and emotionally complex. The ESTP is outward, immediate, and action-oriented. They intrigue each other at first, but sustained connection is harder to maintain as each settles into their natural patterns.',
  'ENFJ-ISFP':'The ENFJ draws the ISFP into the world gently, and the ISFP offers the ENFJ authenticity and groundedness in return. Both are warm and values-driven. A caring and harmonious pairing where each feels appreciated for what they naturally bring.',
  'ENFJ-ESFP':'Both lead with warmth and a genuine focus on people. The ENFJ brings vision and direction; the ESFP brings spontaneity and presence. They energise each other and tend to bring out each other\'s better qualities. A naturally warm pairing.',
  'ENFJ-ISTP':'The ENFJ is oriented toward people and emotional connection; the ISTP is oriented toward logic and independence. The ISTP finds the ENFJ emotionally intense; the ENFJ finds the ISTP closed off. With genuine patience from both, they can balance each other  -  but it takes consistent effort.',
  'ENFJ-ESTP':'Both can be energetic and action-oriented, but for very different reasons. The ENFJ is driven by people and meaning; the ESTP by results and immediacy. They can enjoy each other\'s company, but the emotional depth the ENFJ needs rarely develops naturally in this pairing.',
  'INFP-ISFJ':'Both lead with feeling and care deeply about people. The ISFJ provides warmth and reliability the INFP finds genuinely comforting; the INFP offers the ISFJ a rare sense of being truly understood. Their differences are in execution rather than values  -  more workable than they first appear.',
  'INFP-ESFJ':'The ESFJ\'s orientation toward social approval and external norms can clash with the INFP\'s insistence on inner authenticity. Both care about people, but in quite different ways. The INFP may feel hemmed in; the ESFJ may feel the INFP is too withdrawn to meet them where they are.',
  'INFP-ISTJ':'The INFP leads with values and imagination; the ISTJ leads with duty and precedent. Both are private and internally focused but their internal worlds operate on different principles. They can coexist with mutual respect but rarely find the natural common ground needed for deep connection.',
  'INFP-ESTJ':'The INFP and ESTJ see the world through almost opposing lenses. The ESTJ\'s focus on efficiency, structure, and measurable results sits uneasily against the INFP\'s focus on meaning, values, and authenticity. The friction here is structural rather than personal.',
  'ENFP-ISFJ':'The ISFJ\'s need for routine and stability can feel constraining to the ENFP\'s need for novelty and possibility. The ENFP may find the ISFJ too cautious; the ISFJ may find the ENFP too unpredictable. Takes real and sustained intention from both to bridge.',
  'ENFP-ESFJ':'Both are warm and people-oriented but in different ways. The ESFJ\'s social expectations and desire for harmony can feel limiting to the ENFP\'s need for authenticity and change. They can get along easily on the surface but rarely build deep mutual understanding.',
  'ENFP-ISTJ':'Almost opposite in orientation. The ENFP is spontaneous, future-focused, and values-driven. The ISTJ is structured, tradition-bound, and grounded in the past. What one does naturally the other tends to find frustrating. Requires significant mutual adjustment.',
  'ENFP-ESTJ':'Both can be expressive and opinionated, which is about where the overlap ends. The ESTJ\'s preference for order, efficiency, and convention clashes with the ENFP\'s preference for possibility, meaning, and flexibility. Friction is the likely default.',
  'INFJ-ISFJ':'Both are caring, attentive, and feeling-oriented, with a shared commitment to the people they love. The ISFJ grounds things in experience and duty; the INFJ grounds things in vision and meaning. They understand each other\'s care but may have different ideas about what the relationship should look like.',
  'INFJ-ESFJ':'The INFJ is deeply private and drawn to depth; the ESFJ is socially warm and oriented toward community and harmony. They share the feeling function but use it very differently. The INFJ may feel drained; the ESFJ may feel kept at arm\'s length.',
  'INFJ-ISTJ':'Both are private and principled, but the ISTJ is anchored in the past and proven procedure while the INFJ is anchored in vision and meaning. Their conversations can be respectful and productive but rarely deeply intimate.',

  'ENFJ-ISFJ':'Two feeling-dominant types with a shared orientation toward care and harmony. The ENFJ is outward and visionary; the ISFJ is inward and steady. They understand each other\'s emotional language well and tend to build warm, stable relationships with a natural sense of mutual appreciation.',
  'ENFJ-ESFJ':'Both are warm, socially engaged, and feeling-oriented. So much in common that the differences can be overlooked. Both tend to suppress their own needs for others, which means neither may address what isn\'t working. Warm on the surface; may struggle to surface and resolve deeper tensions.',
  'ENFJ-ISTJ':'The ENFJ\'s emotional expressiveness and future-orientation sits uneasily with the ISTJ\'s reserved, tradition-bound practicality. They can respect each other professionally but emotional intimacy is hard to establish and harder still to sustain.',
  'ENFJ-ESTJ':'Both can be decisive and organised, but the ENFJ is motivated by people and meaning while the ESTJ is motivated by results and systems. A functional pairing but rarely a deeply felt one. The ENFJ will likely want more warmth than the ESTJ naturally provides.',
  'INTJ-ENTJ':'Two Te and Ni users who understand each other\'s drive and long-range vision. High compatibility in values and ambition. The risk is competition rather than collaboration  -  both lead naturally and neither steps back easily.',

  'ENTJ-INTP':'Often cited as a strong match. The ENTJ brings drive, structure, and decisive action; the INTP brings depth and analytical precision. They balance each other at a fundamental level  -  each has what the other tends to skip over.',
  'ENTJ-ENTP':'Both are ambitious, idea-driven, and direct. They energise each other and can accomplish a lot together. The competition for dominance can create friction  -  both lead naturally, and this pairing works best when they have a shared goal to focus on.',
  'INTP-ENTP':'Two Ne/Ti types who speak the same intellectual language. They debate effortlessly, build ideas together, and rarely bore each other. Neither pushes the other toward emotional depth, which can leave the relationship feeling more like a stimulating partnership than an intimate one.',
  'INTJ-ISFP':'The INTJ operates through vision and strategy; the ISFP through present sensation and personal values. They share introversion and a quiet depth of conviction but express it in incompatible ways. Attraction is possible but sustained compatibility takes consistent work.',
  'INTJ-ESFP':'Very different in almost every relevant dimension. The INTJ is strategic, introverted, and long-range. The ESFP is spontaneous, extroverted, and present-focused. The gap here is structural and large.',
  'INTJ-ISTP':'Both are analytical, private, and independent. The INTJ is strategic and visionary; the ISTP is tactical and present-focused. They respect each other\'s competence naturally and stay out of each other\'s way. Not deeply intimate but a stable and functional pairing.',
  'INTJ-ESTP':'The INTJ thinks in systems and long-range visions; the ESTP thinks in immediate actions and observable results. They can collaborate on tasks but rarely align at depth. Different speeds and different drivers.',

  'ENTJ-ESFP':'Both can be bold and direct, but in very different contexts. The ENTJ leads in the boardroom; the ESFP leads in the social room. They may enjoy each other initially but lack the sustained compatibility to build something deep.',
  'ENTJ-ISTP':'Both are decisive, practical, and independent. The ENTJ is strategic and long-range; the ISTP is tactical and present-focused. They respect each other\'s competence and tend to stay out of each other\'s way. Workable without much emotional depth.',
  'ENTJ-ESTP':'Two bold, direct, action-oriented types who energise each other and can accomplish a lot together. The competition for dominance can create friction  -  both lead naturally, and this pairing works best when directed at a shared external goal.',
  'INTP-ISFP':'The INTP\'s world is abstract, analytical, and internally logical. The ISFP\'s world is sensory, emotional, and grounded in the present moment. They may find each other quietly interesting but struggle to connect across the gap in any sustained way.',

  'INTP-ISTP':'Both are analytical, private, and independent. The INTP works through abstract concepts; the ISTP works through hands-on problems. They respect each other easily without needing much from the other. A quiet and stable pairing with more intellectual depth than most.',
  'INTP-ESTP':'Both are Ti-users who value competence and logic above sentiment. The INTP is abstract and conceptual; the ESTP is concrete and action-oriented. They can collaborate effectively and tend to stay clear of unnecessary emotional entanglement. Functional, though not deeply intimate.',
  'ENTP-ISFP':'The ENTP is argumentative, conceptual, and intellectually restless. The ISFP is gentle, sensory, and fully present. The ENTP may find the ISFP unengaging; the ISFP may find the ENTP aggressive. Not much natural common ground.',
  'ENTP-ESFP':'Both can be social and energetic, but their motivations diverge significantly. The ENTP wants intellectual engagement and debate; the ESFP wants sensory experience and connection. They can enjoy each other briefly but rarely go deep.',
  'ENTP-ISTP':'Two Ti-users who share a blunt, competence-first approach to the world. The ENTP is abstract and debate-driven; the ISTP is concrete and action-driven. They respect each other easily. A functional pairing with more intellectual depth than most.',
  'ENTP-ESTP':'Both are bold, confident, and direct. The ENTP goes wide with ideas; the ESTP goes deep with action. They energise each other and rarely back down  -  which can produce great results or significant friction depending on what the energy is directed at.',
  'INTJ-ISFJ':'Both are private and principled, but the INTJ is future-oriented and strategic while the ISFJ is past-oriented and dutiful. They can coexist with mutual respect but rarely connect deeply. A quiet pairing that functions better as colleagues than as partners.',
  'INTJ-ESFJ':'Among the less natural pairings. The INTJ\'s preference for independence, logic, and long-range thinking sits uncomfortably with the ESFJ\'s preference for social warmth, community, and tradition. Each finds the other\'s default approach difficult to understand.',
  'INTJ-ISTJ':'Both are private, principled, and capable. The INTJ brings long-range vision; the ISTJ brings reliable execution. They can work together well and tend to stay out of each other\'s way. Not emotionally close, but a stable and functional pairing.',
  'INTJ-ESTJ':'Both are decisive and capable but the INTJ operates through long-range vision while the ESTJ operates through proven systems and immediate results. They may clash over approach even when they share goals  -  the INTJ wants to redesign; the ESTJ wants to optimise what works.',
  'ENTJ-ISFJ':'The ENTJ operates through drive and vision; the ISFJ through care and reliability. They can respect each other\'s contributions but their fundamental orientations rarely align naturally. The ENTJ may push too hard for change; the ISFJ may give too much without asking for what they need.',

  'INTP-ISFJ':'The INTP is in their head, abstract and logical. The ISFJ is in the world, caring and grounded in routine. They may appreciate each other from a distance but find it hard to build the kind of connection each actually needs.',
  'INTP-ESFJ':'Not an obvious pairing, but the ESFJ\'s warmth can draw out the INTP\'s quieter social side, and the INTP\'s depth can intrigue the ESFJ. The mismatch is in emotional expression  -  the ESFJ needs more warmth and social engagement than the INTP typically offers.',

  'ENTP-ISFJ':'The ENTP challenges everything; the ISFJ values stability, consistency, and proven ways of doing things. The ENTP may find the ISFJ too conventional; the ISFJ may find the ENTP exhausting. The gap between their natural approaches to life is significant.',

  'ENTP-ISTJ':'The ENTP thrives on novelty, debate, and challenging accepted systems. The ISTJ relies on proven methods, consistency, and tradition. They can respect each other\'s competence but clash on almost everything else.',

  'ISFP-ESFP':'Two SP types with authenticity, presence, and freedom at their core. They understand each other intuitively and the relationship is warm and easy. Neither will pressure the other, which is both its strength and its potential limitation  -  difficult conversations may never happen.',

  'ESFP-ESTP':'Two action-oriented, present-focused types who energise each other. Bold, spontaneous, and direct. The risk is that neither provides emotional depth or long-range thinking. They can stay surface-level indefinitely without noticing what they\'re missing.',
  'ISTP-ESTP':'Two SP types who operate on similar principles  -  logic, competence, and action. The ISTP is introverted and precise; the ESTP is extroverted and bold. They understand each other without needing explanation. A clean, uncomplicated pairing.',

  'ESFP-ESTJ':'Both can be direct and action-oriented, but the ESFP is spontaneous and present while the ESTJ is structured and long-range. The ESFP may find the ESTJ too rigid; the ESTJ may find the ESFP too scattered. Workable with clear communication and mutual patience.',

  'ISTP-ESFJ':'An unlikely but workable pairing. The ESFJ\'s warmth softens the ISTP\'s detachment; the ISTP\'s calm steadies the ESFJ. Real effort is required from both, but the differences can be complementary rather than simply frustrating.',

function getPairingData(a,b){
  const types=['INFP','ENFP','INFJ','ENFJ','INTJ','ENTJ','INTP','ENTP','ISFP','ESFP','ISTP','ESTP','ISFJ','ESFJ','ISTJ','ESTJ'];
  const ai=types.indexOf(a),bi=types.indexOf(b);
  const slug=ai<=bi?`${a.toLowerCase()}-${b.toLowerCase()}`:`${b.toLowerCase()}-${a.toLowerCase()}`;
  return pairingData[slug]||null;
}

function getDesc(a,b){
  if(a===b) return pairDesc[`${a}-${a}`]||null;
  return pairDesc[`${a}-${b}`]||pairDesc[`${b}-${a}`]||null;
}
function getScore(a,b){const ai=types.indexOf(a),bi=types.indexOf(b);if(ai===-1||bi===-1)return null;return matrix[ai][bi];}
function codeHtml(t){return t.split('').map((l,i)=>(i%2===1)?`<span class="hi">${l}</span>`:l).join('');}
function canonicalSlug(a,b){const ai=types.indexOf(a),bi=types.indexOf(b);return ai<=bi?`${a.toLowerCase()}-${b.toLowerCase()}`:`${b.toLowerCase()}-${a.toLowerCase()}`;}
function getRelated(a,b){
  const othersA=types.filter(t=>t!==b);
  const forA=othersA.map(t=>({other:t,score:getScore(a,t)})).sort((x,y)=>y.score-x.score).slice(0,5);
  const forB=a===b?[]:types.filter(t=>t!==a).map(t=>({other:t,score:getScore(b,t)})).sort((x,y)=>y.score-x.score).slice(0,5);
  return {forA,forB};
}

  document.getElementById('pair-schema').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":`${pairLabel} Compatibility`,"description":metaDesc,"url":canonical,"publisher":{"@type":"Organization","name":"77 Scenarios","url":"https://77scenarios.com"}});
  const {forA,forB}=getRelated(a,b);
  const relPillsA=forA.map(({other,score:s})=>`<a href="/compatibility/${canonicalSlug(a,other)}" class="related-pill"><span class="score-dot dot-${s}"></span>${a} &amp; ${other}</a>`).join('');
  const relPillsB=isSame?'':forB.map(({other,score:s})=>`<a href="/compatibility/${canonicalSlug(b,other)}" class="related-pill"><span class="score-dot dot-${s}"></span>${b} &amp; ${other}</a>`).join('');

  // FAQ schema
  const faqItems=[
    {q:`Are ${a} and ${b} compatible?`,a:`${pairLabel}: ${scoreLabels[score]}. ${desc.slice(0,200)}`},
    {q:`What do ${a} and ${b} have in common?`,a:`${a} (${typeData[a].name}) and ${b} (${b===a?typeData[a].name:typeData[b].name}) share certain cognitive and relational tendencies. ${desc}`},
    {q:`Can ${a} and ${b} have a successful relationship?`,a:`${score>=4?`Yes  -  ${pairLabel} is one of the more naturally compatible MBTI pairings. `:(score>=3?`With effort, ${pairLabel} can work. `:`${pairLabel} faces real structural differences. `)}${desc.slice(0,150)}`},
  ];
  let faqEl2=document.getElementById('pair-faq-schema');
  if(!faqEl2){faqEl2=document.createElement('script');faqEl2.id='pair-faq-schema';faqEl2.type='application/ld+json';document.head.appendChild(faqEl2);}
  faqEl2.textContent=JSON.stringify({"@context":"https://schema.org","@type":"FAQPage","mainEntity":faqItems.map(({q,a:ans})=>({'@type':'Question','name':q,'acceptedAnswer':{'@type':'Answer','text':ans}}))});

  // Breadcrumb schema
  let bcEl2=document.getElementById('pair-bc-schema');
  if(!bcEl2){bcEl2=document.createElement('script');bcEl2.id='pair-bc-schema';bcEl2.type='application/ld+json';document.head.appendChild(bcEl2);}
  bcEl2.textContent=JSON.stringify({"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://77scenarios.com"},{"@type":"ListItem","position":2,"name":"Compatibility","item":"https://77scenarios.com/compatibility"},{"@type":"ListItem","position":3,"name":`${pairLabel} Compatibility`,"item":canonical}]});

  const pd = getPairingData(a,b);
  const draw = pd ? pd.draw : '';
  const brings_a = pd ? pd.brings_a : [];
  const brings_b = pd ? pd.brings_b : null;
  const friction = pd ? pd.friction : [];
  const tips_arr = pd ? pd.tips : [];
  const func_note = pd ? pd.func_note : '';
  const growth_a = pd ? pd.growth_a : '';
  const growth_b = pd ? pd.growth_b : '';

  document.getElementById('content').innerHTML=`
    <div class="pair-hero r" data-d="1">
      <div class="pair-eyebrow">Myers-Briggs Compatibility</div>
      <div class="pair-heading">${codeHtml(a)}<span class="amp">${isSame?'+':'&amp;'}</span>${codeHtml(b)}</div>
      <div class="pair-names">${typeData[a].name}${isSame?'':' &amp; '+typeData[b].name}</div>
    </div>
    <div class="score-block r" data-d="2">
      <div class="score-label-text sc${score}">${scoreLabels[score]}</div>
      <div class="score-bar-track"><div class="score-bar-fill" id="score-bar"></div></div>
      <div class="score-legend"><span>Think this through</span><span>Ideal match</span></div>
    </div>
    ${draw?`<div class="draw-block r" data-d="2b"><p class="draw-text">${draw}</p></div>`:''}
    <div class="section r" data-d="3">
      <div class="section-label">${a}${isSame?' Same-Type':' &amp; '+b} Relationship Dynamic</div>
      <p class="body-text">${desc}</p>
    </div>
    ${brings_a.length?`
    <div class="section r" data-d="3b">
      <div class="section-label">What each brings</div>
      <div class="brings-grid">
        <div class="brings-card">
          <div class="brings-type">${a} contributes</div>
          <ul class="brings-list">
            ${brings_a.map(x=>`<li>${x}</li>`).join('')}
          </ul>
        </div>
        ${brings_b?`<div class="brings-card">
          <div class="brings-type">${b} contributes</div>
          <ul class="brings-list">
            ${brings_b.map(x=>`<li>${x}</li>`).join('')}
          </ul>
        </div>`:''}
      </div>
    </div>`:''}
    ${friction.length?`
    <div class="section r" data-d="4">
      <div class="section-label">Where friction builds</div>
      <div class="friction-list">
        ${friction.map(f=>`<div class="friction-item"><p>${f}</p></div>`).join('')}
      </div>
    </div>`:''}
    ${tips_arr.length?`
    <div class="section r" data-d="4b">
      <div class="section-label">How to make it work</div>
      <div class="tips-list">
        ${tips_arr.map((t,i)=>`<div class="tip-item"><div class="tip-num">${i+1}</div><p class="tip-text">${t}</p></div>`).join('')}
      </div>
    </div>`:''}
    ${func_note?`
    <div class="section r" data-d="4c">
      <div class="section-label">Cognitive function dynamics</div>
      <div class="func-box"><p>${func_note}</p></div>
    </div>`:''}
    ${(growth_a||growth_b)?`
    <div class="section r" data-d="4d">
      <div class="section-label">Growth potential</div>
      <div class="growth-grid">
        ${growth_a?`<div class="growth-card"><div class="growth-type">${a} grows toward</div><p class="growth-text">${growth_a}</p></div>`:''}
        ${growth_b?`<div class="growth-card"><div class="growth-type">${isSame?'Both grow toward':b+' grows toward'}</div><p class="growth-text">${growth_b}</p></div>`:''}
      </div>
    </div>`:''}
    <div class="type-pair-cards r" data-d="5">
      <a href="/types/${a.toLowerCase()}" class="type-pair-card">
        <div class="tpc-code">${codeHtml(a)}</div>
        <div class="tpc-name">${typeData[a].name}</div>
        <div class="tpc-tagline">${typeData[a].tagline}</div>
        <span class="tpc-arrow">Full profile →</span>
      </a>
      ${isSame?'':`<a href="/types/${b.toLowerCase()}" class="type-pair-card">
        <div class="tpc-code">${codeHtml(b)}</div>
        <div class="tpc-name">${typeData[b].name}</div>
        <div class="tpc-tagline">${typeData[b].tagline}</div>
        <span class="tpc-arrow">Full profile →</span>
      </a>`}
    </div>
    ${relPillsA||relPillsB?`<div class="section r" data-d="5">
      <div class="section-label">Related pairings</div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        ${relPillsA?`<div><div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">${a} with others</div><div class="related-grid">${relPillsA}</div></div>`:''}
        ${relPillsB?`<div><div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">${b} with others</div><div class="related-grid">${relPillsB}</div></div>`:''}
      </div>
    </div>`:''}
    <div class="section r" data-d="5b">
      <div class="section-label">${pairLabel} MBTI Compatibility FAQ</div>
      <div class="faq-list">
        <div class="faq-item">
          <div class="faq-q">Are ${a} and ${isSame?a:b} Myers-Briggs types compatible?</div>
          <div class="faq-a">${scoreLabels[score]}: ${desc.slice(0,200)}</div>
        </div>
        <div class="faq-item">
          <div class="faq-q">What makes ${a} and ${isSame?a:b} attract each other?</div>
          <div class="faq-a">${desc}</div>
        </div>
        <div class="faq-item">
          <div class="faq-q">Can ${a} and ${isSame?a:b} have a successful relationship?</div>
          <div class="faq-a">${score>=4?'This is one of the more naturally compatible MBTI pairings. ':score>=3?'This pairing can work well with awareness and communication. ':'This pairing faces structural differences that require real effort. '}Compatibility ultimately depends on individual growth, communication, and shared values  -  not just personality type.</div>
        </div>
      </div>
    </div>
    <p class="note r" data-d="6">Compatibility is based on relationship satisfaction surveys and cognitive function theory. Every relationship is unique. A good match is not a guarantee and a difficult pairing is not a sentence. <a href="/compatibility">See the full compatibility chart →</a></p>
    <div class="cta-block r" data-d="7">
      <div class="cta-text">Not sure of your type?<br><em>Let the scenarios decide.</em></div>
      <a href="/" class="btn-gold">Take the test →</a>
    </div>`;
  setTimeout(()=>{const bar=document.getElementById('score-bar');if(bar)bar.className=`score-bar-fill sf${score}`;},150);
  document.querySelectorAll('.r').forEach(el=>obs.observe(el));
}

const obs=new IntersectionObserver(entries=>{entries.forEach(en=>{if(!en.isIntersecting)return;const d=parseFloat(en.target.dataset.d||0);setTimeout(()=>en.target.classList.add('in'),d*80);obs.unobserve(en.target);});},{threshold:0.1});
document.querySelectorAll('.r').forEach(el=>obs.observe(el));
render();
</script>
