<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>77 Store — Coming Soon</title>
  <meta name="description" content="77 — A clothing brand born from personality. High quality wear, gold prints. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0e10;
      --gold:     #c9a84c;
      --gold-dim: #8a6d2e;
      --cream:    #ede8df;
      --muted:    #b5ada6;
      --border:   #252a30;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans:  'DM Sans', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Transition overlay ── */
    #t-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #t-overlay.active { opacity: 1; pointer-events: all; }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .nav-logo {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 500;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--cream); }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: calc(100vh - 65px);
      padding: 4rem 2rem;
      position: relative;
    }

    /* Faint background "77" watermark */
    .hero::before {
      content: '77';
      position: absolute;
      font-family: var(--font-serif);
      font-size: clamp(14rem, 30vw, 26rem);
      font-weight: 300;
      color: var(--gold);
      opacity: 0.04;
      user-select: none;
      pointer-events: none;
      line-height: 1;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.8rem;
    }

    .brand-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 0.3rem;
      position: relative;
      z-index: 1;
    }

    .brand-lockup .num {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 18vw, 12rem);
      font-weight: 300;
      line-height: 0.9;
      color: var(--cream);
      letter-spacing: -0.02em;
    }

    .brand-lockup .rule {
      width: 100%;
      height: 1px;
      background: var(--gold);
      margin: 0.6rem 0;
      opacity: 0.6;
    }

    .brand-lockup .word {
      font-family: var(--font-sans);
      font-size: clamp(0.6rem, 1.5vw, 0.8rem);
      font-weight: 300;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .tagline {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      margin: 1.6rem 0 3.2rem;
      max-width: 480px;
      line-height: 1.55;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
      margin: 0 auto 3rem;
    }

    /* ── Waitlist form ── */
    .waitlist-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .waitlist-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: block;
    }

    .waitlist-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.25s;
    }
    .waitlist-row:focus-within {
      border-color: var(--gold-dim);
    }

    .waitlist-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--cream);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      padding: 0.85rem 1rem;
    }
    .waitlist-row input::placeholder { color: var(--muted); opacity: 0.6; }

    .waitlist-row button {
      background: var(--gold);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem 1.4rem;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .waitlist-row button:hover { background: #d4b460; }
    .waitlist-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .waitlist-msg {
      font-size: 0.78rem;
      margin-top: 0.8rem;
      min-height: 1.1rem;
      letter-spacing: 0.02em;
    }
    .waitlist-msg.success { color: var(--gold); }
    .waitlist-msg.error   { color: #e07070; }

    /* ── Pillars ── */
    .pillars {
      display: flex;
      gap: 2.5rem;
      margin-top: 5rem;
      position: relative;
      z-index: 1;
    }
    .pillar {
      text-align: center;
    }
    .pillar-num {
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .pillar-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    @media (max-width: 600px) {
      nav { padding: 1.2rem 1.4rem; }
      .nav-links { gap: 1.2rem; }
      .nav-links a { font-size: 0.75rem; }
      .pillars { gap: 1.5rem; }
    }
  </style>
</head>
<body>

<div id="t-overlay"></div>

<nav>
  <a class="nav-logo" href="/index.html">77 scenarios</a>
  <ul class="nav-links">
    <li><a href="/index.html">Test</a></li>
    <li><a href="/archive.html">Archive</a></li>
    <li><a href="/forum.html">Forum</a></li>
    <li><a href="/store.html" class="active">Store</a></li>
  </ul>
</nav>

<main class="hero">
  <p class="eyebrow">Coming Soon</p>

  <div class="brand-lockup">
    <span class="num">77</span>
    <div class="rule"></div>
    <span class="word">Wear</span>
  </div>

  <div class="divider"></div>

  <p class="tagline">High quality clothing for people who know who they are.</p>

  <div class="waitlist-wrap">
    <span class="waitlist-label">Join the waitlist — be first to know</span>
    <div class="waitlist-row">
      <input type="email" id="email-input" placeholder="your@email.com" autocomplete="off" />
      <button id="join-btn" onclick="joinWaitlist()">Notify me</button>
    </div>
    <p class="waitlist-msg" id="waitlist-msg"></p>
  </div>

  <div class="pillars">
    <div class="pillar">
      <div class="pillar-num">01</div>
      <div class="pillar-label">Heavyweight<br>fabric</div>
    </div>
    <div class="pillar">
      <div class="pillar-num">02</div>
      <div class="pillar-label">Gold<br>prints</div>
    </div>
    <div class="pillar">
      <div class="pillar-num">03</div>
      <div class="pillar-label">Type-specific<br>drops</div>
    </div>
  </div>
</main>

<footer>© 2026 77scenarios.com — All rights reserved</footer>

<script>
  // ── Supabase config ──
  const SUPABASE_URL = 'https://rttomfnfyjjssdqfzkaj.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

  // ── Page transitions ──
  const overlay = document.getElementById('t-overlay');
  document.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('mailto') || a.target === '_blank') return;
    a.addEventListener('click', e => {
      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(() => { window.location.href = href; }, 350);
    });
  });
  window.addEventListener('pageshow', () => overlay.classList.remove('active'));

  // ── Waitlist ──
  async function joinWaitlist() {
    const input = document.getElementById('email-input');
    const btn   = document.getElementById('join-btn');
    const msg   = document.getElementById('waitlist-msg');
    const email = input.value.trim();

    msg.className = 'waitlist-msg';
    msg.textContent = '';

    if (!email || !email.includes('@')) {
      msg.className = 'waitlist-msg error';
      msg.textContent = 'Please enter a valid email.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Joining...';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/subscribers`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          email,
          source: 'store_waitlist',
          created_at: new Date().toISOString()
        })
      });

      if (res.status === 409) {
        msg.className = 'waitlist-msg success';
        msg.textContent = "You're already on the list.";
      } else if (res.ok) {
        msg.className = 'waitlist-msg success';
        msg.textContent = "You're on the list. We'll reach out when we launch.";
        input.value = '';
      } else {
        throw new Error('Server error');
      }
    } catch {
      msg.className = 'waitlist-msg error';
      msg.textContent = 'Something went wrong. Try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Notify me';
    }
  }

  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinWaitlist();
  });
</script>

</body>
</html>
