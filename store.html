<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>77 Store — Coming Soon</title>
  <meta name="description" content="77 — A clothing brand born from personality. High quality wear, gold prints. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0e10;
      --gold:     #c9a84c;
      --gold-dim: #8a6d2e;
      --cream:    #ede8df;
      --muted:    #b5ada6;
      --border:   #252a30;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans:  'DM Sans', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Transition overlay ── */
    #t-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #t-overlay.active { opacity: 1; pointer-events: all; }

    /* ── Site Nav ── */
    .site-nav { position: sticky; top: 0; z-index: 200; background: rgba(12,14,16,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid #252a30; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; height: 56px; }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--cream); text-decoration: none; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #b5ada6; text-decoration: none; white-space: nowrap; transition: color 0.2s; }
    .nav-links a:hover { color: #ede8df; }
    .nav-burger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .nav-burger span { display: block; width: 22px; height: 1.5px; background: #b5ada6; transition: all 0.3s ease; transform-origin: center; }
    .nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); background: #c9a84c; }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); background: #c9a84c; }
    .nav-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
    .nav-overlay.open { opacity: 1; pointer-events: auto; }
    .nav-drawer { position: fixed; top: 0; right: -100%; width: min(320px, 85vw); height: 100%; background: #13161a; border-left: 1px solid #252a30; z-index: 400; transition: right 0.35s cubic-bezier(0.22,1,0.36,1), visibility 0s linear 0.35s; display: flex; flex-direction: column; padding: 0; pointer-events: none; visibility: hidden; }
    .nav-drawer.open { right: 0; pointer-events: auto; visibility: visible; transition: right 0.35s cubic-bezier(0.22,1,0.36,1), visibility 0s linear 0s; }
    .nav-drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 0 24px; height: 56px; border-bottom: 1px solid #252a30; flex-shrink: 0; }
    .nav-close { background: none; border: none; color: #b5ada6; font-size: 18px; cursor: pointer; padding: 4px; transition: color 0.2s; }
    .nav-close:hover { color: #ede8df; }
    .nav-drawer-links { display: flex; flex-direction: column; padding: 16px 0; }
    .nav-drawer-links a { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #b5ada6; text-decoration: none; padding: 18px 24px; border-bottom: 1px solid #1e2227; transition: all 0.15s ease; }
    .nav-drawer-links a:hover { color: #c9a84c; padding-left: 32px; }
    .nav-drawer-links a:first-child { color: #c9a84c; }
    @media (max-width: 768px) {
      .site-nav { padding: 0 20px; }
      .nav-links { display: none; }
      .nav-burger { display: flex; }
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: calc(100vh - 65px);
      padding: 4rem 2rem;
      position: relative;
    }

    /* Faint background "77" watermark */
    .hero::before {
      content: '77';
      position: absolute;
      font-family: var(--font-serif);
      font-size: clamp(14rem, 30vw, 26rem);
      font-weight: 300;
      color: var(--gold);
      opacity: 0.04;
      user-select: none;
      pointer-events: none;
      line-height: 1;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.8rem;
    }

    .brand-lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
      margin-bottom: 0.5rem;
    }

    .brand-lockup .num-canvas {
      display: block;
      position: relative;
      left: 0.05em;
      width: clamp(280px, 45vw, 600px);
      height: auto;
    }

    .brand-lockup .wear-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.2rem;
      width: 100%;
    }

    .brand-lockup .wear-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .brand-lockup .wear-line.right {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .brand-lockup .word {
      font-family: var(--font-sans);
      font-size: clamp(0.55rem, 1.2vw, 0.72rem);
      font-weight: 400;
      letter-spacing: 0.7em;
      text-transform: uppercase;
      color: var(--gold);
      text-indent: 0.7em; /* optical centering for letter-spacing */
    }

    .tagline {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      margin: 1.6rem 0 3.2rem;
      max-width: 480px;
      line-height: 1.55;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
      margin: 0 auto 3rem;
    }

    /* ── Waitlist form ── */
    .waitlist-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .waitlist-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: block;
    }

    .waitlist-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.25s;
    }
    .waitlist-row:focus-within {
      border-color: var(--gold-dim);
    }

    .waitlist-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--cream);
      font-family: var(--font-sans);
      font-size: 0.88rem;
      padding: 0.85rem 1rem;
    }
    .waitlist-row input::placeholder { color: var(--muted); opacity: 0.6; }

    .waitlist-row button {
      background: var(--gold);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem 1.4rem;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .waitlist-row button:hover { background: #d4b460; }
    .waitlist-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    .waitlist-msg {
      font-size: 0.78rem;
      margin-top: 0.8rem;
      min-height: 1.1rem;
      letter-spacing: 0.02em;
    }
    .waitlist-msg.success { color: var(--gold); }
    .waitlist-msg.error   { color: #e07070; }

    /* ── Pillars ── */
    .pillars {
      display: flex;
      gap: 2.5rem;
      margin-top: 5rem;
      position: relative;
      z-index: 1;
    }
    .pillar {
      text-align: center;
    }
    .pillar-num {
      font-family: var(--font-serif);
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .pillar-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    @media (max-width: 600px) {
      .pillars { gap: 1.5rem; }
    }
  </style>
</head>
<body>

<div id="t-overlay"></div>

<nav class="site-nav">
  <a href="/" class="nav-logo">77scenarios.com</a>
  <div class="nav-links" id="nav-links"></div>
  <button class="nav-burger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="nav-overlay" id="nav-overlay" onclick="toggleMenu()"></div>
<div class="nav-drawer" id="nav-drawer">
  <div class="nav-drawer-header">
    <a href="/" class="nav-logo">77scenarios.com</a>
    <button class="nav-close" onclick="toggleMenu()">&#10005;</button>
  </div>
  <nav class="nav-drawer-links"></nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/nav.js"></script>

<main class="hero">
  <p class="eyebrow">Coming Soon</p>

  <div class="brand-lockup">
    <div class="wear-row">
      <div class="wear-line"></div>
      <span class="word">Store</span>
      <div class="wear-line right"></div>
    </div>
  </div>

  <div class="divider"></div>

  <p class="tagline">High quality clothing for people who know who they are.</p>

  <div class="waitlist-wrap">
    <span class="waitlist-label">Join the waitlist — be first to know</span>
    <div class="waitlist-row">
      <input type="email" id="email-input" placeholder="your@email.com" autocomplete="off" />
      <button id="join-btn" onclick="joinWaitlist()">Notify me</button>
    </div>
    <p class="waitlist-msg" id="waitlist-msg"></p>
  </div>

  <div class="pillars">
    <div class="pillar"><div class="pillar-label">Heavyweight<br>fabric</div></div>
    <div class="pillar"><div class="pillar-label">Gold<br>prints</div></div>
    <div class="pillar"><div class="pillar-label">Type-specific<br>drops</div></div>
  </div>
</main>

<footer>© 2026 77scenarios.com — All rights reserved</footer>

<script>
  // ── Mobile nav ──
  function toggleMenu() {
    document.getElementById('nav-drawer').classList.toggle('open');
    document.getElementById('nav-overlay').classList.toggle('open');
  }

  // ── Supabase config ──
  const SUPABASE_URL = 'https://rttomfnfyjjssdqfzkaj.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0dG9tZm5meWpqc3NkcWZ6a2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODcwMjEsImV4cCI6MjA4ODU2MzAyMX0.0qBogK8xywL77IFYj4IywZIhHyKjbvbVmXYvG6wAZGw';

  // ── Page transitions ──
  const overlay = document.getElementById('t-overlay');
  document.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('mailto') || a.target === '_blank') return;
    a.addEventListener('click', e => {
      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(() => { window.location.href = href; }, 350);
    });
  });
  window.addEventListener('pageshow', () => overlay.classList.remove('active'));

  // ── Waitlist ──
  async function joinWaitlist() {
    const input = document.getElementById('email-input');
    const btn   = document.getElementById('join-btn');
    const msg   = document.getElementById('waitlist-msg');
    const email = input.value.trim();

    msg.className = 'waitlist-msg';
    msg.textContent = '';

    if (!email || !email.includes('@')) {
      msg.className = 'waitlist-msg error';
      msg.textContent = 'Please enter a valid email.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Joining...';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/subscribers`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          email,
          source: 'store_waitlist',
          created_at: new Date().toISOString()
        })
      });

      if (res.status === 409) {
        msg.className = 'waitlist-msg success';
        msg.textContent = "You're already on the list.";
      } else if (res.ok) {
        msg.className = 'waitlist-msg success';
        msg.textContent = "You're on the list. We'll reach out when we launch.";
        input.value = '';
      } else {
        throw new Error('Server error');
      }
    } catch {
      msg.className = 'waitlist-msg error';
      msg.textContent = 'Something went wrong. Try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Notify me';
    }
  }

  // ── High-DPI canvas 77 ──
  function render77() {
    const canvas = document.getElementById('num77');
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.parentElement.offsetWidth * 0.85;
    const cssH = cssW * 0.45;
    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';
    canvas.width  = cssW * dpr;
    canvas.height = cssH * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, cssW, cssH);
    const fontSize = cssH * 0.88;
    ctx.font = `300 ${fontSize}px "Cormorant Garamond", serif`;
    ctx.fillStyle = '#c9a84c';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.fillText('77', cssW / 2, cssH / 2);
  }

  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinWaitlist();
  });

  document.fonts.ready.then(() => {
    render77();
    window.addEventListener('resize', render77);
  });
</script>

</body>
</html>
