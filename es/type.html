<script>
const types = {
  ISTJ:{
    name:"El Inspector",tagline:"Deber, precisión, integridad",
    p1:"Todo el mundo dice que le importa hacer las cosas bien. La mayoría no lo dice de la manera en que tú lo dices. Mantienes un estándar en silencio, sin anuncios, y notas la distancia entre lo que las personas se comprometen a hacer y lo que realmente entregan. Esa brecha te molesta de una manera que los demás encuentran difícil de entender. No eres severo por ello, simplemente lo recuerdas.",
    p2:"Tu fiabilidad es tan rara que la mayoría de las personas solo puede apreciarla completamente cuando desaparece. No trabajas por elogios. Trabajas porque el trabajo merece hacerse correctamente. Las personas que te conocen bien saben que pueden entregarte algo y marcharse, completamente seguros de que se manejará.",
    desire:"Ser completamente confiable y nunca ser la fuente de un fallo",
    fear:"Ser sorprendido sin preparación, o ser responsable de algo que se hizo mal",
    strengths:["Los compromisos se cumplen sin excepción — la gente aprende rápido que puede depender de ti","La memoria para detalles factuales, decisiones pasadas y matices de procedimiento es inusualmente aguda","Se mantiene metódico cuando aumenta la presión, donde otros se vuelven reactivos","Aplica el mismo estándar a ti mismo que a los demás, lo cual es raro"],
    blindspots:["Cuando las circunstancias realmente cambian, adaptarse puede parecer una concesión, aunque no lo sea","El calor está ahí pero tiende a quedarse interno — la gente a veces se siente invisible para ti","Las preocupaciones emocionales suelen filtrarse antes de que se hayan comprendido completamente"],
    traits:["Fiable","Meticuloso","Íntegro","Paciente","Reservado"],
    famous:[{name:"Hermione Granger",ctx:"Ficción"},{name:"Warren Buffett",ctx:"Inversor"},{name:"Reina Isabel II",ctx:"Histórico"}],
    similar:["ESTJ","ISFJ","INTJ"]
  },
  ISFJ:{
    name:"El Protector",tagline:"Cuidado silencioso, lealtad feroz",
    p1:"Recuerdas lo que la gente dice porque estabas realmente escuchando. No escuchando y planeando tu respuesta, ni escuchando mientras pensabas en otra cosa. Escuchando. Guardas pequeños detalles sobre las personas que te importan — lo que les gusta, lo que les preocupa, lo que mencionaron querer una vez — y actúas sobre ello después, en silencio, sin señalarlo.",
    p2:"El mundo depende de personas como tú más de lo que reconoce. Apareces. Cumples. Notas cuando algo va mal y haces algo al respecto sin que te lo pidan. El riesgo es que este hábito de dar en silencio puede continuar durante mucho tiempo antes de que alguien piense en preguntarte qué necesitas.",
    desire:"Cuidar a las personas a tu alrededor y saber que no les has fallado",
    fear:"Fallar a alguien que contaba contigo sin decírtelo",
    strengths:["La memoria personal de lo que importa a los demás es casi perturbadora en su precisión","Actúa sobre el cuidado a través de acciones específicas y oportunas, no de palabras","Crea seguridad genuina — la gente se siente sostenida, no gestionada","Cumple compromisos con las personas mucho después de cuando habría sido aceptable detenerse"],
    blindspots:["Raramente pide ayuda, incluso cuando está genuinamente abrumado","Dice que sí a obligaciones mucho más allá del punto de ser justo consigo mismo","Evita el conflicto incluso cuando el conflicto realmente protegería la relación"],
    traits:["Cálido","Observador","Leal","Fiable","Altruista"],
    famous:[{name:"Capitán América",ctx:"Ficción"},{name:"Kate Middleton",ctx:"Figura pública"},{name:"Dr. Watson",ctx:"Ficción"}],
    similar:["ISTJ","INFJ","ESFJ"]
  },
  INFJ:{
    name:"El Consejero",tagline:"Visión rara, resolución tranquila",
    p1:"Cargas una contradicción. Eres profundamente privado y sin embargo entiendes a las personas mejor que casi nadie a tu alrededor. Puedes sentir hacia dónde va una conversación antes de que llegue allí, percibir lo que molesta a alguien antes de que lo haya puesto en palabras, ver el arco más largo de una situación mientras todos los demás reaccionan a la superficie. Guardas esta información con cuidado. No actúas la empatía.",
    p2:"El tipo más raro por una razón. La combinación de intuición e inteligencia emocional que tienes no es un rasgo de personalidad — es una forma de procesar que la mayoría de las personas simplemente no tiene acceso. El costo es que absorbes más que los demás, y recuperarte de esa absorción requiere tiempo a solas que los demás raramente entienden como la necesidad que es.",
    desire:"Vivir en plena alineación con tus valores y dejar algo que realmente importó",
    fear:"Comprometer tu integridad, o darte cuenta demasiado tarde de que los ideales no sobreviven al contacto con el mundo",
    strengths:["Ve patrones en personas y situaciones significativamente antes de cuando se vuelven visibles para otros","Empatía que no pierde claridad analítica — sientes y piensas simultáneamente","Convicción que se mantiene bajo presión sostenida sin volverse frágil","Llega a personas que están cerradas para casi todos los demás"],
    blindspots:["Da demasiado a pocos, y se recupera lentamente cuando esas inversiones no funcionan","El perfeccionismo puede paralizar la finalización indefinidamente","Desaparece completamente cuando está abrumado — los demás leen esto como rechazo"],
    traits:["Perspicaz","Idealista","Empático","Determinado","Enigmático"],
    famous:[{name:"Jesucristo",ctx:"Histórico"},{name:"Aragorn",ctx:"Ficción"},{name:"Nelson Mandela",ctx:"Histórico"}],
    similar:["INTJ","ENFJ","INFP"]
  },
  INTJ:{
    name:"El Arquitecto",tagline:"Mente estratégica, estándar implacable",
    p1:"Ya has visto cinco pasos por delante. La frustración no es que seas más inteligente que todos — es que la mayoría de las personas no están prestando atención a las mismas cosas que tú, y explicar la brecha es genuinamente difícil. Mantienes sistemas complejos en tu cabeza simultáneamente, los evalúas contra un alto estándar, y dices algo cuando se quedan cortos. No porque quieras ser difícil. Porque dejar que esté así se siente mal.",
    p2:"La independencia no es una preferencia — es cómo piensas. El ruido externo no mejora la calidad de lo que produces; la degrada. Has construido hábitos en torno a la soledad no como aislamiento sino como la condición bajo la cual ocurre tu mejor trabajo. Las personas que vale la pena tener en tu vida entenderán esto. Las que no lo hacen lo encontrarán difícil.",
    desire:"Entender cómo funcionan las cosas a un nivel profundo y construir algo que refleje ese entendimiento",
    fear:"Ser incompetente, o dependiente de alguien menos capaz que tú",
    strengths:["Pensamiento estratégico a largo plazo que es genuinamente raro a este nivel","Trabaja sin necesitar validación externa — el trabajo cumple tu estándar o no","Mantiene múltiples capas de complejidad en paralelo sin perder el hilo","Altos estándares personales que producen resultados de los que vale la pena estar orgulloso"],
    blindspots:["La dimensión emocional de las situaciones se subestima sistemáticamente","Puede parecer arrogante o desdeñoso sin darse cuenta","Cuando los demás son irracionales, ocultar el desprecio requiere un esfuerzo visible"],
    traits:["Estratégico","Independiente","Exigente","Decisivo","Visionario"],
    famous:[{name:"Gandalf",ctx:"Ficción"},{name:"Elon Musk",ctx:"Emprendedor"},{name:"Friedrich Nietzsche",ctx:"Filósofo"}],
    similar:["ENTJ","INTP","INFJ"]
  },
  ISTP:{
    name:"El Artesano",tagline:"Cabeza fría, manos hábiles",
    p1:"Cuando algo se rompe o sale mal, eres la persona más tranquila de la sala. No porque no lo tomes en serio, sino porque ya has empezado a diagnosticar. Piensas a través de los problemas interactuando con ellos — desmontando algo, probando una teoría, ajustando según lo que encuentras. Leer sobre ello raramente es tan útil como hacerlo.",
    p2:"Respetas la competencia por encima de casi todo, y puedes detectar su ausencia rápidamente. El rendimiento social — el tipo que sustituye la confianza por la habilidad — se registra como ruido. Mantienes tu propia competencia con el mismo estándar sin sentimentalismo. Cuando dices que algo funciona, funciona.",
    desire:"Entender cómo funcionan las cosas y ser genuinamente útil en la práctica cuando importa",
    fear:"Estar atrapado, obligado a depender de otros, o privado de la autonomía de trabajar a tu manera",
    strengths:["Más claro bajo presión — la crisis agudiza en lugar de sacudir","Diagnóstico y reparación por instinto, no por procedimiento","Alta tolerancia para la ambigüedad genuina — la incertidumbre es un problema a resolver, no una razón para detenerse","Aprende nuevas habilidades rápidamente poniéndose manos a la obra, no observando desde lejos"],
    blindspots:["La disponibilidad emocional requiere un esfuerzo deliberado — las personas cercanas pueden sentir la distancia","Se compromete con personas y planes lentamente — la confianza tarda tiempo en construirse y menos en perderse","Puede retirarse sin aviso y sin explicación"],
    traits:["Tranquilo","Analítico","Práctico","Adaptable","Habilidoso"],
    famous:[{name:"James Bond",ctx:"Ficción"},{name:"Clint Eastwood",ctx:"Actor / Director"},{name:"Arya Stark",ctx:"Ficción"}],
    similar:["ESTP","INTP","ISFP"]
  },
  ISFP:{
    name:"El Artista",tagline:"Presente, libre, profundamente sensible",
    p1:"La gente te confunde con alguien fácil. En cierto modo lo eres, pero tus valores están entre los más firmemente sostenidos de cualquiera. Simplemente no los argumentas — los vives. Cuando una situación viola algo que crees que está mal, te vas. Sin anuncio, sin debate. Te retiras. Las personas que no te entienden a veces viven esto como pasividad. No lo es.",
    p2:"Hay una calidad de atención en ti que la mayoría de las personas no pueden acceder. La música correcta en el momento correcto genuinamente te mueve. Notas el color, la textura, el espacio, la sensación que lleva un entorno. Estás sintonizado con la belleza de una manera que va más allá de la preferencia hacia algo más parecido a la percepción. Esa sintonía también se aplica a las personas — sientes cómo está alguien antes de que hayan dicho una palabra.",
    desire:"Vivir auténticamente, completamente en tus sentidos, según lo que realmente crees",

    {a:'T',b:'F',la:'Racional',lb:'Emocional'},
    {a:'J',b:'P',la:'Juzgador',lb:'Perceptivo'}
  ];
  let spectrumHTML = '';
  const hasScores = scoreKeys.every(k => p.get(k));
  if (hasScores) {
    const bars = scoreKeys.map((k,i) => {
      const val = p.get(k);
      const pct = parseInt(val);
      const letter = val.slice(-1).toUpperCase();
      const dd = dimDefs[i];
      const label = letter === dd.a ? dd.la : dd.lb;
      return `<div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">${label}</span>
          <span style="font-size:12px;color:var(--gold);font-weight:500">${letter} · ${pct}%</span>
        </div>
        <div style="height:4px;background:var(--surface2);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:4px;transition:width 1s cubic-bezier(0.22,1,0.36,1) 0.2s"></div>
        </div>
      </div>`;
    }).join('');
    spectrumHTML = `<div class="section r" data-d="1b" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:36px">

  const desc=`The ${t} personality type (${d.name}): ${d.tagline}. Full description, strengths, blind spots, and famous examples of the ${t} Myers-Briggs type.`;
  let dm=document.querySelector('meta[name="description"]');
  if(!dm){dm=document.createElement('meta');dm.name='description';document.head.appendChild(dm);}

  if(!km){km=document.createElement('meta');km.name='keywords';document.head.appendChild(km);}
  km.content=`${t} personality, ${t} personality type, ${t} Myers-Briggs, ${d.name} personality, MBTI ${t}, ${t} strengths weaknesses, ${t} famous people`;
  document.querySelector('meta[property="og:title"]')?.setAttribute('content',`${t} · ${d.name}, 77 Scenarios`)||

  document.querySelector('meta[property="og:url"]')?.setAttribute('content',`https://77scenarios.com/type?t=${t}`)||
    (()=>{const m=document.createElement('meta');m.setAttribute('property','og:url');m.content=`https://77scenarios.com/type?t=${t}`;document.head.appendChild(m);})();
  document.getElementById('type-schema').textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":`${t} Personality Type: ${d.name}`,"description":desc,"url":`https://77scenarios.com/type.html?t=${t}`,"publisher":{"@type":"Organization","name":"77 Scenarios","url":"https://77scenarios.com"}});

  const code=t.split('').map((l,i)=>(i%2===1)?`<span class="hi">${l}</span>`:l).join('');
  const pills=t.split('').map((l,i)=>{
    const dims=['Energía','Percepción','Juicio','Estilo de vida'];
    return `<a href="/es/letter?l=${l}" class="letter-pill">${l} · ${dims[i]}</a>`;
  }).join('');
  const simCards=d.similar.map(c=>`<a href="/es/type?t=${c}" class="similar-card"><span class="sim-code">${c}</span><span class="sim-name">${typeNames[c]||''}</span></a>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="r" data-d="1"><div class="type-code">${code}</div><div class="type-name">${d.name}</div><div class="type-tagline">${d.tagline}</div><div class="letter-pills">${pills}</div></div>
    ${spectrumHTML}
    <div class="section r" data-d="2"><div class="section-label">Visión general</div><p class="body-text">${d.p1}</p><p class="body-text">${d.p2}</p></div>
    <div class="fd-row section r" data-d="3">
      <div class="fd-box"><div class="fd-label">Deseo central</div><div class="fd-text">${d.desire}</div></div>
      <div class="fd-box"><div class="fd-label">Miedo central</div><div class="fd-text">${d.fear}</div></div>
    </div>
    <div class="section r" data-d="4"><div class="section-label">Rasgos</div><div class="traits-row">${d.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div></div>
    <div class="two-col section r" data-d="5">
      <div class="box"><div class="box-title">Fortalezas</div><ul>${d.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>
      <div class="box"><div class="box-title">Puntos ciegos</div><ul>${d.blindspots.map(s=>`<li>${s}</li>`).join('')}</ul></div>
    </div>
    <div class="section r" data-d="6"><div class="section-label">Ejemplos notables</div><div class="famous-grid">${d.famous.map(f=>`<div class="famous-card"><div class="famous-name">${f.name}</div><div class="famous-ctx">${f.ctx}</div></div>`).join('')}</div></div>
    <div class="section r" data-d="7"><div class="section-label">Tipos similares</div><div class="similar-row">${simCards}</div></div>
    <div class="section r" data-d="7b" style="margin-top:0">
      <div class="section-label">Funciones cognitivas</div>
      <p class="body-text" style="margin-bottom:24px;font-size:14px;">Todo tipo funciona con cuatro funciones mentales en un orden definido. La primera es casi sin esfuerzo. La cuarta es tu punto débil.</p>
      <div style="display:flex;flex-direction:column;gap:12px;" id="fn-stack-inline"></div>
      <a href="/es/functions?t=${t}" style="display:inline-block;margin-top:20px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);text-decoration:none;">Ver el análisis completo de tus funciones &#8594;</a>
    </div>
    <div class="sep r" data-d="8"></div>
    <div class="cta-block r" data-d="9">
      <div class="cta-text">¿No estás seguro de ser <em>${t}</em>?<br>Deja que los escenarios decidan.</div>
      <a href="/es/" class="btn-gold">Hacer el test →</a>
    </div>`;


  // Build inline function stack
  const stackEl = document.getElementById('fn-stack-inline');
  if(stackEl && typeStacks[t]){
    typeStacks[t].forEach((fn,i)=>{
      const m=fnMeta[fn];
      const isFirst=i===0;
      stackEl.innerHTML+=`<div style="display:flex;align-items:center;gap:16px;padding:16px 20px;background:${isFirst?'rgba(201,168,76,0.06)':'var(--surface)'};border:1px solid ${isFirst?'rgba(201,168,76,0.25)':'var(--border)'};border-radius:10px;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:${isFirst?'var(--gold)':'var(--cream)'};min-width:32px;text-align:center;">${fn}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:${isFirst?'var(--gold)':'var(--muted)'};margin-bottom:3px;">${posLabels[i]}</div>
          <div style="font-size:14px;color:var(--cream);font-weight:400;">${m.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${m.tagline}</div>
        </div>
      </div>`;
    });
  }

  // Observe newly injected elements
  document.querySelectorAll('.r').forEach(el=>obs.observe(el));
}

// Transitions
const ov=document.getElementById('t-overlay');
function fadeIn(){ov.style.opacity='1';ov.animate([{opacity:1},{opacity:0}],{duration:550,delay:60,easing:'cubic-bezier(0.22,1,0.36,1)',fill:'forwards'});}
fadeIn();
window.addEventListener('pageshow',e=>{if(e.persisted)fadeIn();});
document.addEventListener('click',e=>{
  const a=e.target.closest('a[href]');
  if(!a)return;
  const h=a.getAttribute('href');
  if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('javascript')||h.startsWith('mailto'))return;
  e.preventDefault();
  ov.animate([{opacity:0},{opacity:1}],{duration:320,easing:'cubic-bezier(0.76,0,0.24,1)',fill:'forwards'}).finished.then(()=>{window.location.href=h;});
});

// Reveal observer — defined before render() so obs.observe() works inside render()
const obs=new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    if(!en.isIntersecting)return;
    const delay=parseFloat(en.target.dataset.d||0)*70;
    setTimeout(()=>en.target.classList.add('in'),delay);
    obs.unobserve(en.target);
  });
},{threshold:0.155});

render();
</script>
